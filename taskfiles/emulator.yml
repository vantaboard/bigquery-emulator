# Build, run, and hot-reload the BigQuery emulator. Mirrors the
# cloud-spanner-emulator gateway_main / emulator_main split: `build`
# compiles the Go gateway, `build-engine-bazel` compiles the C++ engine
# via Bazel (the canonical and only engine build path), and `build-all`
# materializes both halves into ./bin so the spawn-engine code path has
# something to exec.
#
# Usage: task emulator:run (gateway alone, engine subprocess disabled),
#        task emulator:run-full (both halves), task emulator:watch (air).
version: "3"

vars:
  EMULATOR_HTTP_PORT:
    sh: echo "${EMULATOR_HTTP_PORT:-9050}"
  EMULATOR_GRPC_PORT:
    sh: echo "${EMULATOR_GRPC_PORT:-9060}"

tasks:
  default:
    desc: Build and run the gateway (engine subprocess disabled in gateway-only mode)
    cmds:
      - task: run

  build:
    aliases: [build-gateway, gateway-build, gateway:build]
    desc: Build the Go gateway (gateway_main) into ./bin with ldflag-stamped version metadata
    # Stamps the same three `-X main.<sym>=…` ldflags goreleaser sets
    # (see `.goreleaser.yml`'s `builds[].ldflags` block) so local
    # `./bin/gateway_main --version` reports the working-tree HEAD's
    # `git describe`, short sha, and a UTC timestamp instead of the
    # `dev/none/unknown` source defaults. Mirrors goreleaser's contract
    # so operators see the same `--version` shape whether they built
    # locally or pulled a release archive.
    vars:
      GATEWAY_VERSION:
        sh: |
          if [ -n "${GATEWAY_VERSION:-}" ]; then
            echo "$GATEWAY_VERSION"
          else
            git describe --tags --always --dirty 2>/dev/null || echo dev
          fi
      GATEWAY_COMMIT:
        sh: |
          if [ -n "${GATEWAY_COMMIT:-}" ]; then
            echo "$GATEWAY_COMMIT"
          else
            git rev-parse --short HEAD 2>/dev/null || echo none
          fi
      GATEWAY_DATE:
        sh: |
          if [ -n "${GATEWAY_DATE:-}" ]; then
            echo "$GATEWAY_DATE"
          else
            date -u +%Y-%m-%dT%H:%M:%SZ
          fi
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        mkdir -p bin
        go build \
          -ldflags "-s -w \
            -X main.version={{.GATEWAY_VERSION}} \
            -X main.commit={{.GATEWAY_COMMIT}} \
            -X main.date={{.GATEWAY_DATE}}" \
          -o ./bin/gateway_main ./binaries/gateway_main

  # build-engine-bazel is the canonical engine build: it links the full
  # GoogleSQL + DuckDB + gRPC stack, so the resulting binary actually
  # serves `Query.DryRun` / `Query.ExecuteQuery` end to end.
  #
  # After building, we stage both the binary and `libduckdb.so` into
  # ./bin/ side-by-side. The cc_binary sets `-Wl,-rpath,$ORIGIN`, so
  # `./bin/emulator_main` finds its sibling `./bin/libduckdb.so` without
  # `LD_LIBRARY_PATH`. The integration tests (`go test -tags=integration
  # ./gateway/e2e/...`) discover the binary via `./bin/emulator_main`.
  #
  # GoogleSQL build-mode selection (the CI/Docker/release track of
  # the `googlesql-prebuilt` rollout flips the default to prebuilt,
  # see `docs/dev/googlesql-prebuilt/README.md`):
  #
  #   GOOGLESQL_SOURCE=prebuilt   DEFAULT. Consume the published prebuilt
  #                               artifact at
  #                               .cache/googlesql-prebuilt/. The
  #                               cache must be populated first by
  #                               `task googlesql:fetch-prebuilt`,
  #                               `task googlesql:stage-bazel`, or
  #                               `task googlesql:stage-fixture`. The
  #                               pre-flight gate refuses to start
  #                               Bazel if the cache is empty / wrong-
  #                               named, with a one-liner pointing at
  #                               the staging tasks.
  #   GOOGLESQL_SOURCE=local      Explicit opt-in. Build GoogleSQL from
  #                               the sibling `../googlesql/` checkout
  #                               via the `local_path_override` in
  #                               MODULE.bazel. Use for upstream
  #                               GoogleSQL upgrades and producer
  #                               debugging; NOT a silent fallback.
  #
  # The variable maps onto an explicit `--config=googlesql-{source,prebuilt}`
  # group from `.bazelrc`. Selection is explicit: there is NO silent
  # fallback when the cache is missing — the build refuses with an
  # actionable message instead.
  #
  # Process hygiene (see .cursor/rules/bazel-process-hygiene.mdc):
  #   - Throttled by `task bazel:*` shared defaults: jobs = nproc-2,
  #     mem = ~75% of MemTotal. Override with BAZEL_JOBS=N
  #     BAZEL_MEM_MB=N task emulator:build-engine:bazel when you
  #     want a different shape.
  #   - Pinned to system clang-18; the `mise` clang-22 lacks libstdc++ hdrs.
  #   - `trap bazel shutdown` releases the daemon on signal / failure.
  build-engine-bazel:
    aliases: [build-engine, build-engine:bazel]
    desc: Build the C++ engine via Bazel (full GoogleSQL + DuckDB) and stage into ./bin
    vars:
      BAZEL_JOBS:
        sh: |
          if [ -n "${BAZEL_JOBS:-}" ]; then
            echo "$BAZEL_JOBS"
          else
            n=$(nproc 2>/dev/null || echo 4)
            if [ "$n" -gt 4 ]; then echo $((n - 2)); else echo 2; fi
          fi
      BAZEL_MEM_MB:
        sh: |
          if [ -n "${BAZEL_MEM_MB:-}" ]; then
            echo "$BAZEL_MEM_MB"
          elif [ -r /proc/meminfo ]; then
            awk '/^MemTotal:/ { mb = int($2 * 3 / 4 / 1024); if (mb < 4096) mb = 4096; print mb }' /proc/meminfo
          else
            echo 8192
          fi
      BAZEL_CC:
        sh: echo "${BAZEL_CC:-/usr/bin/clang}"
      BAZEL_CXX:
        sh: echo "${BAZEL_CXX:-/usr/bin/clang++}"
      # GoogleSQL mode selection: explicit, no silent fallback. Map
      # the user-friendly `local|prebuilt` value into the bazel
      # `--config=googlesql-{source,prebuilt}` group from `.bazelrc`.
      # Anything else is rejected up-front to avoid a typo making
      # the build silently fall back to source.
      #
      # NOTE: Task evaluates `vars:` blocks lexically and exports each
      # finished value into the env that subsequent `sh:` blocks see.
      # That means `_GOOGLESQL_ARTIFACT_ID` below cannot read
      # `$GOOGLESQL_SOURCE` directly — it would see the canonicalised
      # value ("googlesql-prebuilt") instead of the user-facing form
      # ("prebuilt"). The artifact-id block therefore re-derives the
      # user-facing value from `_GOOGLESQL_SOURCE_RAW` (which captures
      # the raw env var BEFORE this canonicaliser runs). The cmds-side
      # `task: googlesql:preflight` step accepts both forms, so we do
      # not need to thread the raw value through to it.
      _GOOGLESQL_SOURCE_RAW:
        sh: echo "${GOOGLESQL_SOURCE:-prebuilt}"
      GOOGLESQL_SOURCE:
        sh: |
          v="${GOOGLESQL_SOURCE:-prebuilt}"
          case "$v" in
            local|source) echo "googlesql-source" ;;
            prebuilt)     echo "googlesql-prebuilt" ;;
            *)
              echo "GOOGLESQL_SOURCE must be 'local'/'source' or 'prebuilt'; got '$v'" >&2
              exit 2
              ;;
          esac
      # Pre-flight gate for prebuilt mode is now a shared
      # `task googlesql:preflight` step (the first entry in `cmds:`
      # below), so the cache-presence + validator gates live in one
      # place and are also reused by `task bazel:build/test/coverage`.
      # Source mode is a no-op in the preflight (the local_path_override
      # resolves at bazel time).
      # Artifact identity for log surfacing. In prebuilt mode lift
      # artifact_version + googlesql commit out of the cache's
      # manifest so the build banner ties the binary back to a concrete
      # published artifact. In source mode record the sibling checkout's
      # commit instead. Failure-tolerant by design: missing fields fall
      # back to "?" rather than blocking the build (the pre-flight check
      # above already enforces the must-haves for prebuilt mode).
      _GOOGLESQL_ARTIFACT_ID:
        sh: |
          v="{{._GOOGLESQL_SOURCE_RAW}}"
          root="$(git rev-parse --show-toplevel)"
          case "$v" in
            local|source)
              sha="$(git -C "$root/../googlesql" rev-parse --short=12 HEAD 2>/dev/null || echo unknown)"
              echo "source googlesql=$sha"
              ;;
            *)
              mf="$root/.cache/googlesql-prebuilt/googlesql_prebuilt_linux_amd64/manifest.json"
              if [ -f "$mf" ]; then
                ver="$(python3 -c "import json; print(json.load(open('$mf')).get('artifact_version','?'))" 2>/dev/null || echo "?")"
                gs="$(python3 -c "import json; print(json.load(open('$mf')).get('googlesql',{}).get('commit','?')[:12])" 2>/dev/null || echo "?")"
                echo "prebuilt artifact_version=$ver googlesql=$gs"
              else
                echo "prebuilt manifest=missing"
              fi
              ;;
          esac
      # Stamp values for `:version_cc` (see binaries/emulator_main/
      # BUILD.bazel). Matches the gateway-side ldflag inputs in
      # `task emulator:build` so both halves of the emulator report the
      # same `--version` shape when built from the same tree.
      # CI workflows can override by exporting EMULATOR_VERSION /
      # EMULATOR_COMMIT / EMULATOR_BUILD_DATE before invoking the task
      # (`.github/workflows/release.yml` threads `github.ref_name`
      # through this way).
      EMULATOR_VERSION:
        sh: |
          if [ -n "${EMULATOR_VERSION:-}" ]; then
            echo "$EMULATOR_VERSION"
          else
            git describe --tags --always --dirty 2>/dev/null || echo dev
          fi
      EMULATOR_COMMIT:
        sh: |
          if [ -n "${EMULATOR_COMMIT:-}" ]; then
            echo "$EMULATOR_COMMIT"
          else
            git rev-parse --short HEAD 2>/dev/null || echo none
          fi
      EMULATOR_BUILD_DATE:
        sh: |
          if [ -n "${EMULATOR_BUILD_DATE:-}" ]; then
            echo "$EMULATOR_BUILD_DATE"
          else
            date -u +%Y-%m-%dT%H:%M:%SZ
          fi
    cmds:
      # Shared cache-presence + safety-gate validator. Runs before
      # bazel so a missing / corrupt prebuilt fails fast with an
      # actionable message. Source mode evaluates this as a no-op.
      # `GOOGLESQL_SOURCE` is canonicalised in `vars:` above, and
      # `googlesql:preflight` accepts both the user-facing
      # (`prebuilt`/`local`/`source`) and canonical (`googlesql-prebuilt`
      # / `googlesql-source`) forms. Leading colon is the absolute
      # task path; without it, Task scopes the reference to the
      # caller's namespace (`emulator:googlesql:preflight`).
      - task: :googlesql:preflight
      # Delegated to bash because Task's embedded mvdan/sh shell does
      # not accept INT/TERM in `trap`. Wrapping ensures the daemon is
      # released even when Cursor cancels the build mid-flight.
      #
      # The three `--action_env=EMULATOR_*` flags flow through to the
      # `:version_cc` genrule's environment (see BUILD.bazel) so the
      # generated `version.cc` reports the working-tree HEAD. Changing
      # these values only invalidates the version genrule's action -
      # the 8k GoogleSQL TUs stay cached.
      #
      # `--config={{.GOOGLESQL_SOURCE}}` resolves to either
      # `--config=googlesql-source` (no-op, source default) or
      # `--config=googlesql-prebuilt` (`--override_module=googlesql=
      # .cache/googlesql-prebuilt/googlesql_prebuilt_linux_amd64`,
      # workspace-root-relative).
      - |
        bash -c '
          set -eo pipefail
          root="$(git rev-parse --show-toplevel)"
          cd "$root"
          trap "bazel shutdown 2>/dev/null || true" EXIT INT TERM
          echo "[build-engine-bazel] mode: --config={{.GOOGLESQL_SOURCE}} ({{._GOOGLESQL_ARTIFACT_ID}})"
          CC={{.BAZEL_CC}} CXX={{.BAZEL_CXX}} PATH=/usr/bin:$PATH \
          EMULATOR_VERSION={{.EMULATOR_VERSION}} \
          EMULATOR_COMMIT={{.EMULATOR_COMMIT}} \
          EMULATOR_BUILD_DATE={{.EMULATOR_BUILD_DATE}} \
            bazel build \
              --config={{.GOOGLESQL_SOURCE}} \
              --jobs={{.BAZEL_JOBS}} \
              --local_resources=cpu={{.BAZEL_JOBS}} \
              --local_resources=memory={{.BAZEL_MEM_MB}} \
              --action_env=CC={{.BAZEL_CC}} \
              --action_env=CXX={{.BAZEL_CXX}} \
              --action_env=EMULATOR_VERSION \
              --action_env=EMULATOR_COMMIT \
              --action_env=EMULATOR_BUILD_DATE \
              //binaries/emulator_main:emulator_main
          mkdir -p bin
          cp -f bazel-bin/binaries/emulator_main/emulator_main ./bin/emulator_main
          chmod +w ./bin/emulator_main
          # libduckdb.so is a dynamic dep; the cc_import in
          # //third_party/duckdb places it in the runfiles tree. Copy
          # the resolved .so next to the binary so `-Wl,-rpath,$ORIGIN`
          # can find it when run from ./bin/.
          duckdb_so="$(find -L bazel-bin/binaries/emulator_main/emulator_main.runfiles -name libduckdb.so -print -quit)"
          if [ -z "$duckdb_so" ]; then
            echo "build-engine-bazel: libduckdb.so not found in runfiles" >&2
            exit 1
          fi
          cp -L "$duckdb_so" ./bin/libduckdb.so
        '

  build-all:
    desc: Build both halves (gateway + engine) and stage the engine in ./bin
    # build-engine-bazel already stages bin/emulator_main + bin/libduckdb.so
    # with `-Wl,-rpath,$ORIGIN`, so no extra cp step is needed here.
    deps: [build, build-engine-bazel]

  run:
    aliases: [start]
    desc: Build and run the gateway with the engine subprocess disabled (gateway-only stub)
    deps: [build]
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        ./bin/gateway_main \
          --engine_binary= \
          --http_port={{.EMULATOR_HTTP_PORT}} \
          --log_requests

  run-full:
    desc: Build both halves and run the gateway with the engine subprocess attached
    deps: [build-all]
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        ./bin/gateway_main \
          --engine_binary=./bin/emulator_main \
          --http_port={{.EMULATOR_HTTP_PORT}} \
          --grpc_port={{.EMULATOR_GRPC_PORT}} \
          --log_requests

  # run-seeded boots the full gateway with a YAML seed file applied
  # before the REST listener accepts traffic. The fixture is the
  # canonical "people" example documented in docs/SEEDING.md so
  # operators can hit /bigquery/v2/projects/dev/datasets/ds/tables/people/data
  # immediately after the task settles.
  #
  # Override the file with SEED_FILE=path/to/your.yaml when calling
  # the task; otherwise the helper writes a temporary fixture to
  # tmp/seed-quickstart.yaml so this is a one-command flow for a
  # fresh checkout.
  run-seeded:
    desc: Build both halves and run the gateway with a YAML seed file pre-loaded
    deps: [build-all]
    vars:
      SEED_FILE:
        sh: echo "${SEED_FILE:-tmp/seed-quickstart.yaml}"
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ "{{.SEED_FILE}}" = "tmp/seed-quickstart.yaml" ] && [ ! -f tmp/seed-quickstart.yaml ]; then
          mkdir -p tmp
          cat > tmp/seed-quickstart.yaml <<'YAML'
        project_id: dev
        datasets:
          - id: ds
            tables:
              - id: people
                schema:
                  - {name: id,   type: INT64,  mode: REQUIRED}
                  - {name: name, type: STRING}
                rows:
                  - {id: 1, name: ada}
                  - {id: 2, name: bob}
        YAML
        fi
        ./bin/gateway_main \
          --engine-binary=./bin/emulator_main \
          --http-port={{.EMULATOR_HTTP_PORT}} \
          --grpc-port={{.EMULATOR_GRPC_PORT}} \
          --log-requests \
          --seed-data-file={{.SEED_FILE}}

  watch:
    aliases: [dev]
    desc: Hot-reload the gateway via air (see .air.toml). Engine subprocess stays disabled.
    cmds:
      - air
