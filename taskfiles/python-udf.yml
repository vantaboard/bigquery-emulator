# Python UDF environment provisioning (operator-only; never mid-query).
#
# Usage:
#   BIGQUERY_EMULATOR_PYTHON_ALLOW_PIP=1 task python-udf:provision -- lxml
#   BIGQUERY_EMULATOR_DATA_DIR=/var/lib/bq task python-udf:provision
#     (no args: install union of packages from __bqemu_routines)
version: "3"

tasks:
  provision:
    desc: |
      Create or update $BIGQUERY_EMULATOR_DATA_DIR/python-udf-env and pip-install
      packages. With no args, installs the union from registered Python routines
      in catalog.duckdb (__bqemu_routines). Requires BIGQUERY_EMULATOR_PYTHON_ALLOW_PIP=1.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        chmod +x scripts/provision_python_udf_env.sh
        # shellcheck disable=SC2068
        ./scripts/provision_python_udf_env.sh $@
