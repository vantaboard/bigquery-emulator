# Linters: fast pre-commit gate (gofmt + go vet + first-party C++
# format/source rules), full golangci-lint pass driven by
# .golangci.yml, shellcheck over docker/*.sh, and slower compile-aware
# C++ analysis (clang-tidy, cppcheck) for opt-in lanes.
#
# Usage: task lint:run             (pre-commit gate: Go + C++ format/source/cppcheck + dispositions;
#                                   runs every lane even when one fails, then summarizes)
#        task lint:fix             (apply gofmt + golangci-lint --fix + clang-format;
#                                   runs every fix lane even when one fails, then summarizes)
#        task lint:check           (deep pass: golangci-lint + every C++ lane;
#                                   runs every lane even when one fails, then summarizes)
#        task lint:go / lint:go-fix
#                                  (full golangci-lint pass)
#        task lint:shell           (shellcheck on docker/*.sh)
#        task lint:cpp:format      (clang-format dry-run on first-party .cc/.h)
#        task lint:cpp:format-fix  (apply clang-format -i)
#        task lint:cpp:source      (file-length / banned-logging / status checks)
#        task lint:cpp:tidy        (clang-tidy, compile-aware, slow lane)
#        task lint:cpp:tidy-parallel (per-file clang-tidy with JOBS parallelism)
#        task lint:cpp:tidy-report (parse lint-cpp-tidy.log → CSV + triage doc)
#        task lint:cpp:cppcheck    (cppcheck, slow secondary-analysis lane)
#
# The fast gate stays snappy so the auto-commit pre-commit hook
# (.cursor/rules/pre-commit-lint.mdc) does not become a tax. The
# compile-aware lane (`task lint:cpp:tidy`) stays opt-in locally and
# in a separate CI job; `task lint:cpp:cppcheck` is part of
# `task lint:run` and mirrored by `taskfiles/ci.yml` / ci-cpp-analysis.
#
# `task lint:check` is the deep local pass: golangci-lint for Go plus
# every first-party C++ lane (clang-format dry-run, source-only checker,
# clang-tidy, cppcheck). It needs `compile_commands.json` at the repo
# root for the clang-tidy lane — run `task lint:cpp:compile-commands`
# first if it is missing.
version: "3"

vars:
  # Shared by `lint:cpp:test` and `lint:cpp:compile-commands` (same
  # expression as `build-engine.yml` coverage enumerate step and
  # `task lint:cpp:test`).
  CC_TEST_BAZEL_QUERY: >-
    kind(cc_test, //backend/... + //binaries/... + //frontend/... + //tools/googlesql-prebuilt/smoke/...)
  # Map GOOGLESQL_SOURCE to the `--config=` group Bazel needs for
  # `bazel query` / analysis. CI prebuilt lanes have no ../googlesql
  # sibling; query must use googlesql-prebuilt or module resolution fails.
  GOOGLESQL_BAZEL_CONFIG:
    sh: |
      case "${GOOGLESQL_SOURCE:-prebuilt}" in
        prebuilt) echo googlesql-prebuilt ;;
        local|source) echo googlesql-source ;;
        *)
          echo "lint: GOOGLESQL_SOURCE must be 'local'/'source' or 'prebuilt'; got '${GOOGLESQL_SOURCE:-}'" >&2
          exit 2
          ;;
      esac

tasks:
  default:
    desc: Run the fast pre-commit gate (same as lint:run)
    cmds:
      - task: run

  run:
    desc: Pre-commit gate (gofmt + go vet + first-party C++ format/source/cppcheck + dispositions). Used by the auto-commit workflow.
    # The Go half scans every .go file under the worktree, so vendored
    # upstream trees in third_party/ would otherwise leak findings here
    # even though `.golangci.yml` already excludes them from the slow
    # pass. Use a find-based pruning list to skip the same paths in the
    # fast gate so `task lint:run` agrees with `task lint:go`. The C++
    # half delegates to `task lint:cpp:format` / `task lint:cpp:source`
    # / `task lint:cpp:cppcheck`, which all consume the canonical
    # first-party file list from `tools/lint/cpp` so the same exclude
    # rules apply.
    #
    # Every lane runs to completion even when an earlier lane fails; a
    # summary of failed lanes is printed at the end so one invocation
    # surfaces Go and C++ findings together.
    cmds:
      - |
        set +e
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        failures=0
        failed_lanes=()

        run_lane() {
          local lane="$1"
          shift
          echo ""
          echo "========== lint:run: ${lane} =========="
          "$@"
          local rc=$?
          if [ "$rc" -ne 0 ]; then
            failures=$((failures + 1))
            failed_lanes+=("$lane")
            echo "========== lint:run: ${lane}: FAILED (exit ${rc}) ==========" >&2
          else
            echo "========== lint:run: ${lane}: OK =========="
          fi
        }

        run_lane go-gofmt bash -c '
          set -eo pipefail
          gofmt_targets=$(find . \
            \( -path "./third_party" -o -path "./gen" -o -path "./vendor" -o -path "./node_modules" -o -path "./bazel-*" \) -prune -o \
            -type f -name "*.go" -print)
          if [ -z "$gofmt_targets" ]; then
            echo "lint:run: no .go files outside excluded paths" >&2
            exit 0
          fi
          # shellcheck disable=SC2086  # word-split is intentional for the target list
          if [ -n "$(printf "%s\n" $gofmt_targets | xargs gofmt -s -l)" ]; then
            echo "gofmt would reformat:" >&2
            printf "%s\n" $gofmt_targets | xargs gofmt -s -l >&2
            exit 1
          fi
        '

        run_lane go-vet go vet ./...
        run_lane cpp:format task -s lint:cpp:format
        run_lane cpp:source task -s lint:cpp:source
        run_lane cpp:cppcheck task -s lint:cpp:cppcheck
        run_lane dispositions task -s lint:dispositions

        echo ""
        if [ "$failures" -gt 0 ]; then
          echo "lint:run: ${failures} lane(s) failed:" >&2
          printf '  - %s\n' "${failed_lanes[@]}" >&2
          exit 1
        fi
        echo "lint:run: all lanes passed"

  fix:
    desc: Apply auto-fixable lints (gofmt -s -w, golangci-lint --fix, go vet, clang-format -i)
    # Match `lint:run`'s exclusions so we never reformat vendored
    # upstream trees in third_party/ (or generated code under gen/).
    # Step order:
    #   1. Inline gofmt + go vet — cheap baseline before the slower
    #      golangci-lint pass starts.
    #   2. `task: go-fix`        — `golangci-lint run --fix ./...`,
    #      applies formatters + every auto-fixable linter declared in
    #      `.golangci.yml`.
    #   3. `task: cpp:format-fix` — clang-format -i on the first-party
    #      C++ file list.
    #
    # Like `lint:run`, every fix lane runs even when an earlier lane
    # fails; a summary of failed lanes is printed at the end.
    cmds:
      - |
        set +e
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        failures=0
        failed_lanes=()

        run_lane() {
          local lane="$1"
          shift
          echo ""
          echo "========== lint:fix: ${lane} =========="
          "$@"
          local rc=$?
          if [ "$rc" -ne 0 ]; then
            failures=$((failures + 1))
            failed_lanes+=("$lane")
            echo "========== lint:fix: ${lane}: FAILED (exit ${rc}) ==========" >&2
          else
            echo "========== lint:fix: ${lane}: OK =========="
          fi
        }

        run_lane go-gofmt bash -c '
          set -eo pipefail
          gofmt_targets=$(find . \
            \( -path "./third_party" -o -path "./gen" -o -path "./vendor" -o -path "./node_modules" -o -path "./bazel-*" \) -prune -o \
            -type f -name "*.go" -print)
          if [ -n "$gofmt_targets" ]; then
            # shellcheck disable=SC2086  # word-split is intentional for the target list
            printf "%s\n" $gofmt_targets | xargs gofmt -s -w
          fi
        '

        run_lane go-vet go vet ./...
        run_lane go-fix task -s lint:go-fix
        run_lane cpp:format-fix task -s lint:cpp:format-fix

        echo ""
        if [ "$failures" -gt 0 ]; then
          echo "lint:fix: ${failures} lane(s) failed:" >&2
          printf '  - %s\n' "${failed_lanes[@]}" >&2
          exit 1
        fi
        echo "lint:fix: all lanes passed"

  check:
    desc: |
      Deep lint pass for Go and C++ (slow). Runs `golangci-lint` for Go
      and every first-party C++ lane: clang-format dry-run, the
      source-only checker, clang-tidy, and cppcheck. Distinct from
      `task lint:run` (the fast pre-commit gate); use `check` when you
      want the same coverage CI's slow lane provides.
    # Order is cheap-to-expensive:
    #   1. `lint:go`          — golangci-lint (Go formatters + vet +
    #                            every linter declared in .golangci.yml).
    #   2. `lint:cpp:format`  — clang-format dry-run on the first-party
    #                            file list (sub-second).
    #   3. `lint:cpp:source`  — Go-based source-only checker (file
    #                            length, banned logging, status
    #                            anti-patterns).
    #   4. `lint:cpp:tidy`    — clang-tidy (compile-aware; requires
    #                            `compile_commands.json` at the repo
    #                            root — run
    #                            `task lint:cpp:compile-commands`
    #                            first if missing).
    #   5. `lint:cpp:cppcheck`— secondary-analysis lane.
    #   6. `lint:dispositions`— disposition parity gate.
    #
    # Every lane runs to completion even when an earlier lane fails; a
    # summary of failed lanes is printed at the end so one invocation
    # surfaces Go and C++ findings together. Each sub-task already
    # errors with a helpful "install X" / "generate compile DB first"
    # message when its prerequisite is missing.
    cmds:
      - |
        set +e
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        failures=0
        failed_lanes=()

        run_lane() {
          local lane="$1"
          shift
          echo ""
          echo "========== lint:check: ${lane} =========="
          "$@"
          local rc=$?
          if [ "$rc" -ne 0 ]; then
            failures=$((failures + 1))
            failed_lanes+=("$lane")
            echo "========== lint:check: ${lane}: FAILED (exit ${rc}) ==========" >&2
          else
            echo "========== lint:check: ${lane}: OK =========="
          fi
        }

        run_lane go task -s lint:go
        run_lane cpp:format task -s lint:cpp:format
        run_lane cpp:source task -s lint:cpp:source
        run_lane cpp:tidy task -s lint:cpp:tidy
        run_lane cpp:cppcheck task -s lint:cpp:cppcheck
        run_lane dispositions task -s lint:dispositions

        echo ""
        if [ "$failures" -gt 0 ]; then
          echo "lint:check: ${failures} lane(s) failed:" >&2
          printf '  - %s\n' "${failed_lanes[@]}" >&2
          exit 1
        fi
        echo "lint:check: all lanes passed"

  go:
    desc: Run golangci-lint with the project's .golangci.yml (slow, full check)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        golangci-lint run ./...

  go-fix:
    desc: Run golangci-lint --fix to apply formatters and auto-fixable linters
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        golangci-lint run --fix ./...

  dispositions:
    desc: |
      Verify backend/engine/duckdb/transpiler/node_dispositions.yaml
      and backend/engine/duckdb/transpiler/SHAPE_TRACKER.md agree
      row-for-row. The YAML is the machine-readable source of truth
      the engine consumes; the markdown is its human-readable
      mirror. A drift between them means the engine and the docs
      disagree on what route a given ResolvedAST node kind takes.
      The companion lint test for this gate lives at
      tools/check_disposition_parity/parity_test.go
      (TestRunDetectsDriftedFixture). Exits 0 on parity, 1 on
      drift, 2 on usage error.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        go run ./tools/check_disposition_parity

  shell:
    desc: ShellCheck shell scripts under docker/
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        shopt -s nullglob
        scripts=(docker/*.sh)
        if [ ${#scripts[@]} -eq 0 ]; then
          echo "lint:shell: no shell scripts found under docker/" >&2
          exit 0
        fi
        shellcheck "${scripts[@]}"

  # ---------------------------------------------------------------
  # C++ lint lanes (.cc / .h)
  # ---------------------------------------------------------------
  #
  # Every C++ task consumes the canonical first-party source list from
  # `tools/lint/cpp list` so generated, vendored, and cached trees can
  # never leak into a lint run. The list logic is pinned by
  # `tools/lint/cpp/sources_test.go`'s `TestFilterFirstParty` table —
  # treat that test as the single source of truth for "is this file
  # ours?".
  #
  # Tooling expectations:
  #   - clang-format / clang-tidy / cppcheck come from apt
  #     (`sudo apt install clang-format clang-tidy cppcheck` on
  #     Ubuntu — see README.md). They are NOT pinned via mise because
  #     mise has no first-class package for them.
  #   - The Go-based source-only checker ships in this repo at
  #     `tools/lint/cpp/`; running it via `go run` is fast enough for
  #     the pre-commit gate (~250 ms cold; faster after caching).

  cpp:format:
    desc: clang-format dry-run on first-party C++ files (read-only check)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if ! command -v clang-format >/dev/null 2>&1; then
          echo 'lint:cpp:format: clang-format not found on PATH' >&2
          echo '  Fix: sudo apt install clang-format (Ubuntu/Debian)' >&2
          echo '       brew install clang-format (macOS)' >&2
          exit 1
        fi
        files=$(go run ./tools/lint/cpp list)
        if [ -z "$files" ]; then
          echo 'lint:cpp:format: no first-party C++ files found' >&2
          exit 0
        fi
        # `--Werror` upgrades the formatter's warnings to non-zero exit
        # so CI can tell "would reformat" apart from a real failure.
        # shellcheck disable=SC2086  # intentional word-split for the file list
        clang-format --dry-run --Werror $files

  cpp:format-fix:
    desc: clang-format -i on first-party C++ files (writes formatting fixes in place)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if ! command -v clang-format >/dev/null 2>&1; then
          echo 'lint:cpp:format-fix: clang-format not found on PATH' >&2
          exit 1
        fi
        files=$(go run ./tools/lint/cpp list)
        if [ -z "$files" ]; then
          echo 'lint:cpp:format-fix: no first-party C++ files found' >&2
          exit 0
        fi
        # shellcheck disable=SC2086  # intentional word-split for the file list
        clang-format -i $files

  cpp:source:
    desc: Source-only C++ checks (file length, banned logging, status anti-patterns)
    # `tools/lint/cpp` enforces three classes of rule that clang-format
    # and clang-tidy do not cover well: a 500-line whole-file cap,
    # banned production logging APIs (`std::cout`, `std::cerr`, `printf`, …),
    # and obvious `absl::Status` / `absl::StatusOr<T>` misuse. See
    # `tools/lint/cpp/README.md`.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        go run ./tools/lint/cpp check

  cpp:tidy:
    desc: |
      clang-tidy on first-party C++ files (compile-aware, slow lane).
      Requires a `compile_commands.json` at the repo root; see the
      `lint:cpp:compile-commands` task below for the generator. Runs
      outside `task lint:run` because the cold compile-database build
      can take minutes.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if ! command -v clang-tidy >/dev/null 2>&1; then
          echo 'lint:cpp:tidy: clang-tidy not found on PATH' >&2
          echo '  Fix: sudo apt install clang-tidy (Ubuntu/Debian)' >&2
          echo '       brew install llvm (macOS; clang-tidy ships in the LLVM bundle)' >&2
          exit 1
        fi
        if [ ! -f compile_commands.json ]; then
          echo 'lint:cpp:tidy: compile_commands.json not present at the repo root.' >&2
          echo "  Fix: run 'task lint:cpp:compile-commands' first." >&2
          exit 1
        fi
        files=$(go run ./tools/lint/cpp list)
        if [ -z "$files" ]; then
          echo 'lint:cpp:tidy: no first-party C++ files found' >&2
          exit 0
        fi
        # `-warnings-as-errors=*` mirrors the same flag baked into
        # `.clang-tidy`; we set it on the CLI as well so an explicit
        # `clang-tidy ...` invocation that happens to pick up a
        # different config file still treats every finding as a
        # hard failure.
        # shellcheck disable=SC2086  # intentional word-split for the file list
        clang-tidy -p . -warnings-as-errors='*' $files

  cpp:tidy-parallel:
    desc: |
      Per-file clang-tidy with bounded parallelism (same flags as cpp:tidy).
      Much faster than the single-process cpp:tidy lane (~15h vs ~4h on a
      full tree). Writes block-delimited output suitable for tidy-report.
    vars:
      LOG: '{{.LOG | default "lint-cpp-tidy.log"}}'
      JOBS: '{{.JOBS | default "5"}}'
    cmds:
      - |
        export LOG="{{.LOG}}"
        export JOBS="{{.JOBS}}"
        bash -c '
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        log="${LOG:-lint-cpp-tidy.log}"
        jobs="${JOBS:-5}"
        if ! command -v clang-tidy >/dev/null 2>&1; then
          echo "lint:cpp:tidy-parallel: clang-tidy not found on PATH" >&2
          exit 1
        fi
        if [ ! -f compile_commands.json ]; then
          echo "lint:cpp:tidy-parallel: compile_commands.json missing; run task lint:cpp:compile-commands" >&2
          exit 1
        fi
        files=$(go run ./tools/lint/cpp list)
        if [ -z "$files" ]; then
          echo "lint:cpp:tidy-parallel: no first-party C++ files found" >&2
          exit 0
        fi
        echo "=== lint:cpp:tidy-parallel started $(date -Is) jobs=$jobs ===" > "$log"
        failures=0
        while IFS= read -r f; do
          [ -z "$f" ] && continue
          (
            echo ""
            echo "========== $f =========="
            if ! clang-tidy -p . -warnings-as-errors='"'"'*'"'"' "$f"; then
              echo "FAILED: $f"
              exit 1
            fi
          ) >> "$log" 2>&1 &
          while [ "$(jobs -rp | wc -l)" -ge "$jobs" ]; do
            if ! wait -n; then failures=$((failures + 1)); fi
          done
        done <<< "$files"
        while [ "$(jobs -rp | wc -l)" -gt 0 ]; do
          if ! wait -n; then failures=$((failures + 1)); fi
        done
        rc=0
        [ "$failures" -gt 0 ] && rc=1
        echo "=== lint:cpp:tidy-parallel finished $(date -Is) exit=$rc failures=$failures ===" >> "$log"
        echo "EXIT_CODE=$rc" >> "$log"
        echo "lint:cpp:tidy-parallel: wrote $log (failures=$failures)"
        exit $rc
        '

  cpp:tidy-report:
    desc: |
      Parse lint-cpp-tidy.log into lint-cpp-tidy.csv and docs/dev/cpp-lint-tidy-triage.md.
      Run after lint:cpp:tidy-parallel (or any log using the same block format).
    vars:
      LOG: '{{.LOG | default "lint-cpp-tidy.log"}}'
      CSV: '{{.CSV | default "lint-cpp-tidy.csv"}}'
      MARKDOWN: '{{.MARKDOWN | default "docs/dev/cpp-lint-tidy-triage.md"}}'
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ ! -f "${LOG:-lint-cpp-tidy.log}" ]; then
          echo "lint:cpp:tidy-report: log file not found: ${LOG:-lint-cpp-tidy.log}" >&2
          echo "  Run: task lint:cpp:tidy-parallel" >&2
          exit 1
        fi
        go run ./tools/lint/cpp parse-tidy-log \
          -log "${LOG:-lint-cpp-tidy.log}" \
          -csv "${CSV:-lint-cpp-tidy.csv}" \
          -markdown "${MARKDOWN:-docs/dev/cpp-lint-tidy-triage.md}"

  cpp:compile-commands:
    desc: |
      Generate compile_commands.json at the repo root by translating
      `bazel aquery` output for the canonical engine binary. Required
      input for `task lint:cpp:tidy`.
    # We deliberately do NOT pin a Bazel-side compile-commands
    # extractor as a module dependency yet (e.g. hedronvision's
    # `bazel-compile-commands-extractor`); the rollout plan favours a
    # build-system-light approach so the lint stack works against any
    # checkout. The Python helper at `tools/lint/cpp/compile_db.py`
    # parses `bazel aquery --output=jsonproto` and emits the standard
    # JSON compilation database. It calls into the throttled
    # `task bazel:*` wrappers so the build follows the same process
    # hygiene as every other Bazel invocation in this repo.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ ! -x tools/lint/cpp/compile_db.py ]; then
          echo 'lint:cpp:compile-commands: tools/lint/cpp/compile_db.py is missing.' >&2
          exit 1
        fi
        # Discover every first-party `cc_test` (bash mapfile: zsh-safe, one
        # --target per label). Source mode uses default MODULE.bazel resolution
        # on query/aquery; only prebuilt passes --config=googlesql-prebuilt
        # (build:googlesql-source is not valid for bazel query).
        export GOOGLESQL_SOURCE="${GOOGLESQL_SOURCE:-prebuilt}"
        bash -c '
        set -eo pipefail
        case "${GOOGLESQL_SOURCE:-prebuilt}" in
          prebuilt)
            query_cfg=(--config=googlesql-prebuilt)
            aquery_cfg=googlesql-prebuilt
            ;;
          local|source)
            query_cfg=()
            aquery_cfg=
            ;;
          *)
            echo "lint:cpp:compile-commands: GOOGLESQL_SOURCE must be local/source or prebuilt" >&2
            exit 2
            ;;
        esac
        mapfile -t test_targets < <(
          bazel query --noshow_progress --noshow_loading_progress \
            "${query_cfg[@]}" \
            '"'"'{{.CC_TEST_BAZEL_QUERY}}'"'"'
        )
        target_args=( --target //binaries/emulator_main:emulator_main )
        for t in "${test_targets[@]}"; do
          target_args+=( --target "$t" )
        done
        if [ -n "$aquery_cfg" ]; then
          python3 tools/lint/cpp/compile_db.py \
            "${target_args[@]}" \
            --bazel-config "$aquery_cfg" \
            --output compile_commands.json
        else
          python3 tools/lint/cpp/compile_db.py \
            "${target_args[@]}" \
            --output compile_commands.json
        fi
        '

  cpp:test:
    desc: |
      Run every first-party `cc_test` via the throttled
      `task bazel:test` wrapper. Discovers targets via
      `bazel query` over the first-party trees (honors
      `GOOGLESQL_SOURCE` for `--config=googlesql-prebuilt|source`)
      so a new test does not need a manual Taskfile edit. Emits the
      standard `--test_output=errors` shape so failing tests print
      their stderr inline.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if ! command -v bazel >/dev/null 2>&1 && ! command -v bazelisk >/dev/null 2>&1; then
          echo 'lint:cpp:test: bazel/bazelisk not found on PATH' >&2
          exit 1
        fi
        # Use `bazel query` rather than a hand-maintained list. The
        # query lives under each of the first-party include roots so a
        # new cc_test under any of them is picked up automatically.
        # `--config` must match `task bazel:test` (see GOOGLESQL_BAZEL_CONFIG).
        targets=$(bazel query --config={{.GOOGLESQL_BAZEL_CONFIG}} \
          '{{.CC_TEST_BAZEL_QUERY}}' | tr '\n' ' ')
        if [ -z "${targets// }" ]; then
          echo 'lint:cpp:test: no cc_test targets discovered' >&2
          exit 0
        fi
        echo "lint:cpp:test: running ${targets}"
        # Hand off to the throttled `task bazel:test` wrapper so the
        # command inherits BAZEL_JOBS / BAZEL_MEM_MB / the shutdown
        # trap on signal cancellation. We forward TEST_FLAGS so a
        # caller can override `--test_output=errors` when debugging.
        task bazel:test TARGETS="$targets" TEST_FLAGS="${TEST_FLAGS:---test_output=errors}"

  cpp:cppcheck:
    desc: |
      cppcheck on first-party C++ files (secondary-analysis lane).
      Catches uninitialised state, bounds issues, resource leaks, and
      null-handling mistakes that clang-tidy may miss. Included in
      `task lint:run` and the `ci-cpp-analysis` workflow.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if ! command -v cppcheck >/dev/null 2>&1; then
          echo 'lint:cpp:cppcheck: cppcheck not found on PATH' >&2
          echo '  Fix: sudo apt install cppcheck (Ubuntu/Debian)' >&2
          exit 1
        fi
        files=$(go run ./tools/lint/cpp list)
        if [ -z "$files" ]; then
          echo 'lint:cpp:cppcheck: no first-party C++ files found' >&2
          exit 0
        fi
        # `--enable=warning,style,performance,portability` mirrors the
        # set most C++ teams treat as default-on for production code.
        # `--inline-suppr` lets us reuse the source-only checker's
        # suppression markers if needed; `--error-exitcode=1` makes a
        # finding fail CI without needing extra parsing.
        # shellcheck disable=SC2086  # intentional word-split for the file list
        # `--language=c++` + `--std=c++20` matches the Bazel toolchain
        # so cppcheck does not flag every `namespace foo {` as invalid
        # C or treat every `TEST_F(...) { ... }` macro expansion as a
        # syntax error. Without those flags it ran in
        # auto-detect-from-extension mode and parsed our headers as C,
        # which fired ~30 false-positive [syntaxError] entries.
        #
        # The `--suppress=*` block below silences known categories of
        # false positive that come from cppcheck's necessarily-shallow
        # view of our translation units:
        #
        #   * syntaxError:*_test.cc — gtest's `TEST` / `TEST_F` macros
        #     expand to a free-standing function definition that
        #     cppcheck cannot recover from without parsing the gtest
        #     headers (which would re-introduce missingIncludeSystem
        #     noise). The clang-tidy lane already parses these files
        #     correctly, so duplicating the check here adds no value.
        #
        #   * missingReturn — fires on every member declared with
        #     `ABSL_GUARDED_BY(mu_)` because cppcheck parses the
        #     annotation as a function signature instead of a thread
        #     annotation attribute.
        #
        #   * unusedStructMember — cppcheck only sees a single TU at a
        #     time, so any DTO field consumed across translation units
        #     (every field of `Row`, `ColumnSchema`, `QueryRequest`,
        #     `Options`, …) looks unused.
        #
        #   * useStlAlgorithm — the loops it flags either have an
        #     early-return on the first hit (which `std::any_of`
        #     awkwardly emulates) or call themselves recursively, so
        #     converting them to `std::transform` reduces clarity
        #     without removing the helper function.
        #
        #   * invalidPrintfArgType_s in binaries/emulator_main/main.cc
        #     — `__VERSION__` and `__clang_version__` are predefined
        #     `const char*` macros (set by GCC/clang); cppcheck does
        #     not model the predefines and infers `int`.
        #
        #   * knownConditionTrueFalse in
        #     tools/googlesql-prebuilt/smoke/smoke_wrappers.cc — the
        #     smoke check intentionally compares the address of a
        #     statically-linked symbol to zero so that the link step
        #     fails loudly if the symbol drops out; the address is by
        #     definition non-null but the comparison is the point.
        #
        # `--error-exitcode=1` still makes any *new* category of finding
        # fail the lint lane.
        cppcheck \
          --language=c++ \
          --std=c++20 \
          --enable=warning,style,performance,portability \
          --inline-suppr \
          --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          --suppress=syntaxError:*_test.cc \
          --suppress=missingReturn \
          --suppress=unusedStructMember \
          --suppress=useStlAlgorithm \
          --suppress=invalidPrintfArgType_s:binaries/emulator_main/main.cc \
          --suppress=knownConditionTrueFalse:tools/googlesql-prebuilt/smoke/smoke_wrappers.cc \
          --quiet \
          $files
