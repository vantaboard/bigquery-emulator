# Linters: fast pre-commit gate (gofmt + go vet), full golangci-lint
# pass driven by .golangci.yml, and shellcheck over docker/*.sh.
#
# Usage: task lint:run (fast gate, used by the auto-commit workflow)
#        task lint:fix (apply gofmt + re-run vet)
#        task lint:go  / task lint:go-fix (full golangci-lint pass)
#        task lint:shell (shellcheck on docker/*.sh)
#
# The fast gate is kept separate from the full golangci-lint pass so the
# auto-commit pre-commit hook (.cursor/rules/pre-commit-lint.mdc) stays
# snappy and the existing pre-existing golangci-lint findings do not
# block every commit; once those are cleared, fold lint:go into lint:run.
version: "3"

tasks:
  default:
    desc: Run the fast pre-commit gate (same as lint:run)
    cmds:
      - task: run

  run:
    aliases: [check]
    desc: Fast pre-commit gate (gofmt + go vet). Used by the auto-commit workflow.
    # gofmt scans every Go file under the worktree, so vendored upstream
    # trees in third_party/ would otherwise leak findings here even though
    # `.golangci.yml` already excludes them from the slow pass. Use a
    # find-based pruning list to skip the same paths in the fast gate
    # so `task lint:run` agrees with `task lint:go`.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        gofmt_targets=$(find . \
          \( -path './third_party' -o -path './gen' -o -path './vendor' -o -path './node_modules' -o -path './bazel-*' \) -prune -o \
          -type f -name '*.go' -print)
        if [ -z "$gofmt_targets" ]; then
          echo "lint:run: no .go files outside excluded paths" >&2
        else
          # shellcheck disable=SC2086  # word-split is intentional for the target list
          if [ -n "$(printf '%s\n' $gofmt_targets | xargs gofmt -s -l)" ]; then
            echo 'gofmt would reformat:' >&2
            printf '%s\n' $gofmt_targets | xargs gofmt -s -l >&2
            exit 1
          fi
        fi
        go vet ./...

  fix:
    desc: Apply auto-fixable lints from the fast gate (gofmt -s -w + go vet)
    # Match `lint:run`'s exclusions so we never reformat vendored
    # upstream trees in third_party/ (or generated code under gen/).
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        gofmt_targets=$(find . \
          \( -path './third_party' -o -path './gen' -o -path './vendor' -o -path './node_modules' -o -path './bazel-*' \) -prune -o \
          -type f -name '*.go' -print)
        if [ -n "$gofmt_targets" ]; then
          # shellcheck disable=SC2086  # word-split is intentional for the target list
          printf '%s\n' $gofmt_targets | xargs gofmt -s -w
        fi
        go vet ./...

  go:
    desc: Run golangci-lint with the project's .golangci.yml (slow, full check)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        golangci-lint run ./...

  go-fix:
    desc: Run golangci-lint --fix to apply formatters and auto-fixable linters
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        export GOFLAGS="-buildvcs=false${GOFLAGS:+ ${GOFLAGS}}"
        golangci-lint run --fix ./...

  shell:
    desc: ShellCheck shell scripts under docker/
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        shopt -s nullglob
        scripts=(docker/*.sh)
        if [ ${#scripts[@]} -eq 0 ]; then
          echo "lint:shell: no shell scripts found under docker/" >&2
          exit 0
        fi
        shellcheck "${scripts[@]}"
