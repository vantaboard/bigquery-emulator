# Third-party BigQuery client sample suites. Drives `go test`,
# `nox`, and `npm test` against the four upstream sample trees
# vendored under `third_party/<lang>-bigquery-tests/`.
#
# Mirrors the go-googlesql `task thirdparty:*` lane: each suite gets
# its own task plus a `default` aggregator, env vars steer which nox
# session / Python interpreter / pytest selector runs, and shell
# preflights under `scripts/` fail fast when the emulator or
# fake-gcs is unreachable.
#
# Usage:
#   task thirdparty                              # run every suite in order
#   task thirdparty:emulator-up                  # bigquery-emulator via docker compose (alias: emulator)
#   task thirdparty:emulator-down                # stop the docker compose emulator container
#   task thirdparty:golang-bigquery-tests        # Go sample integration tests
#   task thirdparty:python-bigquery-tests        # nox snippets/unit (PYTHON_SAMPLES_NOX_SESSION=...)
#   task thirdparty:node-bigquery-tests          # npm install + npm test (Mocha)
#   task thirdparty:java-bigquery-tests          # mvn package on java-bigquery/samples/snippets (compile-only)
#   task thirdparty:python-bigquery-dataframes-tests
#                                                # bigframes nox `py` session
#   task thirdparty:python-bigquery-dataframes-snippet-gate
#                                                # narrow CI-friendly bigframes allowlist
#
# Bring-up contract: each suite task below calls `task emulator-up`
# after its own vendor-tree existence check, so a fresh clone gets a
# running emulator (via docker-compose.yml) before any client wiring
# runs. Suites that require fake-gcs also call `task fake-gcs-up`:
# `node-bigquery-tests` unconditionally (its preflight is unconditional),
# and `python-bigquery-dataframes-tests` only when STORAGE_EMULATOR_HOST
# is set (the GCS fixtures short-circuit otherwise). Both `emulator-up`
# and `fake-gcs-up` are `run: once`, so Task dedupes the call within a
# single `task thirdparty` run and each container only starts once. The
# containers are left running between invocations (compose-keep-up
# posture); use `task thirdparty:emulator-down` /
# `task thirdparty:fake-gcs-down` for explicit teardown.
#
# Environment overrides:
#   GO_TEST_FLAGS                  extra flags for the Go suite
#   PYTHON_SAMPLES_NOX_SESSION     default `snippets` (upstream emulator-driven session: docs/snippets.py + samples/);
#                                  also unit / unit_noextras (mocked) and any other upstream session
#                                  defined in third_party/python-bigquery-tests/noxfile.py after sync
#   PYTHON_SAMPLES_PYTHON          override interpreter (default: current python3)
#   PYTHON_SAMPLES_CMD_TIMEOUT     wall-clock cap for the Python suite (default 30m)
#   PYTHON_SAMPLES_PYTEST_ARGS     extra pytest flags appended after the task's defaults
#                                  (`-v --durations=10`, plus `-n0` for the `snippets` session).
#                                  Use `last-flag-wins` pytest semantics to tweak: e.g.
#                                  `PYTHON_SAMPLES_PYTEST_ARGS='-vv --tb=short'` for even more detail,
#                                  or `PYTHON_SAMPLES_PYTEST_ARGS='-q'` to silence per-test progress.
#   NOX_DEFAULT_VENV_BACKEND       default `virtualenv` (upstream noxfile uses `python -m pip`, which
#                                  is missing from uv-created venvs). Set to `uv|virtualenv` to opt into
#                                  uv when running a custom noxfile that doesn't depend on pip.
#   JAVA_BQ_MAVEN_GOALS            override Maven goals for each Java snippets module (default: package)
#   JAVA_BQ_SKIP_TESTS             "true" (default) builds compile-only; "false" runs Failsafe ITs
#   JAVA_BQ_SAMPLE_PATHS           whitespace-separated snippet module paths under
#                                  third_party/java-bigquery-tests (default covers
#                                  java-bigquery, java-bigquerystorage, and the two
#                                  java-docs-samples bigqueryconnection / bigquerydatatransfer
#                                  trees)
#   DATAFRAME_SAMPLES_PYTHON       override interpreter for bigframes snippets
#   DATAFRAME_SAMPLES_PYTEST_ARGS  extra `-- ...` pytest args appended to nox
#   DATAFRAME_SAMPLES_TMPDIR       override TMPDIR for nox installs
#   DATAFRAME_SAMPLES_CMD_TIMEOUT  wall-clock cap for the bigframes suite
#   FAKE_GCS_PORT                  fake-gcs-server port (default 4443; preflight)
#
# See `third_party/README.md` for the wiring contract: emulator env
# vars (BIGQUERY_EMULATOR_HOST, BIGQUERY_STORAGE_GRPC_ENDPOINT, ...),
# fake-gcs requirements, and which surfaces skip when missing.
version: "3"

vars:
  GO_TEST_FLAGS: ""
  # Default nox session for python-bigquery-tests is the upstream
  # `snippets` session (docs/snippets.py + samples/, excluding
  # samples/snippets which has its own per-directory noxfile). It
  # exercises the BigQuery emulator end-to-end. Override via the Task
  # CLI: `task thirdparty:python-bigquery-tests PYTHON_SAMPLES_NOX_SESSION=unit`.
  # Available upstream sessions: unit, unit_noextras, snippets, system,
  # mypy_samples, mypy, pytype, cover, prerelease_deps, lint, blacken,
  # docs, docfx (see third_party/python-bigquery-tests/noxfile.py after
  # running scripts/sync_python_bigquery_tests.sh).
  PYTHON_SAMPLES_NOX_SESSION: "snippets"
  PYTHON_SAMPLES_PYTHON: ""
  # Slim-path Java snippets lane: each path below is a Maven snippets module under
  # third_party/java-bigquery-tests. install-without-bom and snapshot are vendored
  # verbatim but stay outside the task. Default goals/skip match the compile-on-PR
  # CI lane. Override JAVA_BQ_SAMPLE_PATHS to narrow the fan-out (e.g. for a quick
  # local check while iterating on a single tree).
  JAVA_BQ_MAVEN_GOALS: "package"
  JAVA_BQ_SKIP_TESTS: "true"
  JAVA_BQ_SAMPLE_PATHS: >-
    java-bigquery/samples/snippets
    java-bigquerystorage/samples/snippets
    java-docs-samples/bigquery/bigqueryconnection/snippets
    java-docs-samples/bigquery/bigquerydatatransfer/snippets

tasks:
  default:
    desc: Run golang-, python-, node-, java-, and python-bigquery-dataframes BigQuery third-party suites in order; continues past per-suite failures and exits non-zero only after the summary if any suite failed
    cmds:
      # Each suite is invoked as a *child* `task thirdparty:<suite>`
      # process (not a `task:` cmd reference) so that a non-zero exit
      # from one suite does not abort the remaining ones — Task stops
      # the cmds list on the first failing `task:` ref, which defeats
      # the "run them all, report at the end" posture this aggregator
      # exists to provide. The trade-off is that each suite re-enters
      # its own `task: emulator-up` (+ conditionally `fake-gcs-up`)
      # rather than sharing the in-process `run: once` collapse — but
      # `docker compose up -d` is idempotent (see emulator-up's own
      # comment) so this is just an extra healthz poll per suite, not
      # a fresh container bringup.
      - |
        set -uo pipefail
        suites="golang-bigquery-tests python-bigquery-tests node-bigquery-tests java-bigquery-tests python-bigquery-dataframes-tests"
        failed=""
        for suite in $suites; do
          echo ""
          echo "==> task thirdparty:${suite}"
          if task "thirdparty:${suite}"; then
            echo "thirdparty:${suite} OK"
          else
            rc=$?
            echo "thirdparty:${suite} FAILED (exit=${rc})" >&2
            failed="${failed:+${failed} }${suite}"
          fi
        done
        echo ""
        echo "thirdparty default summary:"
        if [ -z "${failed}" ]; then
          echo "  all suites passed"
        else
          echo "  failed suites: ${failed}" >&2
          exit 1
        fi

  # Convenience helpers for the docker compose `thirdparty` profile.
  # The default compose recipe (used by `task docker:smoke`) only
  # starts `bigquery-emulator`, so fake-gcs has to be opted into
  # explicitly. The `fake-gcs-up` task is intentionally separate
  # from `task emulator:run-full` because tests can run against the
  # gateway alone when STORAGE_EMULATOR_HOST is unset (the GCS-backed
  # subtests skip rather than fail; see third_party/README.md).
  #
  # `emulator-up` boots the runtime image declared in docker-compose.yml
  # and polls /healthz so each suite task below has a ready listener
  # before it executes any client wiring. The container is left running
  # across suites (matches the `compose-keep-up` posture documented in
  # third_party/README.md); use `emulator-down` for explicit teardown.
  # The poll loop mirrors `task docker:smoke` to keep cold-start
  # diagnostics consistent across local + CI lanes.
  emulator-up:
    aliases: [emulator]
    desc: Start bigquery-emulator via docker compose and wait for /healthz (idempotent)
    # `run: once` collapses the five suite-level invocations during
    # `task thirdparty` to a single bringup, so we do not re-poll
    # /healthz between suites. `docker compose up -d` is itself
    # idempotent, so an explicit `task thirdparty:emulator-up` outside
    # the aggregator is still a no-op when the container is already
    # serving.
    run: once
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        port="${EMULATOR_HTTP_PORT:-9050}"
        # Throttle the in-container Bazel build (engine-builder-bazel
        # stage) AND the running container against the live host's
        # MemAvailable / nproc so neither phase can OOM-kill the IDE.
        # The helper bounds Bazel job count by `MemAvailable * 80% /
        # 3 GiB-per-job` because `--local_resources=memory=N` is a
        # *scheduling hint*, not an OS cap, and heavy GoogleSQL
        # template files (resolved_ast_rewrite_visitor_*.cc etc.)
        # each peak at ~2.5 GiB resident under clang-18. Caller
        # overrides (BAZEL_JOBS, BAZEL_MEM_MB,
        # BIGQUERY_EMULATOR_MEM_LIMIT, BIGQUERY_EMULATOR_CPUS, plus
        # the tuning knobs BAZEL_PER_JOB_MEM_MB / BAZEL_AVAIL_PCT /
        # BAZEL_CPU_RESERVE) are honored verbatim. See
        # `scripts/compute_docker_throttle.sh` for the full picks.
        eval "$(bash "${root}/scripts/compute_docker_throttle.sh")"
        docker compose up -d bigquery-emulator
        # Poll /healthz via the shared helper. It silences the
        # cosmetic curl "Recv failure" that docker-proxy emits during
        # the gateway's startup window (the gateway opens :9050 only
        # AFTER engine gRPC reports SERVING; until then docker-proxy
        # accepts the host-side handshake but RSTs when it can't
        # forward into the container) and only dumps a diagnostic
        # bundle if the overall deadline fires.
        bash "${root}/scripts/wait_for_healthz.sh" "http://localhost:${port}/healthz" 120 bigquery-emulator

  emulator-down:
    desc: Stop the bigquery-emulator docker compose service (named volume preserved)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        docker compose stop bigquery-emulator || true
        docker compose rm -f bigquery-emulator || true

  fake-gcs-up:
    aliases: [fake-gcs]
    desc: Start fake-gcs-server via docker compose --profile thirdparty (mounts testdata/fake-gcs-data/)
    # `run: once` collapses repeated calls during a single `task thirdparty`
    # (or any suite that depends on fake-gcs in addition to the emulator)
    # to one bringup, mirroring the `emulator-up` posture above. `docker
    # compose up -d` is itself idempotent, so direct invocations outside
    # the aggregator still no-op when the container is already serving.
    run: once
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        # Refuse to start fake-gcs against an empty/missing bind mount.
        # Previous behavior silently `mkdir -p`-ed testdata/fake-gcs-data
        # so the container would come up "healthy" but serve 0-byte objects
        # for every `gs://` URI the suites hit, which surfaced as a
        # misleading "returned empty body" preflight failure instead of a
        # clear "you forgot to seed". Detect "directory missing or empty"
        # and exit 1 with the canonical fix command. Set FAKE_GCS_ALLOW_EMPTY=1
        # to opt out (useful when callers genuinely want an empty bucket).
        if [ ! -d testdata/fake-gcs-data ] || [ -z "$(ls -A testdata/fake-gcs-data 2>/dev/null)" ]; then
          if [ "${FAKE_GCS_ALLOW_EMPTY:-0}" != "1" ]; then
            echo "thirdparty:fake-gcs-up: testdata/fake-gcs-data/ is missing or empty (gitignored)." >&2
            echo "  Seed it first so fake-gcs serves the public cloud-samples-data fixtures:" >&2
            echo "    task testdata:fake-gcs-sync" >&2
            echo "  Then re-run this task. Set FAKE_GCS_ALLOW_EMPTY=1 to start with an empty bucket anyway." >&2
            exit 1
          fi
          mkdir -p testdata/fake-gcs-data
        fi
        docker compose --profile thirdparty up -d fake-gcs-server

  fake-gcs-down:
    desc: Stop fake-gcs-server (other compose services keep running)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        docker compose stop fake-gcs-server || true
        docker compose rm -f fake-gcs-server || true

  # third_party/golang-bigquery-tests is a fully vendored Go module
  # (see go.mod). When BIGQUERY_EMULATOR_HOST is unset the suite
  # mostly compiles + skips system tests; with the emulator + gRPC
  # endpoints exported it runs against the gateway. See
  # third_party/README.md for the env-var matrix.
  golang-bigquery-tests:
    desc: Run vendored golang-bigquery-tests go test (bqopts + BIGQUERY_EMULATOR_HOST; see third_party/README.md)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ ! -f third_party/golang-bigquery-tests/go.mod ]; then
          echo "third_party/golang-bigquery-tests missing" >&2
          exit 1
        fi
      - task: emulator-up
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root/third_party/golang-bigquery-tests"
        go test ./... -count=1 {{.GO_TEST_FLAGS}}

  # The vendored python-bigquery-tests tree mirrors upstream's layout
  # (LICENSE, samples/, tests/data) but the upstream `*.py` source —
  # including noxfile.py — is intentionally not vendored. Run
  # scripts/sync_python_bigquery_tests.sh (default ref: main) to
  # populate the tree from googleapis/python-bigquery before running
  # this task; the precondition check below fails fast and points at
  # that workflow when noxfile.py is missing.
  #
  # Default session is upstream's `snippets` — emulator-driven coverage
  # over `docs/snippets.py + samples/` (samples/snippets/ has its own
  # per-directory noxfile and is intentionally excluded by upstream).
  # The task forces `-n0` (serial pytest) onto the nox invocation
  # because the upstream `snippets` session hard-codes `-n=auto`, which
  # deadlocks against a single shared emulator process; pytest-xdist
  # honors the last `-n` flag, so appended posargs win.
  #
  # Backend: defaults to `virtualenv` (overridable via
  # NOX_DEFAULT_VENV_BACKEND). Upstream noxfile invokes `python -m pip
  # freeze` in every session, which fails on uv-created venvs (uv
  # bootstraps without pip). Callers using a custom noxfile that
  # doesn't need pip can opt back in:
  #   NOX_DEFAULT_VENV_BACKEND='uv|virtualenv' task thirdparty:python-bigquery-tests
  python-bigquery-tests:
    desc: Run vendored python-bigquery-tests nox session (default snippets, emulator-driven; see third_party/README.md)
    cmds:
      - |
        set -e
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ ! -f third_party/python-bigquery-tests/noxfile.py ]; then
          echo "third_party/python-bigquery-tests/noxfile.py is missing." >&2
          echo "  This tree vendors the upstream layout but not the *.py source." >&2
          echo "  Run: scripts/sync_python_bigquery_tests.sh (default ref: main)" >&2
          echo "  See third_party/README.md (python-bigquery-tests section)." >&2
          exit 1
        fi
      - task: emulator-up
      - |
        set -e
        root="$(git rev-parse --show-toplevel)"
        nox_session="{{.PYTHON_SAMPLES_NOX_SESSION}}"
        # Sessions that hit the emulator: preflight verifies the
        # gateway is reachable so a dead/half-up emulator fails fast
        # instead of producing 500-page pytest stack traces.
        case "$nox_session" in
          snippets|system)
            if [ -n "${BIGQUERY_EMULATOR_HOST:-}" ]; then
              bash "${root}/scripts/preflight_python_samples_emulator.sh"
            fi
            ;;
        esac
        cd "${root}/third_party/python-bigquery-tests"
        py="${PYTHON_SAMPLES_PYTHON:-}"
        if [ -z "$py" ]; then
          py="$(python3 -c 'import sys; print("%d.%d" % sys.version_info[:2])')"
        fi
        # Python-version requirements come from upstream's noxfile
        # session decorators. UNIT_TEST_PYTHON_VERSIONS = 3.9-3.14;
        # SYSTEM_TEST_PYTHON_VERSIONS = 3.9, 3.11-3.13;
        # DEFAULT_PYTHON_VERSION = 3.9 / 3.14 for everything else.
        case "$nox_session" in
          unit|unit_noextras)
            case "$py" in
              3.9|3.10|3.11|3.12|3.13|3.14) ;;
              *)
                echo "nox session ${nox_session} requires Python 3.9-3.14 (got ${py}). Set PYTHON_SAMPLES_PYTHON." >&2
                exit 1
                ;;
            esac
            ;;
          snippets|system|prerelease_deps)
            case "$py" in
              3.9|3.11|3.12|3.13) ;;
              *)
                echo "nox session ${nox_session} requires Python 3.9, 3.11, 3.12, or 3.13 (got ${py}); export PYTHON_SAMPLES_PYTHON=3.13 (see .envrc) or use PYTHON_SAMPLES_NOX_SESSION=unit for 3.9-3.14." >&2
                exit 1
                ;;
            esac
            ;;
          *)
            case "$py" in
              3.9|3.14) ;;
              *)
                echo "nox session ${nox_session} requires Python 3.9 or 3.14 (got ${py}). Set PYTHON_SAMPLES_PYTHON." >&2
                exit 1
                ;;
            esac
            ;;
        esac
        # Default backend is virtualenv because upstream's noxfile
        # invokes `python -m pip` everywhere; uv-created venvs ship
        # without pip. Caller can opt back in:
        #   NOX_DEFAULT_VENV_BACKEND='uv|virtualenv' task ...
        export NOX_DEFAULT_VENV_BACKEND="${NOX_DEFAULT_VENV_BACKEND:-virtualenv}"
        export PYTHONUNBUFFERED=1
        # Upstream's google.cloud.bigquery._helpers._get_bigquery_host
        # returns BIGQUERY_EMULATOR_HOST verbatim; the python `requests`
        # adapter then fails with InvalidSchema on the bare `host:port`
        # form mise/.envrc exports. Mirror the node-bigquery-tests
        # pattern (STORAGE_EMULATOR_HOST normalization above) and
        # prepend http:// when the env value lacks a scheme. The export
        # only mutates the child nox process env, so the surrounding
        # `task thirdparty:default` chain (golang/node/java) still sees
        # the bare `host:port` form their clients expect.
        _bqhost="${BIGQUERY_EMULATOR_HOST:-}"
        if [ -n "$_bqhost" ] && ! printf '%s' "$_bqhost" | grep -qE '^https?://'; then
          export BIGQUERY_EMULATOR_HOST="http://${_bqhost#//}"
        fi
        # Wall-clock cap so a dead emulator / hung RPC does not block indefinitely (GNU coreutils timeout(1)).
        _py_samples_to="${PYTHON_SAMPLES_CMD_TIMEOUT:-30m}"
        _py_samples_run() {
          case "${_py_samples_to}" in
            0|off|none) "$@" ;;
            *)
              if command -v timeout >/dev/null 2>&1; then
                if timeout --help 2>&1 | grep -q -- '--foreground'; then
                  timeout --foreground -k 30s "${_py_samples_to}" "$@"
                else
                  timeout -k 30s "${_py_samples_to}" "$@"
                fi
              else
                echo "python-bigquery-tests: PYTHON_SAMPLES_CMD_TIMEOUT=${_py_samples_to} but timeout(1) not on PATH; running without wall-clock cap." >&2
                "$@"
              fi
              ;;
          esac
        }
        # Build the pytest posarg block. Two concerns layered on top of
        # the nox session:
        #   1. Per-test progress (`-v`) + slow-test summary
        #      (`--durations=10`). Without `-v`, pytest prints a single
        #      dot per test on one growing line, so a hung test is
        #      invisible. With `-v`, pytest writes the nodeid + flushes
        #      *before* running each test (pytest_runtest_logstart hook),
        #      and `PYTHONUNBUFFERED=1` keeps the parent shell from
        #      buffering — so the user sees which test is currently
        #      running, not just which ones have completed. We apply
        #      these defaults to every session that actually exercises
        #      tests via pytest; lint/blacken/docs/cover etc. don't run
        #      pytest themselves so the posargs would be inert there
        #      (nox ignores unrecognized session args).
        #   2. Force serial pytest (`-n0`) for the emulator-driven
        #      `snippets` session: upstream's `snippets` calls
        #      `py.test -n=auto`, which deadlocks when multiple workers
        #      race a single emulator. pytest-xdist honors the last
        #      `-n` flag, so the `-n0` we append wins.
        # Caller-supplied PYTHON_SAMPLES_PYTEST_ARGS go LAST so they
        # win the last-flag-wins fight (e.g. `-q` overrides our `-v`,
        # or `-n=auto` overrides our `-n0` for a brave caller).
        _py_samples_progress_args=("-v" "--durations=10")
        nox_posargs=()
        case "$nox_session" in
          snippets)
            nox_posargs=("--" "-n0" "${_py_samples_progress_args[@]}")
            ;;
          system|unit|unit_noextras|prerelease_deps)
            nox_posargs=("--" "${_py_samples_progress_args[@]}")
            ;;
        esac
        if [ -n "${PYTHON_SAMPLES_PYTEST_ARGS:-}" ]; then
          # Word-split caller-supplied args the same way the shell
          # would for an unquoted variable; callers expect to pass
          # `'-vv --tb=short'` as a single env var. Avoid `arr+=(...)`
          # so the array build works across both bash and mvdan/sh
          # (Task's default shell).
          if [ "${#nox_posargs[@]}" -eq 0 ]; then
            # shellcheck disable=SC2206
            nox_posargs=("--" ${PYTHON_SAMPLES_PYTEST_ARGS})
          else
            # shellcheck disable=SC2206
            nox_posargs=("${nox_posargs[@]}" ${PYTHON_SAMPLES_PYTEST_ARGS})
          fi
        fi
        if command -v uv >/dev/null 2>&1; then
          # nox[pbs] lets Nox install missing CPython versions (plain uvx nox skips without pythonX.Y on PATH).
          _py_samples_run uvx --from 'nox[pbs]' nox -s "$nox_session" -p "$py" "${nox_posargs[@]}"
        elif command -v nox >/dev/null 2>&1; then
          _py_samples_run nox -s "$nox_session" -p "$py" "${nox_posargs[@]}"
        else
          echo "Install uv (https://docs.astral.sh/uv/) for 'uvx --from nox[pbs] nox', or install 'nox[pbs]' on PATH." >&2
          exit 1
        fi

  # node-bigquery-tests (vendored). Test setup auto-prefixes
  # STORAGE_EMULATOR_HOST with http:// for @google-cloud/storage v7.
  # Preflight verifies fake-gcs is serving the seeded us-states.csv
  # fixture so the load samples don't fail with empty bodies. The
  # preflight is unconditional (it falls back to 127.0.0.1:4443 when
  # STORAGE_EMULATOR_HOST is unset), so fake-gcs must be up before any
  # of the Mocha tests run — `task: fake-gcs-up` below spins it through
  # docker compose the same way `task: emulator-up` spins the gateway.
  node-bigquery-tests:
    desc: Run vendored node-bigquery-tests Mocha suite (npm install && npm test; see third_party/node-bigquery-tests/EMULATOR.md)
    cmds:
      - |
        set -euo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ ! -f third_party/node-bigquery-tests/package.json ]; then
          echo "third_party/node-bigquery-tests missing" >&2
          exit 1
        fi
      - task: emulator-up
      - task: fake-gcs-up
      - |
        set -euo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        bash scripts/preflight_node_samples_gcs.sh
        # Default STORAGE_EMULATOR_HOST so the @google-cloud/storage
        # client used by the Tables suite targets fake-gcs instead of
        # falling through to real storage.googleapis.com (where it
        # 400s with "billing account... disabled"). The default mirrors
        # the contract in third_party/README.md and the fallback in
        # scripts/preflight_node_samples_gcs.sh. Operators can still
        # override by exporting their own value before invoking the
        # task. We always export the var (not just when normalization
        # is needed) so the npm child process inherits it.
        _st="${STORAGE_EMULATOR_HOST:-127.0.0.1:4443}"
        case "$_st" in
          http://*|https://*) ;;
          *) _st="http://${_st#//}" ;;
        esac
        export STORAGE_EMULATOR_HOST="$_st"
        cd third_party/node-bigquery-tests && npm install && npm test

  # Slim-path Java snippets lane. Fans out across the snippet POMs listed in
  # JAVA_BQ_SAMPLE_PATHS; each one is a standalone Maven module that resolves
  # google-cloud-{bigquery,bigquerystorage,bigqueryconnection,bigquerydatatransfer}
  # from libraries-bom on Maven Central (no vendored Java reactor and no client
  # patches, unlike go-googlesql's pre-94048be5b shape). The upstream
  # src/test/java/**/*IT.java is kept verbatim per module but maven.test.skip=true
  # in each snippets POM (and the CLI flags below) keeps test-compile and
  # Failsafe out of the loop. JDK 17+ required; falls back to `mise x -- mvn`
  # when JAVA_HOME is unset. See third_party/README.md (Java section) and
  # third_party/java-bigquery-tests/java-bigquery/samples/EMULATOR.md.
  java-bigquery-tests:
    desc: Maven compile/package for vendored Java BigQuery + Storage + Connection + DataTransfer sample snippet modules (compile-only; see JAVA_BQ_* vars)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        sample_paths="${JAVA_BQ_SAMPLE_PATHS:-{{.JAVA_BQ_SAMPLE_PATHS}}}"
        # Fail fast before paying a Maven cold start when a path is missing.
        # An incomplete vendor is the most common cause; the message points
        # at the source mapping in third_party/README.md (Java section).
        missing=""
        for rel in $sample_paths; do
          if [ ! -f "third_party/java-bigquery-tests/${rel}/pom.xml" ]; then
            missing="${missing}\n  third_party/java-bigquery-tests/${rel}/pom.xml"
          fi
        done
        if [ -n "$missing" ]; then
          printf 'java-bigquery-tests: missing snippet POMs:%b\n' "$missing" >&2
          echo "  Re-vendor the affected sample tree (see third_party/README.md, Java section)." >&2
          exit 1
        fi
      - task: emulator-up
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        goals="${JAVA_BQ_MAVEN_GOALS:-{{.JAVA_BQ_MAVEN_GOALS}}}"
        skip="${JAVA_BQ_SKIP_TESTS:-{{.JAVA_BQ_SKIP_TESTS}}}"
        sample_paths="${JAVA_BQ_SAMPLE_PATHS:-{{.JAVA_BQ_SAMPLE_PATHS}}}"
        mvn_test_flags="-DskipTests=${skip}"
        if [ "$skip" = "true" ]; then
          mvn_test_flags="-DskipTests=true -Dmaven.test.skip=true"
        fi
        # Prefer the user's JAVA_HOME, fall back to mise (`mise install` activates
        # Temurin 17 from mise.toml when present). Match CI's setup-java@v4 by
        # requiring 17+.
        _java_home_ok() { [ -n "${JAVA_HOME:-}" ] && [ -x "${JAVA_HOME}/bin/java" ]; }
        if ! _java_home_ok && ! command -v mise >/dev/null 2>&1; then
          echo "java-bigquery-tests: JAVA_HOME must point to a JDK 17+ (Temurin 17 to match CI)." >&2
          echo "  Fix: export JAVA_HOME, or install https://mise.jdx.dev and run: mise install" >&2
          exit 1
        fi
        for rel in $sample_paths; do
          target="third_party/java-bigquery-tests/${rel}"
          echo "==> mvn -B ${goals} ${mvn_test_flags} (in ${target})"
          if _java_home_ok; then
            ( cd "$target" && mvn -B "$goals" $mvn_test_flags )
          else
            mise x -- sh -ec "cd \"$target\" && mvn -B \"$goals\" $mvn_test_flags"
          fi
        done

  # bigframes snippet allowlist gate. CI uses this to keep the
  # signal narrow until BigFrames SQL parity grows; local devs can
  # widen by setting DATAFRAME_SAMPLES_PYTEST_ARGS or running
  # `python-bigquery-dataframes-tests` directly.
  python-bigquery-dataframes-snippet-gate:
    desc: Run bigframes emulator snippet tests known to pass; requires emulator + optional fake-gcs
    env:
      DATAFRAME_SAMPLES_PYTEST_ARGS: >-
        -k 'test_bigquery_dataframes_set_options or test_bigquery_dataframes_load_data_from_bigquery or test_bigquery_dataframes_pandas_methods or test_performance_optimizations or test_clustering_model'
        --tb=short
    cmds:
      - task: python-bigquery-dataframes-tests

  python-bigquery-dataframes-tests:
    desc: Run python-bigquery-dataframes samples/snippets nox py (emulator or GCP; see third_party/README.md)
    cmds:
      - |
        set -e
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ ! -f third_party/python-bigquery-dataframes-tests/samples/snippets/noxfile.py ]; then
          echo "third_party/python-bigquery-dataframes-tests missing" >&2
          exit 1
        fi
      - task: emulator-up
      # Only spin up fake-gcs when the caller has opted in via
      # STORAGE_EMULATOR_HOST. Without it, conftest's GCS fixtures
      # short-circuit and the bigframes snippets that hit gs:// URIs
      # are skipped — bringing up fake-gcs unconditionally would
      # surprise callers who haven't seeded testdata/fake-gcs-data/.
      # `task: fake-gcs-up` enforces the seed-data guard if invoked,
      # which is the desired fail-fast behavior when the caller
      # genuinely wants GCS coverage.
      - |
        set -e
        if [ -n "${STORAGE_EMULATOR_HOST:-}" ]; then
          task thirdparty:fake-gcs-up
        fi
      - |
        set -e
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ -n "${BIGQUERY_EMULATOR_HOST:-}" ]; then
          bash "${root}/scripts/preflight_python_samples_emulator.sh"
        fi
        if [ -n "${STORAGE_EMULATOR_HOST:-}" ]; then
          bash "${root}/scripts/preflight_dataframe_samples_gcs.sh"
        fi
        cd third_party/python-bigquery-dataframes-tests/samples/snippets
        # Pip writes INSTALLER*.tmp under site-packages during wheel installs; keeping
        # TMPDIR on the same filesystem as .nox avoids sporadic ENOENT when system /tmp
        # is cleaned, is a different mount, or races with other tooling.
        export TMPDIR="${DATAFRAME_SAMPLES_TMPDIR:-$(pwd)/.nox-install-tmp}"
        mkdir -p "${TMPDIR}"
        export INSTALL_LIBRARY_FROM_SOURCE=True
        py="${DATAFRAME_SAMPLES_PYTHON:-}"
        if [ -z "$py" ]; then
          py="$(python3 -c 'import sys; print("%d.%d" % sys.version_info[:2])')"
        fi
        # bigframes 1.42.x + pyarrow 15.x do not support CPython 3.14; prefer another interpreter.
        case "$py" in
          3.14)
            _df_py_found=""
            for _v in 3.12 3.13 3.11 3.10; do
              if command -v "python${_v}" >/dev/null 2>&1; then
                py="${_v}"
                _df_py_found=1
                echo "python-bigquery-dataframes-tests: default Python is 3.14 (unsupported by vendored bigframes pins); using $(command -v "python${_v}")." >&2
                break
              fi
            done
            if [ -z "${_df_py_found}" ]; then
              echo "python-bigquery-dataframes-tests: Python 3.14 is unsupported (bigframes/pyarrow stack). Install python3.12-3.13 or set DATAFRAME_SAMPLES_PYTHON=3.12." >&2
              exit 1
            fi
            ;;
        esac
        case "$py" in
          3.10|3.11|3.12|3.13) ;;
          *)
            echo "python-bigquery-dataframes-tests: nox py requires Python 3.10-3.13 (got ${py}). Set DATAFRAME_SAMPLES_PYTHON." >&2
            exit 1
            ;;
        esac
        _df_to="${DATAFRAME_SAMPLES_CMD_TIMEOUT:-${PYTHON_SAMPLES_CMD_TIMEOUT:-30m}}"
        _df_run() {
          case "${_df_to}" in
            0|off|none) "$@" ;;
            *)
              if command -v timeout >/dev/null 2>&1; then
                timeout -k 30s "${_df_to}" "$@"
              else
                echo "python-bigquery-dataframes-tests: timeout not on PATH; running without wall-clock cap." >&2
                "$@"
              fi
              ;;
          esac
        }
        _df_pytest_extra="${DATAFRAME_SAMPLES_PYTEST_ARGS:-}"
        if command -v uv >/dev/null 2>&1; then
          if [ -n "$_df_pytest_extra" ]; then
            # shellcheck disable=SC2086
            _df_run uvx --from 'nox[pbs]' nox -s py -p "$py" -- $_df_pytest_extra
          else
            _df_run uvx --from 'nox[pbs]' nox -s py -p "$py"
          fi
        elif command -v nox >/dev/null 2>&1; then
          if [ -n "$_df_pytest_extra" ]; then
            # shellcheck disable=SC2086
            _df_run nox -s py -p "$py" -- $_df_pytest_extra
          else
            _df_run nox -s py -p "$py"
          fi
        else
          echo "Install uv (https://docs.astral.sh/uv/) for 'uvx --from nox[pbs] nox', or install 'nox[pbs]' on PATH." >&2
          exit 1
        fi
