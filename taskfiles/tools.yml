# Toolchain bootstrap. Every tool the emulator uses (go, task,
# bazelisk, clang, buf, golangci-lint, shellcheck, air, gcloud, ...)
# is pinned in mise.toml; `task tools:install` materializes them all
# for a fresh checkout.
#
# Usage: task tools:install, task tools:doctor
version: "3"

tasks:
  default:
    desc: Materialize every tool pinned in mise.toml (same as tools:install)
    cmds:
      - task: install

  install:
    desc: Run `mise install` to fetch every tool pinned in mise.toml
    cmds:
      - mise install

  doctor:
    desc: Run `mise doctor` to diagnose toolchain issues (missing pins, stale shims, ...)
    cmds:
      - mise doctor
