# Bazel process-hygiene helpers. The GoogleSQL-linked builds in this
# repo are long (25-55 min on a fresh tree) and the persistent Bazel
# daemon eats multi-GB of JVM heap, so stray queues / orphaned client
# wrappers cause real pain.
#
# See `.cursor/rules/bazel-process-hygiene.mdc` for the agent-side rule
# that drives these tasks. Humans should default to:
#   task bazel:status      # is anything alive?
#   task bazel:shutdown    # release the daemon between plans
#   task bazel:kill-strays # full-tree kill when something got wedged
#
# All `task emulator:build-engine:bazel`-style wrappers should source
# BAZEL_JOBS / BAZEL_MEM_MB / BAZEL_ENV from here so a single override
# (`BAZEL_JOBS=4 task ...`) reshapes every entrypoint.
version: "3"

vars:
  # Auto-detected defaults. The goal is "use the box without swamping
  # the OS/IDE": never grab more than 75% of what the kernel reports as
  # *currently available* memory (`MemAvailable`, which is free + most
  # reclaimable buff/cache and is a much better proxy for "what bazel
  # can actually take without making the OOM killer reap Cursor /
  # Chrome" than `MemTotal`).
  #
  # Memory: BAZEL_MEM_MB = floor(MemAvailable_kB * 0.75 / 1024), with
  # an absolute floor of 4096 MiB so the build can always make
  # forward progress (the process-hygiene rule already requires us to
  # bail and reclaim before launching a build when MemAvailable is
  # below 4 GiB; the floor is just so the math never produces a
  # nonsense value).
  #
  # Jobs: derived from the same memory budget rather than nproc alone.
  # Each parallel clang process can spike to ~2 GiB peak RSS during a
  # GoogleSQL-linked compile, so cap jobs at floor(BAZEL_MEM_MB / 2048),
  # then floor at 2 and ceiling at nproc - 2 so the editor/IDE keep
  # two cores. This stops the auto-detect from spawning 14 clangs
  # against 8 GiB of available RAM and OOM-killing the whole host.
  #
  # Override either on the CLI when you want a different shape:
  #   BAZEL_JOBS=4 BAZEL_MEM_MB=8192 task bazel:build TARGETS=...
  BAZEL_MEM_MB:
    sh: |
      if [ -n "${BAZEL_MEM_MB:-}" ]; then
        echo "$BAZEL_MEM_MB"
      elif [ -r /proc/meminfo ]; then
        awk '/^MemAvailable:/ { mb = int($2 * 3 / 4 / 1024); if (mb < 4096) mb = 4096; print mb; exit }' /proc/meminfo
      else
        echo 8192
      fi
  BAZEL_JOBS:
    sh: |
      if [ -n "${BAZEL_JOBS:-}" ]; then
        echo "$BAZEL_JOBS"
      else
        n=$(nproc 2>/dev/null || echo 4)
        if [ "$n" -gt 4 ]; then cpu_cap=$((n - 2)); else cpu_cap=2; fi
        if [ -r /proc/meminfo ]; then
          mem_cap=$(awk '/^MemAvailable:/ { mb = int($2 * 3 / 4 / 1024); jobs = int(mb / 2048); if (jobs < 2) jobs = 2; print jobs; exit }' /proc/meminfo)
        else
          mem_cap=$cpu_cap
        fi
        if [ "$mem_cap" -lt "$cpu_cap" ]; then echo "$mem_cap"; else echo "$cpu_cap"; fi
      fi
  # Pin the host toolchain to system clang-18; the `mise` clang-22 build
  # ships without C++ stdlib headers and breaks the cc_toolchain probe.
  BAZEL_CC:
    sh: echo "${BAZEL_CC:-/usr/bin/clang}"
  BAZEL_CXX:
    sh: echo "${BAZEL_CXX:-/usr/bin/clang++}"
# GoogleSQL build-mode resolution shared by every Bazel-launching
# wrapper (`build`, `test`, `coverage`) is defined PER-TASK in each
# wrapper's own `vars:` block (mirroring `emulator:build-engine:bazel`).
# It lives there — not at the file's top-level `vars:` — so an
# invalid `GOOGLESQL_SOURCE` in the environment does not surface as
# a load-time error for unrelated read-only tasks like
# `bazel:status` / `bazel:cache:status`. The preflight gate
# (`task googlesql:preflight`) runs as the first `cmds` step of
# each wrapper to catch a missing / invalid prebuilt cache before
# any bazel invocation; that gate is the single source of truth and
# is also called from `emulator:build-engine:bazel`.

tasks:
  default:
    desc: List bazel helper tasks
    cmds:
      - task --list-all | grep '^* bazel:'
    silent: true

  status:
    desc: Print live bazel/clang/process-wrapper PIDs (or '(clean)')
    cmds:
      - |
        echo "=== bazel server / clients / process-wrappers ==="
        # grep returns 1 when there are no matches; that is the
        # success case here, so swallow it explicitly.
        matches=$(ps -eo pid,ppid,etime,pcpu,pmem,rss,args \
          | grep -E 'bazel|clang\b|process-wrapper|emulator_main' \
          | grep -vE '\bgrep\b|task bazel:status' || true)
        if [ -z "$matches" ]; then
          echo '(clean)'
        else
          echo "$matches"
        fi

  shutdown:
    desc: Gracefully shut down the persistent Bazel server (releases JVM heap)
    cmds:
      - |
        set -o pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        bazel shutdown || true

  kill-strays:
    desc: Full-tree kill of bazel/clang/process-wrapper leftovers; then bazel shutdown
    cmds:
      - |
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        # Match bazelisk, bazel client (java -jar A-server.jar), bazel
        # subprocesses (process-wrapper, clang under sandbox), and the
        # zsh wrappers that Cursor uses to background `bazel ...`.
        patterns='bazel|process-wrapper|/usr/lib/llvm-.*/bin/clang|CURSOR_SANDBOX_ENV_RESTORE.*bazel'
        list_strays() {
          ps -eo pid,etime,args \
            | grep -E "$patterns" \
            | grep -vE '\bgrep\b|task bazel:kill-strays' \
            || true
        }
        list_stray_pids() {
          list_strays | awk '{print $1}'
        }
        echo "=== before ==="
        before="$(list_strays)"
        if [ -z "$before" ]; then echo '(clean)'; else echo "$before"; fi
        # Kill children first (process-wrapper / clang), then parents
        # (bazel clients / wrappers), so signals do not race the
        # parent-side cleanup.
        for sig in TERM KILL; do
          pids="$(list_stray_pids)"
          if [ -n "$pids" ]; then
            echo "sending SIG$sig to: $(echo $pids | tr '\n' ' ')"
            kill "-$sig" $pids 2>/dev/null || true
            sleep 1
          fi
        done
        # Daemon may still answer pings; ask it to shut down too.
        bazel shutdown 2>/dev/null || true
        echo "=== after ==="
        after="$(list_strays)"
        if [ -z "$after" ]; then echo '(clean)'; else echo "$after"; fi

  build:
    desc: |
      Throttled `bazel build` wrapper. Set TARGETS="//path/to:target" (required).
      Honors BAZEL_JOBS, BAZEL_MEM_MB, BAZEL_CC, BAZEL_CXX, GOOGLESQL_SOURCE
      (default `prebuilt`; consumes the published GoogleSQL artifact from
      .cache/googlesql-prebuilt/ so this wrapper shares the same disk-cache
      ABI lane as `task emulator:build-engine:bazel`). Releases the
      Bazel daemon on SIGINT/SIGTERM cancellation, but keeps it warm
      after normal success/failure so the next wrapper call inside
      the same plan reuses the analysis cache. End-of-plan shutdown
      is the caller's responsibility (see the cleanup block in
      `.cursor/rules/process-hygiene.mdc`; `task bazel:shutdown`).
    vars:
      TARGETS: '{{.TARGETS | default ""}}'
      # Canonicalise GOOGLESQL_SOURCE the same way
      # `emulator:build-engine:bazel` does. Per-task (not file-level) so an
      # invalid env-var value can never trip up the read-only helpers
      # (`bazel:status`, `bazel:cache:status`).
      GOOGLESQL_SOURCE:
        sh: |
          v="${GOOGLESQL_SOURCE:-prebuilt}"
          case "$v" in
            local|source) echo "googlesql-source" ;;
            prebuilt)     echo "googlesql-prebuilt" ;;
            *)
              echo "GOOGLESQL_SOURCE must be 'local'/'source' or 'prebuilt'; got '$v'" >&2
              exit 2
              ;;
          esac
    cmds:
      # Single-source-of-truth gate for "prebuilt cache must exist and
      # validate" before bazel runs. Reads GOOGLESQL_SOURCE from env; the
      # `vars:` canonicalisation above feeds the same value through.
      # Leading colon = absolute task path; without it, Task resolves
      # within the caller's namespace (`bazel:googlesql:preflight`).
      - task: :googlesql:preflight
      # Delegated to bash because Task's embedded mvdan/sh shell does
      # not accept `INT`/`TERM` (or numeric `2`/`15`) in `trap`. Bash
      # is the only shell on the path where the exit-trap shutdown
      # actually fires on signal cancellation.
      #
      # Trap on SIGINT/SIGTERM only (NOT EXIT). The previous EXIT trap
      # shut the bazel daemon down after every successful wrapper call,
      # which costs ~5-10 s of "Starting local Bazel server" + cold
      # analysis-cache reload (177 packages, 7706 targets for a typical
      # scoped test) on the NEXT invocation. Within a single plan the
      # agent usually runs the wrapper many times back-to-back; keeping
      # the daemon warm between successful calls is a significant
      # wall-time win. End-of-plan shutdown still happens via the
      # MANDATORY cleanup block in `.cursor/rules/process-hygiene.mdc`
      # (`task bazel:shutdown && task bazel:kill-strays`), and CI does
      # the same via its final `bazel shutdown` step. Signal-only trap
      # still releases the daemon on Ctrl-C so a cancelled build does
      # not orphan a multi-GB JVM.
      - |
        bash -c '
          set -eo pipefail
          if [ -z "{{.TARGETS}}" ]; then
            echo "task bazel:build requires TARGETS=//path/to:target" >&2
            exit 2
          fi
          root="$(git rev-parse --show-toplevel)"
          cd "$root"
          trap "bazel shutdown 2>/dev/null || true" INT TERM
          CC={{.BAZEL_CC}} CXX={{.BAZEL_CXX}} PATH=/usr/bin:$PATH \
            bazel build \
              --config={{.GOOGLESQL_SOURCE}} \
              --jobs={{.BAZEL_JOBS}} \
              --local_resources=cpu={{.BAZEL_JOBS}} \
              --local_resources=memory={{.BAZEL_MEM_MB}} \
              --action_env=CC={{.BAZEL_CC}} \
              --action_env=CXX={{.BAZEL_CXX}} \
              {{.TARGETS}}
        '

  test:
    desc: |
      Throttled `bazel test` wrapper. Set TARGETS="//path/to:target" (required).
      Honors BAZEL_JOBS, BAZEL_MEM_MB, BAZEL_CC, BAZEL_CXX, GOOGLESQL_SOURCE
      (default `prebuilt`; consumes the published GoogleSQL artifact from
      .cache/googlesql-prebuilt/ so a scoped test shares the same disk-cache
      ABI lane as `task emulator:build-engine:bazel` and skips the
      ~8K-TU GoogleSQL recompile). Releases the Bazel daemon on
      SIGINT/SIGTERM cancellation, but keeps it warm after normal
      success/failure (warm-daemon-per-plan; end-of-plan shutdown is
      the caller's responsibility — see `.cursor/rules/process-hygiene.mdc`).
    vars:
      TARGETS: '{{.TARGETS | default ""}}'
      TEST_FLAGS: '{{.TEST_FLAGS | default "--test_output=errors"}}'
      GOOGLESQL_SOURCE:
        sh: |
          v="${GOOGLESQL_SOURCE:-prebuilt}"
          case "$v" in
            local|source) echo "googlesql-source" ;;
            prebuilt)     echo "googlesql-prebuilt" ;;
            *)
              echo "GOOGLESQL_SOURCE must be 'local'/'source' or 'prebuilt'; got '$v'" >&2
              exit 2
              ;;
          esac
    cmds:
      # Leading colon = absolute task path (see `bazel:build` for why).
      - task: :googlesql:preflight
      # See `bazel:build` for why we wrap in bash AND why the trap is
      # SIGINT/SIGTERM-only (warm-daemon-per-plan). Task's mvdan/sh
      # cannot trap non-EXIT signals so we still need real bash.
      - |
        bash -c '
          set -eo pipefail
          if [ -z "{{.TARGETS}}" ]; then
            echo "task bazel:test requires TARGETS=//path/to:target" >&2
            exit 2
          fi
          root="$(git rev-parse --show-toplevel)"
          cd "$root"
          trap "bazel shutdown 2>/dev/null || true" INT TERM
          CC={{.BAZEL_CC}} CXX={{.BAZEL_CXX}} PATH=/usr/bin:$PATH \
            bazel test \
              --config={{.GOOGLESQL_SOURCE}} \
              --jobs={{.BAZEL_JOBS}} \
              --local_resources=cpu={{.BAZEL_JOBS}} \
              --local_resources=memory={{.BAZEL_MEM_MB}} \
              --action_env=CC={{.BAZEL_CC}} \
              --action_env=CXX={{.BAZEL_CXX}} \
              {{.TEST_FLAGS}} \
              {{.TARGETS}}
        '

  cache:status:
    desc: |
      Print disk usage of the local Bazel disk cache and the unpacked
      googlesql-prebuilt cache (the two `.cache/` directories the build
      writes to). Reads `du -sh` on each path, plus the action count for
      the disk cache so you can tell at a glance whether it is warm.
    cmds:
      - |
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        echo "=== .cache/bazel-disk (--disk_cache, see .bazelrc) ==="
        if [ -d .cache/bazel-disk ]; then
          du -sh .cache/bazel-disk 2>/dev/null || true
          n=$(find .cache/bazel-disk -type f 2>/dev/null | wc -l)
          echo "action cache entries: $n"
        else
          echo "(absent — populated on next bazel build/test/run/coverage)"
        fi
        echo
        echo "=== .cache/googlesql-prebuilt (--config=googlesql-prebuilt) ==="
        if [ -d .cache/googlesql-prebuilt ]; then
          du -sh .cache/googlesql-prebuilt 2>/dev/null || true
        else
          echo "(absent — populate with task googlesql:fetch-prebuilt or task googlesql:stage-bazel)"
        fi

  cache:clear:
    desc: |
      Wipe the local Bazel disk cache at .cache/bazel-disk. Use when
      reclaiming disk space or when a corrupt action output needs to be
      evicted (rare; usually a `bazel clean` is enough). Does NOT touch
      `.cache/googlesql-prebuilt/` — use `task googlesql:clean-cache`
      for that (or `rm -rf .cache/googlesql-prebuilt/`). Does NOT shut
      down the running bazel server; run `task bazel:shutdown` first if
      you want to invalidate any in-memory action cache too.
    cmds:
      - |
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        if [ ! -d .cache/bazel-disk ]; then
          echo "(.cache/bazel-disk does not exist — nothing to clear)"
          exit 0
        fi
        before=$(du -sh .cache/bazel-disk 2>/dev/null | awk '{print $1}')
        echo "before: $before in .cache/bazel-disk"
        rm -rf .cache/bazel-disk
        echo "after:  (cache cleared; will repopulate on next bazel build)"

  coverage:
    desc: |
      Throttled `bazel coverage` wrapper. Set TARGETS="//path/to:target ..."
      (required; usually the output of a scoped `bazel query` over
      `//backend/...`, `//binaries/...`, `//frontend/...`, and
      `//tools/googlesql-prebuilt/smoke/...` — see `task lint:cpp:test`).
      Honors BAZEL_JOBS, BAZEL_MEM_MB, BAZEL_CC, BAZEL_CXX, GOOGLESQL_SOURCE
      (default `prebuilt`; consumes the published GoogleSQL artifact from
      .cache/googlesql-prebuilt/ so coverage runs share the same disk-cache
      ABI lane as the engine build). Emits a single combined lcov report at
      `bazel-out/_coverage/_coverage_report.dat` via `--combined_report=lcov`,
      which the in-repo `tools/coverage` summarizer (run via
      `task coverage:summarize`) ingests directly. Releases the Bazel
      daemon on SIGINT/SIGTERM cancellation, but keeps it warm after
      normal success/failure (warm-daemon-per-plan; end-of-plan
      shutdown is the caller's responsibility — see
      `.cursor/rules/process-hygiene.mdc`).
    vars:
      TARGETS: '{{.TARGETS | default ""}}'
      COVERAGE_FLAGS: '{{.COVERAGE_FLAGS | default "--combined_report=lcov --test_output=errors"}}'
      GOOGLESQL_SOURCE:
        sh: |
          v="${GOOGLESQL_SOURCE:-prebuilt}"
          case "$v" in
            local|source) echo "googlesql-source" ;;
            prebuilt)     echo "googlesql-prebuilt" ;;
            *)
              echo "GOOGLESQL_SOURCE must be 'local'/'source' or 'prebuilt'; got '$v'" >&2
              exit 2
              ;;
          esac
    cmds:
      # Leading colon = absolute task path (see `bazel:build` for why).
      - task: :googlesql:preflight
      # Same wrap-in-bash trick as `bazel:test`, and SIGINT/SIGTERM-only
      # trap for warm-daemon-per-plan: Task's mvdan/sh shell does not
      # accept symbolic signal names in `trap`, so the trap has to live
      # inside a real bash invocation.
      - |
        bash -c '
          set -eo pipefail
          if [ -z "{{.TARGETS}}" ]; then
            echo "task bazel:coverage requires TARGETS=//path/to:target" >&2
            exit 2
          fi
          root="$(git rev-parse --show-toplevel)"
          cd "$root"
          trap "bazel shutdown 2>/dev/null || true" INT TERM
          CC={{.BAZEL_CC}} CXX={{.BAZEL_CXX}} PATH=/usr/bin:$PATH \
            bazel coverage \
              --config={{.GOOGLESQL_SOURCE}} \
              --jobs={{.BAZEL_JOBS}} \
              --local_resources=cpu={{.BAZEL_JOBS}} \
              --local_resources=memory={{.BAZEL_MEM_MB}} \
              --action_env=CC={{.BAZEL_CC}} \
              --action_env=CXX={{.BAZEL_CXX}} \
              {{.COVERAGE_FLAGS}} \
              {{.TARGETS}}
        '
