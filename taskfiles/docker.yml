# Build and run the runtime Docker image. The multi-stage Dockerfile
# ships both the Go gateway and the C++ engine and is what
# `task docker:smoke` / `.github/workflows/docker-smoke.yml` /
# the GHCR release path (plan 44) eventually consume.
#
# Usage:
#   task docker:build   - build the dev tag
#   task docker:run     - run the dev tag interactively
#   task docker:smoke   - bring up docker-compose, hit /healthz +
#                         a SELECT 1 round-trip, tear down. Mirrors
#                         the docker-smoke CI workflow so local +
#                         CI exercise the exact same recipe.
version: "3"

vars:
  DOCKER_IMAGE: "bigquery-emulator:dev"
  EMULATOR_HTTP_PORT:
    sh: echo "${EMULATOR_HTTP_PORT:-9050}"
  EMULATOR_GRPC_PORT:
    sh: echo "${EMULATOR_GRPC_PORT:-9060}"
  # Throttled defaults for the in-container Bazel build (engine-builder-bazel
  # stage). Without these the Dockerfile auto-detects the host's full nproc
  # / MemTotal, forks ~nproc parallel clang++ processes during the
  # `//binaries/emulator_main` link, and routinely OOM-kills the host's IDE
  # + browser. Picks match the docker-specific guidance in
  # `.cursor/rules/process-hygiene.mdc`: nproc-6 jobs (floor 2), 50% MemTotal
  # (floor 4 GiB) so the developer's box keeps half its RAM and ~6 cores for
  # everything else. Override on the CLI to scale up on dedicated runners:
  #   BAZEL_JOBS=12 BAZEL_MEM_MB=16384 task docker:build
  DOCKER_BAZEL_JOBS:
    sh: |
      if [ -n "${BAZEL_JOBS:-}" ]; then
        echo "$BAZEL_JOBS"
      else
        n=$(nproc 2>/dev/null || echo 4)
        if [ "$n" -gt 8 ]; then echo $((n - 6)); else echo 2; fi
      fi
  DOCKER_BAZEL_MEM_MB:
    sh: |
      if [ -n "${BAZEL_MEM_MB:-}" ]; then
        echo "$BAZEL_MEM_MB"
      elif [ -r /proc/meminfo ]; then
        awk '/^MemTotal:/ { mb = int($2 / 2 / 1024); if (mb < 4096) mb = 4096; print mb }' /proc/meminfo
      else
        echo 4096
      fi
  # Runtime caps consumed by docker-compose.yml's mem_limit / cpus on
  # `docker compose up`. The defaults below are auto-derived from the
  # current host so `task docker:smoke` cannot evict the IDE either.
  DOCKER_RUN_MEM_LIMIT:
    sh: |
      if [ -n "${BIGQUERY_EMULATOR_MEM_LIMIT:-}" ]; then
        echo "$BIGQUERY_EMULATOR_MEM_LIMIT"
      elif [ -r /proc/meminfo ]; then
        awk '/^MemTotal:/ { mb = int($2 * 4 / 5 / 1024); if (mb < 2048) mb = 2048; printf "%dm", mb }' /proc/meminfo
      else
        echo 8192m
      fi
  DOCKER_RUN_CPUS:
    sh: |
      if [ -n "${BIGQUERY_EMULATOR_CPUS:-}" ]; then
        echo "$BIGQUERY_EMULATOR_CPUS"
      else
        n=$(nproc 2>/dev/null || echo 4)
        if [ "$n" -gt 4 ]; then echo "$((n - 2)).0"; else echo "2.0"; fi
      fi

tasks:
  default:
    desc: Build the runtime Docker image (same as docker:build)
    cmds:
      - task: build

  build:
    desc: |
      Build the runtime image with both binaries (tag {{.DOCKER_IMAGE}}).
      Forwards BAZEL_JOBS / BAZEL_MEM_MB build args so the in-container
      Bazel build cannot OOM the host (auto-detect picks nproc-6 jobs and
      50% MemTotal; override via env vars).
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        echo "[docker:build] throttling: BAZEL_JOBS={{.DOCKER_BAZEL_JOBS}} BAZEL_MEM_MB={{.DOCKER_BAZEL_MEM_MB}}"
        docker build \
          --build-arg BAZEL_JOBS={{.DOCKER_BAZEL_JOBS}} \
          --build-arg BAZEL_MEM_MB={{.DOCKER_BAZEL_MEM_MB}} \
          -t {{.DOCKER_IMAGE}} .

  run:
    desc: Run the image and publish the REST gateway + engine gRPC ports
    deps: [build]
    cmds:
      - |
        set -eo pipefail
        docker run --rm \
          -p {{.EMULATOR_HTTP_PORT}}:{{.EMULATOR_HTTP_PORT}} \
          -p {{.EMULATOR_GRPC_PORT}}:{{.EMULATOR_GRPC_PORT}} \
          {{.DOCKER_IMAGE}}

  # Quickstart smoke: same recipe the docker-smoke CI workflow runs.
  # Builds the bigquery-emulator:local tag via docker compose, polls
  # the container's /healthz until it flips to healthy, fires a
  # `SELECT 1` against the synchronous query API, asserts both shape
  # and HTTP 200, and tears the stack down (including the named
  # volume). Exits non-zero on any failure so a CI runner can use it
  # verbatim.
  smoke:
    desc: docker compose up + /healthz + SELECT 1 round-trip + teardown
    cmds:
      - |
        bash -c '
          set -euo pipefail
          root="$(git rev-parse --show-toplevel)"
          cd "$root"

          cleanup() {
            docker compose down -v --remove-orphans >/dev/null 2>&1 || true
          }
          trap cleanup EXIT INT TERM

          # Throttle the in-container Bazel build + the running
          # container so the smoke test never OOM-kills the host.
          # See the var block at the top of this file for derivation;
          # CLI overrides (BAZEL_JOBS, BAZEL_MEM_MB,
          # BIGQUERY_EMULATOR_MEM_LIMIT, BIGQUERY_EMULATOR_CPUS) still
          # win because docker-compose.yml uses `${VAR:-default}`.
          export BAZEL_JOBS="{{.DOCKER_BAZEL_JOBS}}"
          export BAZEL_MEM_MB="{{.DOCKER_BAZEL_MEM_MB}}"
          export BIGQUERY_EMULATOR_MEM_LIMIT="{{.DOCKER_RUN_MEM_LIMIT}}"
          export BIGQUERY_EMULATOR_CPUS="{{.DOCKER_RUN_CPUS}}"
          echo "[docker:smoke] throttling: BAZEL_JOBS=${BAZEL_JOBS} BAZEL_MEM_MB=${BAZEL_MEM_MB} mem_limit=${BIGQUERY_EMULATOR_MEM_LIMIT} cpus=${BIGQUERY_EMULATOR_CPUS}"

          echo "[docker:smoke] docker compose up --build -d"
          docker compose up --build -d

          echo "[docker:smoke] waiting for /healthz to return 200"
          # Poll the gateway directly rather than the Docker daemons
          # Health.Status field. The healthcheck interval (30s) is too
          # coarse for a smoke test and Task templates the inspect
          # format string awkwardly; a tight curl loop reads the same
          # endpoint Docker would and surfaces the engine cold-start
          # tail in seconds, not minutes.
          deadline=$(( $(date +%s) + 120 ))
          while :; do
            if curl -fsS -o /dev/null "http://localhost:{{.EMULATOR_HTTP_PORT}}/healthz"; then
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "[docker:smoke] FAILED: /healthz did not return 200 within 120s"
              echo "[docker:smoke] docker compose ps:"
              docker compose ps
              echo "[docker:smoke] docker compose logs --tail=200:"
              docker compose logs --tail=200
              exit 1
            fi
            sleep 2
          done

          echo "[docker:smoke] GET /healthz"
          curl -fsS http://localhost:{{.EMULATOR_HTTP_PORT}}/healthz \
            | tee /dev/stderr | grep -q "\"status\":\"ok\""

          echo "[docker:smoke] POST jobs.query SELECT 1"
          response=$(curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"SELECT 1 AS n\",\"useLegacySql\":false}" \
            "http://localhost:{{.EMULATOR_HTTP_PORT}}/bigquery/v2/projects/test/queries")
          echo "[docker:smoke] response: ${response}"

          echo "$response" | grep -q "\"kind\":\"bigquery#queryResponse\""
          echo "$response" | grep -q "\"jobComplete\":true"
          echo "$response" | grep -q "\"v\":\"1\""

          echo "[docker:smoke] OK"
        '
