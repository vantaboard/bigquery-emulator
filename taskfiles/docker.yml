# Build and run the runtime Docker image. The multi-stage Dockerfile
# ships both the Go gateway and the C++ engine and is what
# `task docker:smoke` / `.github/workflows/docker-smoke.yml` /
# the GHCR release path (`.github/workflows/release.yml`) consume.
#
# Usage:
#   task docker:build   - build the dev tag
#   task docker:run     - run the dev tag interactively
#   task docker:smoke   - bring up docker-compose, hit /healthz +
#                         a SELECT 1 round-trip, tear down. Mirrors
#                         the docker-smoke CI workflow so local +
#                         CI exercise the exact same recipe.
version: "3"

vars:
  DOCKER_IMAGE: "bigquery-emulator:dev"
  EMULATOR_HTTP_PORT:
    sh: echo "${EMULATOR_HTTP_PORT:-9050}"
  EMULATOR_GRPC_PORT:
    sh: echo "${EMULATOR_GRPC_PORT:-9060}"

tasks:
  default:
    desc: Build the runtime Docker image (same as docker:build)
    cmds:
      - task: build

  build:
    desc: |
      Build the runtime image with both binaries (tag {{.DOCKER_IMAGE}}).
      Forwards BAZEL_JOBS / BAZEL_MEM_MB build args derived from the live
      host's MemAvailable / nproc by `scripts/compute_docker_throttle.sh`
      so the in-container Bazel build cannot OOM the host. Override on
      the CLI to scale up on dedicated runners:
        BAZEL_JOBS=12 BAZEL_MEM_MB=16384 task docker:build
      
      The CI/Docker/release track of the `googlesql-prebuilt`
      rollout: the Dockerfile consumes a published GoogleSQL
      prebuilt artifact when
      GOOGLESQL_PREBUILT_URL + GOOGLESQL_PREBUILT_SHA256 are set in
      the environment, and falls back to a sibling source clone
      otherwise. Both env vars are forwarded as `--build-arg`s when
      set; leaving them empty is harmless (the Dockerfile picks the
      source path).
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        eval "$(bash "${root}/scripts/compute_docker_throttle.sh")"
        eval "$(bash "${root}/scripts/load_googlesql_prebuilt_pin.sh")"
        gsq_args=()
        if [ -n "${GOOGLESQL_PREBUILT_URL:-}" ] && [ -n "${GOOGLESQL_PREBUILT_SHA256:-}" ]; then
          gsq_args+=(--build-arg "GOOGLESQL_PREBUILT_URL=${GOOGLESQL_PREBUILT_URL}")
          gsq_args+=(--build-arg "GOOGLESQL_PREBUILT_SHA256=${GOOGLESQL_PREBUILT_SHA256}")
          echo "[docker:build] GoogleSQL prebuilt: $GOOGLESQL_PREBUILT_URL (sha256=$GOOGLESQL_PREBUILT_SHA256)"
        else
          echo "[docker:build] GoogleSQL: source fallback (set GOOGLESQL_PREBUILT_URL/_SHA256 to switch to prebuilt)"
        fi
        docker build \
          --build-arg BAZEL_JOBS="${BAZEL_JOBS}" \
          --build-arg BAZEL_MEM_MB="${BAZEL_MEM_MB}" \
          "${gsq_args[@]}" \
          -t {{.DOCKER_IMAGE}} .

  run:
    desc: Run the image and publish the REST gateway + engine gRPC ports
    deps: [build]
    cmds:
      - |
        set -eo pipefail
        docker run --rm \
          -p {{.EMULATOR_HTTP_PORT}}:{{.EMULATOR_HTTP_PORT}} \
          -p {{.EMULATOR_GRPC_PORT}}:{{.EMULATOR_GRPC_PORT}} \
          {{.DOCKER_IMAGE}}

  # Quickstart smoke: same recipe the docker-smoke CI workflow runs.
  # Builds the bigquery-emulator:local tag via docker compose, polls
  # the container's /healthz until it flips to healthy, fires a
  # `SELECT 1` against the synchronous query API, asserts both shape
  # and HTTP 200, and tears the stack down (including the named
  # volume). Exits non-zero on any failure so a CI runner can use it
  # verbatim.
  smoke:
    desc: docker compose up + /healthz + SELECT 1 round-trip + teardown
    cmds:
      - |
        bash -c '
          set -euo pipefail
          root="$(git rev-parse --show-toplevel)"
          cd "$root"

          cleanup() {
            docker compose down -v --remove-orphans >/dev/null 2>&1 || true
          }
          trap cleanup EXIT INT TERM

          # Throttle the in-container Bazel build + the running
          # container against the live host so the smoke test never
          # OOM-kills the IDE. CLI overrides (BAZEL_JOBS / BAZEL_MEM_MB /
          # BIGQUERY_EMULATOR_MEM_LIMIT / BIGQUERY_EMULATOR_CPUS, plus
          # the BAZEL_PER_JOB_MEM_MB / BAZEL_AVAIL_PCT / BAZEL_CPU_RESERVE
          # tuning knobs) still win because docker-compose.yml uses
          # `${VAR:-default}` and the helper honors caller env. See
          # `scripts/compute_docker_throttle.sh` for the derivation.
          eval "$(bash "${root}/scripts/compute_docker_throttle.sh")"
          eval "$(bash "${root}/scripts/load_googlesql_prebuilt_pin.sh")"

          if [ "${DOCKER_SMOKE_SKIP_BUILD:-0}" = "1" ]; then
            echo "[docker:smoke] docker compose up -d (DOCKER_SMOKE_SKIP_BUILD=1; image pre-loaded)"
            docker compose up -d
          else
            echo "[docker:smoke] docker compose up --build -d"
            docker compose up --build -d
          fi

          echo "[docker:smoke] waiting for /healthz to return 200"
          # Poll the gateway directly rather than the Docker daemons
          # Health.Status field. The healthcheck interval (30s) is too
          # coarse for a smoke test and Task templates the inspect
          # format string awkwardly; the shared helper polls every 2s
          # and surfaces the engine cold-start tail in seconds, not
          # minutes. It also silences the cosmetic "Recv failure"
          # docker-proxy emits during the startup window — see
          # `scripts/wait_for_healthz.sh` for the why.
          bash "${root}/scripts/wait_for_healthz.sh" "http://localhost:{{.EMULATOR_HTTP_PORT}}/healthz" 120 bigquery-emulator

          echo "[docker:smoke] GET /healthz"
          curl -fsS http://localhost:{{.EMULATOR_HTTP_PORT}}/healthz \
            | tee /dev/stderr | grep -q "\"status\":\"ok\""

          echo "[docker:smoke] POST jobs.query SELECT 1"
          response=$(curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"SELECT 1 AS n\",\"useLegacySql\":false}" \
            "http://localhost:{{.EMULATOR_HTTP_PORT}}/bigquery/v2/projects/test/queries")
          echo "[docker:smoke] response: ${response}"

          echo "$response" | grep -q "\"kind\":\"bigquery#queryResponse\""
          echo "$response" | grep -q "\"jobComplete\":true"
          echo "$response" | grep -q "\"v\":\"1\""

          echo "[docker:smoke] OK"
        '
