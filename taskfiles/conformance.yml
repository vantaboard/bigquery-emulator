# Conformance harness wrapper. Drives `go run
# ./conformance/cmd/runner` with the project's conventions baked in:
# the engine binary lives at ./bin/emulator_main (staged by
# `task emulator:build-engine:bazel`), the seed fixtures live under
# conformance/fixtures, and the matrix runs the single profile
# today (the local execution coordinator over DuckDB storage) by
# default. The `update-baselines` and `run-fixture` convenience
# targets are used during fixture authoring.
#
# Usage:
#   task conformance:run                       # all fixtures, all profiles
#   task conformance:run PROFILE=duckdb        # explicit (only profile today)
#   task conformance:run OUTPUT=json OUTPUT_FILE=/tmp/r.json
#   task conformance:run-fixture FIXTURE=conformance/fixtures/select_literal_value.yaml
#   task conformance:update-baselines FIXTURE=conformance/fixtures/<name>.yaml
#
# Environment overrides:
#   EMULATOR_BIN   path to emulator_main (default ./bin/emulator_main)
#   FIXTURES       directory or single .yaml (default conformance/fixtures)
#   OUTPUT         text | json (default text)
#   OUTPUT_FILE    if set, tee renderer output into this file too
#   PROFILE        comma-separated subset (default: all known profiles)
version: "3"

vars:
  EMULATOR_BIN:
    sh: echo "${EMULATOR_BIN:-./bin/emulator_main}"
  FIXTURES:
    sh: echo "${FIXTURES:-conformance/fixtures}"
  OUTPUT:
    sh: echo "${OUTPUT:-text}"
  OUTPUT_FILE:
    sh: echo "${OUTPUT_FILE:-}"
  PROFILE:
    sh: echo "${PROFILE:-}"

tasks:
  default:
    desc: List conformance helper tasks
    cmds:
      - task --list-all | grep '^* conformance:'
    silent: true

  run:
    desc: Run conformance fixtures against EMULATOR_BIN. Honors PROFILE, FIXTURES, OUTPUT, OUTPUT_FILE.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        # Comma-separated PROFILE list expands to repeated
        # --profile flags. Empty means "all known profiles" so
        # the runner picks them up from KnownProfiles().
        PROFILE_FLAGS=""
        if [ -n "{{.PROFILE}}" ]; then
          for p in $(echo "{{.PROFILE}}" | tr ',' ' '); do
            PROFILE_FLAGS="$PROFILE_FLAGS --profile $p"
          done
        fi
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures "{{.FIXTURES}}" \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          $PROFILE_FLAGS \
          $OUTPUT_FILE_FLAG

  fastpath:
    desc: |
      Run only the DuckDB fast-path conformance fixtures
      (`conformance/fixtures/fastpath/`) plus the polyfill UDF
      fixtures (`conformance/fixtures/functions/`). Targets `~2
      minutes` of wall time, scoped to the `duckdb_native` /
      `duckdb_rewrite` shapes plan-2
      (`googlesqlite-04-scan-emits.plan.md`) pins plus the
      `duckdb_udf` shapes plan-3 lands
      (`googlesqlite-03-operator-disposition.plan.md`). Wired into the
      PR-gating CI job; run locally before pushing if you touched
      the transpiler, its YAML registries, or the polyfill UDF
      library. Honors EMULATOR_BIN (default `./bin/emulator_main`).
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        # Always restrict to the DuckDB profile -- this lane is
        # explicitly the fast-path lane. PROFILE override is
        # ignored on purpose so a misconfigured local environment
        # cannot flip the lane to a future profile and silently
        # skip the fast-path coverage.
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # Two invocations because the runner CLI accepts a single
        # --fixtures path (file or directory). The polyfill UDF
        # fixtures land under conformance/fixtures/functions/ per
        # plan-3 and use the same fixture format, so the second
        # call reuses the same flags.
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures conformance/fixtures/fastpath \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures conformance/fixtures/functions \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG
        # array-struct fixtures (`conformance/fixtures/array_struct/`)
        # pin the divergent `ResolvedArrayScan` shapes routed through
        # the semantic executor by `googlesqlite-12-arrays-generators.plan.md`.
        # Requires `bin/emulator_main` to include the executor's
        # ArrayScan dispatch (plan 8 +); a pre-plan-8 binary will
        # surface NOT_IMPLEMENTED here.
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures conformance/fixtures/array_struct \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG

  run-fixture:
    desc: Run a single fixture (FIXTURE=path/to/fixture.yaml). Honors PROFILE.
    vars:
      FIXTURE: '{{.FIXTURE | default ""}}'
    cmds:
      - |
        set -eo pipefail
        if [ -z "{{.FIXTURE}}" ]; then
          echo "task conformance:run-fixture requires FIXTURE=path/to/fixture.yaml" >&2
          exit 2
        fi
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        PROFILE_FLAGS=""
        if [ -n "{{.PROFILE}}" ]; then
          for p in $(echo "{{.PROFILE}}" | tr ',' ' '); do
            PROFILE_FLAGS="$PROFILE_FLAGS --profile $p"
          done
        fi
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures "{{.FIXTURE}}" \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          $PROFILE_FLAGS \
          $OUTPUT_FILE_FLAG

  routing-matrix:
    desc: |
      Walk every fixture under FIXTURES and emit a Markdown table
      of shape x route. Reads YAML only (no live emulator). The
      table is a deterministic function of the fixture YAMLs;
      committed to CI as a non-blocking artifact per plan 16
      (`.cursor/plans/conformance-routing-matrix.plan.md`). Honors
      OUTPUT_FILE; defaults to stdout.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/routing-matrix \
          --fixtures "{{.FIXTURES}}" \
          $OUTPUT_FILE_FLAG

  update-baselines:
    desc: |
      Rewrite the expected: block of one or more fixtures with the engine's actual output. Pass FIXTURE=path or default to FIXTURES (the whole directory). Honors PROFILE. Read the diff before committing.
    vars:
      FIXTURE: '{{.FIXTURE | default ""}}'
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        TARGET="{{.FIXTURES}}"
        if [ -n "{{.FIXTURE}}" ]; then
          TARGET="{{.FIXTURE}}"
        fi
        PROFILE_FLAGS=""
        if [ -n "{{.PROFILE}}" ]; then
          for p in $(echo "{{.PROFILE}}" | tr ',' ' '); do
            PROFILE_FLAGS="$PROFILE_FLAGS --profile $p"
          done
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures "$TARGET" \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --update-baselines \
          $PROFILE_FLAGS
        echo
        echo "task conformance:update-baselines: review the diff in '$TARGET' before committing." >&2
