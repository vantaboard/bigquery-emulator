# Conformance harness wrapper. Drives `go run
# ./conformance/cmd/runner` with the project's conventions baked in:
# the engine binary lives at ./bin/emulator_main (staged by
# `task emulator:build-engine:bazel`), the seed fixtures live under
# conformance/fixtures, and the matrix runs the single profile
# today (the local execution coordinator over DuckDB storage) by
# default. The `update-baselines` and `run-fixture` convenience
# targets are used during fixture authoring.
#
# Usage:
#   task conformance:run                       # all fixtures, all profiles
#   task conformance:run PROFILE=duckdb        # explicit (only profile today)
#   task conformance:run OUTPUT=json OUTPUT_FILE=/tmp/r.json
#   task conformance:run-fixture FIXTURE=conformance/fixtures/select_literal_value.yaml
#   task conformance:update-baselines FIXTURE=conformance/fixtures/<name>.yaml
#
# Environment overrides:
#   EMULATOR_BIN   path to emulator_main (default ./bin/emulator_main)
#   FIXTURES       directory or single .yaml (default conformance/fixtures)
#   OUTPUT         text | json (default text)
#   OUTPUT_FILE    if set, tee renderer output into this file too
#   PROFILE        comma-separated subset (default: all known profiles)
version: "3"

vars:
  EMULATOR_BIN:
    sh: echo "${EMULATOR_BIN:-./bin/emulator_main}"
  FIXTURES:
    sh: echo "${FIXTURES:-conformance/fixtures}"
  OUTPUT:
    sh: echo "${OUTPUT:-text}"
  OUTPUT_FILE:
    sh: echo "${OUTPUT_FILE:-}"
  PROFILE:
    sh: echo "${PROFILE:-}"

tasks:
  default:
    desc: List conformance helper tasks
    cmds:
      - task --list-all | grep '^* conformance:'
    silent: true

  run:
    desc: Run conformance fixtures against EMULATOR_BIN. Honors PROFILE, FIXTURES, OUTPUT, OUTPUT_FILE.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        # Comma-separated PROFILE list expands to repeated
        # --profile flags. Empty means "all known profiles" so
        # the runner picks them up from KnownProfiles().
        PROFILE_FLAGS=""
        if [ -n "{{.PROFILE}}" ]; then
          for p in $(echo "{{.PROFILE}}" | tr ',' ' '); do
            PROFILE_FLAGS="$PROFILE_FLAGS --profile $p"
          done
        fi
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures "{{.FIXTURES}}" \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          $PROFILE_FLAGS \
          $OUTPUT_FILE_FLAG

  fastpath:
    desc: |
      Run only the DuckDB fast-path conformance fixtures
      (`conformance/fixtures/fastpath/`) plus the polyfill UDF
      fixtures (`conformance/fixtures/functions/`). Targets `~2
      minutes` of wall time, scoped to the `duckdb_native` /
      `duckdb_rewrite` shapes plus the `duckdb_udf` shapes pinned by
      `docs/ENGINE_POLICY.md`. Wired into the
      PR-gating CI job; run locally before pushing if you touched
      the transpiler, its YAML registries, or the polyfill UDF
      library. Honors EMULATOR_BIN (default `./bin/emulator_main`).
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        # Always restrict to the DuckDB profile -- this lane is
        # explicitly the fast-path lane. PROFILE override is
        # ignored on purpose so a misconfigured local environment
        # cannot flip the lane to a future profile and silently
        # skip the fast-path coverage.
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # Two invocations because the runner CLI accepts a single
        # --fixtures path (file or directory). The polyfill UDF
        # fixtures live under conformance/fixtures/functions/ and
        # use the same fixture format, so the second call reuses
        # the same flags.
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures conformance/fixtures/fastpath \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures conformance/fixtures/functions \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG
        # array-struct fixtures (`conformance/fixtures/array_struct/`)
        # pin the divergent `ResolvedArrayScan` shapes routed through
        # the semantic executor by `docs/ENGINE_POLICY.md`.
        # Requires `bin/emulator_main` to include the executor's
        # ArrayScan dispatch; an outdated engine binary that
        # predates it will surface NOT_IMPLEMENTED here.
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures conformance/fixtures/array_struct \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG
        # core_usage fixtures (`conformance/fixtures/core_usage/`) pin
        # everyday client patterns (views, backtick names, default
        # dataset, DML read-back) with production-validated expected
        # rows. Hand-authored — never bootstrap via update-baselines.
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures conformance/fixtures/core_usage \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG

  run-fixture:
    desc: Run a single fixture (FIXTURE=path/to/fixture.yaml). Honors PROFILE.
    vars:
      FIXTURE: '{{.FIXTURE | default ""}}'
    cmds:
      - |
        set -eo pipefail
        if [ -z "{{.FIXTURE}}" ]; then
          echo "task conformance:run-fixture requires FIXTURE=path/to/fixture.yaml" >&2
          exit 2
        fi
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        PROFILE_FLAGS=""
        if [ -n "{{.PROFILE}}" ]; then
          for p in $(echo "{{.PROFILE}}" | tr ',' ' '); do
            PROFILE_FLAGS="$PROFILE_FLAGS --profile $p"
          done
        fi
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures "{{.FIXTURE}}" \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          $PROFILE_FLAGS \
          $OUTPUT_FILE_FLAG

  routing-matrix:
    desc: |
      Walk every fixture under FIXTURES and emit a Markdown table
      of shape x route. Reads YAML only (no live emulator). The
      table is a deterministic function of the fixture YAMLs;
      committed to CI as a non-blocking artifact
      (`docs/ENGINE_POLICY.md`). Honors
      OUTPUT_FILE; defaults to stdout.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/routing-matrix \
          --fixtures "{{.FIXTURES}}" \
          $OUTPUT_FILE_FLAG

  bqutils-sync:
    desc: |
      Regenerate bigquery-utils UDF conformance fixtures from upstream
      (or BIGQUERY_UTILS_LOCAL). Writes to
      conformance/thirdparty-fixtures/bigquery_utils/known_failing/.
      Honors BIGQUERY_UTILS_REF, BIGQUERY_UTILS_REPO,
      BIGQUERY_UTILS_LOCAL, BIGQUERY_UTILS_KEEP; pass --dry-run via CLI_ARGS.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        chmod +x scripts/sync_bigquery_utils_udfs.sh
        # shellcheck disable=SC2086
        ./scripts/sync_bigquery_utils_udfs.sh ${CLI_ARGS:-}

  googlesql-corpus:
    desc: |
      Run the pinned GoogleSQL .test corpus lane (jobs.query semantic
      regression net). Requires bin/emulator_main. Honors EMULATOR_BIN,
      OUTPUT, OUTPUT_FILE.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086
        go run ./conformance/cmd/googlesql-corpus \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --gate-pinned=true \
          $OUTPUT_FILE_FLAG

  bqutils:
    desc: |
      Run the passing bigquery-utils UDF conformance lane (non-gating).
      Requires bin/emulator_main (task emulator:build-engine:bazel).
      Honors EMULATOR_BIN (default ./bin/emulator_main).
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        # shellcheck disable=SC2086
        go run ./conformance/cmd/runner \
          --fixtures conformance/thirdparty-fixtures/bigquery_utils/passing \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --profile duckdb \
          $OUTPUT_FILE_FLAG

  differential:
    desc: |
      Replay the committed production-BigQuery oracle lane against the
      emulator. Requires bin/emulator_main. Honors EMULATOR_BIN, OUTPUT,
      OUTPUT_FILE, PROFILE.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        PROFILE_FLAG=""
        if [ -n "{{.PROFILE}}" ]; then
          PROFILE_FLAG="--profile {{.PROFILE}}"
        fi
        # shellcheck disable=SC2086
        go run ./conformance/cmd/differential \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          $PROFILE_FLAG \
          $OUTPUT_FILE_FLAG

  differential-record:
    desc: |
      Record production BigQuery oracles for the differential corpus.
      No-op when BIGQUERY_DIFFERENTIAL_PROJECT is unset. Requires ADC.
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        go run ./conformance/cmd/differential-record

  session:
    desc: |
      Run stateful multi-step session fixtures (one long-lived engine per
      session). Honors EMULATOR_BIN, SESSIONS, OUTPUT, OUTPUT_FILE, PROFILE.
    vars:
      SESSIONS:
        sh: echo "${SESSIONS:-conformance/sessions}"
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        OUTPUT_FILE_FLAG=""
        if [ -n "{{.OUTPUT_FILE}}" ]; then
          OUTPUT_FILE_FLAG="--output-file {{.OUTPUT_FILE}}"
        fi
        PROFILE_FLAG=""
        if [ -n "{{.PROFILE}}" ]; then
          PROFILE_FLAG="--profile {{.PROFILE}}"
        fi
        # shellcheck disable=SC2086
        go run ./conformance/cmd/session \
          --sessions "{{.SESSIONS}}" \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          $PROFILE_FLAG \
          $OUTPUT_FILE_FLAG

  update-baselines:
    desc: |
      Rewrite the expected: block of one or more fixtures with the engine's actual output. Pass FIXTURE=path or default to FIXTURES (the whole directory). Honors PROFILE. Read the diff before committing.
    vars:
      FIXTURE: '{{.FIXTURE | default ""}}'
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        TARGET="{{.FIXTURES}}"
        if [ -n "{{.FIXTURE}}" ]; then
          TARGET="{{.FIXTURE}}"
        fi
        case "$TARGET" in
          *core_usage*)
            echo "task conformance:update-baselines refuses conformance/fixtures/core_usage/ (hand-authored production-validated expected rows)." >&2
            echo "See .cursor/rules/conformance-core-usage.mdc" >&2
            exit 2
            ;;
        esac
        PROFILE_FLAGS=""
        if [ -n "{{.PROFILE}}" ]; then
          for p in $(echo "{{.PROFILE}}" | tr ',' ' '); do
            PROFILE_FLAGS="$PROFILE_FLAGS --profile $p"
          done
        fi
        # shellcheck disable=SC2086  # intentional word-split for repeated flags
        go run ./conformance/cmd/runner \
          --fixtures "$TARGET" \
          --engine-binary "{{.EMULATOR_BIN}}" \
          --output "{{.OUTPUT}}" \
          --update-baselines \
          $PROFILE_FLAGS
        echo
        echo "task conformance:update-baselines: review the diff in '$TARGET' before committing." >&2
