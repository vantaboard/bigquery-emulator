# GoReleaser config for bigquery-emulator (release-packaging work).
#
# Cuts release archives + checksums for the Go REST gateway across the
# four supported gateway platforms (linux/{amd64,arm64} +
# darwin/{amd64,arm64}) and bundles the canonical Bazel-built C++
# engine binary on every archive. Engine binary is linux/amd64 ONLY:
# upstream GoogleSQL's hermetic LLVM toolchain does not yet
# cross-compile cleanly to non-linux/arm64 (see CI matrix posture in
# `.github/workflows/ci.yml` + the engine-policy notes in
# `docs/ENGINE_POLICY.md`). macOS + linux/arm64 archive consumers must
# either run the published Docker image (`ghcr.io/vantaboard/bigquery-emulator`)
# or BYO-engine. The release notes header below + README §Releases
# document the caveat.
#
# Release flow today (manual seed; semantic-release config is parked at
# `.releaserc.yml` for the eventual flip):
#
#   git tag -a v0.0.1 -m 'release: v0.0.1 (preview)'
#   git push origin v0.0.1
#
# The tag push triggers `.github/workflows/release.yml`, which:
#   1. builds the engine binary via `task emulator:build-engine:bazel`,
#   2. publishes the Docker runtime image to GHCR (linux/amd64 only),
#   3. runs `goreleaser release --clean`, which uploads the gateway
#      archives + checksums to the GitHub release the tag created.
#
# Local snapshot verification:
#
#   task emulator:build-engine:bazel   # stages bin/emulator_main + bin/libduckdb.so
#   task release:snapshot              # goreleaser release --snapshot --clean
#
# Why goreleaser v2 schema: v1 reached EOL in mid-2024. Some knobs
# (`archives[*].format`, `archives[*].builds`) were renamed in v2; the
# config below uses the v2 spelling exclusively. `goreleaser check`
# (`task release:check`) validates the schema offline.

version: 2

project_name: bigquery-emulator

before:
  hooks:
    - go mod download
    # Workflow contract: the release workflow stages the engine binary
    # + libduckdb.so under ./bin BEFORE goreleaser runs. Verify here so
    # a local `goreleaser release --snapshot` fails fast (with a
    # human-readable hint) when the operator forgot to pre-build.
    - sh -c 'test -x bin/emulator_main || (echo "bin/emulator_main missing - run task emulator:build-engine:bazel first" && exit 1)'
    - sh -c 'test -f bin/libduckdb.so || (echo "bin/libduckdb.so missing - run task emulator:build-engine:bazel first" && exit 1)'

builds:
  - id: gateway
    main: ./binaries/gateway_main
    binary: bigquery-emulator-gateway
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      # The gateway's `--version` flag prints these `-X main.<sym>=...`
      # injections (the vars live in `binaries/gateway_main/main.go`).
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: with-engine
    ids:
      - gateway
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - docs/REST_API.md
      - docs/ENGINE_POLICY.md
      # Engine binary is linux/amd64 only. Bundling it on every archive
      # keeps the layout uniform; the README + release notes header
      # call out that non-linux/amd64 callers need Docker (or BYO
      # engine) to actually run the gateway.
      - src: bin/emulator_main
        dst: bin/emulator_main
      - src: bin/libduckdb.so
        dst: bin/libduckdb.so
      - src: docker-compose.yml
        dst: docker-compose.yml

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:alnum:][:punct:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:alnum:][:punct:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore'
      - '^docs'
      - '^test'

release:
  github:
    owner: vantaboard
    name: bigquery-emulator
  draft: false
  # `prerelease: auto` flips a release to pre-release status when the
  # tag carries an SemVer pre-release identifier (e.g. v0.0.1-rc1).
  # The v0.x.y series is preview-grade by convention but the goreleaser
  # `auto` rule keys on the SemVer pre-release suffix, not the major,
  # so non-suffixed v0.x.y tags will publish as full releases. We make
  # the preview status explicit in the release notes header below
  # instead of relying on the auto flag for major=0.
  prerelease: auto
  mode: replace
  name_template: 'v{{ .Version }}'
  header: |
    > **Preview release.** The `v0.x` series is preview-grade; the REST
    > surface, gRPC contract, and on-disk format may break across
    > releases. Stable promises arrive at `v1.0.0`. See
    > [`ROADMAP.md`](https://github.com/vantaboard/bigquery-emulator/blob/main/ROADMAP.md)
    > for the active capability-area narrative.
    >
    > **Engine binary is linux/amd64 only.** macOS + linux/arm64
    > archives include the gateway binary but no engine. On those
    > platforms run the published Docker image
    > (`docker pull ghcr.io/vantaboard/bigquery-emulator:{{ .Tag }}`) or
    > supply your own engine binary via `--engine_binary=<path>`.
