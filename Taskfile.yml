# https://taskfile.dev/docs/getting-started
#
# Common dev tasks for the BigQuery emulator. Per-namespace targets live
# under taskfiles/<namespace>.yml so each namespace can grow without this
# root file getting unwieldy. Run `task --list` to see everything that's
# wired up.

version: "3"

includes:
  emulator: ./taskfiles/emulator.yml
  lint: ./taskfiles/lint.yml
  test: ./taskfiles/test.yml
  docker: ./taskfiles/docker.yml
  ci: ./taskfiles/ci.yml
  tools: ./taskfiles/tools.yml
  proto: ./taskfiles/proto.yml
  bazel: ./taskfiles/bazel.yml
  googlesql: ./taskfiles/googlesql.yml
  conformance: ./taskfiles/conformance.yml
  release: ./taskfiles/release.yml
  thirdparty: ./taskfiles/thirdparty.yml
  testdata: ./taskfiles/testdata.yml
  compose: ./taskfiles/compose.yml
  coverage: ./taskfiles/coverage.yml
  bench: ./taskfiles/bench.yml
  docs: ./taskfiles/docs.yml
  python-udf: ./taskfiles/python-udf.yml

tasks:
  default:
    desc: List every available task
    cmds:
      - task --list
    silent: true

  clean:
    desc: Remove build artifacts (bin/, tmp/)
    cmds:
      - |
        set -eo pipefail
        root="$(git rev-parse --show-toplevel)"
        cd "$root"
        rm -rf bin tmp
