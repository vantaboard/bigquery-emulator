version: "3"

# Common dev tasks for the BigQuery emulator. Run `task --list` to see
# everything that's available. Most tasks are intentionally thin wrappers
# around `go` and `cmake` so they stay easy to read.

vars:
  BIN_DIR: "{{.ROOT_DIR}}/bin"
  HTTP_PORT: "9050"

tasks:
  default:
    desc: Show the task list.
    cmds:
      - task --list

  build:
    desc: Build the Go gateway. (C++ engine build is wired up via cmake or bazel.)
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/gateway_main ./binaries/gateway_main

  build:engine:
    desc: Build the C++ engine via CMake into bin/.
    cmds:
      - cmake -S . -B build-out -DCMAKE_BUILD_TYPE=Release
      - cmake --build build-out --target emulator_main -j

  run:
    desc: Build and run the gateway, with the engine subprocess disabled until Phase 2.
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/gateway_main --engine_binary= --http_port={{.HTTP_PORT}} --log_requests"

  run:full:
    desc: Build both halves and run the gateway with the engine subprocess attached.
    deps: [build, build:engine]
    cmds:
      - cp build-out/emulator_main {{.BIN_DIR}}/emulator_main
      - "{{.BIN_DIR}}/gateway_main --engine_binary={{.BIN_DIR}}/emulator_main --http_port={{.HTTP_PORT}} --log_requests"

  test:
    desc: Run all Go tests.
    cmds:
      - go test ./...

  vet:
    desc: Run `go vet` over the Go side.
    cmds:
      - go vet ./...

  fmt:
    desc: Format Go sources.
    cmds:
      - gofmt -s -w .

  lint:fix:
    desc: Apply auto-fixable lints. Currently just `gofmt -s -w` and `go vet`.
    cmds:
      - task: fmt
      - task: vet

  lint:run:
    desc: Run lints in check-only mode (no fixes). Used by the pre-commit gate.
    cmds:
      - test -z "$(gofmt -s -l .)" || (echo 'gofmt would reformat:' && gofmt -s -l . && exit 1)
      - go vet ./...

  ci:run:
    desc: Run the same checks CI runs (go vet, go test, build engine, build gateway).
    cmds:
      - task: vet
      - task: test
      - task: build:engine
      - task: build

  clean:
    desc: Remove build artifacts.
    cmds:
      - rm -rf {{.BIN_DIR}} build-out
