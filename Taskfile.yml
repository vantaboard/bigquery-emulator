version: "3"

# https://taskfile.dev — tasks source `.envrc` (GO_GOOGLESQL_ROOT, GO_GOOGLESQL_ENGINE_ROOT, stack-bootstrap).

vars:
  DOCKER_DEV_IMAGE: go-googlesql:dev

tasks:
  default:
    desc: Show common tasks (full list task --list-all)
    cmds:
      - |
        echo "bigquery-emulator — https://taskfile.dev (task --list-all)"
        echo "Common: task emulator:build | task emulator:build-duck | task test:prebuilt | task test:duckdb-backend | task dev:air | task dev:air-duck | task docker:build | task test:linux"
        echo "Local sibling go-googlesql-engine: cp go.work.dev go.work  (go.work is gitignored)"

  dev:air:
    desc: Live rebuild/restart with air — SQLite binary (air tmp/air/air.log; emulator tmp/air/emulator.log; go install github.com/air-verse/air@latest; edit .air.toml args_bin)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        if ! command -v air >/dev/null 2>&1; then
          echo "Install air: go install github.com/air-verse/air@latest" >&2
          exit 1
        fi
        exec air -c .air.toml

  dev:air-duck:
    desc: Live rebuild/restart with air — DuckDB binary (DUCKDB_LIB_DIR; .air.duck.toml; copies libduckdb into tmp/air)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        if [[ -z "${DUCKDB_LIB_DIR:-}" ]]; then
          echo "Set DUCKDB_LIB_DIR (e.g. .envrc.local). Same as task emulator:build-duck." >&2
          exit 1
        fi
        if ! command -v air >/dev/null 2>&1; then
          echo "Install air: go install github.com/air-verse/air@latest" >&2
          exit 1
        fi
        exec air -c .air.duck.toml

  emulator:build:
    desc: Build bigquery-emulator binary (unified prebuilt tags). Uses ./go.work if present, else GOWORK=off
    cmds:
      - |
        set -euo pipefail
        source .envrc
        if [ -f go.work ]; then export GOWORK="$PWD/go.work"
        else export GOWORK=off
        fi
        go build -tags "$GOOGLESQL_BUILD_TAGS" -o bigquery-emulator ./cmd/bigquery-emulator

  test:prebuilt:
    desc: Host go test ./... (-short skips stress/long tests). Same tags as emulator:build; uses ./go.work if present, else GOWORK=off
    cmds:
      - |
        set -euo pipefail
        source .envrc
        if [ -f go.work ]; then export GOWORK="$PWD/go.work"
        else export GOWORK=off
        fi
        go test -short -tags "$GOOGLESQL_BUILD_TAGS" -p 1 -count=1 ./...

  emulator:build-duck:
    desc: Build emulator with googlesqlengineduck (tags duckdb,duckdb_use_lib; requires DUCKDB_LIB_DIR with libduckdb)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        if [ -z "${DUCKDB_LIB_DIR:-}" ]; then
          echo "Set DUCKDB_LIB_DIR to the directory containing libduckdb.so (same as task test:duckdb-backend)" >&2
          exit 1
        fi
        export CGO_ENABLED=1
        # Embed a runpath so ./bigquery-emulator-duck finds DuckDB without LD_LIBRARY_PATH,
        # and copy the shared library next to the binary (same directory as $ORIGIN).
        if [[ "$(uname -s)" == "Darwin" ]]; then
          DUCK_SHLIB="libduckdb.dylib"
          export CGO_LDFLAGS="${CGO_LDFLAGS} -lduckdb -L${DUCKDB_LIB_DIR} -Wl,-rpath,@executable_path"
          if [ -n "${DYLD_LIBRARY_PATH:-}" ]; then
            export DYLD_LIBRARY_PATH="${DUCKDB_LIB_DIR}:${DYLD_LIBRARY_PATH}"
          else
            export DYLD_LIBRARY_PATH="${DUCKDB_LIB_DIR}"
          fi
        else
          DUCK_SHLIB="libduckdb.so"
          export CGO_LDFLAGS="${CGO_LDFLAGS} -lduckdb -L${DUCKDB_LIB_DIR} -Wl,-rpath,\$ORIGIN"
          if [ -n "${LD_LIBRARY_PATH:-}" ]; then
            export LD_LIBRARY_PATH="${DUCKDB_LIB_DIR}:${LD_LIBRARY_PATH}"
          else
            export LD_LIBRARY_PATH="${DUCKDB_LIB_DIR}"
          fi
        fi
        if [ ! -f "${DUCKDB_LIB_DIR}/${DUCK_SHLIB}" ]; then
          echo "Missing ${DUCKDB_LIB_DIR}/${DUCK_SHLIB} (wrong DUCKDB_LIB_DIR or platform zip?)" >&2
          exit 1
        fi
        if [ -f go.work ]; then export GOWORK="$PWD/go.work"
        else export GOWORK=off
        fi
        TAGS="${GOOGLESQL_BUILD_TAGS},duckdb,duckdb_use_lib"
        go build -tags "${TAGS}" -o bigquery-emulator-duck ./cmd/bigquery-emulator
        cp -f "${DUCKDB_LIB_DIR}/${DUCK_SHLIB}" .

  test:duckdb-backend:
    desc: DuckDB execution smoke test (DUCKDB_LIB_DIR, CGO_LDFLAGS -lduckdb; tags duckdb,duckdb_use_lib)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        if [ -f go.work ]; then export GOWORK="$PWD/go.work"
        else export GOWORK=off
        fi
        if [ -z "${DUCKDB_LIB_DIR:-}" ]; then
          echo "Set DUCKDB_LIB_DIR to the directory containing libduckdb.so (linux-amd64 zip from DuckDB releases)" >&2
          exit 1
        fi
        DUCKDB_LIB_DIR="$(cd "${DUCKDB_LIB_DIR}" && pwd)"
        if [[ "$(uname -s)" == "Darwin" ]]; then
          DUCK_SHLIB="libduckdb.dylib"
        else
          DUCK_SHLIB="libduckdb.so"
        fi
        if [ ! -f "${DUCKDB_LIB_DIR}/${DUCK_SHLIB}" ]; then
          echo "Missing ${DUCKDB_LIB_DIR}/${DUCK_SHLIB} — fix DUCKDB_LIB_DIR (see .envrc.local.example)" >&2
          exit 1
        fi
        export CGO_ENABLED=1
        # go test runs binaries under /tmp/go-build…; LD_LIBRARY_PATH alone is flaky. Embed RUNPATH to the
        # unpacked DuckDB dir (same idea as emulator:build-duck, but $ORIGIN does not help for /tmp binaries).
        if [[ "$(uname -s)" == "Darwin" ]]; then
          export CGO_LDFLAGS="${CGO_LDFLAGS} -lduckdb -L${DUCKDB_LIB_DIR} -Wl,-rpath,${DUCKDB_LIB_DIR}"
          if [ -n "${DYLD_LIBRARY_PATH:-}" ]; then
            export DYLD_LIBRARY_PATH="${DUCKDB_LIB_DIR}:${DYLD_LIBRARY_PATH}"
          else
            export DYLD_LIBRARY_PATH="${DUCKDB_LIB_DIR}"
          fi
        else
          export CGO_LDFLAGS="${CGO_LDFLAGS} -lduckdb -L${DUCKDB_LIB_DIR} -Wl,-rpath,${DUCKDB_LIB_DIR}"
          if [ -n "${LD_LIBRARY_PATH:-}" ]; then
            export LD_LIBRARY_PATH="${DUCKDB_LIB_DIR}:${LD_LIBRARY_PATH}"
          else
            export LD_LIBRARY_PATH="${DUCKDB_LIB_DIR}"
          fi
        fi
        TAGS="${GOOGLESQL_BUILD_TAGS},duckdb,duckdb_use_lib"
        go test -short -tags "${TAGS}" -p 1 -count=1 -run TestServer_DuckDBExecutionBackendSmoke ./server/...

  emulator:build-linked:
    desc: Build using go.work.dev (set GOWORK)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        export GOWORK="$PWD/go.work.dev"
        go build -tags "$GOOGLESQL_BUILD_TAGS" -o bigquery-emulator ./cmd/bigquery-emulator

  docker:build:
    desc: Dockerfile.linked + sibling build contexts
    cmds:
      - |
        set -euo pipefail
        source .envrc
        VERSION="${VERSION:-latest}"
        if [ -n "${GO_GOOGLESQL_BASE:-}" ]; then
          if [[ "$GO_GOOGLESQL_BASE" =~ ^(.+):([^:]+)$ ]]; then
            GO_GOOGLESQL_IMAGE="${BASH_REMATCH[1]}"
            GO_GOOGLESQL_TAG="${BASH_REMATCH[2]}"
          else
            echo "task docker:build: GO_GOOGLESQL_BASE must be image:tag (e.g. ghcr.io/vantaboard/go-googlesql:v0.5.12)" >&2
            exit 1
          fi
        else
          GO_GOOGLESQL_IMAGE="${GO_GOOGLESQL_IMAGE:-ghcr.io/vantaboard/go-googlesql}"
          GO_GOOGLESQL_TAG="${GO_GOOGLESQL_TAG:-v0.5.12}"
        fi
        docker build -t bigquery-emulator -f Dockerfile.linked . \
          --build-arg VERSION="$VERSION" \
          --build-arg GO_GOOGLESQL_IMAGE="$GO_GOOGLESQL_IMAGE" \
          --build-arg GO_GOOGLESQL_TAG="$GO_GOOGLESQL_TAG" \
          --build-context go_googlesql="$GO_GOOGLESQL_ROOT" \
          --build-context go_googlesql_engine="$GO_GOOGLESQL_ENGINE_ROOT"

  docker:build-linked:
    desc: Alias for docker:build
    cmds:
      - task: docker:build

  docker:build-dev-googlesql:
    desc: Build go-googlesql:dev in the sibling checkout (required for test:linux)
    cmds:
      - |
        set -euo pipefail
        source .envrc
        task -d "$GO_GOOGLESQL_ROOT" docker:build-dev

  test:linux:
    desc: Run go test in go-googlesql:dev (-short skips stress/long tests; CI parity; GOOGLESQL_BUILD_TAGS; clear image CGO_LDFLAGS so bootstrap supplies link flags)
    deps: [docker:build-dev-googlesql]
    cmds:
      - |
        set -euo pipefail
        source .envrc
        docker run --rm \
          -e CGO_ENABLED=1 -e CC=clang -e CXX=clang++ \
          -e CGO_LDFLAGS= \
          -e GOPROXY=https://proxy.golang.org,direct \
          -e GOSUMDB=sum.golang.org \
          -e CCACHE_DIR=/root/.ccache -e CCACHE_COMPRESS=1 \
          -e GOWORK=/work/bigquery-emulator/go.work.dev \
          -v "$PWD":/work/bigquery-emulator \
          -v "$GO_GOOGLESQL_ROOT":/work/go-googlesql \
          -v "$GO_GOOGLESQL_ENGINE_ROOT":/work/go-googlesql-engine \
          -v "$GO_CACHE_ROOT/gocache":/root/.cache/go-build \
          -v "$GO_CACHE_ROOT/gomodcache":/go/pkg/mod \
          -v "$GO_CACHE_ROOT/ccache":/root/.ccache \
          -w /work/bigquery-emulator \
          {{.DOCKER_DEV_IMAGE}} \
          bash -c 'set -euo pipefail; source /work/go-googlesql/scripts/go-googlesql-stack-bootstrap.sh; go test -short -tags "$GOOGLESQL_BUILD_TAGS" -v ./... -count=1'
