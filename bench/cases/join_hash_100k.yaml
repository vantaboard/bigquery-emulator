name: join_hash_100k
tags: [duckdb, join]
setup:
  - sql: |
      CREATE TABLE {{ds}}.a AS
      SELECT id, MOD(id, 1000) AS k FROM UNNEST(GENERATE_ARRAY(1, 100000)) AS id
  - sql: |
      CREATE TABLE {{ds}}.b AS
      SELECT k, k * 2 AS v FROM UNNEST(GENERATE_ARRAY(0, 999)) AS k
query: |
  SELECT COUNT(*) AS cnt, SUM(v) AS total
  FROM {{ds}}.a
  JOIN {{ds}}.b USING (k)
iterations: 10
warmup: 2
max_ms: 180000
