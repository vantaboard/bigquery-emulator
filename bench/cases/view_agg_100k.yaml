name: view_agg_100k
tags: [view, aggregate]
setup:
  - sql: |
      CREATE TABLE {{ds}}.t AS
      SELECT id, MOD(id, 100) AS k, CAST(id AS FLOAT64) / 7 AS v
      FROM UNNEST(GENERATE_ARRAY(1, 100000)) AS id
  - sql: |
      CREATE VIEW {{ds}}.v_agg AS
      SELECT k, COUNT(*) AS cnt, SUM(v) AS total
      FROM {{ds}}.t
      GROUP BY k
query: SELECT k, cnt, total FROM {{ds}}.v_agg ORDER BY k
iterations: 10
warmup: 2
