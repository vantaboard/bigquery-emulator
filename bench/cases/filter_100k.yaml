name: filter_100k
tags: [duckdb, filter]
setup:
  - sql: |
      CREATE TABLE {{ds}}.t AS
      SELECT id, MOD(id, 50) AS bucket
      FROM UNNEST(GENERATE_ARRAY(1, 100000)) AS id
query: SELECT bucket, COUNT(*) AS cnt FROM {{ds}}.t WHERE bucket < 10 GROUP BY bucket ORDER BY bucket
iterations: 10
warmup: 2
