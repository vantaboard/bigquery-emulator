name: scan_100k
tags: [duckdb, scan]
skip_targets: [goccy]
skip_reason: "goccy 0.7.2 hangs on CTAS with CAST(id AS FLOAT64)/N at 100k rows (sqlite3: interrupted)"
setup:
  - sql: |
      CREATE TABLE {{ds}}.t AS
      SELECT id, CAST(id AS FLOAT64) / 3.0 AS v
      FROM UNNEST(GENERATE_ARRAY(1, 100000)) AS id
query: SELECT COUNT(*) AS cnt, SUM(v) AS total FROM {{ds}}.t
iterations: 10
warmup: 2
