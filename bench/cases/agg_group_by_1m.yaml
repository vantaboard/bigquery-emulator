name: agg_group_by_1m
tags: [duckdb, aggregate]
skip_targets: [goccy]
skip_reason: "goccy 0.7.2 hangs on CTAS with CAST(id AS FLOAT64)/N at 100k+ rows (sqlite3: interrupted)"
setup:
  - sql: |
      CREATE TABLE {{ds}}.t AS
      SELECT id, MOD(id, 100) AS k, CAST(id AS FLOAT64) / 7 AS v
      FROM UNNEST(GENERATE_ARRAY(1, 1000000)) AS id
query: SELECT k, COUNT(*) AS cnt, SUM(v) AS total FROM {{ds}}.t GROUP BY k ORDER BY k
iterations: 5
warmup: 1
max_ms: 60000
