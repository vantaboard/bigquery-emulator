name: multi_agg
tags: [duckdb, aggregate]
setup:
  - sql: |
      CREATE TABLE {{ds}}.t AS
      SELECT id, CAST(id AS FLOAT64) AS v, MOD(id, 50) AS k
      FROM UNNEST(GENERATE_ARRAY(1, 150000)) AS id
query: |
  SELECT k,
         COUNT(*) AS cnt,
         AVG(v) AS avg_v,
         MIN(v) AS min_v,
         MAX(v) AS max_v
  FROM {{ds}}.t
  GROUP BY k
  ORDER BY k
iterations: 10
warmup: 2
