site_name: BigQuery Emulator
site_url: https://vantaboard.github.io/bigquery-emulator/
repo_url: https://github.com/vantaboard/bigquery-emulator
repo_name: vantaboard/bigquery-emulator
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: false
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

exclude_docs: |
  README.md
  bigquery/**
  dev/googlesql-prebuilt/**
  dev/coverage/**
  dev/ci-engine-build.md

nav:
  - Home: index.md
  - Getting Started:
      - Docker: DOCKER.md
      - Client libraries: CLIENTS.md
      - Languages & tools: guides/multi-language.md
      - Seeding data: SEEDING.md
      - Releases & install: RELEASES.md
  - Reference:
      - REST API: REST_API.md
      - Engine policy: ENGINE_POLICY.md
      - Feature support: features/support.md
  - Development:
      - Development setup: DEVELOPMENT.md
      - C++ lint policy: dev/cpp-lint.md
