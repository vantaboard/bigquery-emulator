# Compose file for local quickstart, CI smoke, and the third-party
# client sample lane.
#
# `bigquery-emulator` mirrors the layout `cloud-spanner-emulator` ships
# at the same place: one service that bakes the published image and
# exposes the REST + engine gRPC ports on the host.
# `docker compose up --build -d` is the canonical quickstart
# entrypoint and the CI smoke workflow
# (.github/workflows/docker-smoke.yml + `task docker:smoke`) drives the
# same recipe end-to-end.
#
# `fake-gcs-server` is opt-in via the `thirdparty` profile because the
# default `docker compose up` (and `task docker:smoke`) do not need
# Cloud Storage to validate the BigQuery REST surface. The third-party
# client suites under `third_party/<lang>-bigquery-tests/` (and the
# golang-/node-/dataframe- task lanes) need it to back
# `gs://cloud-samples-data/...` URIs. Bring it up with
# `docker compose --profile thirdparty up -d fake-gcs-server` (see
# `third_party/README.md`). The host-side `testdata/fake-gcs-data/`
# directory is gitignored: populate it on demand with
# `task testdata:fake-gcs-sync` before recreating the container.
#
# Notes on the env-var line: the BigQuery client SDKs read
# `BIGQUERY_EMULATOR_HOST` to decide where to send REST traffic; the
# *server* doesn't read it. We export the value here so a developer
# whose host shell sources Compose's `--env-from` (or who copies the
# value verbatim into their own shell) gets a consistent client-side
# pointer at the published port. The gateway itself binds to
# `--hostname=0.0.0.0` via the in-container shim
# (`docker/gateway_main.sh`), so no env var is required to make the
# port reachable.
#
# SQL Tools API (format/parse/complete/analyze for query-editor UIs) is
# enabled by default in the container via `docker/gateway_main.sh`
# (`--enable-sql-tools-api`). For LAN or CI clients that cannot send
# loopback-only requests, pass through gateway flags on `docker run` or
# override the service command, e.g. `--sql-tools-api-allow-remote` plus
# `--sql-tools-api-token=<secret>`. See docs/SQL_TOOLS_API.md.

services:
  bigquery-emulator:
    image: bigquery-emulator:local
    build:
      context: .
      args:
        VERSION: dev
        # Throttle the in-container Bazel build (engine-builder-bazel
        # stage) so it cannot fork enough clang processes to OOM the
        # host. Without overrides, in-container Bazel auto-detects the
        # host's full nproc / MemTotal and routinely consumes 20+ GiB
        # of RAM during the `//binaries/emulator_main` link, which is
        # the exact failure mode `.cursor/rules/process-hygiene.mdc`
        # warns about. The empty fallback hands control back to the
        # Dockerfile's own auto-detect (nproc-2 jobs, 75% MemTotal) for
        # CI runners where the host has no other workload competing
        # for RAM. Local task wrappers (task thirdparty:emulator-up,
        # task docker:build, task docker:smoke) compute the right
        # values for the developer's machine and export them.
        BAZEL_JOBS: ${BAZEL_JOBS:-}
        BAZEL_MEM_MB: ${BAZEL_MEM_MB:-}
        # Forward the GoogleSQL prebuilt artifact pin so the
        # Dockerfile's `engine-builder-bazel` stage skips the multi-GB
        # GoogleSQL source compile. Both must be set together; a
        # missing pair drops back to the source fallback.
        GOOGLESQL_PREBUILT_URL: ${GOOGLESQL_PREBUILT_URL:-}
        GOOGLESQL_PREBUILT_SHA256: ${GOOGLESQL_PREBUILT_SHA256:-}
        # Lift host-built bin/emulator_main + bin/libduckdb.so instead of
        # compiling inside the container (CI thirdparty + release path).
        # Local thirdparty sets prebuilt via ensure_emulator_image_fresh.sh;
        # default bazel keeps docker:smoke / quickstart self-contained.
        ENGINE_SOURCE: ${ENGINE_SOURCE:-bazel}
    ports:
      - "9050:9050"
      - "9060:9060"
    environment:
      # Hint for client SDKs sharing this network or copying this value.
      # Has no effect on the gateway itself; see comment block above.
      BIGQUERY_EMULATOR_HOST: "0.0.0.0:9050"
      # Gateway load/extract/external paths fetch gs:// via this origin.
      # Empty by default (docker:smoke / quickstart). thirdparty:fake-gcs-up
      # exports http://fake-gcs-server:4443 and recreates this service so
      # in-container fetches reach the compose fake-gcs service (not 127.0.0.1).
      STORAGE_EMULATOR_HOST: ${STORAGE_EMULATOR_HOST:-}
    volumes:
      - bq-emulator-data:/var/lib/bigquery-emulator
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9050/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Runtime resource caps. The emulator itself (engine + gateway)
    # is normally well under a couple of GiB resident, but the
    # in-process GoogleSQL analyzer can spike on pathological queries
    # and the container should never be allowed to evict the host's
    # IDE / browser. Defaults (8g, 4 cores) suit a typical developer
    # box; task thirdparty:emulator-up exports tighter values derived
    # from the live host's `/proc/meminfo` and `nproc`. Override via
    # BIGQUERY_EMULATOR_MEM_LIMIT (e.g. "12g") and
    # BIGQUERY_EMULATOR_CPUS (e.g. "6") before `docker compose up`.
    mem_limit: ${BIGQUERY_EMULATOR_MEM_LIMIT:-8g}
    cpus: ${BIGQUERY_EMULATOR_CPUS:-4.0}

  # Local Google Cloud Storage emulator for third-party suites that
  # load gs://cloud-samples-data/... fixtures (golang-bigquery-tests
  # snippets/loadingdata + snippets/querying setup, node sample
  # external-table tests, bigframes snippets). The volume mount uses
  # ./testdata/fake-gcs-data which is gitignored — populate it via
  # `task testdata:fake-gcs-sync` before bringing this service up.
  # See https://github.com/fsouza/fake-gcs-server.
  fake-gcs-server:
    image: fsouza/fake-gcs-server:latest
    profiles: ["thirdparty"]
    ports:
      - "${FAKE_GCS_PORT:-4443}:4443"
    environment:
      FAKE_GCS_SCHEME: http
    volumes:
      - ./testdata/fake-gcs-data:/data

  # Local Pub/Sub emulator for client libraries that honor
  # `PUBSUB_EMULATOR_HOST` (cloud.google.com/go/pubsub and the
  # Node/Python equivalents). Opt-in via the same `thirdparty` profile
  # as fake-gcs-server so default `docker compose up` and
  # `task docker:smoke` do not pay the JVM cold-start cost. Bump the
  # tag periodically: https://cloud.google.com/sdk/docs/downloads-docker.
  #
  # Set `PUBSUB_EMULATOR_HOST=127.0.0.1:8085` and run a pull/push
  # subscriber in test code for local Pub/Sub wiring. The official Pub/Sub
  # emulator cannot deliver to a BigQuery
  # subscription (documented limitation); local "message -> BigQuery
  # row" tests should still use a subscriber in test code that writes
  # against `BIGQUERY_EMULATOR_HOST`.
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:532.0.0-emulators
    profiles: ["thirdparty"]
    ports:
      - "${PUBSUB_EMULATOR_PORT:-8085}:8085"
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
      - --project=${PUBSUB_PROJECT_ID:-dev}

volumes:
  bq-emulator-data:
