# buf workspace + lint/breaking config for the BigQuery emulator's
# internal gRPC contract (proto/emulator.proto). See buf.gen.yaml for
# the matching codegen pipeline.
#
# Module root is the repo (imports use proto/emulator.proto, matching
# Bazel protoc -I.). includes scopes lint/breaking to proto/ only.
version: v2

modules:
  - path: .
    includes:
      - proto

lint:
  use:
    - STANDARD
  except:
    # Our package is `bigquery_emulator.v1`, not the buf-canonical
    # <module>.v1 derived from `vantaboard/bigquery-emulator`. The
    # gateway expects this exact name today, so silence the lint until
    # we genuinely want to bump it.
    - PACKAGE_DIRECTORY_MATCH
    - PACKAGE_VERSION_SUFFIX
    # The internal contract is intentionally shaped like the BigQuery
    # REST surface (`Catalog`, `Query`) rather than buf's canonical
    # `*Service` suffix; the gateway already imports the un-suffixed
    # names and the package version (`bigquery_emulator.v1`) carries
    # the API generation.
    - SERVICE_SUFFIX
    # `QueryRequest` is deliberately reused by DryRun + ExecuteQuery so
    # the gateway can dry-run by flipping a single flag without
    # re-marshaling, and the streamed response uses the row type
    # directly rather than a wrapper message.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    # WriteStream.Type values (COMMITTED, PENDING, BUFFERED) mirror
    # google.cloud.bigquery.storage.v1; prefixing with TYPE_ would
    # break parity with the public Storage Write SDK.
    - ENUM_VALUE_PREFIX

breaking:
  use:
    - FILE
