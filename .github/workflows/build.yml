name: build and push image
on:
  push:
    tags:
      - v*

env:
  REGISTRY: ghcr.io
  # Must match the repo that runs the workflow: fork jobs cannot push to another org's GHCR.
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/bigquery-emulator

jobs:
  # For each platform in the matrix, creates and pushes a platform-compatible Docker image to the registry
  # and stores all the image digests as Github Actions build output artifacts so that we can referenced them
  # in the `merge-platform-images` job below
  build-image:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-linux-amd64
            platform: linux/amd64
          - os: ubuntu-latest
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-linux-arm64
            platform: linux/arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Resolve stack versions
        id: ver
        run: bash scripts/ci-resolve-stack-refs.sh go.mod
      - name: Checkout go-googlesql
        uses: actions/checkout@v6
        with:
          repository: vantaboard/go-googlesql
          ref: ${{ steps.ver.outputs.gsql_ref }}
          path: go-googlesql
      - name: Checkout go-googlesqlite
        uses: actions/checkout@v6
        with:
          repository: vantaboard/go-googlesqlite
          ref: ${{ steps.ver.outputs.gsqlite_ref }}
          path: go-googlesqlite
      # GitHub-hosted macOS runners have no Docker daemon; use Linux + QEMU for arm64.
      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3
      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        name: Build and push by digest
        id: build
        with:
          context: .
          file: ./Dockerfile.linked
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          platforms: ${{ matrix.platform }}
          build-args: |
            GO_GOOGLESQL_TAG=${{ steps.ver.outputs.gsql }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          build-contexts: |
            go_googlesql=./go-googlesql
            go_googlesqlite=./go-googlesqlite
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.asset_name }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.asset_name }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.asset_name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Creates a multi-architecture image manifest from the digests of the individual images built above.
  # This produces a single image tag that contains all the platform-specific images.
  merge-platform-images:
    runs-on: ubuntu-latest
    needs:
      - build-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, 'pre') }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        # Extract image tags from the metadata action output and create a manifest list
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
