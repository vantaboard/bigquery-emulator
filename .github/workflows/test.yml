name: build and test
on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

env:
  CGO_ENABLED: "1"
  CC: clang
  CXX: clang++

jobs:
  ci:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.24.0"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout bigquery-emulator
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: bigquery-emulator
      - name: Resolve stack versions
        id: ver
        run: |
          gsql=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' bigquery-emulator/go.mod)
          gsqlite=$(awk '/github.com\/vantaboard\/go-googlesqlite /{print $2; exit}' bigquery-emulator/go.mod)
          echo "gsql=${gsql}" >> "$GITHUB_OUTPUT"
          echo "gsqlite=${gsqlite}" >> "$GITHUB_OUTPUT"
          echo "go-googlesql=${gsql} go-googlesqlite=${gsqlite}"
      - name: Checkout go-googlesql
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: vantaboard/go-googlesql
          ref: ${{ steps.ver.outputs.gsql }}
          path: go-googlesql
      - name: Checkout go-googlesqlite
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: vantaboard/go-googlesqlite
          ref: ${{ steps.ver.outputs.gsqlite }}
          path: go-googlesqlite
      - name: Setup Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: bigquery-emulator/go.sum
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang
      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
        if: runner.os == 'Linux'
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@v1.20.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Cache Bazel
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-googlesql-${{ hashFiles('go-googlesql/internal/cmd/updater/googlesql.ref', 'go-googlesql/internal/cmd/updater/Dockerfile', 'go-googlesql/go.mod', 'go-googlesql/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-googlesql-
      - name: Default prebuilts (release tarball or Bazel)
        working-directory: ${{ github.workspace }}
        env:
          GOOGLESQL_VERSION: ${{ steps.ver.outputs.gsql }}
        run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
      - name: Download modules
        working-directory: bigquery-emulator
        run: go mod download
      - name: Build and test
        working-directory: bigquery-emulator
        env:
          VERSION: test
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        run: |
          source ../go-googlesql/scripts/go-googlesql-stack-bootstrap.sh
          task emulator:build
          go test -tags googlesql,googlesql_unified_prebuilt -v ./... -count=1
      - name: Show version
        working-directory: bigquery-emulator
        run: ./bigquery-emulator --version
      - name: Show linking info
        if: runner.os == 'Linux'
        working-directory: bigquery-emulator
        run: ldd bigquery-emulator || true

  python-integration-test:
    needs: ci
    name: Python Integration Test
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: setup docker buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
    - name: build docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        load: true
        tags: bigquery-emulator:test
        platforms: linux/amd64
        push: false
        cache-from: type=gha,scope=${{ github.workflow }}-integration
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}-integration
    - name: setup python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version-file: test/python/.python-version
    - name: install uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
    - name: cache uv dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('test/python/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-
    - name: sync dependencies
      run: uv sync
      working-directory: test/python
    - name: run integration tests
      run: uv run pytest -v
      working-directory: test/python
      env:
        BIGQUERY_EMULATOR_REPOSITORY: bigquery-emulator
        BIGQUERY_EMULATOR_VERSION: test

  node-integration-test:
    needs: ci
    name: Node.js Integration Test
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: setup docker buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
    - name: build docker image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        load: true
        tags: bigquery-emulator:test
        platforms: linux/amd64
        push: false
        cache-from: type=gha,scope=${{ github.workflow }}-integration
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}-integration
    - name: setup node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '24'
    - name: enable corepack
      run: corepack enable
    - name: cache yarn dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: test/node/.yarn/cache
        key: ${{ runner.os }}-yarn-${{ hashFiles('test/node/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-
    - name: install dependencies
      run: yarn install --immutable
      working-directory: test/node
    - name: run integration tests
      run: yarn test
      working-directory: test/node
      env:
        BIGQUERY_EMULATOR_REPOSITORY: bigquery-emulator
        BIGQUERY_EMULATOR_VERSION: test
