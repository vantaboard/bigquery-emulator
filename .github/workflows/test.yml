name: build and test
on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

env:
  CGO_ENABLED: "1"
  CC: clang
  CXX: clang++

jobs:
  ci:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26.0"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout bigquery-emulator
        uses: actions/checkout@v6
        with:
          path: bigquery-emulator
      - name: Resolve stack versions
        id: ver
        run: |
          gsql=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' bigquery-emulator/go.mod)
          gsqlite=$(awk '/github.com\/vantaboard\/go-googlesqlite /{print $2; exit}' bigquery-emulator/go.mod)
          echo "gsql=${gsql}" >> "$GITHUB_OUTPUT"
          echo "gsqlite=${gsqlite}" >> "$GITHUB_OUTPUT"
          echo "go-googlesql=${gsql} go-googlesqlite=${gsqlite}"
      - name: Checkout go-googlesql
        uses: actions/checkout@v6
        with:
          repository: vantaboard/go-googlesql
          ref: ${{ steps.ver.outputs.gsql }}
          path: go-googlesql
      - name: Checkout go-googlesqlite
        uses: actions/checkout@v6
        with:
          repository: vantaboard/go-googlesqlite
          ref: ${{ steps.ver.outputs.gsqlite }}
          path: go-googlesqlite
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: bigquery-emulator/go.sum
      # Match go-googlesql: go install (avoids arduino/setup-task unauthenticated GitHub API rate limits).
      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install clang and libc++ (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libc++-dev libc++abi-dev
      # Do not install mold: go-googlesql CGO uses -l:libcxx_prebuilt.a (GNU ld verbatim -l:).
      # mold mishandles that form (library not found: :libcxx_prebuilt.a); default ld.bfd works.
      - name: Install bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@v1.20.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      # Bazel 7.x–8.x on macOS default to /private/var/tmp, not ~/.cache/bazel, so actions/cache
      # would warn on save ("Path ... does not exist"). Align output root with Linux + cache path.
      - name: macOS Bazel output root (match ~/.cache/bazel cache)
        if: runner.os == 'macOS'
        run: echo "BAZELISK_STARTUP_OPTS=--output_user_root=${HOME}/.cache/bazel" >> "$GITHUB_ENV"
      # Tarball prebuilts skip Bazel entirely; Bazel also only creates ~/.cache/bazel after first run.
      # Post Cache warns if the path is missing at job end — ensure it exists (match go-googlesql go.yml).
      - name: Ensure Bazel cache directory exists
        run: mkdir -p "$HOME/.cache/bazel"
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-googlesql-${{ hashFiles('go-googlesql/scripts/maint-pins/googlesql.ref', 'go-googlesql/go.mod', 'go-googlesql/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-googlesql-
      - name: Default prebuilts (release tarball or Bazel)
        working-directory: ${{ github.workspace }}
        env:
          GOOGLESQL_VERSION: ${{ steps.ver.outputs.gsql }}
        run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
      # CGO links ${SRCDIR}/lib/libprotobuf_cgo.a and lib/libgooglesql.a; release tarballs may omit
      # those symlinks (see go-googlesql ensure_prebuilt_internal_symlinks). Safe on Linux and macOS.
      - name: Ensure stable prebuilt symlinks (lib/*.a)
        working-directory: go-googlesql
        run: |
          set -euo pipefail
          ga="$(go env GOOS)_$(go env GOARCH)"
          p="internal/ccall/go-protobuf/protobuf/lib"
          if [[ -f "$p/$ga/libprotobuf_cgo.a" ]]; then
            ln -sfn "$ga/libprotobuf_cgo.a" "$p/libprotobuf_cgo.a"
          fi
          u="internal/ccall/go-googlesql-unified/lib"
          if [[ -f "$u/$ga/libgooglesql.a" ]]; then
            ln -sfn "$ga/libgooglesql.a" "$u/libgooglesql.a"
          fi
          if [[ "$(go env GOOS)" == "linux" ]] && [[ -f "$p/$ga/libcxx_prebuilt.a" ]]; then
            ln -sfn "$ga/libcxx_prebuilt.a" "$p/libcxx_prebuilt.a"
            ln -sfn "$ga/libcxxabi_prebuilt.a" "$p/libcxxabi_prebuilt.a"
          fi
      - name: Point go.mod at sibling stack checkouts
        # CGO #cgo LDFLAGS use ${SRCDIR} under the resolved module; prebuilts live only in the
        # git checkout, not in the module proxy zip. Replace matches local dev (docs/prebuilt-cgo.md).
        working-directory: bigquery-emulator
        run: |
          go mod edit -replace "github.com/vantaboard/go-googlesql=${{ github.workspace }}/go-googlesql"
          go mod edit -replace "github.com/vantaboard/go-googlesqlite=${{ github.workspace }}/go-googlesqlite"
      - name: Download modules
        working-directory: bigquery-emulator
        run: go mod download
      - name: Build and test
        working-directory: bigquery-emulator
        env:
          VERSION: test
          GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
          GO_GOOGLESQLITE_ROOT: ${{ github.workspace }}/go-googlesqlite
        run: |
          source ../go-googlesql/scripts/go-googlesql-stack-bootstrap.sh
          task emulator:build
          go test -tags "$GOOGLESQL_BUILD_TAGS" -v ./... -count=1
      - name: Show version
        working-directory: bigquery-emulator
        run: ./bigquery-emulator --version
      - name: Show linking info
        if: runner.os == 'Linux'
        working-directory: bigquery-emulator
        run: ldd bigquery-emulator || true

  python-integration-test:
    needs: ci
    name: Python Integration Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout bigquery-emulator
      uses: actions/checkout@v6
    - name: Resolve stack versions
      id: ver
      run: |
        gsql=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' go.mod)
        gsqlite=$(awk '/github.com\/vantaboard\/go-googlesqlite /{print $2; exit}' go.mod)
        echo "gsql=${gsql}" >> "$GITHUB_OUTPUT"
        echo "gsqlite=${gsqlite}" >> "$GITHUB_OUTPUT"
    - name: Checkout go-googlesql
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesql
        ref: ${{ steps.ver.outputs.gsql }}
        path: go-googlesql
    - name: Checkout go-googlesqlite
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesqlite
        ref: ${{ steps.ver.outputs.gsqlite }}
        path: go-googlesqlite
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Install Task
      run: |
        go install github.com/go-task/task/v3/cmd/task@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: Install clang and libc++
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends clang libc++-dev libc++abi-dev
    - name: Install bazelisk
      run: |
        go install github.com/bazelbuild/bazelisk@v1.20.0
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: Default prebuilts (release tarball or Bazel)
      env:
        GOOGLESQL_VERSION: ${{ steps.ver.outputs.gsql }}
      run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
    - name: Free disk space (Docker / BuildKit)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android
    - name: setup docker buildx
      uses: docker/setup-buildx-action@v3
    - name: build docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.linked
        load: true
        tags: bigquery-emulator:test
        platforms: linux/amd64
        push: false
        build-args: |
          GO_GOOGLESQL_TAG=${{ steps.ver.outputs.gsql }}
        build-contexts: |
          go_googlesql=./go-googlesql
          go_googlesqlite=./go-googlesqlite
        cache-from: type=gha,scope=${{ github.workflow }}-integration
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}-integration
    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version-file: test/python/.python-version
    - name: install uv
      uses: astral-sh/setup-uv@v5
    - name: cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('test/python/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-
    - name: sync dependencies
      run: uv sync
      working-directory: test/python
    - name: run integration tests
      run: uv run pytest -v
      working-directory: test/python
      env:
        BIGQUERY_EMULATOR_REPOSITORY: bigquery-emulator
        BIGQUERY_EMULATOR_VERSION: test

  node-integration-test:
    needs: ci
    name: Node.js Integration Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout bigquery-emulator
      uses: actions/checkout@v6
    - name: Resolve stack versions
      id: ver
      run: |
        gsql=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' go.mod)
        gsqlite=$(awk '/github.com\/vantaboard\/go-googlesqlite /{print $2; exit}' go.mod)
        echo "gsql=${gsql}" >> "$GITHUB_OUTPUT"
        echo "gsqlite=${gsqlite}" >> "$GITHUB_OUTPUT"
    - name: Checkout go-googlesql
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesql
        ref: ${{ steps.ver.outputs.gsql }}
        path: go-googlesql
    - name: Checkout go-googlesqlite
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesqlite
        ref: ${{ steps.ver.outputs.gsqlite }}
        path: go-googlesqlite
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum
    - name: Install Task
      run: |
        go install github.com/go-task/task/v3/cmd/task@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: Install clang and libc++
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends clang libc++-dev libc++abi-dev
    - name: Install bazelisk
      run: |
        go install github.com/bazelbuild/bazelisk@v1.20.0
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: Default prebuilts (release tarball or Bazel)
      env:
        GOOGLESQL_VERSION: ${{ steps.ver.outputs.gsql }}
      run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
    - name: Free disk space (Docker / BuildKit)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android
    - name: setup docker buildx
      uses: docker/setup-buildx-action@v3
    - name: build docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.linked
        load: true
        tags: bigquery-emulator:test
        platforms: linux/amd64
        push: false
        build-args: |
          GO_GOOGLESQL_TAG=${{ steps.ver.outputs.gsql }}
        build-contexts: |
          go_googlesql=./go-googlesql
          go_googlesqlite=./go-googlesqlite
        cache-from: type=gha,scope=${{ github.workflow }}-integration
        cache-to: type=gha,mode=max,scope=${{ github.workflow }}-integration
    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: enable corepack
      run: corepack enable
    - name: cache yarn dependencies
      uses: actions/cache@v4
      with:
        path: test/node/.yarn/cache
        key: ${{ runner.os }}-yarn-${{ hashFiles('test/node/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-
    - name: install dependencies
      run: yarn install --immutable
      working-directory: test/node
    - name: run integration tests
      run: yarn test
      working-directory: test/node
      env:
        BIGQUERY_EMULATOR_REPOSITORY: bigquery-emulator
        BIGQUERY_EMULATOR_VERSION: test
