# Third-party BigQuery client live integration lanes.
#
# Live suites consume the shared engine artifact from build-engine via
# workflow_run. Golang compile-only (no emulator) lives in
# thirdparty-golang-compile.yml. See third_party/README.md for env-var matrix.

name: thirdparty-samples

on:
  workflow_run:
    workflows: [build-engine]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: thirdparty-samples-${{ github.event.workflow_run.head_branch || github.ref }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  engine-build-failed:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion != 'success'
    name: engine-build-failed
    runs-on: ubuntu-latest
    steps:
      - name: Report build-engine failure
        run: |
          echo "::error::build-engine concluded with '${{ github.event.workflow_run.conclusion }}'; gate jobs cannot run."
          exit 1

  java-bigquery-tests-live:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: java-bigquery-tests (live emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read
    env:
      THIRDPARTY_SKIP_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: third_party/java-bigquery-tests/**/pom.xml

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Build runtime image (ENGINE_SOURCE=prebuilt)
        run: |
          set -euo pipefail
          gsq_args=()
          if [ -n "${GOOGLESQL_PREBUILT_URL}" ] && [ -n "${GOOGLESQL_PREBUILT_SHA256}" ]; then
            gsq_args+=(--build-arg "GOOGLESQL_PREBUILT_URL=${GOOGLESQL_PREBUILT_URL}")
            gsq_args+=(--build-arg "GOOGLESQL_PREBUILT_SHA256=${GOOGLESQL_PREBUILT_SHA256}")
          fi
          docker build \
            --build-arg ENGINE_SOURCE=prebuilt \
            "${gsq_args[@]}" \
            -t bigquery-emulator:local \
            .
        env:
          GOOGLESQL_PREBUILT_URL: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          GOOGLESQL_PREBUILT_SHA256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Bring up emulator via docker compose
        run: |
          set -euo pipefail
          docker compose up -d bigquery-emulator
          for _ in $(seq 1 120); do
            if curl -fsS -o /dev/null http://localhost:9050/healthz 2>/dev/null; then
              echo "emulator ready"; break
            fi
            sleep 2
          done

      - name: Seed fake-gcs testdata
        run: task testdata:fake-gcs-sync

      - name: Run thirdparty:java-bigquery-tests (live ITs)
        id: java_live_its
        continue-on-error: true
        run: task thirdparty:java-bigquery-tests
        env:
          BIGQUERY_EMULATOR_HOST: "http://localhost:9050"
          BIGQUERY_STORAGE_GRPC_ENDPOINT: "localhost:9060"
          JAVA_BQ_ALLOW_FAILING_ITS: >-
            CreateAwsConnectionIT,DeleteConnectionIT,GetConnectionIT,
            ShareConnectionIT,UpdateConnectionIT,
            CreateAmazonS3TransferIT,CreateAdManagerTransferIT,CreateAdsTransferIT,
            CreateCampaignmanagerTransferIT,CreatePlayTransferIT,CreateRedshiftTransferIT,
            CreateTeradataTransferIT,CreateYoutubeChannelTransferIT,
            CreateYoutubeContentOwnerTransferIT,DisableTransferConfigIT,ReEnableTransferConfigIT

      - name: Gate on non-allowlisted Java IT failures
        env:
          JAVA_BQ_ALLOW_FAILING_ITS: >-
            CreateAwsConnectionIT,DeleteConnectionIT,GetConnectionIT,
            ShareConnectionIT,UpdateConnectionIT,
            CreateAmazonS3TransferIT,CreateAdManagerTransferIT,CreateAdsTransferIT,
            CreateCampaignmanagerTransferIT,CreatePlayTransferIT,CreateRedshiftTransferIT,
            CreateTeradataTransferIT,CreateYoutubeChannelTransferIT,
            CreateYoutubeContentOwnerTransferIT,DisableTransferConfigIT,ReEnableTransferConfigIT
        run: |
          set -euo pipefail
          {
            echo "### Java live IT gate"
            echo ""
            if [ "${{ steps.java_live_its.outcome }}" = "success" ]; then
              echo "Maven verify passed (no unexpected failures)."
            else
              echo "Maven verify exited non-zero; checking Failsafe reports against allowlist."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          bash scripts/java_bq_ci_gate.sh "$JAVA_BQ_ALLOW_FAILING_ITS" \
            third_party/java-bigquery-tests/java-bigquery/samples/snippets \
            third_party/java-bigquery-tests/java-bigquerystorage/samples/snippets \
            third_party/java-bigquery-tests/java-docs-samples/bigquery/bigqueryconnection/snippets \
            third_party/java-bigquery-tests/java-docs-samples/bigquery/bigquerydatatransfer/snippets

      - name: Stop emulator
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  python-bigquery-tests-live:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: python-bigquery-tests (live emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: read
    env:
      THIRDPARTY_SKIP_BUILD: "1"
      THIRDPARTY_FRESH_VOLUME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up thirdparty docker emulator
        uses: ./.github/actions/setup-thirdparty-docker-emulator
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}
          prebuilt-url: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Run thirdparty:python-bigquery-tests (nox snippets)
        run: task thirdparty:python-bigquery-tests
        env:
          BIGQUERY_EMULATOR_HOST: "http://localhost:9050"
          BIGQUERY_STORAGE_GRPC_ENDPOINT: "localhost:9060"
          PYTHON_SAMPLES_PYTHON: "3.13"

      - name: Stop emulator
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  node-bigquery-tests-live:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: node-bigquery-tests (live emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read
    env:
      THIRDPARTY_SKIP_BUILD: "1"
      THIRDPARTY_FRESH_VOLUME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: third_party/node-bigquery-tests/package-lock.json

      - name: Set up thirdparty docker emulator
        uses: ./.github/actions/setup-thirdparty-docker-emulator
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}
          prebuilt-url: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Run thirdparty:node-bigquery-tests (Mocha)
        run: task thirdparty:node-bigquery-tests
        env:
          BIGQUERY_EMULATOR_HOST: "http://localhost:9050"
          BIGQUERY_STORAGE_GRPC_ENDPOINT: "localhost:9060"

      - name: Stop emulator
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  python-bigquery-dataframes-snippet-gate-live:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: python-bigquery-dataframes snippet gate (live emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read
    env:
      THIRDPARTY_SKIP_BUILD: "1"
      THIRDPARTY_FRESH_VOLUME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up thirdparty docker emulator
        uses: ./.github/actions/setup-thirdparty-docker-emulator
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}
          prebuilt-url: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Run thirdparty:python-bigquery-dataframes-snippet-gate
        run: task thirdparty:python-bigquery-dataframes-snippet-gate
        env:
          BIGQUERY_EMULATOR_HOST: "http://localhost:9050"
          BIGQUERY_STORAGE_GRPC_ENDPOINT: "localhost:9060"
          DATAFRAME_SAMPLES_PYTHON: "3.12"

      - name: Stop emulator
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true

  golang-bigquery-tests-live:
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: golang-bigquery-tests (live emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read
    env:
      THIRDPARTY_SKIP_BUILD: "1"
      THIRDPARTY_FRESH_VOLUME: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: third_party/golang-bigquery-tests/go.sum

      - name: Set up thirdparty docker emulator
        uses: ./.github/actions/setup-thirdparty-docker-emulator
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}
          prebuilt-url: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Run thirdparty:golang-bigquery-tests (live)
        run: task thirdparty:golang-bigquery-tests
        env:
          BIGQUERY_EMULATOR_HOST: "http://localhost:9050"
          BIGQUERY_STORAGE_GRPC_ENDPOINT: "localhost:9060"
          BIGQUERY_ANALYTICSHUB_GRPC_ENDPOINT: "localhost:9060"

      - name: Stop emulator
        if: always()
        run: docker compose down -v --remove-orphans 2>/dev/null || true
