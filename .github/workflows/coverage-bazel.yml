# Bazel coverage workflow for the BigQuery emulator's C++ engine.
#
# Triggered after a successful `build-engine` run on push to `main` only.
# PRs skip this workflow (Go coverage from `ci` gates merges; C++ coverage
# is informational and runs post-merge). Reuses the `engine` Bazel disk cache
# that `build-engine` just populated instead of cold-starting in parallel.
#
# Runs `bazel coverage` over every first-party `cc_test` target discovered
# via a scoped `bazel query` (see the Enumerate step). The aggregated lcov
# report at `bazel-out/_coverage/_coverage_report.dat` is uploaded as the
# `cpp-bazel-coverage` workflow artifact, which
# `.github/workflows/coverage-publish.yml` aggregates with the
# `go-coverage` artifact from ci.yml and publishes to the
# self-hosted gh-pages coverage page.
#
# Why a separate workflow (not folded into ci.yml):
#   * `bazel coverage` instrumentation roughly doubles the cold-link
#     cost of the already-slow GoogleSQL build (~25-55 min cold in
#     ci.yml; coverage drives that to the 60-120 min range on a cold
#     disk cache).
#   * Adding it to ci.yml would crowd out the build/test gate; a coverage
#     regression should not block a build/test merge and vice versa.
#   * Same split rationale documented at the top of conformance.yml.
#
# amd64-only for the same reason ci.yml's Bazel build is amd64-only:
# the GoogleSQL hermetic LLVM toolchain only ships amd64 binaries today.

name: coverage-bazel

on:
  workflow_run:
    workflows: [build-engine]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: coverage-bazel-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  bazel-coverage:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_branch == 'main'
    name: bazel-coverage
    runs-on: ubuntu-latest
    # Cold disk cache is the long pole on the first main push after a
    # cache flush. After `build-engine` on the same SHA, this job restores
    # the warm `engine` disk cache and typically lands in the 15-40 min
    # range. Timeout mirrors release.yml's 180 min ceiling.
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Go is installed only so `go-task/setup-task` can run Task wrappers
      # (`task bazel:coverage`, optional `task googlesql:fetch-prebuilt`).
      # This job never runs `go mod download` / `go test` / `go build`, so
      # enabling setup-go's module cache restores a hit then post-job cleanup
      # warns that GOMODCACHE was never created on disk.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            libgrpc-dev \
            protobuf-compiler-grpc \
            lcov

      - name: Restore GoogleSQL prebuilt cache
        uses: actions/cache@v5
        with:
          path: .cache/googlesql-prebuilt
          key: googlesql-prebuilt-${{ vars.GOOGLESQL_PREBUILT_SHA256 || 'source' }}

      # Shares `disk-cache: engine` with build-engine / ci cc_test so
      # coverage reuses action outputs from the engine build on the same
      # SHA. Bazel keys by action hash; instrumented coverage compiles
      # do not incorrectly reuse non-instrumented objects.
      - name: Set up Bazel (bazelisk)
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: engine
          repository-cache: true

      # CI/Docker/release prebuilt-mode wiring: prefer the published
      # prebuilt artifact and fall back to a sibling source checkout
      # when the repo vars are unset. See
      # `.github/actions/setup-googlesql/action.yml` for the
      # resolution rules.
      - name: Resolve GoogleSQL build mode
        id: googlesql
        uses: ./.github/actions/setup-googlesql
        with:
          prebuilt-url: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Enumerate cc_test targets
        id: targets
        # `bazel query` only needs the @googlesql repo to be resolvable
        # (no compile work yet). The setup-googlesql action above has
        # populated either the prebuilt cache or `../googlesql/`, so
        # the query goes through cleanly under either mode.
        env:
          GOOGLESQL_SOURCE: ${{ steps.googlesql.outputs.googlesql-source }}
        run: |
          set -euo pipefail
          # Map the user-facing `GOOGLESQL_SOURCE` env value to the
          # bazel `--config=` group that pins the resolution mode the
          # query needs to match the build below.
          case "${GOOGLESQL_SOURCE:-prebuilt}" in
            prebuilt) gsq_cfg=googlesql-prebuilt ;;
            local|source) gsq_cfg=googlesql-source ;;
            *) echo "Unexpected GOOGLESQL_SOURCE='${GOOGLESQL_SOURCE}'" >&2; exit 2 ;;
          esac
          # Scoped to first-party trees (same expression as `task lint:cpp:test`).
          # `//...` would load `tools/googlesql-prebuilt/templates`, whose
          # BUILD.bazel is an artifact template (no `include/**/*.h` here).
          query='kind(cc_test, //backend/... + //binaries/... + //frontend/... + //tools/googlesql-prebuilt/smoke/...)'
          targets="$(bazel query --config="$gsq_cfg" "$query" | tr '\n' ' ')"
          if [ -z "${targets// }" ]; then
            echo "no cc_test targets found via bazel query: $query" >&2
            exit 1
          fi
          echo "targets=${targets}" >> "$GITHUB_OUTPUT"

      - name: Run bazel coverage
        env:
          GOOGLESQL_SOURCE: ${{ steps.googlesql.outputs.googlesql-source }}
        run: |
          # `task bazel:coverage` does not honor `--config=googlesql-*`
          # internally; thread the same `--config` flag through
          # COVERAGE_FLAGS so the coverage build matches the mode
          # picked by the resolver above.
          case "${GOOGLESQL_SOURCE:-prebuilt}" in
            prebuilt) gsq_cfg=googlesql-prebuilt ;;
            local|source) gsq_cfg=googlesql-source ;;
          esac
          echo "::notice::Coverage build with GoogleSQL ${{ steps.googlesql.outputs.mode }} (artifact_version=${{ steps.googlesql.outputs.artifact-version }} googlesql=${{ steps.googlesql.outputs.googlesql-commit }})"
          task bazel:coverage \
            TARGETS="${{ steps.targets.outputs.targets }}" \
            COVERAGE_FLAGS="--config=$gsq_cfg --combined_report=lcov --test_output=errors --strategy=CoverageReport=local"

      # Hand off the LCOV combined report to coverage-publish.yml.
      # That workflow_run-triggered consumer pairs this artifact with
      # the `go-coverage` artifact uploaded by ci.yml, aggregates
      # both, and publishes the combined badge/HTML/baseline to
      # gh-pages on push-to-main. See .github/workflows/coverage-publish.yml
      # for the consumer side of the pipeline.
      - name: Upload C++ (Bazel) coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cpp-bazel-coverage
          path: bazel-out/_coverage/_coverage_report.dat
          if-no-files-found: error
          retention-days: 14

      - name: Release Bazel daemon
        if: always()
        run: timeout 60 bazel shutdown || true
