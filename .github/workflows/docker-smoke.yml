# Docker quickstart smoke for the BigQuery emulator.
#
# Consumes the pre-built engine from `.github/workflows/build-engine.yml`
# (ENGINE_SOURCE=prebuilt Docker path), assembles the runtime image,
# brings the docker-compose stack up, polls /healthz, fires the
# documented `SELECT 1` quickstart query, asserts both the HTTP status
# and the response shape, then tears the stack down.
#
# Triggered via `workflow_run` after build-engine succeeds so the
# in-container Bazel compile is not duplicated. BuildKit cache on
# gateway/runtime layers still applies via actions/cache.
#
# Local equivalent: `task docker:smoke` (builds inline).

name: docker-smoke

on:
  workflow_run:
    workflows: [build-engine]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: docker-smoke-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  engine-build-failed:
    if: github.event.workflow_run.conclusion != 'success'
    name: engine-build-failed
    runs-on: ubuntu-latest
    steps:
      - name: Report build-engine failure
        run: |
          echo "::error::build-engine concluded with '${{ github.event.workflow_run.conclusion }}'; gate jobs cannot run."
          exit 1

  quickstart-smoke:
    name: quickstart-smoke
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore Docker layer cache
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: docker-smoke-buildx-${{ runner.os }}-${{ hashFiles('Dockerfile', 'MODULE.bazel', 'MODULE.bazel.lock', '.bazelrc', '.bazelversion', 'binaries/emulator_main/**', 'backend/**', 'frontend/**', 'proto/**', 'third_party/**', 'gateway/**', 'binaries/gateway_main/**') }}
          restore-keys: |
            docker-smoke-buildx-${{ runner.os }}-

      - name: Build runtime image and smoke-test
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          DOCKER_SMOKE_SKIP_BUILD: "1"
        run: |
          set -euo pipefail
          eval "$(bash scripts/load_googlesql_prebuilt_pin.sh)"
          gsq_args=()
          if [ -n "${GOOGLESQL_PREBUILT_URL:-}" ] && [ -n "${GOOGLESQL_PREBUILT_SHA256:-}" ]; then
            gsq_args+=(--build-arg "GOOGLESQL_PREBUILT_URL=${GOOGLESQL_PREBUILT_URL}")
            gsq_args+=(--build-arg "GOOGLESQL_PREBUILT_SHA256=${GOOGLESQL_PREBUILT_SHA256}")
            echo "[docker-smoke] GoogleSQL prebuilt: ${GOOGLESQL_PREBUILT_URL}"
          fi
          bash scripts/docker_build_retry.sh docker buildx build \
            --tag bigquery-emulator:local \
            --load \
            --build-arg ENGINE_SOURCE=prebuilt \
            --cache-from "type=local,src=/tmp/.buildx-cache" \
            --cache-to "type=local,dest=/tmp/.buildx-cache-new,mode=max" \
            "${gsq_args[@]}" \
            .
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          task docker:smoke

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --tail=400 || true

      - name: Tear down (best-effort)
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
