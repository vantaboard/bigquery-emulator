# Routing-matrix artifact. Pure Go (reads YAML only; no engine).
# `continue-on-error: true` because the matrix is documentation — a
# regression here should not block the conformance fixture gate in
# conformance.yml (workflow_run only).

name: conformance-routing-matrix

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: conformance-routing-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  routing-matrix:
    name: routing-matrix
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Emit routing matrix
        run: |
          task conformance:routing-matrix \
            OUTPUT_FILE=conformance-routing-matrix.md

      - name: Verify matrix is reproducible
        run: |
          task conformance:routing-matrix \
            OUTPUT_FILE=conformance-routing-matrix.repeat.md
          diff -u conformance-routing-matrix.md \
                  conformance-routing-matrix.repeat.md

      - name: Upload routing matrix
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: conformance-routing-matrix
          path: conformance-routing-matrix.md
          if-no-files-found: warn
