# CI for the BigQuery emulator.
#
# Mirrors `task ci:run` (see Taskfile.yml): `go vet`, `go test`, CMake
# build of the C++ engine, and a Go build of the gateway. Runs on a
# linux/amd64 + linux/arm64 matrix so we catch architecture-specific
# regressions early (the C++ engine will eventually link GoogleSQL, and
# GoogleSQL is sensitive to compiler/arch differences).
#
# Keep this file and the `ci:run` task in sync: anything that runs here
# should also run via `task ci:run` locally, and vice versa.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            make \
            ninja-build

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build C++ engine (emulator_main)
        run: |
          cmake -S . -B build-out \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++
          cmake --build build-out --target emulator_main -j

      - name: Build Go gateway (gateway_main)
        run: |
          mkdir -p bin
          go build -o bin/gateway_main ./binaries/gateway_main
