# CI for the BigQuery emulator.
#
# Mirrors `task ci:run` (see Taskfile.yml): `go vet`, `go test`, a
# Bazel build of the canonical engine binary (GoogleSQL +
# reference_impl + DuckDB + gRPC), and a Go build of the gateway.
#
# linux/amd64 only: the canonical Bazel-built engine
# `//binaries/emulator_main:emulator_main` links GoogleSQL, whose
# hermetic LLVM toolchain only ships amd64 binaries today. arm64
# support is tracked against upstream GoogleSQL toolchain notes.
#
# Keep this file and the `ci:run` task in sync: anything that runs here
# should also run via `task ci:run` locally, and vice versa.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            libgrpc-dev \
            protobuf-compiler-grpc

      - name: go vet
        run: go vet ./...

      - name: go test (with coverage)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: go-amd64
          name: go-amd64
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # ---------------------------------------------------------------
      # Bazel build of emulator_main (canonical, full GoogleSQL)
      # ---------------------------------------------------------------
      #
      # `local_path_override` in MODULE.bazel points at a sibling
      # `../googlesql/` checkout; the step below pulls the matching
      # tag from upstream and applies the one-line semver patch
      # documented in MODULE.bazel before the build kicks off.
      - name: Set up Bazel (bazelisk)
        uses: bazel-contrib/setup-bazel@0.13.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Checkout sibling googlesql (for local_path_override)
        uses: actions/checkout@v4
        with:
          repository: google/googlesql
          ref: 2026.01.1
          path: googlesql-sibling

      - name: Stage googlesql at ../googlesql
        run: |
          mv googlesql-sibling ../googlesql
          # MODULE.bazel:module(version = "2026.01.1") trips gazelle's
          # strict semver parser ("leading zero"); see the long note
          # at the top of //MODULE.bazel for the rationale.
          sed -i 's/version = "2026.01.1"/version = "2026.1.1"/' ../googlesql/MODULE.bazel

      - name: Build C++ engine via Bazel (full GoogleSQL + DuckDB)
        run: |
          bazel build //binaries/emulator_main:emulator_main

      - name: Build Go gateway (gateway_main)
        run: |
          mkdir -p bin
          go build -o bin/gateway_main ./binaries/gateway_main
