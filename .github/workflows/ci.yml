# CI for the BigQuery emulator.
#
# Mirrors `task ci:run` (see taskfiles/ci.yml): `go vet`, `go test`,
# cc_test, conformance fastpath, and gateway build. The C++ engine
# compile lives in `.github/workflows/build-engine.yml`; this workflow's
# `build-and-test` job consumes that artifact via `workflow_run`.
#
# linux/amd64 only: the canonical Bazel-built engine
# `//binaries/emulator_main:emulator_main` links GoogleSQL, whose
# hermetic LLVM toolchain only ships amd64 binaries today. arm64
# support is tracked against upstream GoogleSQL toolchain notes.
#
# Keep this file and the `ci:run` task in sync for test coverage;
# locally `task ci:run` still builds the engine sequentially on one
# machine (see taskfiles/ci.yml header).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_run:
    workflows: [build-engine]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.workflow_run.head_branch || github.ref }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (amd64)
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            libgrpc-dev \
            protobuf-compiler-grpc

      - name: Install C++ lint tooling (clang-format, clang-tidy, cppcheck)
        run: |
          sudo apt-get install -y --no-install-recommends \
            clang-format \
            clang-tidy \
            cppcheck

      - name: Fast lint gate (gofmt + go vet + first-party C++ format/source + disposition parity + stale-term sweep)
        run: task lint:run

      - name: go test (with coverage)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload Go coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Bazel (bazelisk)
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: engine
          repository-cache: true

      - name: Resolve GoogleSQL build mode
        id: googlesql
        uses: ./.github/actions/setup-googlesql
        with:
          prebuilt-url: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Run first-party cc_test targets via Bazel
        env:
          GOOGLESQL_SOURCE: ${{ steps.googlesql.outputs.googlesql-source }}
        run: task lint:cpp:test

      - name: Conformance fastpath fixtures (DuckDB-native / -rewrite)
        run: task conformance:fastpath

      - name: Build Go gateway (gateway_main)
        run: |
          mkdir -p bin
          go build -o bin/gateway_main ./binaries/gateway_main

      - name: Release Bazel daemon
        if: always()
        run: bazel shutdown || true

  cpp-analysis:
    if: github.event_name != 'workflow_run'
    name: cpp-analysis (cppcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cppcheck

      - name: cppcheck on first-party C++ tree
        run: task lint:cpp:cppcheck
