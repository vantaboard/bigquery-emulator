# CI for the BigQuery emulator.
#
# Mirrors `task ci:run` (see Taskfile.yml): `go vet`, `go test`, a
# Bazel build of the canonical engine binary (GoogleSQL + DuckDB +
# gRPC), and a Go build of the gateway.
#
# linux/amd64 only: the canonical Bazel-built engine
# `//binaries/emulator_main:emulator_main` links GoogleSQL, whose
# hermetic LLVM toolchain only ships amd64 binaries today. arm64
# support is tracked against upstream GoogleSQL toolchain notes.
#
# Keep this file and the `ci:run` task in sync: anything that runs here
# should also run via `task ci:run` locally, and vice versa.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        # The prebuilt-GoogleSQL setup action shells out to
        # `task googlesql:fetch-prebuilt`; install Task on the runner
        # so that path is available regardless of the resolved mode.
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            libgrpc-dev \
            protobuf-compiler-grpc

      - name: Install C++ lint tooling (clang-format, clang-tidy, cppcheck)
        # The fast `task lint:run` gate calls `task lint:cpp:format` and
        # `task lint:cpp:source`, both of which need clang-format on the
        # PATH. clang-tidy / cppcheck come along for the slower opt-in
        # lanes (`task lint:cpp:tidy`, `task lint:cpp:cppcheck`); we
        # install them in this same step so the runner is also able to
        # execute the secondary-analysis job below.
        #
        # We pin to the apt-shipped clang-format-18 so the formatter
        # version matches the clang-18 toolchain Bazel pins via
        # `task emulator:build-engine:bazel`. Mismatched clang-format
        # versions produce different output for the same input file,
        # which would surface as flapping CI.
        run: |
          sudo apt-get install -y --no-install-recommends \
            clang-format \
            clang-tidy \
            cppcheck

      - name: Fast lint gate (gofmt + go vet + first-party C++ format/source)
        # Mirror of `task lint:run`. Fails the job if Go formatting,
        # `go vet`, clang-format, or the source-only C++ checker
        # surface any finding. Subsumes the previous standalone
        # `go vet` step (`task lint:run` invokes `go vet ./...`
        # internally).
        run: task lint:run

      - name: go test (with coverage)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      # Hand off coverage.out to coverage-publish.yml. That workflow's
      # workflow_run trigger fires after this run completes, downloads
      # the artifact via the REST API, and either publishes to
      # gh-pages (push to main) or gates the PR against the last
      # published baseline. See .github/workflows/coverage-publish.yml
      # for the consumer side of the pipeline.
      - name: Upload Go coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

      # ---------------------------------------------------------------
      # Bazel build of emulator_main (canonical, full GoogleSQL)
      # ---------------------------------------------------------------
      #
      # The CI/Docker/release track of the `googlesql-prebuilt`
      # rollout (see `docs/dev/googlesql-prebuilt/README.md`) consumes
      # a pinned prebuilt artifact instead of recompiling GoogleSQL
      # from source.
      # The composite action below resolves the mode:
      #
      #   * If `vars.GOOGLESQL_PREBUILT_URL` and
      #     `vars.GOOGLESQL_PREBUILT_SHA256` are set at the repository
      #     level, it downloads + verifies + unpacks the artifact and
      #     the build runs with `GOOGLESQL_SOURCE=prebuilt`.
      #   * Otherwise it emits a workflow-level warning and falls back
      #     to a sibling `../googlesql/` checkout (the legacy source
      #     path), with `GOOGLESQL_SOURCE=local`. This keeps CI green
      #     during the transition window before maintainers configure
      #     the repo vars; once they do, the prebuilt path takes over
      #     automatically.
      - name: Set up Bazel (bazelisk)
        uses: bazel-contrib/setup-bazel@0.13.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Resolve GoogleSQL build mode
        id: googlesql
        uses: ./.github/actions/setup-googlesql
        with:
          prebuilt-url: ${{ vars.GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ vars.GOOGLESQL_PREBUILT_SHA256 }}

      - name: Build C++ engine via Bazel (full GoogleSQL + DuckDB)
        env:
          GOOGLESQL_SOURCE: ${{ steps.googlesql.outputs.googlesql-source }}
        run: |
          echo "::notice::Building emulator_main with GoogleSQL ${{ steps.googlesql.outputs.mode }} (artifact_version=${{ steps.googlesql.outputs.artifact-version }} googlesql=${{ steps.googlesql.outputs.googlesql-commit }})"
          task emulator:build-engine:bazel

      - name: Run first-party cc_test targets via Bazel
        # Runs every `cc_test` target under the first-party include
        # roots (backend/, binaries/, frontend/,
        # tools/googlesql-prebuilt/smoke/). Reuses the same throttled
        # `task bazel:test` wrapper the engine build sits behind so
        # the daemon shutdown / process-hygiene rules from
        # `.cursor/rules/bazel-process-hygiene.mdc` apply uniformly.
        # The cache is already warm from the engine build above, so
        # this step is dominated by test-runtime, not compile-time.
        env:
          GOOGLESQL_SOURCE: ${{ steps.googlesql.outputs.googlesql-source }}
        run: task lint:cpp:test

      - name: Build Go gateway (gateway_main)
        run: |
          mkdir -p bin
          go build -o bin/gateway_main ./binaries/gateway_main

      - name: Release Bazel daemon
        if: always()
        run: bazel shutdown || true

  cpp-analysis:
    # Slow C++ analysis lane. Runs in parallel with `build-and-test`
    # and is REQUIRED — a finding fails the workflow. The user
    # plans to clear remaining findings before each release and
    # would rather have the gate enforced than read advisory output.
    name: cpp-analysis (cppcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        # `tools/lint/cpp` is a Go binary; `task lint:cpp:cppcheck`
        # invokes `go run ./tools/lint/cpp list` to compute the
        # first-party file list before handing off to cppcheck.
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cppcheck

      - name: cppcheck on first-party C++ tree
        # Mirror of `task lint:cpp:cppcheck`. Surfaces warnings,
        # style, performance, and portability findings against the
        # canonical first-party file list.
        run: task lint:cpp:cppcheck
