# CI build-and-test gate for the BigQuery emulator.
#
# Triggered only after `.github/workflows/build-engine.yml` succeeds
# (`workflow_run`). Downloads the shared engine artifact and runs lint,
# Go tests (with coverage), and conformance fastpath. First-party
# `cc_test` and C++ Bazel coverage run in `build-engine` itself.
# Gateway integration tests (`go test -tags=integration ./gateway/e2e/...`)
# run in the `gateway-e2e` job after downloading the engine artifact.
#
# Cheap cppcheck lives in ci-cpp-analysis.yml (push/PR parallel).
#
# Keep in sync with `task ci:run` (see taskfiles/ci.yml).

name: ci

on:
  workflow_run:
    workflows: [build-engine]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  engine-build-failed:
    if: github.event.workflow_run.conclusion != 'success'
    name: engine-build-failed
    runs-on: ubuntu-latest
    steps:
      - name: Report build-engine failure
        run: |
          echo "::error::build-engine concluded with '${{ github.event.workflow_run.conclusion }}'; gate jobs cannot run."
          exit 1

  build-and-test:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: build-and-test (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install C++ lint tooling (clang-format, clang-tidy, cppcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-format \
            clang-tidy \
            cppcheck

      - name: Fast lint gate (gofmt + go vet + first-party C++ format/source + disposition parity + stale-term sweep)
        run: task lint:run

      - name: go test (with coverage)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload Go coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Conformance fastpath fixtures (DuckDB-native / -rewrite)
        run: task conformance:fastpath

  gateway-e2e:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: gateway-e2e (integration)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: go test -tags=integration (gateway/e2e)
        run: go test -tags=integration ./gateway/e2e/...
