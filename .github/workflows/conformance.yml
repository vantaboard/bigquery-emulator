# Conformance matrix CI for the BigQuery emulator.
#
# Triggered only after `.github/workflows/build-engine.yml` succeeds.
# Runs `task conformance:run` for each profile and uploads JSON reports.
#
# Routing-matrix docs live in conformance-routing-matrix.yml (push/PR).

name: conformance

on:
  workflow_run:
    workflows: [build-engine]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  engine-build-failed:
    if: github.event.workflow_run.conclusion != 'success'
    name: engine-build-failed
    runs-on: ubuntu-latest
    steps:
      - name: Report build-engine failure
        run: |
          echo "::error::build-engine concluded with '${{ github.event.workflow_run.conclusion }}'; gate jobs cannot run."
          exit 1

  conformance:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: conformance (${{ matrix.profile }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        profile: [duckdb]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Run conformance fixtures
        run: |
          task conformance:run \
            PROFILE=${{ matrix.profile }} \
            OUTPUT=json \
            OUTPUT_FILE=conformance-${{ matrix.profile }}.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: conformance-${{ matrix.profile }}
          path: conformance-${{ matrix.profile }}.json
          if-no-files-found: warn

  bqutils:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: conformance (bqutils)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Install Python UDF runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-lxml

      - name: Run bigquery-utils passing lane
        run: |
          task conformance:bqutils \
            OUTPUT=json \
            OUTPUT_FILE=conformance-bqutils.json

      - name: Upload bqutils conformance report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: conformance-bqutils
          path: conformance-bqutils.json
          if-no-files-found: warn
