# Conformance matrix CI for the BigQuery emulator.
#
# Runs `task conformance:run` against every seed fixture under
# `conformance/fixtures/` for each runtime profile in parallel.
# Each profile produces its own JSON report which is uploaded as a
# workflow artifact (`conformance-<profile>.json`). Today there is
# only one profile (`duckdb`) -- the local execution coordinator
# over DuckDB storage; the matrix shape stays in place so a future
# profile addition does not require a workflow rewrite.
#
# The C++ engine binary is built once by `.github/workflows/build-engine.yml`
# and consumed here via `workflow_run` + `setup-engine-from-artifact`.
# The workflow stays in its own file so conformance regressions do
# not block the build/test gate — and vice versa.
#
# `routing-matrix` runs on the direct push/PR trigger (no engine).

name: conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_run:
    workflows: [build-engine]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.event.workflow_run.head_branch || github.ref }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  conformance:
    name: conformance (${{ matrix.profile }})
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        profile: [duckdb]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Run conformance fixtures
        run: |
          task conformance:run \
            PROFILE=${{ matrix.profile }} \
            OUTPUT=json \
            OUTPUT_FILE=conformance-${{ matrix.profile }}.json

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: conformance-${{ matrix.profile }}
          path: conformance-${{ matrix.profile }}.json
          if-no-files-found: warn

  routing-matrix:
    if: github.event_name != 'workflow_run'
    name: routing-matrix
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Emit routing matrix
        run: |
          task conformance:routing-matrix \
            OUTPUT_FILE=conformance-routing-matrix.md

      - name: Verify matrix is reproducible
        run: |
          task conformance:routing-matrix \
            OUTPUT_FILE=conformance-routing-matrix.repeat.md
          diff -u conformance-routing-matrix.md \
                  conformance-routing-matrix.repeat.md

      - name: Upload routing matrix
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: conformance-routing-matrix
          path: conformance-routing-matrix.md
          if-no-files-found: warn
