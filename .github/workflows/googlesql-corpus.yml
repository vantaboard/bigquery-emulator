# Pinned GoogleSQL .test corpus lane.
#
# Triggered after a successful `build-engine` run. Consumes the shared
# `engine-binaries` artifact (same pattern as conformance.yml / ci.yml)
# instead of cold-compiling the C++ engine in this job.
#
# The lane runs the vendored subset under
# `conformance/googlesql-corpus/corpus/` — see SURVEY.md. `task
# conformance:googlesql-corpus` walks the corpus dir and runs only the
# `pinned` cases in `manifest/pinned.json`.
#
# Non-flaky by construction: cases are pure inline `SELECT`s (no
# `prepare_database`, no public-data tables, no network), the runner
# walks files in lexical order, and case order within a file is the
# vendored file order — so the pass/skip set is deterministic.

name: googlesql-corpus

on:
  workflow_run:
    workflows: [build-engine]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: googlesql-corpus-${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  engine-build-failed:
    if: github.event.workflow_run.conclusion != 'success'
    name: engine-build-failed
    runs-on: ubuntu-latest
    steps:
      - name: Report build-engine failure
        run: |
          echo "::error::build-engine concluded with '${{ github.event.workflow_run.conclusion }}'; googlesql-corpus cannot run."
          exit 1

  googlesql-corpus:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event != 'workflow_dispatch'
    name: googlesql corpus (pinned)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up engine from build-engine artifact
        uses: ./.github/actions/setup-engine-from-artifact
        with:
          run-id: ${{ github.event.workflow_run.id }}
          head-sha: ${{ github.event.workflow_run.head_sha }}

      - name: Run pinned GoogleSQL .test corpus
        run: |
          set -euo pipefail
          task conformance:googlesql-corpus \
            OUTPUT=json \
            OUTPUT_FILE=googlesql-corpus-result.json

      - name: Upload corpus results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: googlesql-corpus-results
          path: googlesql-corpus-result.json
          if-no-files-found: warn
          retention-days: 14
