name: publish
on:
  push:
    tags:
      - v*
jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-linux-amd64
            go-version: "1.26.0"
          - os: macos-latest
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-darwin-amd64
            go-version: "1.26.0"

    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: Resolve go-googlesql version
      id: gsql
      run: |
        v=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' go.mod)
        echo "v=${v}" >> "$GITHUB_OUTPUT"
    - name: Checkout go-googlesql (stack-bootstrap)
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesql
        ref: ${{ steps.gsql.outputs.v }}
        path: go-googlesql
    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
    - name: setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
    - name: extract version from tags
      id: meta
      run: |
        echo ::set-output name=VERSION::${GITHUB_REF#refs/tags/}
    - uses: rui314/setup-mold@v1
    - name: cache for linux
      uses: actions/cache@v4
      if: runner.os == 'Linux'
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: cache for macOS
      uses: actions/cache@v4
      if: runner.os == 'macOS'
      with:
        path: |
          ~/Library/Caches/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: build
      run: task emulator:build
      env:
        VERSION: ${{ steps.meta.outputs.VERSION }}
        GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ matrix.artifact_name }}
        asset_name: ${{ matrix.asset_name }}
        tag: ${{ github.ref }}
