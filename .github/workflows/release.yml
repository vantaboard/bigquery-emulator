name: publish
on:
  push:
    tags:
      - v*
defaults:
  run:
    shell: bash
jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-linux-amd64
            go-version: "1.26.0"
          - os: ubuntu-24.04-arm
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-linux-arm64
            go-version: "1.26.0"
          - os: macos-15-intel
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-darwin-amd64
            go-version: "1.26.0"
          - os: macos-15
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-darwin-arm64
            go-version: "1.26.0"

    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: Resolve stack versions
      id: ver
      run: bash scripts/ci-resolve-stack-refs.sh go.mod
    - name: Checkout go-googlesql
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesql
        ref: ${{ steps.ver.outputs.gsql_ref }}
        path: go-googlesql
    - name: Checkout go-googlesqlite
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesqlite
        ref: ${{ steps.ver.outputs.gsqlite_ref }}
        path: go-googlesqlite
    - name: setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
        cache-dependency-path: go.sum
    - name: Install Task
      run: |
        go install github.com/go-task/task/v3/cmd/task@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: Install clang and libc++ (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends clang libc++-dev libc++abi-dev
    - name: Install bazelisk
      run: |
        go install github.com/bazelbuild/bazelisk@v1.20.0
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: extract version from tags
      id: meta
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    - name: Default prebuilts (release tarball or Bazel)
      env:
        GO_GOOGLESQL_VERSION: ${{ steps.ver.outputs.gsql }}
      run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
    - name: Ensure stable prebuilt symlinks (lib/*.a)
      working-directory: go-googlesql
      run: |
        set -euo pipefail
        ga="$(go env GOOS)_$(go env GOARCH)"
        p="internal/ccall/go-protobuf/protobuf/lib"
        if [[ -f "$p/$ga/libprotobuf_cgo.a" ]]; then
          ln -sfn "$ga/libprotobuf_cgo.a" "$p/libprotobuf_cgo.a"
        fi
        u="internal/ccall/go-googlesql-unified/lib"
        if [[ -f "$u/$ga/libgooglesql.a" ]]; then
          ln -sfn "$ga/libgooglesql.a" "$u/libgooglesql.a"
        fi
        if [[ "$(go env GOOS)" == "linux" ]] && [[ -f "$p/$ga/libcxx_prebuilt.a" ]]; then
          ln -sfn "$ga/libcxx_prebuilt.a" "$p/libcxx_prebuilt.a"
          ln -sfn "$ga/libcxxabi_prebuilt.a" "$p/libcxxabi_prebuilt.a"
        fi
    # Repo root is ${{ github.workspace }}; go.mod uses ../go-googlesql/lib/* for local siblings.
    # From workspace root, ../go-googlesql is the parent directory — wrong for Actions (checkouts are
    # workspace/go-googlesql). Override nested lib modules with absolute paths (see go-googlesqlite CI).
    - name: Point go.mod at sibling stack checkouts
      run: |
        set -euo pipefail
        R="${{ github.workspace }}/go-googlesql"
        go mod edit -replace "github.com/vantaboard/go-googlesql=${R}"
        go mod edit -replace "github.com/vantaboard/go-googlesqlite=${{ github.workspace }}/go-googlesqlite"
        for m in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64 windows-amd64; do
          go mod edit -replace "github.com/vantaboard/go-googlesql/lib/${m}=${R}/lib/${m}"
        done
        go mod download
    # Do not use mold: go-googlesql CGO -l:libcxx_prebuilt.a is incompatible with mold's -l: parsing.
    - name: cache for linux
      uses: actions/cache@v4
      if: runner.os == 'Linux'
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-
    - name: cache for macOS
      uses: actions/cache@v4
      if: runner.os == 'macOS'
      with:
        path: |
          ~/Library/Caches/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-
    - name: build
      run: task emulator:build
      env:
        VERSION: ${{ steps.meta.outputs.VERSION }}
        GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        GO_GOOGLESQLITE_ROOT: ${{ github.workspace }}/go-googlesqlite
    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ matrix.artifact_name }}
        asset_name: ${{ matrix.asset_name }}
        tag: ${{ github.ref }}
