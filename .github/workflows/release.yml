# Release workflow (release-packaging work).
#
# Cuts a release on tag push (`vX.Y.Z`) or via manual dispatch
# (`inputs.ref` lets the operator re-release a previously pushed tag
# without having to delete-and-retag). One job, one runner: the
# canonical Bazel-built C++ engine, the Docker image push to GHCR, and
# the goreleaser archive upload all share the same checkout so the
# version numbers cannot drift.
#
# Steps in order:
#   1. Checkout the triggering ref (or `inputs.ref` for dispatch).
#   2. Set up Go + Task + Bazelisk and resolve a pinned GoogleSQL
#      prebuilt artifact (CI/Docker/release prebuilt-mode wiring; see
#      `docs/dev/googlesql-prebuilt/README.md`). The pin lives in
#      `env.RELEASE_GOOGLESQL_PREBUILT_*` below; the release maintainer
#      updates both values whenever a new GoogleSQL prebuilt is
#      published. Tag-push runs refuse to start when the pin is empty —
#      release builds never silently fall back to a slow GoogleSQL
#      source compile.
#   3. Build the C++ engine via `task emulator:build-engine:bazel`
#      (default `GOOGLESQL_SOURCE=prebuilt` consumes the pinned
#      artifact). This stages `bin/emulator_main` + `bin/libduckdb.so`.
#      The goreleaser config's `before.hooks` block on these existing.
#   4. Push the Docker runtime image (multi-stage `Dockerfile`) to
#      GHCR. Tags are derived from the SemVer triplet by
#      `docker/metadata-action@v6` (`vX.Y.Z`, `vX.Y`, `vX`, `latest`);
#      `latest` is suppressed for pre-release tags (`v0.0.1-rc1`).
#      Linux/amd64 only — the engine binary is linux/amd64 only and
#      the README documents the caveat. Multi-arch is explicitly out
#      of scope for the release pipeline today.
#   5. Run `goreleaser release --clean`. Goreleaser writes the
#      gateway archives + checksums to the GitHub release the tag
#      push opened. Engine binary is deliberately bundled into all
#      four archives. Release notes include the
#      pinned GoogleSQL artifact URL + SHA-256 so consumers can
#      reproduce the build from the same artifact.
#
# Time budget: the cold Bazel cache dominates. With prebuilt
# GoogleSQL the first cut should land in roughly 15-30 min on a
# 4-vCPU/7-GB runner (vs. the 95-120 min source-build budget the
# legacy path used). The 180 min ceiling stays in place as a safety
# net for cold caches.
#
# Concurrency: scoped to the ref so a force-push to a tag (rare) does
# not race itself; `cancel-in-progress: false` because release
# publishes must finish — interrupting mid-publish leaves a partial
# release on GHCR or Releases.
#
# ---------------------------------------------------------------------
# Release maintainer playbook:
# ---------------------------------------------------------------------
#
# 1. Build + verify a new GoogleSQL prebuilt:
#      gh workflow run googlesql-prebuilt.yml \
#        -f googlesql_ref=2026.01.1 \
#        -f artifact_version=0.1.0 \
#        -f publish=true
#    The producer publishes a GitHub Release at
#      `googlesql-prebuilt/v<artifact_version>+gs-<short_sha>`
#    with three assets: `<asset>.tar.gz`, `<asset>.tar.gz.sha256`,
#    and `<asset>.manifest.json`.
# 2. Read the new tarball URL + SHA-256:
#      gh release view googlesql-prebuilt/v<...>+gs-<...> --json assets
# 3. Update `env.RELEASE_GOOGLESQL_PREBUILT_URL` /
#    `env.RELEASE_GOOGLESQL_PREBUILT_SHA256` below in this file to the
#    new values. Commit the change with a `chore(release): pin
#    GoogleSQL prebuilt v<...>+gs-<...>` message.
# 4. Tag the new release as usual (`git tag -a vX.Y.Z`); the workflow
#    consumes the pin.
#
# Source fallback: explicit only. Use
# `gh workflow run release.yml -f ref=vX.Y.Z -f googlesql_source=true`
# when debugging a GoogleSQL upgrade where no prebuilt is available
# yet. Tag-push runs (`on: push: tags`) cannot select source mode and
# refuse to start when the prebuilt pin is empty.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Existing tag to (re)release (e.g. v0.0.1)"
        required: true
      googlesql_source:
        description: "Force GoogleSQL source build (debug only; default: prebuilt artifact pin)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # ------------------------------------------------------------------
  # GoogleSQL prebuilt pin (CI/Docker/release prebuilt-mode wiring).
  #
  # Both values must be filled in by the release maintainer (see the
  # playbook in this workflow's header) before a tag-push release.
  # The "Validate GoogleSQL prebuilt pin" step below refuses to run a
  # tag-push release with either value empty so the release path
  # cannot silently fall back to a multi-hour source compile.
  #
  # Format:
  #   * URL  — `https://github.com/<owner>/<repo>/releases/download/
  #             googlesql-prebuilt/v<artifact_version>+gs-<short>/
  #             googlesql-prebuilt-linux-amd64-clang18-<short>-v<artifact_version>.tar.gz`
  #   * SHA  — 64 lowercase hex chars from the producer's
  #            `<asset>.tar.gz.sha256` sidecar.
  #
  # Leave empty for now (see the file header). The first published
  # GoogleSQL prebuilt populates these on its release commit.
  # ------------------------------------------------------------------
  RELEASE_GOOGLESQL_PREBUILT_URL: "https://github.com/vantaboard/bigquery-emulator/releases/download/googlesql-prebuilt/v0.1.2+gs-36dd14aa0657/googlesql-prebuilt-linux-amd64-clang18-36dd14aa0657-v0.1.2.tar.gz"
  RELEASE_GOOGLESQL_PREBUILT_SHA256: "0cdd8237bd5ca2d20df51704541d93d7dbd4c1c202ada519e9c8d7b97e1bf993"

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # workflow_dispatch passes the operator-supplied tag in
          # `inputs.ref`; tag push (`on: push: tags`) leaves it empty
          # and the default `github.ref` resolves to the tag.
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install C++ build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libprotobuf-dev \
            protobuf-compiler \
            libgrpc++-dev \
            libgrpc-dev \
            protobuf-compiler-grpc

      - name: Set up Bazel (bazelisk)
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          # `release` keeps the cache distinct from ci/conformance so
          # tag re-cuts share their own cache key but do not invalidate
          # the on-PR caches.
          disk-cache: release
          repository-cache: true

      - name: Validate GoogleSQL prebuilt pin
        # Refuse to run a tag-pushed release when both pin values are
        # empty: tag-push releases cannot silently fall back to source
        # builds (per the prebuilt-mode done criteria — "Source
        # fallback is not used unless the release operator explicitly
        # selects it").
        # `workflow_dispatch` runs may opt into source mode by setting
        # `inputs.googlesql_source=true`; tag pushes cannot.
        env:
          PIN_URL: ${{ env.RELEASE_GOOGLESQL_PREBUILT_URL }}
          PIN_SHA: ${{ env.RELEASE_GOOGLESQL_PREBUILT_SHA256 }}
          FORCE_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.googlesql_source || 'false' }}
        run: |
          set -euo pipefail
          if [ "$FORCE_SOURCE" = "true" ]; then
            echo "::warning::workflow_dispatch with googlesql_source=true; this release will compile GoogleSQL from source (slow)."
            exit 0
          fi
          if [ -z "$PIN_URL" ] || [ -z "$PIN_SHA" ]; then
            echo "::error::release.yml has no GoogleSQL prebuilt pin set." >&2
            echo "Update env.RELEASE_GOOGLESQL_PREBUILT_URL and" >&2
            echo "env.RELEASE_GOOGLESQL_PREBUILT_SHA256 at the top of" >&2
            echo ".github/workflows/release.yml — see the playbook in" >&2
            echo "the workflow header. Or, for a debug rebuild only," >&2
            echo "use 'workflow_dispatch' with googlesql_source=true." >&2
            exit 1
          fi
          if ! [[ "$PIN_SHA" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::RELEASE_GOOGLESQL_PREBUILT_SHA256 must be 64 lowercase hex chars" >&2
            exit 1
          fi

      - name: Resolve GoogleSQL build mode
        id: googlesql
        # Normal release path: pass the env-pinned URL + SHA-256 to the
        # composite action, which downloads + verifies + unpacks under
        # `.cache/googlesql-prebuilt/`. The
        # `inputs.googlesql_source=true` debug path passes empty
        # strings; the action then falls back to a source clone.
        #
        # Safety gate (`fail-on-source-fallback: true` for the normal
        # release path): when the operator has NOT opted into
        # `googlesql_source=true`
        # but the env pin is somehow empty (defensive — the "Validate
        # GoogleSQL prebuilt pin" step above already refuses that case),
        # the composite action fails fast instead of silently falling back
        # to source mode mid-release.
        uses: ./.github/actions/setup-googlesql
        with:
          prebuilt-url: ${{ (github.event_name == 'workflow_dispatch' && inputs.googlesql_source) && '' || env.RELEASE_GOOGLESQL_PREBUILT_URL }}
          prebuilt-sha256: ${{ (github.event_name == 'workflow_dispatch' && inputs.googlesql_source) && '' || env.RELEASE_GOOGLESQL_PREBUILT_SHA256 }}
          fail-on-source-fallback: ${{ (github.event_name == 'workflow_dispatch' && inputs.googlesql_source) && 'false' || 'true' }}

      - name: Build C++ engine via Bazel (full GoogleSQL + DuckDB)
        # `task emulator:build-engine:bazel` reads BAZEL_JOBS /
        # BAZEL_MEM_MB from /proc; on the GitHub-hosted ubuntu-latest
        # runners that drives jobs=2..6 + memory ~= 75% of MemTotal
        # which keeps headroom for the rest of the workflow.
        #
        # EMULATOR_VERSION / EMULATOR_COMMIT / EMULATOR_BUILD_DATE
        # flow into the `:version_cc` genrule in
        # `binaries/emulator_main/BUILD.bazel` so the linked-in
        # `--version` strings match the tag this workflow is publishing.
        # `inputs.ref` covers the `workflow_dispatch` re-release path;
        # `github.ref_name` covers the `on: push: tags` path.
        env:
          EMULATOR_VERSION: ${{ inputs.ref || github.ref_name }}
          EMULATOR_COMMIT: ${{ github.sha }}
          GOOGLESQL_SOURCE: ${{ steps.googlesql.outputs.googlesql-source }}
        run: |
          export EMULATOR_BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "::notice::Release engine build with GoogleSQL ${{ steps.googlesql.outputs.mode }} (artifact_version=${{ steps.googlesql.outputs.artifact-version }} googlesql=${{ steps.googlesql.outputs.googlesql-commit }})"
          task emulator:build-engine:bazel

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Normalize repository owner (lowercase)
        id: owner
        # GHCR rejects mixed-case owners, so the owner must be
        # lowercased before tagging. `tr` is the cheap, portable
        # normalizer.
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner_lc }}/bigquery-emulator
          # `type=semver` parses the trigger tag and produces the
          # vX.Y.Z / vX.Y / vX trio; the `v` prefix matches the
          # tagFormat in `.releaserc.yml` and the README copy.
          # `latest` is suppressed for pre-release tags
          # (`!contains(github.ref, '-')` returns false for
          # v0.0.1-rc1).
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=bigquery-emulator
            org.opencontainers.image.source=https://github.com/${{ steps.owner.outputs.owner_lc }}/bigquery-emulator
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        # `continue-on-error: true` so a GHCR `permission_denied:
        # write_package` failure (the v0.0.1 cut hit this — the
        # `vantaboard` user namespace had not yet bootstrapped the
        # `bigquery-emulator` container package, so the GITHUB_TOKEN
        # had `packages: write` scope but no permission to create the
        # package) does NOT block the goreleaser step that ships the
        # gateway archives + engine binaries to the GitHub release.
        # Releases stay binary-shipped even when the Docker image push
        # is broken. Once GHCR is unblocked (manual `docker push` of a
        # placeholder under a PAT with `write:packages`, or enabling
        # "Inherit access from repository" on the package settings),
        # subsequent tag pushes get the image too. See gh#26495700505.
        continue-on-error: true
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Linux/amd64 only — engine is amd64-only (see README and the
          # release notes header). Multi-arch is out of scope.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # ENGINE_SOURCE=prebuilt tells the Dockerfile to skip the
          # in-container Bazel build and COPY `bin/emulator_main` +
          # `bin/libduckdb.so` from the build context — the previous
          # `task emulator:build-engine:bazel` step already staged both.
          # Without this, the workflow does the cold-cache GoogleSQL +
          # gRPC compile twice (once on the host, once inside the
          # `engine-builder` stage) and blows past the job timeout.
          # See the cancelled run gh#26485361700 for context.
          build-args: |
            VERSION=${{ inputs.ref || github.ref_name }}
            ENGINE_SOURCE=prebuilt

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append GoogleSQL artifact identity to release notes
        # Reproducibility: surface the exact GoogleSQL artifact this
        # release was built against so consumers can rebuild from the
        # same pin. `gh release edit --notes` overwrites the existing
        # notes, so first read goreleaser's output then append.
        #
        # The safety-gate identity widening: in addition to the URL
        # + SHA-256, we now publish the upstream tag, manifest
        # `schema_version`, `platform.libc`, and the compiler
        # `<name>-<version>` so a release reader can fully trace the
        # build back to a specific GoogleSQL artifact contract.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REL_TAG: ${{ inputs.ref || github.ref_name }}
          GSQ_MODE: ${{ steps.googlesql.outputs.mode }}
          GSQ_VER: ${{ steps.googlesql.outputs.artifact-version }}
          GSQ_COMMIT: ${{ steps.googlesql.outputs.googlesql-commit }}
          GSQ_COMMIT_FULL: ${{ steps.googlesql.outputs.googlesql-commit-full }}
          GSQ_TAG: ${{ steps.googlesql.outputs.googlesql-tag }}
          GSQ_SCHEMA: ${{ steps.googlesql.outputs.schema-version }}
          GSQ_LIBC: ${{ steps.googlesql.outputs.platform-libc }}
          GSQ_COMPILER: ${{ steps.googlesql.outputs.compiler }}
          GSQ_URL: ${{ env.RELEASE_GOOGLESQL_PREBUILT_URL }}
          GSQ_SHA: ${{ env.RELEASE_GOOGLESQL_PREBUILT_SHA256 }}
        run: |
          set -euo pipefail
          existing="$(gh release view "$REL_TAG" --json body --jq .body 2>/dev/null || echo "")"
          appended="$(mktemp)"
          {
            printf '%s\n' "$existing"
            printf '\n---\n\n## GoogleSQL build provenance\n\n'
            if [ "$GSQ_MODE" = "prebuilt" ]; then
              printf -- '- mode: **prebuilt** (release-pinned, safety-gate validated)\n'
              printf -- '- artifact_version: `%s`\n' "${GSQ_VER:-?}"
              printf -- '- googlesql commit: `%s`\n' "${GSQ_COMMIT_FULL:-${GSQ_COMMIT:-?}}"
              printf -- '- googlesql upstream tag: `%s`\n' "${GSQ_TAG:-?}"
              printf -- '- manifest schema_version: `%s`\n' "${GSQ_SCHEMA:-?}"
              printf -- '- platform.libc: `%s`\n' "${GSQ_LIBC:-?}"
              printf -- '- compiler: `%s`\n' "${GSQ_COMPILER:-?}"
              printf -- '- artifact URL: %s\n' "${GSQ_URL:-?}"
              printf -- '- artifact SHA-256: `%s`\n' "${GSQ_SHA:-?}"
              printf '\nReproduce locally with:\n\n```\ntask googlesql:fetch-prebuilt URL=%s SHA256=%s\ntask emulator:build-engine:bazel\n```\n' "${GSQ_URL}" "${GSQ_SHA}"
            else
              printf -- '- mode: **source** (debug rebuild; not the standard release path)\n'
              printf -- '- googlesql commit: `%s`\n' "${GSQ_COMMIT_FULL:-${GSQ_COMMIT:-?}}"
              printf -- '- googlesql ref: `%s`\n' "${GSQ_TAG:-?}"
            fi
          } > "$appended"
          gh release edit "$REL_TAG" --notes-file "$appended"
          rm -f "$appended"
          # Also surface in the workflow summary so the run page shows it.
          # The setup-googlesql composite already wrote a table; append a
          # second block here that ties the build to the release tag.
          {
            printf '## Release-time GoogleSQL build provenance\n\n'
            printf -- '- release tag: %s\n' "$REL_TAG"
            printf -- '- mode: %s\n' "$GSQ_MODE"
            printf -- '- artifact_version: %s\n' "${GSQ_VER:-?}"
            printf -- '- googlesql commit: %s\n' "${GSQ_COMMIT_FULL:-${GSQ_COMMIT:-?}}"
            printf -- '- googlesql tag: %s\n' "${GSQ_TAG:-?}"
            printf -- '- schema_version: %s\n' "${GSQ_SCHEMA:-?}"
            printf -- '- platform.libc: %s\n' "${GSQ_LIBC:-?}"
            printf -- '- compiler: %s\n' "${GSQ_COMPILER:-?}"
            printf -- '- artifact URL: %s\n' "${GSQ_URL:-?}"
            printf -- '- artifact SHA-256: %s\n' "${GSQ_SHA:-?}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release badge JSON
        env:
          REL_TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p gh-pages-publish
          go run ./tools/release badge --version="$REL_TAG" --out=gh-pages-publish/badge-release.json

      - name: Publish release badge to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-publish
          publish_branch: gh-pages
          enable_jekyll: false
          keep_files: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "chore(release): publish badge for ${{ inputs.ref || github.ref_name }}"

      - name: Bump README release badge cache buster
        # shields.io caches endpoint badge images by URL; bump &v= on main
        # whenever a release publishes fresh badge-release.json on gh-pages.
        env:
          REL_TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail
          cache_ver="${REL_TAG#v}"
          go run ./tools/release readme-badge --version="$REL_TAG" --readme=README.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmp="$(mktemp)"
          cp README.md "$tmp"
          git fetch origin main
          git checkout -B main origin/main
          cp "$tmp" README.md
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): bump README release badge cache buster to ${cache_ver} [skip ci]"
            git push origin main
          fi

      - name: Release Bazel daemon
        if: always()
        run: timeout 60 bazel shutdown || true
