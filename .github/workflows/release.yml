name: publish
on:
  push:
    tags:
      - v*
defaults:
  run:
    shell: bash
jobs:
  publish:
    name: Publish for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-linux-amd64
            go-version: "1.26.0"
          - os: macos-15-intel
            artifact_name: bigquery-emulator
            asset_name: bigquery-emulator-darwin-amd64
            go-version: "1.26.0"

    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: Resolve stack versions
      id: ver
      run: |
        gsql=$(awk '/github.com\/vantaboard\/go-googlesql /{print $2; exit}' go.mod)
        gsqlite=$(awk '/github.com\/vantaboard\/go-googlesqlite /{print $2; exit}' go.mod)
        echo "gsql=${gsql}" >> "$GITHUB_OUTPUT"
        echo "gsqlite=${gsqlite}" >> "$GITHUB_OUTPUT"
    - name: Checkout go-googlesql
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesql
        ref: ${{ steps.ver.outputs.gsql }}
        path: go-googlesql
    - name: Checkout go-googlesqlite
      uses: actions/checkout@v6
      with:
        repository: vantaboard/go-googlesqlite
        ref: ${{ steps.ver.outputs.gsqlite }}
        path: go-googlesqlite
    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
    - name: setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
        cache-dependency-path: go.sum
    - name: Install clang and libc++ (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends clang libc++-dev libc++abi-dev
    - name: Install bazelisk
      run: |
        go install github.com/bazelbuild/bazelisk@v1.20.0
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
    - name: extract version from tags
      id: meta
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
    - name: Default prebuilts (release tarball or Bazel)
      env:
        GOOGLESQL_VERSION: ${{ steps.ver.outputs.gsql }}
      run: bash go-googlesql/scripts/ci-download-or-build-default-prebuilts.sh go-googlesql
    - uses: rui314/setup-mold@v1
      if: runner.os == 'Linux'
    - name: cache for linux
      uses: actions/cache@v4
      if: runner.os == 'Linux'
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: cache for macOS
      uses: actions/cache@v4
      if: runner.os == 'macOS'
      with:
        path: |
          ~/Library/Caches/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: build
      run: task emulator:build
      env:
        VERSION: ${{ steps.meta.outputs.VERSION }}
        GO_GOOGLESQL_ROOT: ${{ github.workspace }}/go-googlesql
        GO_GOOGLESQLITE_ROOT: ${{ github.workspace }}/go-googlesqlite
    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ matrix.artifact_name }}
        asset_name: ${{ matrix.asset_name }}
        tag: ${{ github.ref }}
