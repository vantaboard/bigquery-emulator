# Deploy static content from the gh-pages branch to GitHub Pages.
#
# coverage-publish and bench push HTML/charts to gh-pages via
# peaceiris/actions-gh-pages; this workflow publishes that branch
# using GitHub Actions (replacing the legacy branch-based Pages
# build that emitted Node.js 20 deprecation warnings).
name: pages

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
