json_query_array: semantic_executor plan=googlesqlite-11-json.plan.md
json_value_array: semantic_executor plan=googlesqlite-11-json.plan.md
json_type: semantic_executor plan=googlesqlite-11-json.plan.md
json_extract_string_array: semantic_executor plan=googlesqlite-11-json.plan.md
parse_json: semantic_executor plan=googlesqlite-11-json.plan.md
