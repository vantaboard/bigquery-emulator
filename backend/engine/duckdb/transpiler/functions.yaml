# BigQuery -> DuckDB function disposition table.
#
# Each line is
#
#   <bq_function>: <disposition> [duckdb_name=<name>] [plan=<plan>]
#                                [status=planned]
#
# Where `<disposition>` is one of the six route names from
# `backend/engine/disposition.h` (see `node_dispositions.yaml` for
# the per-`ResolvedAST` analog):
#
#   * `duckdb_native`     - emit `<duckdb_name>(<args>)` directly.
#                            Requires `duckdb_name=...`.
#   * `duckdb_rewrite`    - emit via a structural rewrite that still
#                            lands on a DuckDB function. Requires
#                            `duckdb_name=...`. No current rows
#                            (rewrites today live in transpiler.cc
#                            outside this table); kept as a valid
#                            disposition so a future row can land
#                            here without YAML schema churn.
#   * `duckdb_udf`        - emit via a DuckDB UDF/macro registered
#                            at executor startup. Ready rows
#                            (without `status=planned`) MUST carry
#                            `duckdb_name=<NAME>`, where `<NAME>` is
#                            the registered BigQuery polyfill UDF /
#                            macro name installed by
#                            `backend/engine/duckdb/udf::RegisterAll`
#                            on every executor-opened DuckDB
#                            connection. The transpiler emits
#                            `<NAME>(<args>)` identically to a
#                            `duckdb_native` call; the UDF body owns
#                            the BigQuery semantic gap.
#                            `status=planned` rows do NOT carry
#                            `duckdb_name=` (the wrapper has not
#                            landed yet) and surface UNIMPLEMENTED.
#   * `semantic_executor` - run on the local row/value semantic
#                            executor. Until
#                            `semantic-functions-compliance.plan.md`
#                            lands, rows on this disposition surface
#                            UNIMPLEMENTED.
#   * `control_op`        - DDL/metadata; no function-table use case
#                            today but accepted by the generator.
#   * `unsupported`       - intentionally out of scope today; the
#                            engine surfaces UNIMPLEMENTED.
#                            `specialized-feature-policy.plan.md`
#                            owns these rows.
#
# Optional metadata:
#   * `plan=<plan-file>`  - owning `.cursor/plans/*.plan.md`.
#                            Mandatory for `unsupported` rows.
#   * `status=planned`    - the owning plan has not landed; the
#                            engine surfaces UNIMPLEMENTED. Only
#                            valid alongside dispositions that the
#                            transpiler does not yet emit
#                            (`duckdb_udf` / `semantic_executor` /
#                            `control_op`).
#
# Keys are case-insensitive; the loader lowercases them at parse time.
# Functions registered as both scalar (`ResolvedFunctionCall`) and
# aggregate (`ResolvedAggregateFunctionCall`) get one entry here; the
# transpiler dispatches to the right emit path based on the resolved
# node kind. SAFE.* prefix (`error_mode == SAFE_ERROR_MODE`) is not
# represented here -- the emit short-circuits to `""` so the engine
# surfaces UNIMPLEMENTED regardless of the underlying function
# disposition.
#
# Order does not affect resolution; entries are grouped by category
# for readability. Keep this file the source of truth -- the genrule
# `functions_table_inc` regenerates `functions_table.inc` from this
# YAML at build time.
#
# Planned-route policy (per the plan's "Shared Rules"): every
# previously-`kFallback` row picks the real planned route owned by
# the matching `local-execution-roadmap-index.plan.md` follow-up
# plan, with `status=planned` so the runtime keeps surfacing
# UNIMPLEMENTED until the implementation lands alongside its
# conformance fixture. The disposition does NOT get promoted off
# `status=planned` without the matching emit + conformance fixture
# landing in the same commit.

# --- Math --------------------------------------------------------------
abs: duckdb_native duckdb_name=ABS
ceil: duckdb_native duckdb_name=CEIL
ceiling: duckdb_native duckdb_name=CEIL
floor: duckdb_native duckdb_name=FLOOR
round: duckdb_native duckdb_name=ROUND
trunc: duckdb_native duckdb_name=TRUNC
sqrt: duckdb_native duckdb_name=SQRT
exp: duckdb_native duckdb_name=EXP
sign: duckdb_native duckdb_name=SIGN
greatest: duckdb_native duckdb_name=GREATEST
least: duckdb_native duckdb_name=LEAST
pi: duckdb_native duckdb_name=PI
ln: duckdb_native duckdb_name=LN
log10: duckdb_native duckdb_name=LOG10
# BigQuery LOG(X) returns the natural log (LN); DuckDB's bare
# `log(x)` returns base-10. The `bq_log` macro (registered by
# `backend/engine/duckdb/udf/numeric/numeric_macros.cc`) closes the
# single-arg gap by routing to `ln(x)` and closes the two-arg gap
# by re-deriving `bq_log(x, base)` through `ln(x) / ln(base)` (BQ's
# LOG(X, Y) takes X first, DuckDB's two-arg `log(b, x)` takes the
# base first; the identity sidesteps the ordering ambiguity).
# Edge cases the macro does NOT pin: X <= 0 or base <= 0 / 1 in
# BigQuery raise an error while DuckDB's `ln` returns NaN /
# -Infinity / NULL depending on version. Common-path correctness
# is pinned by `numeric_macros_test::LogSingleArgIsNaturalLog`,
# `LogTwoArgIdentity`, and `LogNullPropagation`; the
# error-path divergence is documented and acceptable because
# every common-path call surfaces a numerically-correct result.
log: duckdb_udf duckdb_name=bq_log plan=duckdb-polyfill-udf-library.plan.md
# BQ MOD(x, y) returns the remainder with sign-of-dividend
# (truncated-division semantics). DuckDB's `%` agrees today; the
# `bq_mod` macro (registered by
# `backend/engine/duckdb/udf/numeric/numeric_macros.cc`) pins the
# contract under our own name so a future DuckDB upgrade that
# switches `%`'s sign convention surfaces as a unit-test failure
# (`backend/engine/duckdb/udf/numeric/numeric_macros_test.cc`,
# `ModSignTracksDividend`) instead of as silent semantic drift.
mod: duckdb_udf duckdb_name=bq_mod plan=duckdb-polyfill-udf-library.plan.md
pow: duckdb_native duckdb_name=POW
power: duckdb_native duckdb_name=POW
# `sqrt_numeric` is a placeholder row for the case where BigQuery
# SQRT is called with a NUMERIC argument and the transpiler needs
# to insert an explicit cast (the analyzer resolves it to the
# bare `sqrt` function, not `sqrt_numeric`, so this row is
# effectively unreachable today). Closing this gap requires
# signature-aware function dispatch in the transpiler -- the
# current emit path looks up by lowercase function NAME only and
# does not discriminate by argument type. That's a transpiler
# architecture change, not a thin polyfill macro, so the row
# re-points at the semantic-functions plan where the
# argument-type-aware emit can be addressed alongside the other
# NUMERIC / BIGNUMERIC dispatch cases.
sqrt_numeric: semantic_executor plan=semantic-functions-compliance.plan.md status=planned
cbrt: duckdb_native duckdb_name=CBRT
is_inf: duckdb_native duckdb_name=ISINF
is_nan: duckdb_native duckdb_name=ISNAN
# BQ SAFE_DIVIDE returns NULL on /0; DuckDB raises. SAFE semantics
# are exact, not close, so the semantic executor owns these.
safe_divide: semantic_executor plan=semantic-functions-compliance.plan.md status=planned
# BQ DIV truncates toward zero; DuckDB's `//` operator is FLOOR
# division, which disagrees on mixed-sign inputs
# (`DIV(-5, 2) == -2` vs `-5 // 2 == -3`). The `bq_div` macro
# (registered by `backend/engine/duckdb/udf/numeric/numeric_macros.cc`)
# bridges with the identity `(x - x % y) // y`, which is exact integer
# division because `x - x % y` is divisible by y. Unit test
# `DivTruncatesNotFloors` pins the mixed-sign edge case.
div: duckdb_udf duckdb_name=bq_div plan=duckdb-polyfill-udf-library.plan.md
# BQ SAFE_NEGATE returns NULL on INT64 overflow; DuckDB raises.
safe_negate: semantic_executor plan=semantic-functions-compliance.plan.md status=planned

