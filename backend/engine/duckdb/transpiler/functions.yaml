# BigQuery -> DuckDB function disposition table.
#
# Each line is
#
#   <bq_function>: <disposition> [duckdb_name=<name>] [plan=<plan>]
#                                [status=planned]
#
# Where `<disposition>` is one of the six route names from
# `backend/engine/disposition.h` (see `node_dispositions.yaml` for
# the per-`ResolvedAST` analog):
#
#   * `duckdb_native`     - emit `<duckdb_name>(<args>)` directly.
#                            Requires `duckdb_name=...`.
#   * `duckdb_rewrite`    - emit via a structural rewrite that still
#                            lands on a DuckDB function. Requires
#                            `duckdb_name=...`. No current rows
#                            (rewrites today live in transpiler.cc
#                            outside this table); kept as a valid
#                            disposition so a future row can land
#                            here without YAML schema churn.
#   * `duckdb_udf`        - emit via a DuckDB UDF/macro registered
#                            at executor startup. Ready rows
#                            (without `status=planned`) MUST carry
#                            `duckdb_name=<NAME>`, where `<NAME>` is
#                            the registered BigQuery polyfill UDF /
#                            macro name installed by
#                            `backend/engine/duckdb/udf::RegisterAll`
#                            on every executor-opened DuckDB
#                            connection. The transpiler emits
#                            `<NAME>(<args>)` identically to a
#                            `duckdb_native` call; the UDF body owns
#                            the BigQuery semantic gap.
#                            `status=planned` rows do NOT carry
#                            `duckdb_name=` (the wrapper has not
#                            landed yet) and surface UNIMPLEMENTED.
#   * `semantic_executor` - run on the local row/value semantic
#                            executor. Until
#                            `googlesqlite-09-date-time.plan.md`
#                            lands, rows on this disposition surface
#                            UNIMPLEMENTED.
#   * `control_op`        - DDL/metadata; no function-table use case
#                            today but accepted by the generator.
#   * `local_stub`        - accepted at the analyzer and evaluated
#                            against a deterministic BigQuery-shaped
#                            placeholder so client-library startup
#                            probes succeed. The handler lives under
#                            `backend/engine/semantic/stubs/` (or
#                            `backend/engine/control/stubs/` for
#                            statement-level stubs). Routed through
#                            the semantic executor at runtime.
#                            `googlesqlite-15-specialized-stubs.plan.md`
#                            owns these rows.
#   * `unsupported`       - intentionally out of scope today; the
#                            engine surfaces UNIMPLEMENTED.
#                            `googlesqlite-15-specialized-stubs.plan.md`
#                            owns these rows.
#
# Optional metadata:
#   * `plan=<plan-file>`  - owning `.cursor/plans/*.plan.md`.
#                            Mandatory for `unsupported` rows.
#   * `status=planned`    - the owning plan has not landed; the
#                            engine surfaces UNIMPLEMENTED. Only
#                            valid alongside dispositions that the
#                            transpiler does not yet emit
#                            (`duckdb_udf` / `semantic_executor` /
#                            `control_op`).
#
# Keys are case-insensitive; the loader lowercases them at parse time.
# Functions registered as both scalar (`ResolvedFunctionCall`) and
# aggregate (`ResolvedAggregateFunctionCall`) get one entry here; the
# transpiler dispatches to the right emit path based on the resolved
# node kind. SAFE.* prefix (`error_mode == SAFE_ERROR_MODE`) is not
# represented here -- the emit short-circuits to `""` so the engine
# surfaces UNIMPLEMENTED regardless of the underlying function
# disposition.
#
# Order does not affect resolution; entries are grouped by category
# for readability. Keep this file the source of truth -- the genrule
# `functions_table_inc` regenerates `functions_table.inc` from this
# YAML at build time.
#
# Planned-route policy (per the plan's "Shared Rules"): every
# previously-`kFallback` row picks the real planned route owned by
# the matching `local-execution-roadmap-index.plan.md` follow-up
# plan, with `status=planned` so the runtime keeps surfacing
# UNIMPLEMENTED until the implementation lands alongside its
# conformance fixture. The disposition does NOT get promoted off
# `status=planned` without the matching emit + conformance fixture
# landing in the same commit.

# --- Internal operators (googlesqlite-03) --------------------------------
# Analyzer builtins (`$equal`, `$add`, ...) lower to SQL infix via the
# transpiler's dedicated operator emit path; `duckdb_name` carries the
# DuckDB token for parity with other `duckdb_native` rows.
$add: duckdb_native duckdb_name=+
$subtract: duckdb_native duckdb_name=-
$multiply: duckdb_native duckdb_name=*
$divide: duckdb_native duckdb_name=/
$unary_minus: duckdb_native duckdb_name=-
$equal: duckdb_native duckdb_name==
$not_equal: duckdb_native duckdb_name=!=
$less: duckdb_native duckdb_name=<
$less_or_equal: duckdb_native duckdb_name=<=
$greater: duckdb_native duckdb_name=>
$greater_or_equal: duckdb_native duckdb_name=>=
$and: duckdb_native duckdb_name=AND
$or: duckdb_native duckdb_name=OR
$not: duckdb_native duckdb_name=NOT
$is_null: duckdb_native duckdb_name=IS_NULL
$is_not_null: duckdb_native duckdb_name=IS_NOT_NULL
$like: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$between: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$in: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$is_true: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$is_not_true: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$is_false: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$is_not_false: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$is_distinct_from: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$is_not_distinct_from: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$bitwise_and: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$bitwise_or: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$bitwise_xor: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$bitwise_not: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$bitwise_left_shift: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$bitwise_right_shift: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
$interval: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
justify_days: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md
justify_hours: semantic_executor plan=googlesqlite-08-semantic-operators.plan.md

# --- Math --------------------------------------------------------------
abs: duckdb_native duckdb_name=ABS
ceil: duckdb_native duckdb_name=CEIL
ceiling: duckdb_native duckdb_name=CEIL
floor: duckdb_native duckdb_name=FLOOR
round: duckdb_native duckdb_name=ROUND
trunc: duckdb_native duckdb_name=TRUNC
sqrt: duckdb_native duckdb_name=SQRT
exp: duckdb_native duckdb_name=EXP
sign: duckdb_native duckdb_name=SIGN
greatest: duckdb_native duckdb_name=GREATEST
least: duckdb_native duckdb_name=LEAST
pi: duckdb_native duckdb_name=PI
ln: duckdb_native duckdb_name=LN
log10: duckdb_native duckdb_name=LOG10
# BigQuery LOG(X) returns the natural log (LN); DuckDB's bare
# `log(x)` returns base-10. The `bq_log` macro (registered by
# `backend/engine/duckdb/udf/numeric/numeric_macros.cc`) closes the
# single-arg gap by routing to `ln(x)` and closes the two-arg gap
# by re-deriving `bq_log(x, base)` through `ln(x) / ln(base)` (BQ's
# LOG(X, Y) takes X first, DuckDB's two-arg `log(b, x)` takes the
# base first; the identity sidesteps the ordering ambiguity).
# Edge cases the macro does NOT pin: X <= 0 or base <= 0 / 1 in
# BigQuery raise an error while DuckDB's `ln` returns NaN /
# -Infinity / NULL depending on version. Common-path correctness
# is pinned by `numeric_macros_test::LogSingleArgIsNaturalLog`,
# `LogTwoArgIdentity`, and `LogNullPropagation`; the
# error-path divergence is documented and acceptable because
# every common-path call surfaces a numerically-correct result.
log: duckdb_udf duckdb_name=bq_log plan=googlesqlite-03-operator-disposition.plan.md
# BQ MOD(x, y) returns the remainder with sign-of-dividend
# (truncated-division semantics). DuckDB's `%` agrees today; the
# `bq_mod` macro (registered by
# `backend/engine/duckdb/udf/numeric/numeric_macros.cc`) pins the
# contract under our own name so a future DuckDB upgrade that
# switches `%`'s sign convention surfaces as a unit-test failure
# (`backend/engine/duckdb/udf/numeric/numeric_macros_test.cc`,
# `ModSignTracksDividend`) instead of as silent semantic drift.
mod: duckdb_udf duckdb_name=bq_mod plan=googlesqlite-03-operator-disposition.plan.md
pow: duckdb_native duckdb_name=POW
power: duckdb_native duckdb_name=POW
# `sqrt_numeric` is a placeholder row for the case where BigQuery
# SQRT is called with a NUMERIC argument and the transpiler needs
# to insert an explicit cast (the analyzer resolves it to the
# bare `sqrt` function, not `sqrt_numeric`, so this row is
# effectively unreachable today). Closing this gap requires
# signature-aware function dispatch in the transpiler -- the
# current emit path looks up by lowercase function NAME only and
# does not discriminate by argument type. That's a transpiler
# architecture change, not a thin polyfill macro, so the row
# re-points at the semantic-functions plan where the
# argument-type-aware emit can be addressed alongside the other
# NUMERIC / BIGNUMERIC dispatch cases.
sqrt_numeric: semantic_executor plan=googlesqlite-09-date-time.plan.md status=planned
cbrt: duckdb_native duckdb_name=CBRT
is_inf: duckdb_native duckdb_name=ISINF
is_nan: duckdb_native duckdb_name=ISNAN
# BQ IEEE_DIVIDE(x, y) returns the IEEE 754 floating-point quotient
# and NEVER errors: 1.0/0.0 -> +Inf, -1.0/0.0 -> -Inf, 0.0/0.0 ->
# NaN. DuckDB's bare `/` raises on division by zero for FLOAT64,
# so a thin macro cannot match the IEEE-754 contract without
# re-implementing the special-case dispatch in macro syntax. The
# semantic executor owns the BigQuery-exact result.
# (`backend/engine/semantic/functions/numeric_edges.cc::IeeeDivide`).
ieee_divide: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ BIT_COUNT(INT64) counts the bits set in the two's-complement
# representation; `BIT_COUNT(-1) == 64`. DuckDB v1.5.3's
# `bit_count` accepts only unsigned arguments, so a thin macro
# cannot match the negative-input contract without an explicit
# cast that loses the two's-complement bit pattern. The semantic
# executor (`backend/engine/semantic/functions/numeric_edges.cc::BitCount`)
# owns the BigQuery-exact result.
bit_count: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ SAFE_DIVIDE returns NULL on /0; DuckDB raises. SAFE semantics
# are exact, not close, so the semantic executor owns these. The
# semantic executor wraps the strict `$divide` operator with a
# SAFE trampoline that converts overflow / division-by-zero into
# NULL of the FLOAT64 return type
# (`backend/engine/semantic/eval_expr.cc::DispatchFunctionByName`
# `safe_divide` case + `WrapSafe`).
safe_divide: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ DIV truncates toward zero; DuckDB's `//` operator is FLOOR
# division, which disagrees on mixed-sign inputs
# (`DIV(-5, 2) == -2` vs `-5 // 2 == -3`). The `bq_div` macro
# (registered by `backend/engine/duckdb/udf/numeric/numeric_macros.cc`)
# bridges with the identity `(x - x % y) // y`, which is exact integer
# division because `x - x % y` is divisible by y. Unit test
# `DivTruncatesNotFloors` pins the mixed-sign edge case.
div: duckdb_udf duckdb_name=bq_div plan=googlesqlite-03-operator-disposition.plan.md
# BQ SAFE_NEGATE returns NULL on INT64 overflow; DuckDB raises.
# The semantic executor wraps the strict unary-minus operator with
# the SAFE trampoline so `SAFE_NEGATE(INT64_MIN)` returns NULL
# instead of erroring out
# (`backend/engine/semantic/eval_expr.cc::DispatchFunctionByName`
# `safe_negate` case + `WrapSafe`).
safe_negate: semantic_executor plan=googlesqlite-09-date-time.plan.md

# --- String ------------------------------------------------------------
concat: duckdb_native duckdb_name=CONCAT
length: duckdb_native duckdb_name=LENGTH
char_length: duckdb_native duckdb_name=LENGTH
character_length: duckdb_native duckdb_name=LENGTH
byte_length: duckdb_native duckdb_name=OCTET_LENGTH
lower: duckdb_native duckdb_name=LOWER
upper: duckdb_native duckdb_name=UPPER
substr: duckdb_native duckdb_name=SUBSTRING
substring: duckdb_native duckdb_name=SUBSTRING
replace: duckdb_native duckdb_name=REPLACE
trim: duckdb_native duckdb_name=TRIM
ltrim: duckdb_native duckdb_name=LTRIM
rtrim: duckdb_native duckdb_name=RTRIM
lpad: duckdb_native duckdb_name=LPAD
rpad: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
# DuckDB REVERSE is VARCHAR-only; BYTES reversal is semantic.
reverse: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
ascii: duckdb_native duckdb_name=ASCII
chr: duckdb_native duckdb_name=CHR
starts_with: duckdb_native duckdb_name=STARTS_WITH
ends_with: duckdb_native duckdb_name=ENDS_WITH
to_hex: duckdb_native duckdb_name=TO_HEX
from_hex: duckdb_native duckdb_name=FROM_HEX

# --- Regex / format ----------------------------------------------------
# BigQuery's RE2 dialect differs from DuckDB's; FORMAT is %-style,
# DuckDB has PRINTF which differs subtly. The polyfill UDF library
# owns the rewrite path.
# BQ SPLIT(value [, delimiter]) returns ARRAY<STRING> of `value`'s
# substrings between non-overlapping `delimiter` occurrences. The
# delimiter defaults to `,` when omitted. DuckDB's `string_split`
# requires both arguments; the `bq_split` macro (registered by
# `backend/engine/duckdb/udf/string/string_macros.cc`) uses a
# default value (`delimiter := ','`) so both `SPLIT(v)` and
# `SPLIT(v, d)` callsites lower through the same registered name.
# Unit test `string_macros_test::SplitDefaultDelimiterIsComma` pins
# the default-delimiter contract; `SplitEmptyInputReturnsSingleEmpty`
# pins the BQ "still one element on empty input" edge.
#
# Edge cases NOT pinned by the macro (documented and acceptable):
#   * Empty delimiter (`SPLIT(v, '')`): BigQuery splits into
#     characters; DuckDB returns the input as a single-element
#     list. Hitting this case surfaces DuckDB's behavior, not
#     BigQuery's. A future polyfill iteration can close the gap
#     with a CASE arm that swaps to `regexp_split_to_array(value,
#     '')` (or equivalent) when the delimiter is empty.
#   * BYTES input: BigQuery SPLIT works on both STRING and BYTES;
#     DuckDB's `string_split` is VARCHAR-only. The BYTES path is
#     out of scope today.
split: duckdb_udf duckdb_name=bq_split plan=googlesqlite-03-operator-disposition.plan.md
# BQ REGEXP_CONTAINS(value, regex) -> BOOL. Both BigQuery and
# DuckDB v1.5.3 use RE2 for regex evaluation, so the dialects
# agree on anchoring, character classes, embedded `(?i)`
# inline flags, and backreference numbering. The `bq_regexp_contains`
# macro (registered by
# `backend/engine/duckdb/udf/regex/regex_macros.cc`) is a thin
# alias around DuckDB's `regexp_matches` that pins the contract
# under our own name. Unit tests
# `regex_macros_test::RegexpContainsAnchoredMatch`,
# `RegexpContainsCaseSensitiveByDefault`, and
# `RegexpContainsHonorsInlineFlags` guard against silent
# RE2-dialect drift.
regexp_contains: duckdb_udf duckdb_name=bq_regexp_contains plan=googlesqlite-03-operator-disposition.plan.md
# BQ REGEXP_REPLACE(value, regex, replacement) replaces ALL
# non-overlapping matches; DuckDB's `regexp_replace` defaults to
# replacing ONLY the first match. The `bq_regexp_replace` macro
# closes the gap by forwarding the `'g'` global option
# unconditionally; backreference syntax (`\1`, `\2`, ...) round-trips
# unchanged because both engines vendor RE2. Unit test
# `regex_macros_test::RegexpReplaceIsGlobal` pins the global
# contract (`'aaaa' / 'a' / 'b' -> 'bbbb'`); a regression that
# dropped the `'g'` would surface as `'baaa'`.
regexp_replace: duckdb_udf duckdb_name=bq_regexp_replace plan=googlesqlite-03-operator-disposition.plan.md
# BQ REGEXP_EXTRACT / REGEXP_EXTRACT_ALL diverge from DuckDB's
# `regexp_extract` / `regexp_extract_all` on capture-group
# semantics. BigQuery contract: "If the regular expression contains
# a capturing group, the function returns the substring matched by
# the FIRST capturing group; otherwise the entire matched
# substring." DuckDB always returns the whole match by default and
# exposes the group via a separate numeric `group` argument. A
# thin macro cannot introspect the regex pattern to choose between
# the two behaviors. The discrimination is a few lines of Go in
# the semantic executor (parse the regex, count `(...)` groups
# minus non-capturing `(?:...)`, dispatch to `regexp_extract(..., 1)`
# or `regexp_extract(..., 0)` accordingly), so the rows re-point
# at `googlesqlite-09-date-time.plan.md`.
regexp_extract: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
regexp_extract_all: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
regexp_instr: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
normalize: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
to_code_points: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
initcap: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
repeat: duckdb_native duckdb_name=REPEAT
right: duckdb_native duckdb_name=RIGHT
translate: duckdb_native duckdb_name=TRANSLATE
farm_fingerprint: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
generate_date_array: semantic_executor plan=googlesqlite-12-arrays-generators.plan.md
generate_timestamp_array: semantic_executor plan=googlesqlite-12-arrays-generators.plan.md
# BQ FORMAT is printf-style with BigQuery extensions: `%t` /
# `%T` for type-aware rendering, `%p` for parameterized
# substitution, type-specific format codes for ARRAY / STRUCT /
# JSON, and the BQ-specific `%E4Y` / `%E*Y` extended-year extensions
# carried over from FORMAT_TIMESTAMP. DuckDB's `printf` / `format`
# implement only a subset of POSIX printf and do not understand
# the BigQuery extensions. The format-spec translation table is
# non-trivial (parses the spec, dispatches per type) and is more
# naturally expressed as Go in the semantic executor.
format: semantic_executor plan=googlesqlite-10-string-hash-format.plan.md
# BQ CONTAINS_SUBSTR applies Unicode NFKC normalization plus
# case-folding to both arguments before substring search; DuckDB's
# `contains` does exact byte-level match. The gap is wider than a
# thin macro (no DuckDB NFKC primitive), so the row re-points at
# the semantic executor per the polyfill plan's "no silent
# approximation" rule.
contains_substr: semantic_executor plan=googlesqlite-09-date-time.plan.md status=planned
# BQ STRPOS returns 1-based index; DuckDB strpos agrees today. The
# `bq_strpos` macro pins the contract under our name so a future
# DuckDB upgrade flipping to 0-based would surface as a unit-test
# failure (`StrposReturnsOneBasedIndex`) instead of as a silent
# off-by-one regression.
strpos: duckdb_udf duckdb_name=bq_strpos plan=googlesqlite-03-operator-disposition.plan.md
# BQ INSTR is variadic: `INSTR(value, subvalue [, position [, occurrence]])`
# where `position` may be negative (search from the right) and
# `occurrence` selects the Nth match. DuckDB's `instr` is 2-arg
# only; the 3- and 4-arg surface needs more than a thin macro.
# Implementation lives in
# `backend/engine/semantic/functions/string_funcs.cc::Instr`; pins
# the 1-based byte-index contract for forward (position > 0) and
# reverse (position < 0) searches plus the `occurrence` Nth-match
# selector. Empty subvalue returns the clamped start position;
# missing match returns 0.
instr: semantic_executor plan=googlesqlite-09-date-time.plan.md
# DuckDB v1.5.3 does NOT ship a `soundex` scalar function (verified
# directly: `SELECT soundex('Robert')` -> Catalog Error). A thin
# macro wrapper is therefore impossible; the classic 4-character
# SOUNDEX algorithm lives in
# `backend/engine/semantic/functions/string_funcs.cc::Soundex`.
# Reference outputs pinned by `string_funcs_test.cc` cover the
# Wikipedia / BigQuery documentation examples
# (`Robert -> R163`, `Ashcraft -> A261`, `Tymczak -> T522`).
soundex: semantic_executor plan=googlesqlite-09-date-time.plan.md

# --- Datetime ----------------------------------------------------------
# Most datetime functions need interval-semantics rewriting before
# they can target DuckDB equivalents safely (month-end arithmetic,
# calendar weeks, etc.). The zero-arg `current_*` family is safe to
# map directly. The interval-arithmetic and format/parse families
# land on the polyfill UDF library.
current_timestamp: duckdb_native duckdb_name=GET_CURRENT_TIMESTAMP
current_date: duckdb_native duckdb_name=CURRENT_DATE
current_time: duckdb_native duckdb_name=CURRENT_TIME
current_datetime: duckdb_native duckdb_name=GET_CURRENT_TIMESTAMP
# BigQuery DATE(expr) truncates TIMESTAMP / DATETIME to DATE.
date: duckdb_native duckdb_name=DATE
# BQ DATE_ADD / DATE_SUB / DATETIME_ADD / DATETIME_SUB /
# TIMESTAMP_ADD / TIMESTAMP_SUB all diverge from DuckDB's
# `<value> + INTERVAL N PART` arithmetic on the MONTH-END SNAP
# semantic: BigQuery clamps the result to the last day of the
# target month when the source day-of-month doesn't exist
# (`DATE_ADD(DATE '2024-01-31', INTERVAL 1 MONTH) == DATE
# '2024-02-29'`), while DuckDB overflows into the next month
# (`DATE '2024-01-31' + INTERVAL 1 MONTH == DATE '2024-03-02'`).
# Closing the gap requires a CASE-arm rewrite that checks
# whether the resulting day exists in the target month and snaps
# to LAST_DAY when it does not -- doable as a macro, but the
# logic also has to be applied to TIMESTAMP_ADD's timezone-aware
# variant and to the QUARTER / YEAR units (BQ snaps for YEAR too:
# `DATE_ADD(DATE '2020-02-29', INTERVAL 1 YEAR) == DATE
# '2021-02-28'`). The semantic executor owns this rewrite
# alongside the rest of BigQuery-exact date arithmetic.
date_add: semantic_executor plan=googlesqlite-09-date-time.plan.md
date_sub: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ DATE_DIFF / DATETIME_DIFF / TIMESTAMP_DIFF count CALENDAR
# BOUNDARIES (not whole units): `DATE_DIFF(DATE '2024-01-31',
# DATE '2024-01-01', MONTH) == 0` because only the day-of-month
# changed within the same calendar month (BQ's "boundary crossings"
# rule), while a naive subtraction-based macro would return 30. The
# WEEK part also has a parameterizable start-of-week (defaults to
# Sunday in BQ, configurable to MONDAY .. SATURDAY), and ISOWEEK
# uses ISO-8601 week numbering. DuckDB's `date_diff` is
# elapsed-units based and does not match either contract. The
# semantic executor owns the rewrite.
date_diff: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ DATE_TRUNC / DATETIME_TRUNC / TIMESTAMP_TRUNC differ from
# DuckDB's `date_trunc(part, value)` on the calendar-week
# definitions (WEEK with Sunday vs Monday start, ISOWEEK, ISOYEAR,
# QUARTER alignment) and on the TIMESTAMP_TRUNC timezone argument
# (BQ TIMESTAMP_TRUNC takes an explicit timezone; DuckDB
# date_trunc has no zone parameter and truncates in the column's
# zone). The semantic executor owns the rewrite alongside the
# DIFF family.
date_trunc: semantic_executor plan=googlesqlite-09-date-time.plan.md
datetime_add: semantic_executor plan=googlesqlite-09-date-time.plan.md
datetime_sub: semantic_executor plan=googlesqlite-09-date-time.plan.md
datetime_diff: semantic_executor plan=googlesqlite-09-date-time.plan.md
timestamp_add: semantic_executor plan=googlesqlite-09-date-time.plan.md
timestamp_sub: semantic_executor plan=googlesqlite-09-date-time.plan.md
timestamp_diff: semantic_executor plan=googlesqlite-09-date-time.plan.md
timestamp_trunc: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ EXTRACT(part FROM value) has BigQuery-specific parts
# (DATE / TIME / DATETIME extraction from a TIMESTAMP at a
# specified timezone, ISOYEAR, ISOWEEK, MICROSECOND with
# explicit precision, DAYOFYEAR / DAYOFWEEK with BQ's
# Sunday-is-1 convention). DuckDB's `extract` covers a different
# subset and uses ISO-8601 conventions where BQ uses the
# Sunday-start convention. A thin macro cannot translate the
# part token between dialects without losing edge cases.
extract: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ FORMAT_TIMESTAMP / FORMAT_DATE / FORMAT_DATETIME and the
# matching PARSE_* family use BigQuery's extended strftime
# specification (`%E4Y` for 4-digit zero-padded year, `%E*S` for
# fractional seconds with adaptive precision, `%Q` for quarter,
# `%Ez` for ISO-8601 timezone, `%Z` for IANA timezone name) on
# top of POSIX strftime. DuckDB's `strftime` / `strptime`
# implement the POSIX core but not the `%E*` / `%Q` / `%Ez`
# extensions. The format-spec translation table is doable but
# extensive (each spec needs a translated emit + a fallback for
# unsupported specs); more naturally expressed in Go.
format_timestamp: semantic_executor plan=googlesqlite-09-date-time.plan.md status=planned
format_date: semantic_executor plan=googlesqlite-09-date-time.plan.md status=planned
format_datetime: semantic_executor plan=googlesqlite-09-date-time.plan.md status=planned
parse_date: semantic_executor plan=googlesqlite-09-date-time.plan.md
parse_timestamp: semantic_executor plan=googlesqlite-09-date-time.plan.md
parse_datetime: semantic_executor plan=googlesqlite-09-date-time.plan.md
# BQ UNIX_SECONDS(timestamp) returns BIGINT seconds since
# 1970-01-01 UTC with sub-second precision truncated. DuckDB's
# `epoch(timestamp)` returns DOUBLE; the `bq_unix_seconds` macro
# (registered by
# `backend/engine/duckdb/udf/datetime/datetime_macros.cc`) casts
# the result to BIGINT (truncates toward zero, matching BQ for
# positive epoch values). Unit test
# `datetime_macros_test::UnixSecondsTruncatesSubsecond` pins the
# truncation contract.
unix_seconds: duckdb_udf duckdb_name=bq_unix_seconds plan=googlesqlite-03-operator-disposition.plan.md
# BQ UNIX_MILLIS / UNIX_MICROS map cleanly to DuckDB's already-
# BIGINT `epoch_ms` / `epoch_us`. The macros pin the contract
# under our own name so a future DuckDB precision drift would
# surface as a unit-test failure.
unix_millis: duckdb_udf duckdb_name=bq_unix_millis plan=googlesqlite-03-operator-disposition.plan.md
unix_micros: duckdb_udf duckdb_name=bq_unix_micros plan=googlesqlite-03-operator-disposition.plan.md
# BQ UNIX_DATE(date) returns BIGINT days since 1970-01-01.
# `date_diff('day', '1970-01-01'::DATE, value)` is calendar-day-
# boundary counted, matching the BQ contract exactly (including
# negative values for pre-epoch dates).
unix_date: duckdb_udf duckdb_name=bq_unix_date plan=googlesqlite-03-operator-disposition.plan.md

# --- Conditional / null-handling --------------------------------------
ifnull: duckdb_native duckdb_name=IFNULL
coalesce: duckdb_native duckdb_name=COALESCE
nullif: duckdb_native duckdb_name=NULLIF
# BQ IF(cond, a, b) returns A when cond is TRUE and B otherwise; a
# NULL cond falls through to B. The `bq_if` macro pins that contract
# via `CASE WHEN cond THEN A ELSE B END`; unit test
# `IfNullCondFallsThroughToElse` guards the NULL-cond edge case.
if: duckdb_udf duckdb_name=bq_if plan=googlesqlite-03-operator-disposition.plan.md
# BQ ISNULL(x) is the call-form of the `IS NULL` operator. The
# `bq_isnull` macro pins the contract via `(x IS NULL)`; unit test
# `IsNullOnNonNullValues` pins the empty-string-is-not-NULL case.
isnull: duckdb_udf duckdb_name=bq_isnull plan=googlesqlite-03-operator-disposition.plan.md

# --- Array -------------------------------------------------------------
array_length: duckdb_native duckdb_name=LEN
array_to_string: duckdb_native duckdb_name=ARRAY_TO_STRING
array_concat: duckdb_native duckdb_name=ARRAY_CONCAT
array_reverse: duckdb_native duckdb_name=ARRAY_REVERSE
generate_array: duckdb_native duckdb_name=GENERATE_SERIES

# --- Aggregation -------------------------------------------------------
# The transpiler routes aggregates through `EmitAggregateFunctionCall`,
# which still owns the DISTINCT / ORDER BY / HAVING modifier
# rejection (those have no native DuckDB OVER analog yet). Entries
# here only control whether the bare aggregate name lowers cleanly.
count: duckdb_native duckdb_name=COUNT
sum: duckdb_native duckdb_name=SUM
avg: duckdb_native duckdb_name=AVG
min: duckdb_native duckdb_name=MIN
max: duckdb_native duckdb_name=MAX
any_value: duckdb_native duckdb_name=ANY_VALUE
# ORDER BY / LIMIT modifiers rewrite to list()/list_slice() (and
# array_to_string for STRING_AGG LIMIT) in EmitAggregateFunctionCall
# — see googlesqlite-06-aggregate-modifiers.plan.md.
array_agg: duckdb_rewrite duckdb_name=ARRAY_AGG
string_agg: duckdb_rewrite duckdb_name=STRING_AGG
# BQ COUNTIF(b) returns the count of TRUE values for `b`; NULL and
# FALSE values are not counted. DuckDB v1.5.3 ships an aggregate
# `count_if(arg)` with identical semantics ("Returns the number of
# times when arg has been TRUE"). The two agree on NULL handling
# (DuckDB count_if does not count NULL, matching BQ). Routed as
# `duckdb_native` directly -- no macro layer needed because the
# DuckDB function name maps 1:1 to the BigQuery contract; a
# regression that drifted DuckDB's count_if behavior would surface
# in the per-function conformance fixture under
# `conformance/fixtures/functions/aggregate/function_countif.yaml`.
countif: duckdb_native duckdb_name=COUNT_IF
logical_and: duckdb_native duckdb_name=BOOL_AND
logical_or: duckdb_native duckdb_name=BOOL_OR
bit_and: duckdb_native duckdb_name=BIT_AND
bit_or: duckdb_native duckdb_name=BIT_OR
bit_xor: duckdb_native duckdb_name=BIT_XOR

# --- Window functions --------------------------------------------------
# Ranking analytics route through `EmitAnalyticFunctionCall`. Listed
# here so `LookupFunction` agrees the disposition is "lower it"
# rather than "fall back".
row_number: duckdb_native duckdb_name=ROW_NUMBER
rank: duckdb_native duckdb_name=RANK
dense_rank: duckdb_native duckdb_name=DENSE_RANK
percent_rank: duckdb_native duckdb_name=PERCENT_RANK
cume_dist: duckdb_native duckdb_name=CUME_DIST
ntile: duckdb_native duckdb_name=NTILE
lag: duckdb_native duckdb_name=LAG
lead: duckdb_native duckdb_name=LEAD
first_value: duckdb_native duckdb_name=FIRST_VALUE
last_value: duckdb_native duckdb_name=LAST_VALUE
nth_value: duckdb_native duckdb_name=NTH_VALUE
percentile_cont: duckdb_native duckdb_name=quantile_cont
percentile_disc: duckdb_native duckdb_name=quantile_disc

# Internal extract/subscript operators lowered by the semantic executor.
$extract: semantic_executor plan=googlesqlite-09-date-time.plan.md
$subscript: duckdb_rewrite duckdb_name=$subscript

# --- Specialized families: stub-and-defer -----------------------------
# These rows pick the per-family posture documented by
# `googlesqlite-15-specialized-stubs.plan.md`'s scope table.
#
# `unsupported` rows: deliberately out of scope today; the engine
#   surfaces UNIMPLEMENTED with a family-named, doc-linking error
#   from `UnsupportedExecutor`. Promoting one of these to a real
#   route requires the matching plan from
#   `local-execution-roadmap-index.plan.md` to land alongside its
#   conformance fixture.
#
# `semantic_executor status=planned` rows: graduated from
#   `unsupported` to `local_impl` by the specialized-feature
#   policy plan; the actual implementation is deferred to
#   `googlesqlite-09-date-time.plan.md`. Until that plan ships
#   its handler, the engine surfaces UNIMPLEMENTED with the
#   per-family "planned, waiting for ..." pointer (same surface as
#   any other `status=planned` semantic-executor function).
#
# `local_stub` rows: accepted at the analyzer and evaluated against
#   a deterministic BigQuery-shaped placeholder so client-library
#   startup probes can succeed. The handler lives under
#   `backend/engine/semantic/stubs/`. Promoting one of these to a
#   real local implementation requires a follow-up plan; the row
#   stays on `local_stub` until then so the runtime behavior is
#   "succeeds with placeholder", not "silent approximation".

# Anonymized / differential-privacy / threshold aggregates. No
# stub: DP semantics are too easy to get wrong by accident, and a
# placeholder result would mask the missing implementation. The
# `unsupported` row is the no-silent-approximation choice.
approx_quantiles: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
approx_count_distinct: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
approx_top_count: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
approx_top_sum: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md

# Internal array subscript helpers (OFFSET/ORDINAL) for semantic path.
$array_at_offset: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md

# HLL_COUNT.* graduates to `local_impl` (semantic executor) per the
# specialized-feature plan. The HLL algorithm is small, deterministic,
# and seedable; `googlesqlite-09-date-time.plan.md` owns the
# actual implementation. Until that plan ships its handler the
# engine surfaces a per-function `status=planned` UNIMPLEMENTED.
hll_count.init: semantic_executor plan=googlesqlite-09-date-time.plan.md
hll_count.merge: semantic_executor plan=googlesqlite-09-date-time.plan.md
hll_count.merge_partial: semantic_executor plan=googlesqlite-09-date-time.plan.md
hll_count.extract: semantic_executor plan=googlesqlite-09-date-time.plan.md

# BigQuery ML inference: `unsupported`. There is no local model
# training / serving surface, and a stub `ML.PREDICT` would lie
# about producing inference results. `CREATE MODEL` itself routes
# to `kLocalStub` at the statement level (see
# `node_dispositions.yaml::ResolvedCreateModelStmt`) so client
# library registration probes succeed; calling `ML.PREDICT` on the
# stub-registered model returns the family-named UNIMPLEMENTED.
ml.predict: unsupported plan=googlesqlite-15-specialized-stubs.plan.md
ml.forecast: unsupported plan=googlesqlite-15-specialized-stubs.plan.md
ml.evaluate: unsupported plan=googlesqlite-15-specialized-stubs.plan.md

