net.ip_from_string: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
net.safe_ip_from_string: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
net.ip_to_string: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
net.ip_net_mask: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
net.ip_trunc: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
net.ipv4_from_int64: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
net.ipv4_to_int64: semantic_executor plan=googlesqlite-15-specialized-stubs.plan.md
net.host: semantic_executor plan=googlesqlite-09-date-time.plan.md
net.public_suffix: semantic_executor plan=googlesqlite-09-date-time.plan.md
