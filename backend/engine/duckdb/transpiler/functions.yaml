# --- Aggregation -------------------------------------------------------
# The transpiler routes aggregates through `EmitAggregateFunctionCall`,
# which still owns the DISTINCT / ORDER BY / HAVING modifier
# rejection (those have no native DuckDB OVER analog yet). Entries
# here only control whether the bare aggregate name lowers cleanly.
count: duckdb_native duckdb_name=COUNT
sum: duckdb_native duckdb_name=SUM
avg: duckdb_native duckdb_name=AVG
min: duckdb_native duckdb_name=MIN
max: duckdb_native duckdb_name=MAX
stddev_samp: duckdb_native duckdb_name=STDDEV_SAMP
variance: duckdb_native duckdb_name=VAR_SAMP
var_samp: duckdb_native duckdb_name=VAR_SAMP
any_value: duckdb_native duckdb_name=ANY_VALUE
# ORDER BY / LIMIT modifiers rewrite to list()/list_slice() (and
# array_to_string for STRING_AGG LIMIT) in EmitAggregateFunctionCall
# — see docs/ENGINE_POLICY.md.
array_agg: duckdb_rewrite duckdb_name=ARRAY_AGG
string_agg: duckdb_rewrite duckdb_name=STRING_AGG
# BQ COUNTIF(b) returns the count of TRUE values for `b`; NULL and
# FALSE values are not counted. DuckDB v1.5.3 ships an aggregate
# `count_if(arg)` with identical semantics ("Returns the number of
# times when arg has been TRUE"). The two agree on NULL handling
# (DuckDB count_if does not count NULL, matching BQ). Routed as
# `duckdb_native` directly -- no macro layer needed because the
# DuckDB function name maps 1:1 to the BigQuery contract; a
# regression that drifted DuckDB's count_if behavior would surface
# in the per-function conformance fixture under
# `conformance/fixtures/functions/aggregate/function_countif.yaml`.
countif: duckdb_native duckdb_name=COUNT_IF
# AGG(<measure>) expands via the analyzer's measure rewrite into
# multi-level aggregates; the semantic executor evaluates the result.
agg: semantic_executor
logical_and: duckdb_native duckdb_name=BOOL_AND
logical_or: duckdb_native duckdb_name=BOOL_OR
bit_and: duckdb_native duckdb_name=BIT_AND
bit_or: duckdb_native duckdb_name=BIT_OR
bit_xor: duckdb_native duckdb_name=BIT_XOR

# --- Window functions --------------------------------------------------
# Ranking analytics route through `EmitAnalyticFunctionCall`. Listed
# here so `LookupFunction` agrees the disposition is "lower it"
# rather than "fall back".
row_number: duckdb_native duckdb_name=ROW_NUMBER
rank: duckdb_native duckdb_name=RANK
dense_rank: duckdb_native duckdb_name=DENSE_RANK
percent_rank: duckdb_native duckdb_name=PERCENT_RANK
cume_dist: duckdb_native duckdb_name=CUME_DIST
ntile: duckdb_native duckdb_name=NTILE
lag: duckdb_native duckdb_name=LAG
lead: duckdb_native duckdb_name=LEAD
first_value: duckdb_native duckdb_name=FIRST_VALUE
last_value: duckdb_native duckdb_name=LAST_VALUE
nth_value: duckdb_native duckdb_name=NTH_VALUE
percentile_cont: duckdb_native duckdb_name=quantile_cont
percentile_disc: duckdb_native duckdb_name=quantile_disc

# Internal extract/subscript operators lowered by the semantic executor.
$extract: duckdb_udf duckdb_name=bq_extract
$subscript: duckdb_rewrite duckdb_name=$subscript

# --- Specialized families: stub-and-defer -----------------------------
# These rows pick the per-family posture documented by
# `docs/ENGINE_POLICY.md`'s scope table.
#
# `unsupported` rows: deliberately out of scope today; the engine
#   surfaces UNIMPLEMENTED with a family-named, doc-linking error
#   from `UnsupportedExecutor`. Promoting one of these to a real
#   route requires the matching plan from
#   `docs/ENGINE_POLICY.md` to land alongside its
#   conformance fixture.
#
# `semantic_executor status=planned` rows: graduated from
#   `unsupported` to `local_impl` by the specialized-feature
#   policy plan; the actual implementation is deferred to
#   `docs/ENGINE_POLICY.md`. Until the handler ships
#   its handler, the engine surfaces UNIMPLEMENTED with the
#   per-family "planned, waiting for ..." pointer (same surface as
#   any other `status=planned` semantic-executor function).
#
# `local_stub` rows: accepted at the analyzer and evaluated against
#   a deterministic BigQuery-shaped placeholder so client-library
#   startup probes can succeed. The handler lives under
#   `backend/engine/semantic/stubs/`. Promoting one of these to a
#   real local implementation requires a follow-up plan; the row
#   stays on `local_stub` until then so the runtime behavior is
#   "succeeds with placeholder", not "silent approximation".

# Approximate aggregation. NOT differential privacy: these compute
# exact results on the semantic executor
# (`backend/engine/semantic/functions/aggregate_specialized.cc`).
# The differential-privacy / anonymized aggregate *scans*
# (`ResolvedAnonymizedAggregateScan`, ...) are `local_stub` rows in
# `node_dispositions.yaml`: privacy modifiers are stripped and the
# plain aggregate is evaluated on the semantic executor (NOT
# differential privacy — see `docs/ENGINE_POLICY.md`).
approx_quantiles: semantic_executor
approx_count_distinct: semantic_executor
approx_top_count: semantic_executor
approx_top_sum: semantic_executor
# Internal array subscript helpers (OFFSET/ORDINAL) for semantic path.
$array_at_offset: semantic_executor

# ARRAY_TRANSFORM / ARRAY_FILTER are ZetaSQL inline-lambda builtins the
# analyzer still resolves under EnableMaximumLanguageFeaturesForDevelopment,
# but BigQuery (PRODUCT_EXTERNAL) does not expose them (verified via bq
# dry-run: "Function not found: ARRAY_TRANSFORM" / "ARRAY_FILTER"). Marked
# `unsupported` so they surface UNIMPLEMENTED instead of executing.
array_transform: unsupported
array_filter: unsupported

# HLL_COUNT.* uses a local sketch wire format (not byte-compatible
# with cloud BigQuery); see `docs/ENGINE_POLICY.md`. Implemented in
# `backend/engine/semantic/functions/hll_funcs.cc`.
hll_count.init: semantic_executor
hll_count.merge: semantic_executor
hll_count.merge_partial: semantic_executor
hll_count.extract: semantic_executor

# KLL_QUANTILES.* uses a local sketch wire format wrapping Apache
# DataSketches KLL (not byte-compatible with cloud BigQuery); see
# `docs/ENGINE_POLICY.md`. Implemented in
# `backend/engine/semantic/functions/kll_funcs.cc`.
kll_quantiles.init_int64: semantic_executor
kll_quantiles.init_float64: semantic_executor
kll_quantiles.merge_int64: semantic_executor
kll_quantiles.merge_float64: semantic_executor
kll_quantiles.merge_partial: semantic_executor
kll_quantiles.merge_point_int64: semantic_executor
kll_quantiles.merge_point_float64: semantic_executor
kll_quantiles.extract_int64: semantic_executor
kll_quantiles.extract_float64: semantic_executor
kll_quantiles.extract_point_int64: semantic_executor
kll_quantiles.extract_point_float64: semantic_executor

# BigQuery ML inference: `local_stub`. There is no local model
# training / serving surface; these TVFs return schema-correct
# placeholder rows (NULL predicted / metric / forecast values) so
# queries referencing `ML.PREDICT` / `ML.FORECAST` / `ML.EVALUATE`
# do not fail. `CREATE MODEL` routes to `kLocalStub` at the
# statement level (see `node_dispositions.yaml::ResolvedCreateModelStmt`).
ml.predict: local_stub
ml.forecast: local_stub
ml.evaluate: local_stub

# NET.* IP / URL parsing on the semantic executor via
# `backend/engine/semantic/functions/net_funcs.cc`.
net.ip_from_string: semantic_executor
net.safe_ip_from_string: semantic_executor
net.ip_to_string: semantic_executor
net.ip_net_mask: semantic_executor
net.ip_trunc: semantic_executor
net.ipv4_from_int64: semantic_executor
net.ipv4_to_int64: semantic_executor
net.host: semantic_executor
net.public_suffix: semantic_executor
net.reg_domain: semantic_executor
string: semantic_executor
normalize_and_casefold: semantic_executor

# KEYS.* is `local_stub` per the specialized-feature plan: the
# emulator does not implement real keysets, but accepting the
# function call with a deterministic placeholder lets client-
# library bootstrap probes succeed. The handler lives in
# `backend/engine/semantic/stubs/keys.{h,cc}`. (BigQuery has no
# `KEYS.ENCRYPT` / `KEYS.DECRYPT_BYTES`; encryption is the `AEAD.*`
# family, which the emulator does not model.)
keys.new_keyset: local_stub
keys.keyset_length: local_stub

# Geography / GIS MVP: WKT-backed GEOGRAPHY values on the semantic
# executor (WGS84 spherical haversine + planar point-in-polygon for
# predicates). DuckDB `spatial` can close remaining gaps later.
st_geogpoint: semantic_executor
st_geogfromtext: semantic_executor
st_geogfromwkb: semantic_executor
st_astext: semantic_executor
st_distance: semantic_executor
st_within: semantic_executor
st_contains: semantic_executor
st_intersects: semantic_executor

# --- JSON  -------------------------------------------
# BigQuery JSON extract/query/value functions diverge from DuckDB's
# `json_extract` / `->` operators on path syntax, NULL propagation,
# and scalar-vs-JSON return typing. The semantic executor delegates
# to GoogleSQL's `JsonPathEvaluator` for BigQuery-exact behavior.
json_extract: semantic_executor
json_query: semantic_executor
json_value: semantic_executor
json_extract_scalar: semantic_executor
json_extract_array: semantic_executor
json_query_array: semantic_executor
json_value_array: semantic_executor
json_type: semantic_executor
json_extract_string_array: semantic_executor
parse_json: semantic_executor
# RANGE<> type algebra (DATE / DATETIME / TIMESTAMP bounds).
range: semantic_executor
range_start: semantic_executor
range_end: semantic_executor
range_overlaps: semantic_executor

to_json: semantic_executor
to_json_string: semantic_executor

# Misc BigQuery-specific scalars. `GENERATE_UUID` is non-deterministic
# and evaluates on the semantic executor (RFC-4122 v4 per call).
# `SESSION_USER` has no analog in the emulator's no-auth posture and
# stays `unsupported`. `ERROR(msg)` is a control-flow function whose
# semantics belong to the procedural scripting executor
# (`docs/ENGINE_POLICY.md`); it evaluates on the semantic executor.
generate_uuid: semantic_executor
session_user: local_stub
error: semantic_executor
