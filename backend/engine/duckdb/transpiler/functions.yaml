# --- Regex / format ----------------------------------------------------
# BigQuery's RE2 dialect differs from DuckDB's; FORMAT is %-style,
# DuckDB has PRINTF which differs subtly. The polyfill UDF library
# owns the rewrite path.
# BQ SPLIT(value [, delimiter]) returns ARRAY<STRING> of `value`'s
# substrings between non-overlapping `delimiter` occurrences. The
# delimiter defaults to `,` when omitted. DuckDB's `string_split`
# requires both arguments; the `bq_split` macro (registered by
# `backend/engine/duckdb/udf/string/string_macros.cc`) uses a
# default value (`delimiter := ','`) so both `SPLIT(v)` and
# `SPLIT(v, d)` callsites lower through the same registered name.
# Unit test `string_macros_test::SplitDefaultDelimiterIsComma` pins
# the default-delimiter contract; `SplitEmptyInputReturnsSingleEmpty`
# pins the BQ "still one element on empty input" edge.
#
# Edge cases NOT pinned by the macro (documented and acceptable):
#   * Empty delimiter (`SPLIT(v, '')`): BigQuery splits into
#     characters; DuckDB returns the input as a single-element
#     list. Hitting this case surfaces DuckDB's behavior, not
#     BigQuery's. A future polyfill iteration can close the gap
#     with a CASE arm that swaps to `regexp_split_to_array(value,
#     '')` (or equivalent) when the delimiter is empty.
#   * BYTES input: BigQuery SPLIT works on both STRING and BYTES;
#     DuckDB's `string_split` is VARCHAR-only. The BYTES path is
#     out of scope today.
split: duckdb_udf duckdb_name=bq_split
# BQ REGEXP_CONTAINS(value, regex) -> BOOL. Both BigQuery and
# DuckDB v1.5.3 use RE2 for regex evaluation, so the dialects
# agree on anchoring, character classes, embedded `(?i)`
# inline flags, and backreference numbering. The `bq_regexp_contains`
# macro (registered by
# `backend/engine/duckdb/udf/regex/regex_macros.cc`) is a thin
# alias around DuckDB's `regexp_matches` that pins the contract
# under our own name. Unit tests
# `regex_macros_test::RegexpContainsAnchoredMatch`,
# `RegexpContainsCaseSensitiveByDefault`, and
# `RegexpContainsHonorsInlineFlags` guard against silent
# RE2-dialect drift.
regexp_contains: duckdb_udf duckdb_name=bq_regexp_contains
# BQ REGEXP_REPLACE(value, regex, replacement) replaces ALL
# non-overlapping matches; DuckDB's `regexp_replace` defaults to
# replacing ONLY the first match. The `bq_regexp_replace` macro
# closes the gap by forwarding the `'g'` global option
# unconditionally; backreference syntax (`\1`, `\2`, ...) round-trips
# unchanged because both engines vendor RE2. Unit test
# `regex_macros_test::RegexpReplaceIsGlobal` pins the global
# contract (`'aaaa' / 'a' / 'b' -> 'bbbb'`); a regression that
# dropped the `'g'` would surface as `'baaa'`.
regexp_replace: duckdb_udf duckdb_name=bq_regexp_replace
# BQ REGEXP_EXTRACT / REGEXP_EXTRACT_ALL diverge from DuckDB's
# `regexp_extract` / `regexp_extract_all` on capture-group
# semantics. BigQuery contract: "If the regular expression contains
# a capturing group, the function returns the substring matched by
# the FIRST capturing group; otherwise the entire matched
# substring." DuckDB always returns the whole match by default and
# exposes the group via a separate numeric `group` argument. A
# thin macro cannot introspect the regex pattern to choose between
# the two behaviors. The discrimination is a few lines of Go in
# the semantic executor (parse the regex, count `(...)` groups
# minus non-capturing `(?:...)`, dispatch to `regexp_extract(..., 1)`
# or `regexp_extract(..., 0)` accordingly), so the rows re-point
# at `docs/ENGINE_POLICY.md`.
regexp_extract: semantic_executor
regexp_extract_all: semantic_executor
regexp_instr: semantic_executor
normalize: semantic_executor
to_code_points: semantic_executor
initcap: semantic_executor
repeat: duckdb_native duckdb_name=REPEAT
right: duckdb_native duckdb_name=RIGHT
translate: semantic_executor
farm_fingerprint: duckdb_native duckdb_name=hash
rand: duckdb_native duckdb_name=random
generate_date_array: semantic_executor
generate_timestamp_array: semantic_executor
# BQ FORMAT is printf-style with BigQuery extensions: `%t` /
# `%T` for type-aware rendering, `%p` for parameterized
# substitution, type-specific format codes for ARRAY / STRUCT /
# JSON, and the BQ-specific `%E4Y` / `%E*Y` extended-year extensions
# carried over from FORMAT_TIMESTAMP. DuckDB's `printf` / `format`
# implement only a subset of POSIX printf and do not understand
# the BigQuery extensions. The format-spec translation table is
# non-trivial (parses the spec, dispatches per type) and is more
# naturally expressed as Go in the semantic executor.
format: semantic_executor
# BQ CONTAINS_SUBSTR applies Unicode NFKC normalization plus
# case-folding to both arguments before substring search; DuckDB's
# `contains` does exact byte-level match. The semantic executor
# (`backend/engine/semantic/functions/contains_substr.cc`) owns the
# recursive STRUCT / ARRAY search and the NULL-in-composite
# propagation contract documented in BigQuery's string_functions
# reference.
contains_substr: semantic_executor
# BQ STRPOS returns 1-based index; DuckDB strpos agrees today. The
# `bq_strpos` macro pins the contract under our name so a future
# DuckDB upgrade flipping to 0-based would surface as a unit-test
# failure (`StrposReturnsOneBasedIndex`) instead of as a silent
# off-by-one regression.
strpos: duckdb_udf duckdb_name=bq_strpos
# BQ INSTR is variadic: `INSTR(value, subvalue [, position [, occurrence]])`
# where `position` may be negative (search from the right) and
# `occurrence` selects the Nth match. DuckDB's `instr` is 2-arg
# only; the 3- and 4-arg surface needs more than a thin macro.
# Implementation lives in
# `backend/engine/semantic/functions/string_funcs.cc::Instr`; pins
# the 1-based byte-index contract for forward (position > 0) and
# reverse (position < 0) searches plus the `occurrence` Nth-match
# selector. Empty subvalue returns the clamped start position;
# missing match returns 0.
instr: semantic_executor
# DuckDB v1.5.3 does NOT ship a `soundex` scalar function (verified
# directly: `SELECT soundex('Robert')` -> Catalog Error). A thin
# macro wrapper is therefore impossible; the classic 4-character
# SOUNDEX algorithm lives in
# `backend/engine/semantic/functions/string_funcs.cc::Soundex`.
# Reference outputs pinned by `string_funcs_test.cc` cover the
# Wikipedia / BigQuery documentation examples
# (`Robert -> R163`, `Ashcraft -> A261`, `Tymczak -> T522`).
soundex: semantic_executor

# --- Datetime ----------------------------------------------------------
# Most datetime functions need interval-semantics rewriting before
# they can target DuckDB equivalents safely (month-end arithmetic,
# calendar weeks, etc.). The zero-arg `current_*` family is safe to
# map directly. The interval-arithmetic and format/parse families
# land on the polyfill UDF library.
current_timestamp: duckdb_native duckdb_name=GET_CURRENT_TIMESTAMP
current_date: duckdb_native duckdb_name=CURRENT_DATE
current_time: duckdb_native duckdb_name=CURRENT_TIME
current_datetime: duckdb_native duckdb_name=GET_CURRENT_TIMESTAMP
# BigQuery DATE(expr) truncates TIMESTAMP / DATETIME to DATE.
date: duckdb_native duckdb_name=DATE
# BigQuery TIMESTAMP(string) / TIMESTAMP(datetime[, tz]) constructors.
timestamp: duckdb_native duckdb_name=TIMESTAMP
# BQ DATE_ADD / DATE_SUB / DATETIME_ADD / DATETIME_SUB /
# TIMESTAMP_ADD / TIMESTAMP_SUB all diverge from DuckDB's
# `<value> + INTERVAL N PART` arithmetic on the MONTH-END SNAP
# semantic: BigQuery clamps the result to the last day of the
# target month when the source day-of-month doesn't exist
# (`DATE_ADD(DATE '2024-01-31', INTERVAL 1 MONTH) == DATE
# '2024-02-29'`), while DuckDB overflows into the next month
# (`DATE '2024-01-31' + INTERVAL 1 MONTH == DATE '2024-03-02'`).
# Closing the gap requires a CASE-arm rewrite that checks
# whether the resulting day exists in the target month and snaps
# to LAST_DAY when it does not -- doable as a macro, but the
# logic also has to be applied to TIMESTAMP_ADD's timezone-aware
# variant and to the QUARTER / YEAR units (BQ snaps for YEAR too:
# `DATE_ADD(DATE '2020-02-29', INTERVAL 1 YEAR) == DATE
# '2021-02-28'`). The semantic executor owns this rewrite
# alongside the rest of BigQuery-exact date arithmetic.
date_add: duckdb_udf duckdb_name=bq_date_add
date_sub: semantic_executor
# BQ DATE_DIFF / DATETIME_DIFF / TIMESTAMP_DIFF count CALENDAR
# BOUNDARIES (not whole units): `DATE_DIFF(DATE '2024-01-31',
# DATE '2024-01-01', MONTH) == 0` because only the day-of-month
# changed within the same calendar month (BQ's "boundary crossings"
# rule), while a naive subtraction-based macro would return 30. The
# WEEK part also has a parameterizable start-of-week (defaults to
# Sunday in BQ, configurable to MONDAY .. SATURDAY), and ISOWEEK
# uses ISO-8601 week numbering. DuckDB's `date_diff` is
# elapsed-units based and does not match either contract. The
# semantic executor owns the rewrite.
date_diff: semantic_executor
# BQ DATE_TRUNC / DATETIME_TRUNC / TIMESTAMP_TRUNC differ from
# DuckDB's `date_trunc(part, value)` on the calendar-week
# definitions (WEEK with Sunday vs Monday start, ISOWEEK, ISOYEAR,
# QUARTER alignment) and on the TIMESTAMP_TRUNC timezone argument
# (BQ TIMESTAMP_TRUNC takes an explicit timezone; DuckDB
# date_trunc has no zone parameter and truncates in the column's
# zone). The semantic executor owns the rewrite alongside the
# DIFF family.
date_trunc: semantic_executor
datetime_add: semantic_executor
datetime_sub: semantic_executor
datetime_diff: semantic_executor
timestamp_add: semantic_executor
timestamp_sub: semantic_executor
timestamp_diff: semantic_executor
timestamp_trunc: semantic_executor
timestamp_bucket: semantic_executor
# BQ EXTRACT(part FROM value) has BigQuery-specific parts
# (DATE / TIME / DATETIME extraction from a TIMESTAMP at a
# specified timezone, ISOYEAR, ISOWEEK, MICROSECOND with
# explicit precision, DAYOFYEAR / DAYOFWEEK with BQ's
# Sunday-is-1 convention). DuckDB's `extract` covers a different
# subset and uses ISO-8601 conventions where BQ uses the
# Sunday-start convention. A thin macro cannot translate the
# part token between dialects without losing edge cases.
extract: duckdb_udf duckdb_name=bq_extract
# BQ FORMAT_TIMESTAMP / FORMAT_DATE / FORMAT_DATETIME use BigQuery's
# extended strftime specification (`%E4Y`, `%E*S`, `%Q`, `%Ez`, `%Z`).
# DuckDB's `strftime` / `strptime` implement the POSIX core but not
# the `%E*` / `%Q` / `%Ez` extensions. The semantic executor delegates
# to googlesql's `Format*ToString` helpers with `kFormatOpts`
# (`backend/engine/semantic/functions/datetime_parse_format.cc`).
format_timestamp: semantic_executor
format_date: semantic_executor
format_datetime: semantic_executor
parse_date: semantic_executor
parse_timestamp: semantic_executor
parse_datetime: semantic_executor
# BQ UNIX_SECONDS(timestamp) returns BIGINT seconds since
# 1970-01-01 UTC with sub-second precision truncated. DuckDB's
# `epoch(timestamp)` returns DOUBLE; the `bq_unix_seconds` macro
# (registered by
# `backend/engine/duckdb/udf/datetime/datetime_macros.cc`) casts
# the result to BIGINT (truncates toward zero, matching BQ for
# positive epoch values). Unit test
# `datetime_macros_test::UnixSecondsTruncatesSubsecond` pins the
# truncation contract.
unix_seconds: duckdb_udf duckdb_name=bq_unix_seconds
# BQ UNIX_MILLIS / UNIX_MICROS map cleanly to DuckDB's already-
# BIGINT `epoch_ms` / `epoch_us`. The macros pin the contract
# under our own name so a future DuckDB precision drift would
# surface as a unit-test failure.
unix_millis: duckdb_udf duckdb_name=bq_unix_millis
unix_micros: duckdb_udf duckdb_name=bq_unix_micros
# BQ UNIX_DATE(date) returns BIGINT days since 1970-01-01.
# `date_diff('day', '1970-01-01'::DATE, value)` is calendar-day-
# boundary counted, matching the BQ contract exactly (including
# negative values for pre-epoch dates).
unix_date: duckdb_udf duckdb_name=bq_unix_date

# --- Conditional / null-handling --------------------------------------
ifnull: duckdb_native duckdb_name=IFNULL
coalesce: duckdb_native duckdb_name=COALESCE
nullif: duckdb_native duckdb_name=NULLIF
# BQ IF(cond, a, b) returns A when cond is TRUE and B otherwise; a
# NULL cond falls through to B. The `bq_if` macro pins that contract
# via `CASE WHEN cond THEN A ELSE B END`; unit test
# `IfNullCondFallsThroughToElse` guards the NULL-cond edge case.
if: duckdb_udf duckdb_name=bq_if

