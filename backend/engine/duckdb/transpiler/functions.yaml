# KEYS.* is `local_stub` per the specialized-feature plan: the
# emulator does not implement real keysets, but accepting the
# function call with a deterministic placeholder lets client-
# library bootstrap probes succeed. The handler lives in
# `backend/engine/semantic/stubs/keys.{h,cc}`. Encryption /
# decryption calls (`KEYS.ENCRYPT`, `KEYS.DECRYPT_BYTES`) stay
# `unsupported` -- a stub there would silently produce
# unencrypted bytes a caller might mistake for real ciphertext,
# which violates the no-silent-approximation rule.
keys.new_keyset: local_stub plan=googlesqlite-15-specialized-stubs.plan.md
keys.keyset_length: local_stub plan=googlesqlite-15-specialized-stubs.plan.md
keys.encrypt: unsupported plan=googlesqlite-15-specialized-stubs.plan.md
keys.decrypt_bytes: unsupported plan=googlesqlite-15-specialized-stubs.plan.md

