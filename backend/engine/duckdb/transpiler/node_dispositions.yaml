# Per-`ResolvedAST` node-kind disposition registry.
#
# Authoritative source for the routing disposition the local
# execution coordinator assigns to each `ResolvedAST` node kind. The
# parallel human-readable view lives in `SHAPE_TRACKER.md` next to
# this file; the markdown is a mirror of this YAML, enforced by
# `tools/check_disposition_parity` (run via `task lint:dispositions`).
#
# Line format:
#
#   <NodeKind>: <disposition> [plan=<plan-file>] [status=<status>]
#
# Where:
#   - `<NodeKind>` is the (exact, case-sensitive) GoogleSQL resolved
#     AST class name from `googlesql/resolved_ast/resolved_ast.h`
#     (e.g. `ResolvedQueryStmt`). One node class per line. Composite
#     SHAPE_TRACKER rows (`Foo / Bar`) expand to one line per class
#     here.
#   - `<disposition>` is one of the six route names from
#     `backend/engine/disposition.h`:
#       * `duckdb_native`     - lowers to DuckDB SQL directly.
#       * `duckdb_rewrite`    - lowers via a structural rewrite.
#       * `duckdb_udf`        - lowers via a DuckDB UDF/macro.
#       * `semantic_executor` - runs on the local row/value executor.
#       * `control_op`        - routed through storage/catalog.
#       * `local_stub`        - deterministic BigQuery-shaped stub
#                               for a specialized feature family.
#                               Handler lives under
#                               `backend/engine/semantic/stubs/`
#                               (function-level) or
#                               `backend/engine/control/stubs/`
#                               (statement-level). Owned by
#                               `googlesqlite-15-specialized-stubs.plan.md`.
#       * `unsupported`       - deliberately out of scope locally.
#   - `plan=<plan-file>` (optional) names the
#     `.cursor/plans/*.plan.md` file that owns the row. Mandatory for
#     `unsupported` rows so a reader can trace why a route is closed
#     (those rows all point at `googlesqlite-15-specialized-stubs.plan.md`).
#   - `status=planned` (optional) marks rows whose owning plan has
#     not yet landed an implementation. The engine surfaces
#     `UNIMPLEMENTED` for these until their owning plan ships.
#
# Blank lines and `#`-only lines are ignored; trailing `# ...`
# inline comments are stripped.
#
# Editing rules:
#
#  * Keep this file the source of truth. Edits land alongside the
#    matching `SHAPE_TRACKER.md` row in the same commit so the
#    parity checker stays green.
#  * Do NOT promote a row off `unsupported` (or off `status=planned`)
#    without landing the implementation + conformance fixture(s) in
#    the same commit. See
#    `.cursor/plans/local-execution-roadmap-index.plan.md`'s
#    "Disposition + emit + conformance land together" rule.

# --- Statements --------------------------------------------------------
ResolvedQueryStmt: duckdb_native
ResolvedExplainStmt: unsupported plan=googlesqlite-15-specialized-stubs.plan.md
ResolvedCreateTableStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedCreateTableAsSelectStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedCreateViewStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedCreateMaterializedViewStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedCreateProcedureStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md status=planned
ResolvedCreateFunctionStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedCreateTableFunctionStmt: control_op plan=googlesqlite-15-specialized-stubs.plan.md
# `CREATE MODEL` (BigQuery ML) is `local_stub`: the statement
# parses, analyzes, and the engine returns OK without materializing
# a model. A subsequent `ML.PREDICT(<stub-model>)` call surfaces
# `UNIMPLEMENTED` from the `ml.*` function-table rows (`unsupported`).
# The stub handler lives in
# `backend/engine/control/stubs/create_model.{h,cc}`; the
# coordinator pre-dispatches `RESOLVED_CREATE_MODEL_STMT` to it
# rather than routing through `ControlOpExecutor` (mirrors the
# pipe-DDL pre-dispatch pattern). The posture exists so client
# libraries that probe BigQuery ML availability by issuing
# `CREATE MODEL` do not fail at startup.
ResolvedCreateModelStmt: local_stub plan=googlesqlite-15-specialized-stubs.plan.md
ResolvedDropStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedDropFunctionStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedInsertStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md
ResolvedUpdateStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md
ResolvedDeleteStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md
ResolvedMergeStmt: duckdb_rewrite plan=googlesqlite-14-dml-system.plan.md
ResolvedCallStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md status=planned
ResolvedAssignmentStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md
ResolvedExecuteImmediateStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md status=planned
ResolvedAnalyzeStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedAuxLoadDataStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md
ResolvedAssertStmt: semantic_executor plan=googlesqlite-14-dml-system.plan.md
ResolvedExportDataStmt: control_op plan=googlesqlite-01-ddl-catalog.plan.md

