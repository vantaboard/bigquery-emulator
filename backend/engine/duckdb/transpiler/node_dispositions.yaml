# Per-`ResolvedAST` node-kind disposition registry.
#
# Authoritative source for the routing disposition the local
# execution coordinator assigns to each `ResolvedAST` node kind. The
# parallel human-readable view lives in `SHAPE_TRACKER.md` next to
# this file; the markdown is a mirror of this YAML, enforced by
# `tools/check_disposition_parity` (run via `task lint:dispositions`).
#
# Line format:
#
#   <NodeKind>: <disposition> [status=planned]
#
# Where:
#   - `<NodeKind>` is the (exact, case-sensitive) GoogleSQL resolved
#     AST class name from `googlesql/resolved_ast/resolved_ast.h`
#     (e.g. `ResolvedQueryStmt`). One node class per line. Composite
#     SHAPE_TRACKER rows (`Foo / Bar`) expand to one line per class
#     here.
#   - `<disposition>` is one of the route names from
#     `backend/engine/disposition.h`:
#       * `duckdb_native`     - lowers to DuckDB SQL directly.
#       * `duckdb_rewrite`    - lowers via a structural rewrite.
#       * `duckdb_udf`        - lowers via a DuckDB UDF/macro.
#       * `semantic_executor` - runs on the local row/value executor.
#       * `control_op`        - routed through storage/catalog.
#       * `local_stub`        - deterministic BigQuery-shaped stub
#                               for a specialized feature family.
#                               Handler lives under
#                               `backend/engine/semantic/stubs/`
#                               (function-level) or
#                               `backend/engine/control/stubs/`
#                               (statement-level). See
#                               `docs/ENGINE_POLICY.md`.
#       * `unsupported`       - deliberately out of scope locally.
#   - `status=planned` (optional) marks rows whose implementation has
#     not yet landed. The engine surfaces `UNIMPLEMENTED` for these
#     until the handler ships.
#
# Blank lines and `#`-only lines are ignored; trailing `# ...`
# inline comments are stripped.
#
# Editing rules:
#
#  * Keep this file the source of truth. Edits land alongside the
#    matching `SHAPE_TRACKER.md` row in the same commit so the
#    parity checker stays green.
#  * Do NOT promote a row off `unsupported` (or off `status=planned`)
#    without landing the implementation + conformance fixture(s) in
#    the same commit. See `docs/ENGINE_POLICY.md`.

# --- Statements --------------------------------------------------------
ResolvedQueryStmt: duckdb_native
ResolvedExplainStmt: unsupported
ResolvedCreateTableStmt: control_op
ResolvedCreateTableAsSelectStmt: control_op
ResolvedCreateViewStmt: control_op
ResolvedCreateMaterializedViewStmt: control_op
ResolvedCreateProcedureStmt: control_op
ResolvedCreateFunctionStmt: control_op
ResolvedCreateTableFunctionStmt: control_op
# `CREATE MODEL` (BigQuery ML) is `local_stub`: the statement
# parses, analyzes, and the engine returns OK without materializing
# a model. A subsequent `ML.PREDICT(<stub-model>)` call surfaces
# `UNIMPLEMENTED` from the `ml.*` function-table rows (`unsupported`).
# The stub handler lives in
# `backend/engine/control/stubs/create_model.{h,cc}`; the
# coordinator pre-dispatches `RESOLVED_CREATE_MODEL_STMT` to it
# rather than routing through `ControlOpExecutor` (mirrors the
# pipe-DDL pre-dispatch pattern). The posture exists so client
# libraries that probe BigQuery ML availability by issuing
# `CREATE MODEL` do not fail at startup.
ResolvedCreateModelStmt: local_stub
ResolvedAlterTableStmt: control_op
ResolvedDropStmt: control_op
ResolvedDropFunctionStmt: control_op
ResolvedInsertStmt: semantic_executor
ResolvedUpdateStmt: semantic_executor
ResolvedDeleteStmt: semantic_executor
ResolvedMergeStmt: duckdb_rewrite # hard matrix (NOT MATCHED BY SOURCE, multi-action) promotes to semantic_executor at classify time
ResolvedCallStmt: semantic_executor
ResolvedMultiStmt: semantic_executor
ResolvedCreateConstantStmt: semantic_executor
ResolvedAssignmentStmt: semantic_executor
ResolvedExecuteImmediateStmt: semantic_executor
ResolvedAnalyzeStmt: control_op
ResolvedAuxLoadDataStmt: control_op
ResolvedAssertStmt: semantic_executor
ResolvedExportDataStmt: control_op
ResolvedCreateSnapshotTableStmt: control_op
ResolvedCloneDataStmt: control_op
ResolvedUndropStmt: control_op
ResolvedDropSnapshotTableStmt: control_op

# --- Relational scans --------------------------------------------------
ResolvedTableScan: duckdb_native
# Wildcard tables (`dataset.prefix_*`) resolve to `WildcardTable` in
# the virtual catalog and materialize as a union before lowering.
ResolvedSingleRowScan: duckdb_native
ResolvedProjectScan: duckdb_native
ResolvedFilterScan: duckdb_native
ResolvedJoinScan: duckdb_native
ResolvedArrayScan: duckdb_native
ResolvedAggregateScan: duckdb_native
ResolvedAnonymizedAggregateScan: unsupported
ResolvedDifferentialPrivacyAggregateScan: unsupported
ResolvedAggregationThresholdAggregateScan: unsupported
ResolvedSetOperationScan: duckdb_native
ResolvedOrderByScan: duckdb_native
ResolvedLimitOffsetScan: duckdb_native
ResolvedAnalyticScan: duckdb_native
ResolvedSampleScan: duckdb_native
ResolvedWithScan: duckdb_native
ResolvedWithRefScan: duckdb_native
ResolvedRecursiveScan: duckdb_rewrite
ResolvedRecursiveRefScan: duckdb_rewrite
ResolvedPivotScan: duckdb_rewrite
ResolvedUnpivotScan: duckdb_rewrite
ResolvedMatchRecognizeScan: semantic_executor
ResolvedGroupRowsScan: semantic_executor
ResolvedTVFScan: semantic_executor
ResolvedRelationArgumentScan: semantic_executor status=planned
ResolvedBarrierScan: semantic_executor
ResolvedPipeIfScan: semantic_executor
ResolvedPipeForkScan: semantic_executor
ResolvedPipeTeeScan: semantic_executor
ResolvedPipeExportDataScan: control_op
ResolvedPipeCreateTableScan: control_op
ResolvedPipeInsertScan: semantic_executor
# `ResolvedGraph*Scan` family from SHAPE_TRACKER.md. The graph
# query (GQL) surface is deliberately out of scope locally; every
# graph scan class enumerated in
# `googlesql/resolved_ast/resolved_ast.h` is recorded here so the
# parity checker can read them off this YAML directly instead of
# inferring from a wildcard.
ResolvedGraphTableScan: unsupported
ResolvedGraphScan: unsupported
ResolvedGraphLinearScan: unsupported
ResolvedGraphRefScan: unsupported
ResolvedGraphCallScan: unsupported
ResolvedGraphElementScan: unsupported
ResolvedGraphNodeScan: unsupported
ResolvedGraphEdgeScan: unsupported
ResolvedGraphPathScan: unsupported

# --- Expressions -------------------------------------------------------
ResolvedLiteral: duckdb_native
ResolvedParameter: duckdb_native
ResolvedColumnRef: duckdb_native
ResolvedFunctionCall: duckdb_native
ResolvedAggregateFunctionCall: duckdb_native
ResolvedAnalyticFunctionCall: duckdb_native
ResolvedCast: duckdb_native
ResolvedMakeStruct: duckdb_rewrite
ResolvedGetStructField: duckdb_rewrite
ResolvedMakeProto: unsupported
ResolvedGetProtoField: unsupported
ResolvedGetProtoOneof: unsupported
ResolvedReplaceField: unsupported
ResolvedGetJsonField: duckdb_rewrite
ResolvedGetRowField: unsupported
ResolvedFlatten: semantic_executor
ResolvedFlattenedArg: semantic_executor
ResolvedSubqueryExpr: duckdb_native
ResolvedWithExpr: duckdb_native
ResolvedInlineLambda: semantic_executor
ResolvedFilterField: unsupported
ResolvedFilterFieldArg: unsupported
# Literals appear inside every lowered expression (e.g. ORDER BY
# FARM_FINGERPRINT('x')); promoting the whole query to semantic_executor
# whenever the walker sees a constant breaks analytic/window fast paths.
# Scalar-only SELECT (`SELECT 1`) still routes via VisitResolvedQueryStmt.
ResolvedConstant: duckdb_native
ResolvedSystemVariable: semantic_executor
ResolvedSequence: unsupported
ResolvedArgumentRef: semantic_executor
ResolvedArgumentDef: semantic_executor
ResolvedCatalogColumnRef: control_op
ResolvedExpressionColumn: unsupported
ResolvedUpdateConstructor: semantic_executor status=planned

# --- Per-row metadata / shape helpers ----------------------------------
ResolvedOutputColumn: duckdb_native
ResolvedComputedColumn: duckdb_native
ResolvedDeferredComputedColumn: semantic_executor
ResolvedOrderByItem: duckdb_native
ResolvedColumnHolder: semantic_executor
# `ResolvedGroupingSet*` / `ResolvedRollup` / `ResolvedCube` row
# from SHAPE_TRACKER.md, expanded to per-class rows for the parity
# checker.
ResolvedGroupingSet: duckdb_rewrite
ResolvedRollup: duckdb_rewrite
ResolvedCube: duckdb_rewrite
ResolvedAggregateHavingModifier: semantic_executor
# `ResolvedWindowFrame*` / `ResolvedAnalyticFunctionGroup` row from
# SHAPE_TRACKER.md, expanded to per-class rows.
ResolvedWindowFrame: duckdb_native
ResolvedWindowFrameExpr: duckdb_native
ResolvedAnalyticFunctionGroup: duckdb_native
ResolvedSetOperationItem: duckdb_native
ResolvedFunctionArgument: duckdb_native
ResolvedReturningClause: semantic_executor
