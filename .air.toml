# Live reload: `task dev:air` (requires: go install github.com/air-verse/air@latest)
# Set BIGQUERY_EMULATOR_PROJECT in .env (env_files below), or add "--project", "<id>" to args_bin.

root = "."
tmp_dir = "tmp/air"

# Optional; file may be absent.
env_files = [".env"]

[build]
pre_cmd = []
cmd = "bash scripts/air-build.sh"
bin = "tmp/air/bigquery-emulator"
entrypoint = ["./tmp/air/bigquery-emulator"]
# Project ID: use .env (BIGQUERY_EMULATOR_PROJECT) or extend this list with "--project", "<id>".
args_bin = ["--log-level", "debug", "--database", ".bqdata"]
include_ext = ["go", "mod", "sum"]
exclude_dir = ["tmp", "vendor", ".git", ".bqdata", "internal/cmd/generator"]
exclude_regex = ["_test\\.go"]
exclude_unchanged = false
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"
log = "air.log"

[log]
time = false
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = true
keep_scroll = true
