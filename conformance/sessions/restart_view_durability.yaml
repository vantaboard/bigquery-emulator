# R5: Views not persisted across container restart (client tables.insert path).
# Reported: v0.5.0 (email thread)
# Plan: .cursor/plans/conformance-hardening/07-reported-bug-regression-fixtures.plan.md
name: restart_view_durability
description: |
  Regression for R5: a view created via REST tables.insert (view.query body —
  the client path) must survive a graceful engine restart against the same
  --data_dir and return identical rows on SELECT.
project_id: proj-session-restart-view
steps:
  - dataset: ds_main
  - sql: CREATE TABLE ds_main.profiles_staging (id INT64, inserted_at TIMESTAMP, name STRING)
  - rows:
      dataset: ds_main
      table: profiles_staging
      rows:
        - {id: 1, inserted_at: "2026-01-01T00:00:00Z", name: old-ada}
        - {id: 1, inserted_at: "2026-02-01T00:00:00Z", name: new-ada}
        - {id: 2, inserted_at: "2026-01-15T00:00:00Z", name: linus}
  - table:
      dataset: ds_main
      id: profiles_dedup
      view:
        query: |
          SELECT * EXCEPT(rn) FROM (
            SELECT *, ROW_NUMBER() OVER (PARTITION BY id ORDER BY inserted_at DESC) AS rn
            FROM ds_main.profiles_staging
          ) WHERE rn = 1
  - query: SELECT id, name FROM ds_main.profiles_dedup ORDER BY id
    expect_rows:
      - {id: "1", name: new-ada}
      - {id: "2", name: linus}
  - restart: true
  - expect_table_list:
      dataset: ds_main
      contains: [profiles_staging, profiles_dedup]
  - query: SELECT id, name FROM ds_main.profiles_dedup ORDER BY id
    expect_rows:
      - {id: "1", name: new-ada}
      - {id: "2", name: linus}
