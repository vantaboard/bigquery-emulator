# multi_array_unnest_pad: multi-array UNNEST zip (PAD mode).
name: multi_array_unnest_pad
description: |
  Multi-array UNNEST with default PAD zip mode. The shorter array
  pads with NULL; row count follows the longest array.
project_id: proj-array-struct-multi-zip-pad
query: |
  SELECT a, b
    FROM UNNEST([1, 2, 3] AS a, [10, 20] AS b)
   ORDER BY a
expected:
  route: semantic_executor
  rows:
    - {a: "1", b: "10"}
    - {a: "2", b: "20"}
    - {a: "3", b: null}
