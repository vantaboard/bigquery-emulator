# cross_join_unnest: FROM t, UNNEST(t.arr) via semantic_executor.
#
# Pins the correlated cross-join UNNEST shape promoted by
# `VisitResolvedArrayScan(correlated_input_scan)` and evaluated
# through `MaterializeArrayScan` + `outer_row_eval`.
name: cross_join_unnest
description: |
  Cross-join UNNEST of a table column. Verifies one output row per
  array element with the outer table columns preserved.
project_id: proj-array-struct-cross-join-unnest
dataset_id: ds_array_struct_cross_join
setup:
  - dataset: ds_array_struct_cross_join
  - table:
      dataset: ds_array_struct_cross_join
      id: items
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: vals, type: INT64, mode: REPEATED}
  - rows:
      dataset: ds_array_struct_cross_join
      table: items
      rows:
        - {id: 1, vals: [10, 20]}
        - {id: 2, vals: [30]}
query: |
  SELECT id, n
    FROM ds_array_struct_cross_join.items, UNNEST(items.vals) AS n
   ORDER BY id, n
expected:
  route: semantic_executor
  rows:
    - {id: "1", n: "10"}
    - {id: "1", n: "20"}
    - {id: "2", n: "30"}
