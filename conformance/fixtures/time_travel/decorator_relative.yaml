# decorator_relative: table@<offset> in a backtick path is lowered to
# FOR SYSTEM_TIME AS OF before analysis (sql_preprocess + gateway/query).
name: decorator_relative
description: |
  CREATE TABLE -> INSERT -> SELECT via `table@-1` decorator reads the
  in-window row set through the as-of attach path (1 ms lookback).
project_id: proj-time-travel-decorator
dataset_id: ds_time_travel_decorator
setup:
  - dataset: ds_time_travel_decorator
  - sql: |
      CREATE TABLE ds_time_travel_decorator.events (
        id INT64,
        name STRING
      )
  - sql: |
      INSERT INTO ds_time_travel_decorator.events (id, name) VALUES
        (1, 'alpha')
query: |
  SELECT id, name
  FROM `ds_time_travel_decorator.events@-1`
  ORDER BY id
expected:
  route: duckdb_native
  rows:
    - {id: "1", name: "alpha"}
