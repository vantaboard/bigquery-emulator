# assert_false_surfaces_error: ASSERT on a FALSE predicate surfaces
# BigQuery's `Assertion failed` envelope.
#
# `procedural-scripting-executor.plan.md` Family 5. BigQuery's
# documented behavior for ASSERT (see
# `docs/bigquery/docs/reference/standard-sql/debugging-statements.md`)
# is to surface a query error when the predicate evaluates to FALSE
# or NULL. The semantic executor's
# `script::ExecuteAssert` handler builds the message
# `Assertion failed: <description>` and tags the status as
# `kInvalidArgument` (the BigQuery REST `invalidQuery` reason); the
# gateway's `AnalyzeStatusToGrpc` then maps it onto HTTP 400.
name: scripting_assert_false_surfaces_error
description: |
  ASSERT FALSE AS 'must hold' fails with HTTP 400; the message
  carries both the literal "Assertion failed" prefix and the
  user-supplied description.
project_id: proj-scripting-assert-false
query: "ASSERT FALSE AS 'must hold'"
expected:
  error:
    code: 400
    message_contains: "Assertion failed"
