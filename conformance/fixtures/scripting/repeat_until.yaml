# repeat_until: REPEAT...UNTIL runs the body before testing the condition.
name: scripting_repeat_until
description: |
  REPEAT accumulates 0 + 1 + 2 before UNTIL i >= 3 becomes true; final
  SELECT returns total 3 (same arithmetic as the WHILE fixture).
project_id: proj-scripting-repeat-until
query: |
  BEGIN
    DECLARE total INT64 DEFAULT 0;
    DECLARE i INT64 DEFAULT 0;
    REPEAT
      SET total = total + i;
      SET i = i + 1;
    UNTIL i >= 3
    END REPEAT;
    SELECT CAST(total AS STRING) AS total;
  END;
expected:
  route: semantic_executor
  rows:
    - {total: "3"}
