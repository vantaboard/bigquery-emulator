# subquery_expr_exists: non-correlated EXISTS SubqueryExpr on the
#                        DuckDB fast path.
#
# Pins BigQuery's `EXISTS(<subquery>)` contract: the result is
# `true` when the subquery returns at least one row, `false`
# otherwise. The emit is `EXISTS (<inner>)`. Route:
# `duckdb_native` (`docs/ENGINE_POLICY.md` Family 2).
#
# We pin both the true-side and false-side branches in one fixture
# via a UNION ALL so a regression that always returns the same
# answer (or that flips boolean polarity) surfaces here.
#
# Route-label assertion: deferred to plan 16.
name: subquery_expr_exists
description: |
  Non-correlated EXISTS subquery exercised on both true and
  false branches. Verifies the transpiler emits EXISTS-style
  syntax and DuckDB returns the matching booleans.
project_id: proj-cte-subquery-exists
query: |
  SELECT EXISTS (SELECT 1 FROM UNNEST([1, 2, 3]) AS n) AS has_rows,
         EXISTS (SELECT 1 FROM UNNEST(CAST([] AS ARRAY<INT64>)) AS m)
           AS no_rows
expected:
  route: semantic_executor
  rows:
    - {has_rows: "true", no_rows: "false"}
