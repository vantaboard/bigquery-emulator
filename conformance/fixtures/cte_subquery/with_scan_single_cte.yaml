# with_scan_single_cte: ResolvedWithScan + ResolvedWithRefScan
#                        via the DuckDB fast path.
#
# Pins BigQuery's `WITH a AS (...) SELECT ... FROM a` non-recursive
# CTE contract end-to-end. The route is `duckdb_native` (DuckDB
# supports `WITH ... AS (...)` natively): the transpiler emits each
# CTE entry with its inner SELECT projected to positional anchor
# names (`_cte_<idx>`) and each `ResolvedWithRefScan` renames the
# anchor back to the analyzer's per-reference column names. See
# `cte-subquery-routing.plan.md` Family 1 and
# `backend/engine/duckdb/transpiler/transpiler.cc::EmitWithScan` /
# `EmitWithRefScan`.
#
# Edge case pinned: a single CTE referenced once. The two-column
# projection exercises the positional-anchor rename on both columns
# so a regression that drops the anchor or swaps column order
# shows up as a row mismatch.
#
# Route-label assertion: deferred to plan 16 (the route-label
# infrastructure does not yet inspect `ResolvedWithScan` promotion
# decisions; see `conformance/fixtures/functions/README.md`).
name: with_scan_single_cte
description: |
  Single-binding non-recursive CTE referenced once. Verifies the
  transpiler emits the CTE on the fast path with the per-column
  positional-anchor rename preserved across the ref scan.
project_id: proj-cte-subquery-with-scan-single
query: |
  WITH p AS (
    SELECT 1 AS id, 'ada' AS name
    UNION ALL
    SELECT 2 AS id, 'linus' AS name
  )
  SELECT id, name FROM p ORDER BY id
expected:
  rows:
    - {id: "1", name: "ada"}
    - {id: "2", name: "linus"}
