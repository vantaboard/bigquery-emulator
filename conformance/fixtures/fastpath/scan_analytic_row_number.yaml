# scan_analytic_row_number: ResolvedAnalyticScan + ROW_NUMBER OVER.
#
# Pins the window-function fast path: ROW_NUMBER() OVER (PARTITION
# BY ... ORDER BY ...) lowers to DuckDB's same syntax. The
# transpiler emits the OVER clause via BuildPartitionClause +
# BuildOrderClause and the projection list via
# BuildAnalyticProjection. We pin per-partition row numbers
# starting from 1 (BQ contract) so a regression that resets the
# number across partitions or starts from 0 surfaces.
name: scan_analytic_row_number
description: |
  ROW_NUMBER() OVER (PARTITION BY kind ORDER BY id). Verifies the
  engine emits per-partition row numbers starting from 1, partition
  boundaries reset the counter, and the OVER ORDER BY drives the
  numbering within each partition.
project_id: proj-fastpath-analytic-row-number
dataset_id: ds_fastpath_analytic_row_number
setup:
  - dataset: ds_fastpath_analytic_row_number
  - table:
      dataset: ds_fastpath_analytic_row_number
      id: events
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: kind, type: STRING, mode: REQUIRED}
  - rows:
      dataset: ds_fastpath_analytic_row_number
      table: events
      rows:
        - {id: 1, kind: login}
        - {id: 2, kind: click}
        - {id: 3, kind: login}
        - {id: 4, kind: login}
        - {id: 5, kind: click}
query: |
  SELECT id, kind,
         ROW_NUMBER() OVER (PARTITION BY kind ORDER BY id) AS rn
    FROM ds_fastpath_analytic_row_number.events
   ORDER BY id
expected:
  route: duckdb_native
  rows:
    - {id: "1", kind: "login", rn: "1"}
    - {id: "2", kind: "click", rn: "1"}
    - {id: "3", kind: "login", rn: "2"}
    - {id: "4", kind: "login", rn: "3"}
    - {id: "5", kind: "click", rn: "2"}
