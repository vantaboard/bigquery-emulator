# expr_with_expr: ResolvedWithExpr scalar binding.
#
# BQ `WITH(<a> AS <e>, ...) <body>` is a once-per-row scalar
# binding. The transpiler emits a scalar subquery
# `(SELECT <body> FROM (SELECT <e1> AS "a", ...))` which DuckDB
# honors as a scalar subquery. Pin the binding-then-body shape
# here so a regression that double-evaluates `<e1>` (or evaluates
# `<body>` against an unbound name) surfaces.
name: expr_with_expr
description: |
  Scalar WITH expression. Verifies the engine evaluates the
  binding once and references it from the body. Two bindings to
  exercise the multi-binding path.
project_id: proj-fastpath-expr-with-expr
query: |
  SELECT WITH(half AS 21, name AS 'ada') half * 2 AS doubled,
         WITH(half AS 21, name AS 'ada') name     AS who
expected:
  rows:
    - {doubled: "42", who: "ada"}
