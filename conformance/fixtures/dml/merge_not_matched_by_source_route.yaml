# merge_not_matched_by_source_route: pins semantic_executor for hard MERGE.
name: merge_not_matched_by_source_route
description: |
  MERGE with WHEN NOT MATCHED BY SOURCE routes through semantic_executor.
project_id: proj-dml-merge-nmbs-route
dataset_id: ds_dml_merge_nmbs_route
setup:
  - dataset: ds_dml_merge_nmbs_route
  - sql: |
      CREATE TABLE ds_dml_merge_nmbs_route.target (id INT64)
  - sql: |
      CREATE TABLE ds_dml_merge_nmbs_route.source (id INT64)
  - sql: |
      INSERT INTO ds_dml_merge_nmbs_route.target (id) VALUES (1), (2)
  - sql: |
      INSERT INTO ds_dml_merge_nmbs_route.source (id) VALUES (1)
query: |
  MERGE ds_dml_merge_nmbs_route.target AS T
  USING ds_dml_merge_nmbs_route.source AS S
  ON T.id = S.id
  WHEN NOT MATCHED BY SOURCE THEN DELETE
expected:
  route: semantic_executor
  rows: []
