# undrop_schema_not_found: UNDROP SCHEMA without a tombstone.
name: ddl_undrop_schema_not_found
description: |
  UNDROP SCHEMA against a dataset that was never dropped returns HTTP
  404 with a not-found shaped message.
project_id: proj-undrop-missing
dataset_id: ds_never_dropped
setup: []
query: UNDROP SCHEMA ds_never_dropped
expected:
  route: control_op
  route_strict: false
  error:
    code: 404
    message_contains: "ds_never_dropped"
