# function_isnull: BigQuery ISNULL via `duckdb_udf` route.
#
# Pins the polyfill UDF library's `bq_isnull` macro through the
# gateway. Edge case pinned: empty string is NOT NULL in BigQuery
# (`bq_isnull('') == FALSE`); a regression that treated `''` as
# NULL would surface the empty-string row as TRUE.
#
# Route-label assertion: intentionally omitted; routing drift is
# tracked by `task conformance:routing-matrix`.
name: function_isnull
description: |
  BigQuery ISNULL lowered through the polyfill UDF library
  (`backend/engine/duckdb/udf/conditional/conditional_macros.cc`'s
  `bq_isnull` macro). Verifies that ISNULL returns TRUE for SQL NULL
  values and FALSE for non-NULL values including the empty string.
project_id: proj-functions-isnull
dataset_id: ds_functions_isnull
setup:
  - dataset: ds_functions_isnull
  - table:
      dataset: ds_functions_isnull
      id: words
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: s, type: STRING, mode: NULLABLE}
  - rows:
      dataset: ds_functions_isnull
      table: words
      rows:
        - {id: 1, s: "hi"}
        - {id: 2, s: ""}     # empty string is NOT null in BQ
        - {id: 3, s: null}
query: |
  SELECT id, ISNULL(s) AS is_null_flag
    FROM ds_functions_isnull.words
   ORDER BY id
expected:
  route: duckdb_udf
  rows:
    - {id: "1", is_null_flag: "false"}
    - {id: "2", is_null_flag: "false"}   # empty string -> FALSE
    - {id: "3", is_null_flag: "true"}
