# function_instr: BigQuery INSTR variadic via the semantic executor.
#
# Pins the 1-based byte-index contract for both forward and
# reverse searches plus the `occurrence` selector. DuckDB's
# `instr` is 2-argument only and cannot model the 3- and 4-arg
# surface without a separate path; the implementation lives in
# `backend/engine/semantic/functions/string_funcs.cc::Instr`.
#
# Edge cases pinned:
#   * 2-arg forward search returns the first match's 1-based index
#   * 3-arg form respects the `position` start offset
#   * 4-arg form picks the Nth occurrence from the start
#   * negative `position` searches from the right (occurrence
#     still counts matches walking left)
#   * empty subvalue returns the (clamped) start position
#   * missing match returns 0
#
# Route-label assertion deferred to plan 16.
name: function_instr
description: |
  BigQuery INSTR (variadic, 2..4 args) lowered through the
  semantic executor. Pins forward, reverse, and Nth-occurrence
  semantics that the DuckDB 2-arg `instr` cannot model.
project_id: proj-functions-instr
query: |
  SELECT INSTR('hello world', 'world') AS two_arg,
         INSTR('ababab', 'ab', 2) AS three_arg,
         INSTR('ababab', 'ab', 1, 3) AS four_arg,
         INSTR('ababab', 'ab', -1) AS reverse,
         INSTR('hello', 'xyz') AS missing,
         INSTR('hello', '') AS empty_sub
expected:
  rows:
    - {two_arg: "7", three_arg: "3", four_arg: "5", reverse: "5", missing: "0", empty_sub: "1"}
