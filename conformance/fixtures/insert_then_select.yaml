# insert_then_select: REST-catalog -> SQL DML -> SQL SELECT round-trip.
#
# Creates a dataset + typed table via the REST surface, seeds two rows
# via INSERT VALUES (which lands on the reference-impl engine on both
# profiles; the DuckDB profile reaches it through FallbackEngine), and
# reads them back via SELECT * ORDER BY id. Mirrors
# `gateway/e2e/dml_insert_test.go::TestDMLInsertValuesRoundTrip` so a
# divergence on either profile is a clear signal the DML write path
# regressed.
name: insert_then_select
description: |
  Catalog mutation + INSERT VALUES + SELECT round-trip. Verifies the
  REST `tables.insert` catalog write, the SQL DML write, and the
  query read path on both profiles.
profiles: [memory, duckdb]
project_id: proj-insert-then-select
dataset_id: ds_insert_then_select
setup:
  - dataset: ds_insert_then_select
  - table:
      dataset: ds_insert_then_select
      id: people
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: name, type: STRING, mode: NULLABLE}
  - sql: |
      INSERT INTO ds_insert_then_select.people (id, name)
      VALUES (1, 'ada'), (2, 'linus')
query: |
  SELECT id, name FROM ds_insert_then_select.people ORDER BY id
expected:
  rows:
    - {id: "1", name: "ada"}
    - {id: "2", name: "linus"}
