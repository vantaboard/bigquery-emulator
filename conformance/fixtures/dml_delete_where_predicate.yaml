# dml_delete_where_predicate: DELETE matching a multi-row predicate.
#
# Mirrors `gateway/e2e/dml_update_delete_test.go::TestDMLDeleteRoundTrip`
# but with a predicate that matches more than one row (`tier = 'free'`).
# Verifies the engine deletes the matched set atomically and leaves
# the rest of the table untouched.
name: dml_delete_where_predicate
description: |
  DELETE FROM ... WHERE tier = 'free'. Verifies the engine matches
  multiple rows in one statement and removes all of them.
profiles: [memory, duckdb]
project_id: proj-dml-delete-predicate
dataset_id: ds_dml_delete_predicate
setup:
  - dataset: ds_dml_delete_predicate
  - table:
      dataset: ds_dml_delete_predicate
      id: people
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: name, type: STRING, mode: NULLABLE}
        - {name: tier, type: STRING, mode: NULLABLE}
  - sql: |
      INSERT INTO ds_dml_delete_predicate.people (id, name, tier)
      VALUES (1, 'ada', 'free'),
             (2, 'linus', 'pro'),
             (3, 'grace', 'free'),
             (4, 'edsger', 'pro')
  - sql: |
      DELETE FROM ds_dml_delete_predicate.people
       WHERE tier = 'free'
query: |
  SELECT id, name, tier FROM ds_dml_delete_predicate.people ORDER BY id
expected:
  rows:
    - {id: "2", name: "linus",  tier: "pro"}
    - {id: "4", name: "edsger", tier: "pro"}
