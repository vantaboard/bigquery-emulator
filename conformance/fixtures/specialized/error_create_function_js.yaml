# error_create_function_js: LANGUAGE js CREATE FUNCTION surfaces 501.
#
# docs/ENGINE_POLICY.md pins JavaScript UDFs to clean rejection:
# CREATE must not register an External_function that would fail
# unpredictably at call time.
name: specialized_error_create_function_js
description: |
  CREATE FUNCTION ... LANGUAGE js returns HTTP 501 notImplemented
  mentioning JavaScript.
project_id: proj-specialized-error-create-function-js
query: |
  CREATE FUNCTION js_add(x INT64) RETURNS INT64
  LANGUAGE js AS "return x + 1;"
expected:
  route: unsupported
  route_strict: false
  error:
    code: 501
    message_contains: "JavaScript"
