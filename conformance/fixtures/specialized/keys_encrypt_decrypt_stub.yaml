# keys_encrypt_decrypt_stub: KEYS.* placeholder round-trip (not real AEAD).
name: specialized_keys_encrypt_decrypt_stub
description: |
  KEYS.NEW_KEYSET returns a deterministic sentinel keyset envelope;
  KEYS.KEYSET_LENGTH reports a single logical key for any BYTES keyset.
  KEYS.ENCRYPT / KEYS.DECRYPT_BYTES stubs are wired in
  `backend/engine/semantic/stubs/keys.cc` but are not yet exercised here
  because the GoogleSQL analyzer segfaults resolving KEYS.ENCRYPT on the
  full GoogleSqlCatalog path (see coordinator keys tests).
project_id: proj-specialized-keys-stub
dataset_id: ds_keys_stub
setup:
  - dataset: ds_keys_stub
query: |
  SELECT KEYS.KEYSET_LENGTH(KEYS.NEW_KEYSET('AEAD_AES_GCM_256')) AS key_count
expected:
  route: local_stub
  rows:
    - {key_count: "1"}
