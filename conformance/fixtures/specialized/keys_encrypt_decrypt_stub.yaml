# keys_encrypt_decrypt_stub: KEYS.* placeholder round-trip (not real AEAD).
name: specialized_keys_encrypt_decrypt_stub
description: |
  KEYS.NEW_KEYSET returns a deterministic sentinel keyset envelope;
  KEYS.ENCRYPT / KEYS.DECRYPT_BYTES round-trip plaintext through the
  emulator cipher prefix on the semantic stub lane (`stubs/keys.cc`).
project_id: proj-specialized-keys-stub
dataset_id: ds_keys_stub
setup:
  - dataset: ds_keys_stub
query: |
  WITH ks AS (SELECT KEYS.NEW_KEYSET('AEAD_AES_GCM_256') AS keyset)
  SELECT TO_BASE64(
    KEYS.DECRYPT_BYTES(
      keyset,
      KEYS.ENCRYPT(keyset, FROM_BASE64('YWJj'))
    )
  ) AS plain
  FROM ks
expected:
  route: local_stub
  rows:
    - {plain: "YWJj"}
