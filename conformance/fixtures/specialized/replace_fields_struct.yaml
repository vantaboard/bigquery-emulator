# replace_fields_struct: REPLACE_FIELDS on a STRUCT value via semantic_executor.
name: replace_fields_struct
description: |
  REPLACE_FIELDS mutates one STRUCT leaf while preserving siblings.
project_id: proj-replace-fields-struct
query: |
  WITH t AS (
    SELECT REPLACE_FIELDS(STRUCT(1 AS a, 'keep' AS b), 99 AS a) AS s
  )
  SELECT s.a AS a, s.b AS b FROM t
expected:
  route: semantic_executor
  rows:
    - {a: "99", b: "keep"}
