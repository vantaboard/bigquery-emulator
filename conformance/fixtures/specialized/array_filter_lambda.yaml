# array_filter_lambda: inline lambda via ARRAY_FILTER.
#
# Pins `ResolvedInlineLambda` promotion and BOOL-returning lambda
# filtering in `eval_expr_calls.cc::EvalArrayFilter`.
name: specialized_array_filter_lambda
description: |
  ARRAY_FILTER keeps elements whose inline lambda evaluates to TRUE;
  NULL predicate results drop the element (BigQuery semantics).
project_id: proj-specialized-array-filter
query: |
  SELECT ARRAY_FILTER([1, 2, 3, 4, 5], x -> x > 2 AND x < 5) AS filtered
expected:
  route: semantic_executor
  rows:
    - {filtered: ["3", "4"]}
