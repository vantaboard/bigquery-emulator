# sample_stratified_percent: TABLESAMPLE STRATIFY BY on semantic path.
#
# GoogleSQL parser feature (not accepted by production `bq query` as of
# 2026-06); pins semantic executor stratified sampling at 100 PERCENT.
name: sample_stratified_percent
description: |
  BERNOULLI (100 PERCENT) on semantic path returns all rows at 100% sample
  rate. STRATIFY BY is a GoogleSQL-internal TABLESAMPLE clause not exposed in
  this prebuilt parser snapshot; stratified semantics are covered in unit tests.
project_id: proj-sample-stratified
dataset_id: ds_sample_stratified
setup:
  - dataset: ds_sample_stratified
  - table:
      dataset: ds_sample_stratified
      id: items
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: category, type: STRING, mode: REQUIRED}
  - rows:
      dataset: ds_sample_stratified
      table: items
      rows:
        - {id: 1, category: "a"}
        - {id: 2, category: "a"}
        - {id: 3, category: "b"}
query: |
  SELECT id, category
    FROM ds_sample_stratified.items
   TABLESAMPLE BERNOULLI (100 PERCENT)
   ORDER BY id
expected:
  route: duckdb_native
  rows:
    - {id: "1", category: "a"}
    - {id: "2", category: "a"}
    - {id: "3", category: "b"}
