# ANY TYPE UDF casting a STRING argument through FLOAT64 (int UDF pattern).
name: udf_any_type_string_floor
description: |
  Templated UDF body uses CAST(v AS FLOAT64) on a STRING call
  argument; verifies semantic CAST STRING -> FLOAT64 inside UDF eval.
project_id: proj-udf-any-type-string-floor
setup:
  - sql: |-
      CREATE FUNCTION int(v ANY TYPE) AS (
        CAST(FLOOR(CAST(v AS FLOAT64)) AS INT64)
      );
query: SELECT int("-1") AS out
expected:
  route: semantic_executor
  rows:
    - {out: "-1"}
