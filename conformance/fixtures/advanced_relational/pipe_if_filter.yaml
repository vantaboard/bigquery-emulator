# pipe_if_filter: pipe IF selects a branch subpipeline at analyze time.
#
# Pins `docs/ENGINE_POLICY.md` Family 2. The analyzer resolves `|> IF true
# THEN (...)` to a `ResolvedPipeIfScan` with `selected_case` pointing at the
# THEN branch; the semantic executor materializes the input rows, runs the
# selected subpipeline (here a WHERE filter), and returns the branch output.
#
# Note: trailing ORDER BY after a top-level pipe chain is a parse
# error; wrap in a subquery if ordering is required.
name: pipe_if_filter
description: |
  Pipe IF with a constant-true condition selects the THEN branch subpipeline,
  which filters rows before the outer SELECT projects `key`.
project_id: proj-advanced-pipe-if
dataset_id: ds_pipe_if
setup:
  - dataset: ds_pipe_if
  - table:
      dataset: ds_pipe_if
      id: kv
      schema:
        - {name: key, type: INT64, mode: REQUIRED}
        - {name: val, type: STRING, mode: REQUIRED}
  - rows:
      dataset: ds_pipe_if
      table: kv
      rows:
        - {key: 1, val: a}
        - {key: 2, val: b}
        - {key: 3, val: c}
query: |
  SELECT key
  FROM ds_pipe_if.kv
  |> IF true THEN (
       |> WHERE key >= 2
     )
     ELSE (
       |> WHERE false
     )
expected:
  rows:
    - {key: "2"}
    - {key: "3"}
