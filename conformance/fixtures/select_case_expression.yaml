# select_case_expression: CASE WHEN ... THEN ... ELSE ... END.
#
# Pins the analyzer / evaluator's CASE branch lowering on DuckDB.
# Seeds via `tabledata.insertAll` so the row payload pins the
# streaming-insert path; INSERT VALUES is also available now via
# the local DML executor (`backend/engine/semantic/dml/`,
# `docs/ENGINE_POLICY.md`).
name: select_case_expression
description: |
  Projection with a CASE WHEN ... THEN ... ELSE expression. Verifies
  the engine evaluates the branch condition row-by-row and emits the
  THEN/ELSE STRING into the projection.
project_id: proj-select-case
dataset_id: ds_select_case
setup:
  - dataset: ds_select_case
  - table:
      dataset: ds_select_case
      id: people
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: name, type: STRING, mode: NULLABLE}
  - rows:
      dataset: ds_select_case
      table: people
      rows:
        - {id: 1, name: ada}
        - {id: 2, name: linus}
        - {id: 3, name: grace}
query: |
  SELECT id,
         CASE WHEN id = 1 THEN 'first' ELSE 'rest' END AS label
    FROM ds_select_case.people
   ORDER BY id
expected:
  route: duckdb_native
  rows:
    - {id: "1", label: "first"}
    - {id: "2", label: "rest"}
    - {id: "3", label: "rest"}
