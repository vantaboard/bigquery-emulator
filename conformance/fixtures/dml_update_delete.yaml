# dml_update_delete: UPDATE + DELETE round-trip on both profiles.
#
# Runs on both the memory profile (reference-impl engine implements
# ResolvedUpdateStmt / ResolvedDeleteStmt directly, see
# `gateway/e2e/dml_update_delete_test.go::TestDMLUpdateRoundTrip` which
# spawns memory storage via `startEmulator(t)`) and the DuckDB profile
# (engine handles DML through the FallbackEngine wrapper).
#
# Seeds three rows, mutates id=1's name and deletes id=2, then asserts
# the post-mutation state surfaces the expected two rows via SELECT.
name: dml_update_delete
description: |
  UPDATE and DELETE round-trip with post-mutation SELECT. Verifies
  the engine's mutation pipeline lands the changes durably enough for
  a subsequent read to see them on both profiles.
profiles: [memory, duckdb]
project_id: proj-dml-update-delete
dataset_id: ds_dml_update_delete
setup:
  - dataset: ds_dml_update_delete
  - table:
      dataset: ds_dml_update_delete
      id: people
      schema:
        - {name: id, type: INT64, mode: REQUIRED}
        - {name: name, type: STRING, mode: NULLABLE}
  - sql: |
      INSERT INTO ds_dml_update_delete.people (id, name)
      VALUES (1, 'ada'), (2, 'linus'), (3, 'grace')
  - sql: |
      UPDATE ds_dml_update_delete.people
      SET name = 'augusta'
      WHERE id = 1
  - sql: |
      DELETE FROM ds_dml_update_delete.people
      WHERE id = 2
query: |
  SELECT id, name FROM ds_dml_update_delete.people ORDER BY id
expected:
  rows:
    - {id: "1", name: "augusta"}
    - {id: "3", name: "grace"}
