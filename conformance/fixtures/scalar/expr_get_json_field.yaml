# expr_get_json_field: ResolvedGetJsonField operator selection.
#
# The query is a scalar-only SELECT (no FROM clause) so the route
# classifier promotes it to `semantic_executor`. The semantic
# executor mirrors the transpiler's `->` (JSON-typed result) vs `->>`
# (scalar result) selection on the analyzer-resolved return type.
# We exercise the `->` / `->` chained shape (JSON typed) here; the
# `JSON_VALUE` / scalar-coerce shape lives in the polyfill plan
# (`.cursor/plans/local-exec-03-operator-disposition.plan.md`). Rehomed
# from `fastpath/` to `scalar/` by plan 17 to match the observed
# route.
name: expr_get_json_field
description: |
  Field access against a JSON literal. Verifies the engine emits
  `->` for the JSON-typed return path and the chained access
  composes against the parent JSON expression.
project_id: proj-fastpath-expr-get-json-field
query: |
  SELECT
    JSON '{"user": {"name": "ada"}}'.user.name AS user_name,
    JSON '{"items": ["a", "b"]}'.items         AS items
expected:
  route: semantic_executor
  rows:
    - {user_name: "\"ada\"", items: "[\"a\",\"b\"]"}
