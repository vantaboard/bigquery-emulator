# expr_with_expr: ResolvedWithExpr scalar binding.
#
# BQ `WITH(<a> AS <e>, ...) <body>` is a once-per-row scalar
# binding. The query is a scalar-only SELECT (no FROM clause) so
# the route classifier promotes it to `semantic_executor`; the
# semantic executor evaluates the bindings once and references
# them from the body. Pin the binding-then-body shape here so a
# regression that double-evaluates `<e1>` (or evaluates `<body>`
# against an unbound name) surfaces. Rehomed from `fastpath/` to
# `scalar/` by plan 17 to match the observed route.
name: expr_with_expr
description: |
  Scalar WITH expression. Verifies the engine evaluates the
  binding once and references it from the body. Two bindings to
  exercise the multi-binding path.
project_id: proj-fastpath-expr-with-expr
query: |
  SELECT WITH(half AS 21, name AS 'ada') half * 2 AS doubled,
         WITH(half AS 21, name AS 'ada') name     AS who
expected:
  route: semantic_executor
  rows:
    - {doubled: "42", who: "ada"}
