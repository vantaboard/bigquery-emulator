# select_one: scalar-only SELECT routed to the semantic executor.
#
# `SELECT 1 AS n` has no FROM clause, so the route classifier
# promotes it to the local semantic executor (see
# `.cursor/plans/local-exec-07-semantic-core-expr.plan.md`). The output row
# is shaped identically to what the DuckDB fast path would have
# produced for the same query, so the conformance differ does not
# branch on route. Plan 16
# (`.cursor/plans/conformance-routing-matrix.plan.md`) landed the
# hard route-label assertion this fixture pins below
# (`expected.route: semantic_executor`).
name: scalar_select_one
description: |
  Trivial constant SELECT with no FROM. Routes through the local
  semantic executor; verifies the gateway emits the same one-row
  envelope a DuckDB lowering would produce.
project_id: proj-scalar-select-one
query: SELECT 1 AS n
expected:
  route: semantic_executor
  rows:
    - {n: "1"}
