# regression_integer_overflow: INT64 overflow surfaces an error.
#
# Sharp edge: BigQuery's INT64 arithmetic raises on overflow rather
# than wrapping silently like a C-level int64. The query is a
# scalar-only SELECT (no FROM clause) so the route classifier
# promotes it to `semantic_executor`; pin the overflow contract
# here so a regression to silently-wrapping arithmetic (e.g. via
# a future structural rewrite or executor change) surfaces as a
# fixture failure. Rehomed from `fastpath/` to `scalar/` by plan
# 17 to match the observed route.
#
# The expected error matches the "Out of range" / "out of range"
# substring DuckDB emits for INT64 overflow; the gateway's error
# diff is substring-based on `error.message` so a more verbose
# wrapping (e.g. "INT64: ... Out of range ...") still matches.
name: regression_integer_overflow
description: |
  INT64 max + 1 must surface an "out of range" error rather than
  silently wrapping to a negative value. Verifies the engine
  preserves BigQuery's overflow-raises contract through the fast
  path's arithmetic emit.
project_id: proj-fastpath-regression-integer-overflow
query: |
  SELECT 9223372036854775807 + 1 AS overflow
expected:
  route: semantic_executor
  route_strict: false
  error:
    message_contains: "out of range"
