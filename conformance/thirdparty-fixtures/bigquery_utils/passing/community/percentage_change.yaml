      CREATE FUNCTION percentage_change(val1 FLOAT64, val2 FLOAT64) RETURNS FLOAT64 AS
      (
        ROUND(IF(ABS(val1) > 0 AND ABS(val2) > 0, (val2 - val1) / ABS(val1), NULL), 4)
      );
