      CREATE FUNCTION cw_twograms(t STRING) RETURNS ARRAY<STRING> AS (
         (WITH splt as (SELECT regexp_extract_all(t, r'(\S+)') as a)
          SELECT array_agg(concat(a[offset(i)], ' ', a[offset(i+1)])) from splt join unnest(generate_array(0, array_length(a) - 2, 1)) as i
      ));
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(cw_twograms("Test Str 123456 789")) AS actual, TO_JSON_STRING(CAST(["Test Str", "Str 123456", "123456 789"] AS ARRAY<STRING>)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
expected:
  match: ordered
  rows:
    - case_id: "0"
      matches: true
