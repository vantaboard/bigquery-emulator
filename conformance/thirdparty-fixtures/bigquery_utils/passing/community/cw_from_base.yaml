  - sql: "/*\n * Copyright 2022 Google LLC\n *\n * Licensed under the Apache License, Version 2.0 (the \"License\");\n * you may not use this file except in compliance with the License.\n * You may obtain a copy of the License at\n *\n *     http://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required by applicable law or agreed to in writing, software\n * distributed under the License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\n * See the License for the specific language governing permissions and\n * limitations under the License.\n */\n\n/* Similar to Presto from_base function - convert string from given base to decimal */\nCREATE FUNCTION cw_from_base(number STRING, base INT64) RETURNS INT64 \n\nAS (\n    (WITH chars AS (\n        SELECT IF(ch >= 48 AND ch <= 57, ch - 48, IF(ch >= 65 AND ch <= 90, ch - 65 + 10, ch - 97 + 10)) pos, offset + 1 AS idx\n        FROM UNNEST(TO_CODE_POINTS(number)) AS ch WITH OFFSET\n    )\n    SELECT SAFE_CAST(SUM(pos*CAST(POW(base, CHAR_LENGTH(number) - idx) AS NUMERIC)) AS INT64) from_base FROM chars)\n);"
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(cw_from_base("001101011", CAST(2 AS INT64))) AS actual, TO_JSON_STRING(CAST(107 AS INT64)) AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(cw_from_base("37", CAST(8 AS INT64))) AS actual, TO_JSON_STRING(CAST(31 AS INT64)) AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(cw_from_base("A", CAST(16 AS INT64))) AS actual, TO_JSON_STRING(CAST(10 AS INT64)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
