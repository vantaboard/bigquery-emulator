      CREATE FUNCTION cw_threegrams(t STRING) RETURNS ARRAY<STRING> AS (
         (WITH splt as (SELECT regexp_extract_all(t, r'(\S+)') as a)
          SELECT array_agg(concat(a[offset(i)], ' ', a[offset(i+1)], ' ', a[offset(i+2)])) from splt join unnest(generate_array(0, array_length(a) - 3, 1)) as i
      ));
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(cw_threegrams("Test 1234 str abc")) AS actual, TO_JSON_STRING(CAST(["Test 1234 str", "1234 str abc"] AS ARRAY<STRING>)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
expected:
  match: ordered
