      CREATE FUNCTION url_param(url STRING, p STRING)
      RETURNS STRING
      LANGUAGE js AS """
        result = null;
        try {
          query = url.split("?")[1].split("#")[0];
          if(query) {
            params = query.split('&').forEach(function(part) {
              item = part.split('=');
              if(item[0] == p ) {
                result = decodeURIComponent(item[1]);
              }
            });
          }
        }
        catch(err) {}
        return result;
      """;
