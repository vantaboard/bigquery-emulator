       /* Internal function */
      CREATE FUNCTION cw_regex_mode(mode STRING) RETURNS STRING
      LANGUAGE js AS """
        var m = '';
        if (mode == 'i' || mode == 'm')
          m += mode;
        else if (mode == 'n')
          m += 's';
        m += 'g';
        return m;
      """;
