    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(cw_regex_mode("n")) AS actual, TO_JSON_STRING("sg") AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(cw_regex_mode("a")) AS actual, TO_JSON_STRING("g") AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
