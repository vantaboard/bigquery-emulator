      CREATE FUNCTION cw_range_datetime_ldiff(p1 RANGE<DATETIME>, p2 RANGE<DATETIME>) RETURNS RANGE<DATETIME>

      AS (
        CASE
          WHEN RANGE_OVERLAPS(p1, p2) AND RANGE_START(p1) < RANGE_START(p2) THEN
            RANGE(RANGE_START(p1), RANGE_START(p2))
          ELSE NULL
        END
      );
