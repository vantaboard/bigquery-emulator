      CREATE FUNCTION cw_initcap(s STRING) RETURNS STRING AS (
        (SELECT STRING_AGG(CONCAT(UPPER(SUBSTR(part, 1, 1)), LOWER(SUBSTR(part, 2))), ' ')
         FROM UNNEST(SPLIT(s, ' ')) AS part)
      );
