      CREATE FUNCTION interval_seconds(iv INTERVAL)
      RETURNS INT64

      AS (
           31536000 * EXTRACT(YEAR FROM iv)
          + 2592000 * EXTRACT(MONTH FROM iv)
          +   86400 * EXTRACT(DAY FROM iv)
          +    3600 * EXTRACT(HOUR FROM iv)
          +      60 * EXTRACT(MINUTE FROM iv)
          +           EXTRACT(SECOND FROM iv)
      );
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(interval_seconds(INTERVAL -1 DAY)) AS actual, TO_JSON_STRING(CAST(-86400 AS INT64)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
expected:
