      CREATE FUNCTION cw_xml_element(name STRING, data ARRAY<STRING>) RETURNS STRING

      AS (
        (
          SELECT '<' || name || '>' || STRING_AGG(COALESCE(v, ''), '') || '</' || name || '>'
          FROM UNNEST(data) v
        )
      );
