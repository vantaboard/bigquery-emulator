    SELECT 1 AS case_id, TO_JSON_STRING(percentage_difference(CAST(0.2 AS NUMERIC), CAST(0.8 AS NUMERIC))) AS actual, TO_JSON_STRING(CAST(1.2 AS FLOAT64)) AS expected
