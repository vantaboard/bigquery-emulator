      CREATE FUNCTION interval_micros(iv INTERVAL)
      RETURNS FLOAT64

      AS (
           31536000000000 * EXTRACT(YEAR FROM iv)
          + 2592000000000 * EXTRACT(MONTH FROM iv)
          +   86400000000 * EXTRACT(DAY FROM iv)
          +    3600000000 * EXTRACT(HOUR FROM iv)
          +      60000000 * EXTRACT(MINUTE FROM iv)
          +       1000000 * EXTRACT(SECOND FROM iv)
          +          1000 * EXTRACT(MILLISECOND FROM iv)
          +                 EXTRACT(MICROSECOND FROM iv)
      );
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(interval_micros(INTERVAL -1 DAY)) AS actual, TO_JSON_STRING(CAST(-86400000000 AS INT64)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
expected:
  match: ordered
  rows:
