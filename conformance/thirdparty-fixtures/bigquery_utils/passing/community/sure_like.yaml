      CREATE FUNCTION sure_like(value STRING, like_pattern STRING)

      AS (
        IF(
          value NOT LIKE like_pattern,
          ERROR(FORMAT("sure_like: Value must be matech (%T LIKE %T)", value, like_pattern)),
          value
        )
      );
