      CREATE FUNCTION split_part(
        string STRING,
        delimiter STRING,
        part INT64)
      AS (
        CASE
          WHEN part < 1 THEN ERROR('The part argument must be an integer greater than 0.')
          WHEN ARRAY_LENGTH(SPLIT(string, delimiter)) < part THEN ""
          ELSE SPLIT(string, delimiter)[ORDINAL(part)]
        END
      );
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(split_part("2020-02-01", "-", CAST(1 AS INT64))) AS actual, TO_JSON_STRING("2020") AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(split_part("2020-02-01", "-", CAST(2 AS INT64))) AS actual, TO_JSON_STRING("02") AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(split_part("2020-02-01", "-", CAST(3 AS INT64))) AS actual, TO_JSON_STRING("01") AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(split_part("2020-02-01", "-", CAST(5 AS INT64))) AS actual, TO_JSON_STRING("") AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
