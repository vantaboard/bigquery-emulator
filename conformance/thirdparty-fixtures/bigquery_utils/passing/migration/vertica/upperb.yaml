      /** Emulate Vertica LOWERB function, which lowercases only ASCII characters within a given string. */
      CREATE FUNCTION upperb(str STRING) RETURNS STRING AS (
          CAST(UPPER(CAST(str AS BYTES)) AS STRING)
      );
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(upperb("étudiant")) AS actual, TO_JSON_STRING("éTUDIANT") AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(upperb("etudiant")) AS actual, TO_JSON_STRING("ETUDIANT") AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(upperb("foo")) AS actual, TO_JSON_STRING("FOO") AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(upperb("aBCdef Gh")) AS actual, TO_JSON_STRING("ABCDEF GH") AS expected
    UNION ALL
    SELECT 4 AS case_id, TO_JSON_STRING(upperb("")) AS actual, TO_JSON_STRING("") AS expected
    UNION ALL
    SELECT 5 AS case_id, TO_JSON_STRING(upperb(NULL)) AS actual, TO_JSON_STRING(NULL) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
