      /* Emulates Teradata's P_INTERSECT operator.  */
      CREATE FUNCTION cw_period_intersection(p1 STRUCT<lower TIMESTAMP, upper TIMESTAMP>, p2 STRUCT<lower TIMESTAMP, upper TIMESTAMP>) RETURNS STRUCT<lower TIMESTAMP, upper TIMESTAMP>

      AS (
        CASE
          WHEN GREATEST(p1.lower, p2.lower) < LEAST(p1.upper, p2.upper) THEN
            STRUCT(GREATEST(p1.lower, p2.lower) AS lower, LEAST(p1.upper, p2.upper) AS upper)
          ELSE NULL
        END
      );
