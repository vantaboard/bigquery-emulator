    SELECT 1 AS case_id, TO_JSON_STRING(cw_regexp_instr_2("TestStr123456", "90")) AS actual, TO_JSON_STRING(CAST(0 AS INT64)) AS expected
  )
  SELECT case_id, actual = expected AS matches FROM cases ORDER BY case_id
