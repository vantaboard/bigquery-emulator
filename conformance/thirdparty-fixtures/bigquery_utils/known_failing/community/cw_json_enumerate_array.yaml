      CREATE FUNCTION cw_json_enumerate_array(text string)
      RETURNS array<struct<ordinal int64, jsonvalue string>>
      LANGUAGE js AS """

          if ( text === null  )
            return [];
          var idx = 0;
          var nxt = function() {
              idx ++;
              return idx;
          };
          return  JSON.parse(text).map( x => ({ ordinal: nxt(), jsonvalue: JSON.stringify(x)}));
      """;
query: "WITH cases AS (\n  SELECT 0 AS case_id, TO_JSON_STRING(cw_json_enumerate_array('[{\"name\":\"Cameron\"}, {\"name\":\"John\"}]')) AS actual, TO_JSON_STRING(([STRUCT(CAST(1 AS INT64) AS ordinal, '{\"name\":\"Cameron\"}' AS jsonvalue), \n                           STRUCT(CAST(2 AS INT64) AS ordinal, '{\"name\":\"John\"}' AS jsonvalue)])) AS expected\n)\nSELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id\n"
