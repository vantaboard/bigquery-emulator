      CREATE FUNCTION levenshtein(source STRING, target STRING)
      RETURNS INT64
      LANGUAGE js
      AS
      """
        return js_levenshtein(source || '', target || '');
      """
      ;
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(levenshtein("analyze", "analyse")) AS actual, TO_JSON_STRING(CAST(1 AS INT64)) AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(levenshtein("opossum", "possum")) AS actual, TO_JSON_STRING(CAST(1 AS INT64)) AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(levenshtein("potatoe", "potatoe")) AS actual, TO_JSON_STRING(CAST(0 AS INT64)) AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(levenshtein("while", "whilst")) AS actual, TO_JSON_STRING(CAST(2 AS INT64)) AS expected
    UNION ALL
    SELECT 4 AS case_id, TO_JSON_STRING(levenshtein("aluminum", "alumininium")) AS actual, TO_JSON_STRING(CAST(3 AS INT64)) AS expected
    UNION ALL
    SELECT 5 AS case_id, TO_JSON_STRING(levenshtein("Connecticut", "CT")) AS actual, TO_JSON_STRING(CAST(10 AS INT64)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
