    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(cw_parse_timestamp("10-Sep-02 14:10:10123000", "DD-MMM-YY HH:mm:ssSSSSSS")) AS actual, TO_JSON_STRING(TIMESTAMP "2002-09-10 14:10:10.123000 UTC") AS expected
