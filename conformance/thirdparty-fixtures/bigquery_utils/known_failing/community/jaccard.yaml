      CREATE FUNCTION jaccard(a STRING, b STRING)
      RETURNS FLOAT64
      LANGUAGE js AS r"""
        let intersectSize = 0;

        if(a && b) {
          // Split word into characters, and make characters unique
          const sa = [...new Set(String(a).split(''))]
          const sb = [...new Set(String(b).split(''))]

          const la = sa.length;
          const lb = sb.length;

          for(let i = 0; i < la; i++) {
            for(let j = 0; j < lb; j++) {
              intersectSize += (sa[i] === sb[j]) ? 1 : 0
            }
          }

          // Compute Jaccard distance
          const union = (sa.length + sb.length) - intersectSize
          return parseFloat(((intersectSize / union) * 100 + Number.EPSILON) / 100).toFixed(2)
        } else {
          return 0.0
        }
      """;
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(jaccard("thanks", "thaanks")) AS actual, TO_JSON_STRING(CAST(1.0 AS FLOAT64)) AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(jaccard("thanks", "thanxs")) AS actual, TO_JSON_STRING(CAST(0.71 AS FLOAT64)) AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(jaccard("bad demo", "abd demo")) AS actual, TO_JSON_STRING(CAST(1.0 AS FLOAT64)) AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(jaccard("edge case", "no match")) AS actual, TO_JSON_STRING(CAST(0.25 AS FLOAT64)) AS expected
    UNION ALL
    SELECT 4 AS case_id, TO_JSON_STRING(jaccard("12", "123")) AS actual, TO_JSON_STRING(CAST(0.67 AS FLOAT64)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
