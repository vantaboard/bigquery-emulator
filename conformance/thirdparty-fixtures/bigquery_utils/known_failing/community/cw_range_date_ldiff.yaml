      CREATE FUNCTION cw_range_date_ldiff(p1 RANGE<DATE>, p2 RANGE<DATE>) RETURNS RANGE<DATE>

      AS (
        CASE
          WHEN RANGE_OVERLAPS(p1, p2) AND RANGE_START(p1) < RANGE_START(p2) THEN
            RANGE(RANGE_START(p1), RANGE_START(p2))
          ELSE NULL
        END
      );
