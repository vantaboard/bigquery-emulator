    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(sure_range("b", "a", "c")) AS actual, TO_JSON_STRING("b") AS expected
  )
  SELECT case_id, actual = expected AS matches FROM cases ORDER BY case_id
