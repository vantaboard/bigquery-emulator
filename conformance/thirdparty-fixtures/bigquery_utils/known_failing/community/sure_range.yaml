      CREATE FUNCTION sure_range(
        value ANY TYPE
        , lower_bound ANY TYPE
        , upper_bound ANY TYPE
      )

      AS (
        IF(
          value NOT BETWEEN lower_bound AND upper_bound,
          error(format("sure_range: Value %T must be included in [%T, %T]", value, lower_bound, upper_bound)),
          value
        )
      );
query: |
