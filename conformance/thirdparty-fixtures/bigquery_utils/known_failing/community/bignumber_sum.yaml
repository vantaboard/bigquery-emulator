  - sql: "/*\n * Copyright 2023 Google LLC\n *\n * Licensed under the Apache License, Version 2.0 (the \"License\");\n * you may not use this file except in compliance with the License.\n * You may obtain a copy of the License at\n *\n *     http://www.apache.org/licenses/LICENSE-2.0\n *\n * Unless required by applicable law or agreed to in writing, software\n * distributed under the License is distributed on an \"AS IS\" BASIS,\n * WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\n * See the License for the specific language governing permissions and\n * limitations under the License.\n */\n\n-- Safely allows calculating the total sum of numbers of any magnitude\nCREATE FUNCTION bignumber_sum(numbers ARRAY<STRING>)\nRETURNS STRING\nLANGUAGE js\n  \nAS r\"\"\"\n    if (numbers === null || numbers.length === 0) {\n        return null;\n    }\n    let sum = new bn_js.BN(0, 10);\n    for (num of numbers) {\n        if (num === null || num === \"\") {\n            return null;\n        }\n        else {\n            // perform addition on sum and num, storing the result in sum\n            sum.iadd(new bn_js.BN(num, 10));\n        }\n    }\n    return sum.toString(10);\n\"\"\";"
query: "WITH cases AS (\n  SELECT 0 AS case_id, TO_JSON_STRING(bignumber_sum(ARRAY<STRING>[\n                \"99999999999999999999999999999999999999999999999999999999999999999999\", \n                \"893427328732842662772591830391462182598436547786876876876\",\n                \"123456789123456789123456789123456789123456789123456789123456789123456789\"\n            ])) AS actual, TO_JSON_STRING(\"123556789123457682550785521966119561715287180585639387560004576000333664\") AS expected\n  UNION ALL\n  SELECT 1 AS case_id, TO_JSON_STRING(bignumber_sum(ARRAY<STRING>[\n                \"99999999999999999999999999999999999999999999999999999999999999999999\", \n                \"\",\n                \"123456789123456789123456789123456789123456789123456789123456789123456789\"\n            ])) AS actual, TO_JSON_STRING(NULL) AS expected\n  UNION ALL\n  SELECT 2 AS case_id, TO_JSON_STRING(bignumber_sum(ARRAY<STRING>[\n                \"99999999999999999999999999999999999999999999999999999999999999999999\", \n                \"893427328732842662772591830391462182598436547786876876876\",\n                NULL\n            ])) AS actual, TO_JSON_STRING(NULL) AS expected\n)\nSELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id\n"
