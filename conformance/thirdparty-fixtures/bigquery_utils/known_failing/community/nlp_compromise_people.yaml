      CREATE FUNCTION nlp_compromise_people(str STRING)
      RETURNS ARRAY<STRING>
      LANGUAGE js AS """
        return nlp(str).people().out('topk').map(x=>x.normal)
      """
      ;
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(nlp_compromise_people("Mary is in the boat. Nancy is in the boat. Fred is in the boat. Jack is too.")) AS actual, TO_JSON_STRING(CAST(["mary", "nancy", "fred", "jack"] AS ARRAY<STRING>)) AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(nlp_compromise_people("jean jacket. jean Slkje")) AS actual, TO_JSON_STRING(CAST(["jean slkje"] AS ARRAY<STRING>)) AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(nlp_compromise_people("The Bill was passed by James MacCarthur")) AS actual, TO_JSON_STRING(CAST(["james maccarthur"] AS ARRAY<STRING>)) AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(nlp_compromise_people("Rod MacDonald bought a Rod")) AS actual, TO_JSON_STRING(CAST(["rod macdonald"] AS ARRAY<STRING>)) AS expected
    UNION ALL
    SELECT 4 AS case_id, TO_JSON_STRING(nlp_compromise_people("Matt 'the doctor' Smith lasted three seasons.")) AS actual, TO_JSON_STRING(CAST(["matt the doctor smith"] AS ARRAY<STRING>)) AS expected
    UNION ALL
    SELECT 5 AS case_id, TO_JSON_STRING(nlp_compromise_people("Randal Kieth Orton and Dwayne 'the rock' Johnson had a really funny fight.")) AS actual, TO_JSON_STRING(CAST(["randal kieth orton", "dwayne the rock johnson"] AS ARRAY<STRING>)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
