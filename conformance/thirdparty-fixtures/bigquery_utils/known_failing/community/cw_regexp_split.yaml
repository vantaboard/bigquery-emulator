      CREATE FUNCTION cw_regexp_split(text string, delim string, flags string)
      RETURNS array<struct<tokennumber int64, token string>>
      LANGUAGE js AS """
          var idx = 0;
          var nxt = function() {
              idx ++;
              return idx;
          };
          var fix_flags = function(mode) {
              var m = '';
              if (mode == 'i' || mode == 'm')
                  m += mode;
              else if (mode == 'n')
                  m += 's';
              m += 'g';
              return m;
          };

          return text.
              split( new RegExp(delim,fix_flags(flags))).
              filter( x => x != '').
              map( x => ({ tokennumber : nxt(), token: x }) );
      """;
query: "WITH cases AS (\n  SELECT 0 AS case_id, TO_JSON_STRING(cw_regexp_split(\"Test#1\", \"#\", \"i\")) AS actual, TO_JSON_STRING(([STRUCT(CAST(1 AS INT64) AS tokennumber, \"Test\" AS token), \n                           STRUCT(CAST(2 AS INT64) AS tokennumber, \"1\" AS token)])) AS expected\n)\nSELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id\n"
