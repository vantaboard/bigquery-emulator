      CREATE FUNCTION cw_csvld(text string, comma string, quote string,len INT64)
      RETURNS array<string>
      LANGUAGE js AS """

          var ret = []
          var index = 0;
          /* Can't return NULL from ARRAY */
          for( var j = 0 ; j < len ; j ++ ) ret.push('');
          if ( text === null )
              return ret;
          var state = 0;
          const STATE_TOP    = 0;
          const STATE_QUOTE  = 1;
          const STATE_ESCAPE = 2;
          var start_new = function () { index ++;  };
          var append = function(c) {  ret[index] += c; };

          for ( var j = 0 ; j < text.length ; j ++ ) {
              var c = text.charAt(j);
              switch ( state ) {
              case STATE_TOP:
                  if ( c == quote ) state = STATE_QUOTE;
                  else if ( c == comma ) start_new();
                  else append(c);
                  break;
              case STATE_QUOTE:
                  if ( c == quote ) state = STATE_ESCAPE;
                  else append(c);
                  break;
              case STATE_ESCAPE:
                  if ( c == quote ) {
                      state = STATE_QUOTE;
                      append(quote)
                  } else if ( c == comma ) {
                      state = STATE_TOP;
                      start_new();
                  } else {
                      state = STATE_TOP;
                      append(c);
                  }
                  break;
              default: /* impossible condition */
                  break;
              }
          }
          return ret;
      """;
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(cw_csvld("Test#123", "#", '"', CAST(2 AS INT64))) AS actual, TO_JSON_STRING(CAST(["Test", "123"] AS ARRAY<STRING>)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
expected:
  match: ordered
