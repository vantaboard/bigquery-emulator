      CREATE FUNCTION cw_otranslate(s STRING, key STRING, value STRING) RETURNS STRING AS (
        (SELECT
           STRING_AGG(CASE WHEN STRPOS(key, c) > 0
                           THEN SUBSTR(value, STRPOS(key, c), 1) -- this correctly gets '' for out-of-bounds
                           ELSE c END, '' ORDER BY o1 ASC)
         FROM UNNEST(SPLIT(s, '')) AS c WITH OFFSET o1
        )
      );
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(cw_otranslate("Thin and Thick", "Thk", "Sp")) AS actual, TO_JSON_STRING("Spin and Spic") AS expected
  )
  SELECT case_id, actual = expected AS matches FROM cases ORDER BY case_id
