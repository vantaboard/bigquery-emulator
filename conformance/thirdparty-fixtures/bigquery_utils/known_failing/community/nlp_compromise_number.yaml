    SELECT 1 AS case_id, TO_JSON_STRING(nlp_compromise_number("three point 5")) AS actual, TO_JSON_STRING(CAST(3.5 AS NUMERIC)) AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(nlp_compromise_number("2 hundred")) AS actual, TO_JSON_STRING(CAST(200 AS NUMERIC)) AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(nlp_compromise_number("minus 8")) AS actual, TO_JSON_STRING(CAST(-8 AS NUMERIC)) AS expected
    UNION ALL
    SELECT 4 AS case_id, TO_JSON_STRING(nlp_compromise_number("5 million 3 hundred 25 point zero 1")) AS actual, TO_JSON_STRING(CAST(5000325.01 AS NUMERIC)) AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
