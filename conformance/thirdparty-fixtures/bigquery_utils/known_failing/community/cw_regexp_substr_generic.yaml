      CREATE FUNCTION cw_regexp_substr_generic(str STRING, regexp STRING, p INT64, o INT64, mode STRING, g INT64) RETURNS STRING
      LANGUAGE js AS """
        if (str == null || regexp == null || p == null || o == null || mode == null) return null;
        var r = new RegExp(regexp, mode);
        var m = str.substring(p - 1).matchAll(r);
        if (m == null) return null;
        var co = 1;
        for(var cm of m) {
          if (co == o) {
            if (g < cm.length) {
              return cm[g];
            } else {
              return null;
            }
          }
          co++;
        }
        return null;
      """;
