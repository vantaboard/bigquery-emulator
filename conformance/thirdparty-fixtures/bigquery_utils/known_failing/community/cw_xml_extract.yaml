    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(cw_xml_extract("<a><b>x</b><b>y</b></a>", "//b/text()")) AS actual, TO_JSON_STRING("xy") AS expected
  )
  SELECT case_id, actual = expected AS matches FROM cases ORDER BY case_id
