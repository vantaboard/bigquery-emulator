    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(cw_xml_element_with_attributes("x", [STRUCT("a" AS name, "42" AS value), STRUCT(CAST(NULL AS STRING) AS name, "43" AS value)], ["a", "&amp;", "b"])) AS actual, TO_JSON_STRING('<x a="42" >a&amp;b</x>') AS expected
