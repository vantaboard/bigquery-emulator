      CREATE FUNCTION cw_xml_element_with_attributes(name STRING, attributes ARRAY<STRUCT<name STRING, value STRING>>, data ARRAY<STRING>) RETURNS STRING

      AS (
        (
          WITH
            t AS (
              SELECT
                COALESCE(
                  ' '
                    || NULLIF(
                      TRIM(STRING_AGG(COALESCE(a.name || '="' || NULLIF(a.value, '') || '"', ''), ' ')),
                      '')
                    || ' ',
                  '') AS attributes
              FROM UNNEST(attributes) a
            )
          SELECT
            '<' || name || ANY_VALUE(t.attributes) || '>' || STRING_AGG(COALESCE(v, ''), '') || '</'
            || name || '>'
          FROM t
          CROSS JOIN UNNEST(data) v
        )
      );
query: |
