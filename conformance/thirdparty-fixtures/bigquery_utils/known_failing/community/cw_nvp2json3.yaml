      CREATE FUNCTION cw_nvp2json3(nvp STRING,name_delim STRING, val_delim STRING) RETURNS STRING AS (
               --concat('{"',replace(replace(nvp,name_delim,'","'),val_delim,'":"'),'"}')
               -- JSON_EXTRACT(concat('{"',replace(replace(nvp,name_delim,'","'),val_delim,'":"'),'"}'),'$')
               JSON_EXTRACT(concat('{"',replace(replace(replace(replace(nvp,'\\','\\\\'),'"','\\"'),name_delim,'","'),val_delim,'":"'),'"}'),'$')
      );
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(cw_nvp2json3("name=google&occupation=engineer&hair=color", "&", "=")) AS actual, TO_JSON_STRING('{"name":"google","occupation":"engineer","hair":"color"}') AS expected
  )
  SELECT case_id, actual = expected AS matches FROM cases ORDER BY case_id
