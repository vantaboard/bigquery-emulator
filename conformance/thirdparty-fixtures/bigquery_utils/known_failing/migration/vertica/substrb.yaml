      /** Emulate Vertica SUBSTRB function, which treats the multibyte character string as a string of octets (bytes). */
      CREATE FUNCTION substrb(str STRING, startpos INT64 /* 1-based */, extent INT64 /* 1-based */) RETURNS STRING AS (
          CAST(SUBSTR(CAST(str AS BYTES), startpos, extent) AS STRING)
      );
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(substrb("soupçon", CAST(5 AS INT64), CAST(2 AS INT64))) AS actual, TO_JSON_STRING("ç") AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(substrb("foobar", CAST(1 AS INT64), CAST(2 AS INT64))) AS actual, TO_JSON_STRING("fo") AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(substrb("foobar", CAST(10 AS INT64), CAST(2  AS INT64))) AS actual, TO_JSON_STRING("") AS expected
    UNION ALL
    SELECT 3 AS case_id, TO_JSON_STRING(substrb(NULL, CAST(1 AS INT64), CAST(2 AS INT64))) AS actual, TO_JSON_STRING(NULL) AS expected
    UNION ALL
    SELECT 4 AS case_id, TO_JSON_STRING(substrb("", CAST(3 AS INT64), CAST(4 AS INT64))) AS actual, TO_JSON_STRING("") AS expected
  )
  SELECT case_id, actual = expected AS matches FROM cases ORDER BY case_id
