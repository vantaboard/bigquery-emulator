  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(convert_datetime_string(DATETIME '2024-10-01 13:34:56.789', 130)) AS actual, TO_JSON_STRING('01 Oct 2024 01:34:56:7890000PM') AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(convert_datetime_string(DATETIME '2024-10-01 13:34:56.789', 1)) AS actual, TO_JSON_STRING('10/01/24') AS expected
