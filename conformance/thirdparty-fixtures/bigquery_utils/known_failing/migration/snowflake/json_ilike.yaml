      CREATE FUNCTION json_ilike(input JSON, pattern STRING)
      RETURNS JSON
      LANGUAGE js
       AS r"""
        const re = new RegExp("^" + pattern.replace(/_/g, ".").replace(/\%/g, ".*") + "$", "i");
        return Object.fromEntries(Object.entries(input).filter(kv => re.test(kv[0])));
      """;
query: |
  WITH cases AS (
    SELECT 0 AS case_id, TO_JSON_STRING(json_ilike(json_object('abc', 1, 'def', 2), '_b_')) AS actual, TO_JSON_STRING(JSON '{"abc": 1}') AS expected
    UNION ALL
    SELECT 1 AS case_id, TO_JSON_STRING(json_ilike(json_object('abc', 1, 'cba', 2), '%c%')) AS actual, TO_JSON_STRING(JSON '{"abc": 1, "cba": 2}') AS expected
    UNION ALL
    SELECT 2 AS case_id, TO_JSON_STRING(json_ilike(json_object('abc', 1, 'cba', 2), 'c%')) AS actual, TO_JSON_STRING(JSON '{"cba": 2}') AS expected
  )
  SELECT case_id, IFNULL(actual = expected, actual IS NULL AND expected IS NULL) AS matches FROM cases ORDER BY case_id
