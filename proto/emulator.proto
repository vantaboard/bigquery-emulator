// emulator.proto is the internal contract between the Go REST gateway and
// the C++ engine. It is intentionally minimal: the gateway owns the
// public-facing BigQuery REST shape, and only forwards the bits that
// actually need GoogleSQL to do their job.
//
// Code generation is wired up via buf (see ../buf.gen.yaml) for the Go
// side and via Bazel (see ./BUILD.bazel) for the C++ side. The Go
// stubs land in gateway/enginepb/ and are checked in so `go build`
// works without an extra codegen step; the C++ stubs are generated
// fresh into the Bazel output tree.

syntax = "proto3";

package bigquery_emulator.v1;

// Generated artifacts:
//   - Go:  github.com/vantaboard/bigquery-emulator/gateway/enginepb
//   - C++: namespace bigquery_emulator::v1 (derived from `package` above).
option go_package = "github.com/vantaboard/bigquery-emulator/gateway/enginepb;enginepb";

// Use arenas for the C++ codegen path; gives us per-RPC bump-allocator
// behavior for the engine without changing any .proto definitions.
option cc_enable_arenas = true;

// ---------------------------------------------------------------------------
// Catalog service
//
// The Go gateway is the source of truth for the BigQuery resource model
// (projects -> datasets -> tables). It tells the engine about catalog
// changes so the engine can resolve names during analysis and find rows
// during execution.
// ---------------------------------------------------------------------------

service Catalog {
  rpc RegisterDataset(RegisterDatasetRequest) returns (RegisterDatasetResponse);
  rpc DropDataset(DropDatasetRequest) returns (DropDatasetResponse);
  rpc UndeleteDataset(UndeleteDatasetRequest) returns (UndeleteDatasetResponse);
  // Lists every dataset registered under `project_id`. The gateway's
  // `datasets.list` REST handler delegates here; the response is
  // shaped as a single page (no continuation cursor today, the
  // emulator never has enough datasets to need one).
  rpc ListDatasets(ListDatasetsRequest) returns (ListDatasetsResponse);

  rpc RegisterTable(RegisterTableRequest) returns (RegisterTableResponse);
  rpc DropTable(DropTableRequest) returns (DropTableResponse);
  // Lists every table registered under `dataset`. The gateway's
  // `tables.list` REST handler delegates here; pagination contract
  // matches ListDatasets.
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);

  rpc DescribeTable(DescribeTableRequest) returns (DescribeTableResponse);

  // Row-level access. `InsertRows` delegates to `Storage::AppendRows`
  // and is the engine side of `tabledata.insertAll`. `ListRows` is
  // the engine side of `tabledata.list` and returns a single
  // (possibly empty) page of rows plus the total row count so the
  // gateway can synthesize BigQuery's pageToken semantics.
  rpc InsertRows(InsertRowsRequest) returns (InsertRowsResponse);
  rpc ListRows(ListRowsRequest) returns (ListRowsResponse);

  // Routine metadata persisted in `catalog.duckdb` for REST
  // round-trip and cross-restart SQL UDF / TVF / procedure replay.
  rpc ListRoutines(ListRoutinesRequest) returns (ListRoutinesResponse);
  rpc GetRoutine(GetRoutineRequest) returns (GetRoutineResponse);
  rpc UpsertRoutine(UpsertRoutineRequest) returns (UpsertRoutineResponse);
  rpc DeleteRoutine(DeleteRoutineRequest) returns (DeleteRoutineResponse);

  // Row-access policies and column-level security metadata.
  rpc UpsertRowAccessPolicy(UpsertRowAccessPolicyRequest)
      returns (UpsertRowAccessPolicyResponse);
  rpc DeleteRowAccessPolicy(DeleteRowAccessPolicyRequest)
      returns (DeleteRowAccessPolicyResponse);
  rpc ListRowAccessPolicies(ListRowAccessPoliciesRequest)
      returns (ListRowAccessPoliciesResponse);
  rpc SetColumnGovernance(SetColumnGovernanceRequest)
      returns (SetColumnGovernanceResponse);
}

message DatasetRef {
  string project_id = 1;
  string dataset_id = 2;
}

message TableRef {
  string project_id = 1;
  string dataset_id = 2;
  string table_id = 3;
  // BigQuery REST `type` when known (e.g. VIEW). Empty defaults to TABLE.
  string table_type = 4;
}

message FieldSchema {
  string name = 1;
  // BigQuery type names: STRING, INT64, FLOAT64, BOOL, TIMESTAMP, DATE,
  // TIME, DATETIME, GEOGRAPHY, BYTES, NUMERIC, BIGNUMERIC, JSON, STRUCT,
  // ARRAY, ...
  string type = 2;
  // NULLABLE | REQUIRED | REPEATED. Empty defaults to NULLABLE.
  string mode = 3;
  string description = 4;
  repeated FieldSchema fields = 5;  // for STRUCT/RECORD.
}

message TableSchema {
  repeated FieldSchema fields = 1;
}

message RegisterDatasetRequest {
  DatasetRef dataset = 1;
  string location = 2;
}
message RegisterDatasetResponse {}

message DropDatasetRequest {
  DatasetRef dataset = 1;
  bool delete_contents = 2;
}
message DropDatasetResponse {}

message UndeleteDatasetRequest {
  DatasetRef dataset = 1;
}
message UndeleteDatasetResponse {}

message ListDatasetsRequest {
  string project_id = 1;
}
message ListDatasetsResponse {
  // Refs are returned in deterministic (lexicographic by dataset_id)
  // order so the gateway's listing is stable across calls. See
  // backend/storage/storage.h::Storage::ListDatasets.
  repeated DatasetRef datasets = 1;
}

message RegisterTableRequest {
  TableRef table = 1;
  TableSchema schema = 2;
}
message RegisterTableResponse {}

message DropTableRequest {
  TableRef table = 1;
}
message DropTableResponse {}

message ListTablesRequest {
  DatasetRef dataset = 1;
}
message ListTablesResponse {
  // Refs are returned in deterministic (lexicographic by table_id)
  // order. See backend/storage/storage.h::Storage::ListTables.
  repeated TableRef tables = 1;
}

message DescribeTableRequest {
  TableRef table = 1;
}
message DescribeTableResponse {
  TableSchema schema = 1;
  // BigQuery REST `type` when the table is a logical view (empty for
  // physical tables). Populated by Catalog.DescribeTable when the
  // target is registered in the view registry rather than storage.
  string table_type = 2;
  // View SQL (`view.query` on the REST Table resource).
  string view_query = 3;
  // Always false for GoogleSQL views; carried for REST parity.
  bool view_use_legacy_sql = 4;
}

// DataRow is a single row of stored data. Cells are positional and
// align with the columns of the target table's `TableSchema`. The
// `Cell` shape is shared with `Query`'s result rows so the wire
// types stay consistent across the two read paths.
message DataRow {
  repeated Cell cells = 1;
}

message InsertRowsRequest {
  TableRef table = 1;
  repeated DataRow rows = 2;
}
message InsertRowsResponse {}

message ListRowsRequest {
  TableRef table = 1;
  // Row index of the first row to return (0-based). Rows before this
  // index are skipped.
  int64 start_index = 2;
  // Maximum number of rows in the response. A non-positive value
  // returns every remaining row from `start_index`.
  int64 max_results = 3;
}
message RoutineRef {
  string project_id = 1;
  string dataset_id = 2;
  string routine_id = 3;
}

message RoutineDescriptor {
  RoutineRef routine = 1;
  // SCALAR_FUNCTION | AGGREGATE_FUNCTION | TABLE_VALUED_FUNCTION | PROCEDURE
  string routine_type = 2;
  string language = 3;
  string definition_body = 4;
  string ddl_sql = 5;
  string signature_json = 6;
}

message ListRoutinesRequest {
  DatasetRef dataset = 1;
}
message ListRoutinesResponse {
  repeated RoutineDescriptor routines = 1;
}

message GetRoutineRequest {
  RoutineRef routine = 1;
}
message GetRoutineResponse {
  RoutineDescriptor routine = 1;
}

message UpsertRoutineRequest {
  RoutineDescriptor routine = 1;
}
message UpsertRoutineResponse {}

message DeleteRoutineRequest {
  RoutineRef routine = 1;
}
message DeleteRoutineResponse {}

message RowAccessPolicy {
  TableRef table = 1;
  string policy_id = 2;
  string filter_predicate = 3;
  repeated string grantees = 4;
  int64 creation_time_ms = 5;
  int64 last_modified_time_ms = 6;
}

message UpsertRowAccessPolicyRequest {
  RowAccessPolicy policy = 1;
}
message UpsertRowAccessPolicyResponse {
  RowAccessPolicy policy = 1;
}

message DeleteRowAccessPolicyRequest {
  TableRef table = 1;
  string policy_id = 2;
}
message DeleteRowAccessPolicyResponse {}

message ListRowAccessPoliciesRequest {
  TableRef table = 1;
}
message ListRowAccessPoliciesResponse {
  repeated RowAccessPolicy policies = 1;
}

message ColumnGovernance {
  string column_name = 1;
  repeated string policy_tags = 2;
  // NULLIFY | SHA256 | DEFAULT_VALUE | DENIED | NONE
  string mask_kind = 3;
  repeated string mask_grantees = 4;
  string default_mask_value = 5;
}

message SetColumnGovernanceRequest {
  TableRef table = 1;
  ColumnGovernance column = 2;
}
message SetColumnGovernanceResponse {}

message ListRowsResponse {
  repeated DataRow rows = 1;
  // Total number of rows in the table at the moment the request was
  // served; the gateway surfaces this as `totalRows` in the REST
  // response.
  int64 total_rows = 2;
  // One past the index of the last row returned. The gateway uses
  // this to emit a `pageToken` (when `next_start_index < total_rows`)
  // or omit it (when the page reached the end of the table).
  int64 next_start_index = 3;
}

// ---------------------------------------------------------------------------
// Query service
//
// The gateway forwards `bigquery.jobs.query` and the query-config branch of
// `bigquery.jobs.insert` here. The engine returns a streamed sequence of
// rows; the gateway is responsible for paginating them out to the BigQuery
// REST client.
// ---------------------------------------------------------------------------

service Query {
  rpc DryRun(QueryRequest) returns (DryRunResponse);
  rpc ExecuteQuery(QueryRequest) returns (stream QueryResultRow);
}

message QueryRequest {
  string project_id = 1;
  // Default dataset for unqualified table references.
  string default_dataset_id = 2;
  string sql = 3;
  // Optional: query parameters keyed by name. Positional parameters use
  // an empty key (BigQuery's @0, @1, ... convention is unrolled here).
  map<string, QueryParameter> parameters = 4;
  bool use_legacy_sql = 5;
  // Synthetic caller email from the gateway auth middleware. Empty
  // defaults to emulator@bigquery.local at the engine boundary.
  string principal_email = 6;
}

message QueryParameter {
  string type_kind = 1;   // googlesql TypeKind name (e.g. INT64, STRING).
  string value_json = 2;  // JSON-encoded literal value.
  // Optional STRUCT/ARRAY field-type descriptor (gateway-encoded from
  // REST `parameterType`; empty for scalar parameters).
  string type_json = 3;
}

message DryRunResponse {
  TableSchema schema = 1;
  int64 estimated_bytes_processed = 2;
}

message QueryResultRow {
  // The stream carries one of five message kinds:
  //   * `schema` only — emitted as the first message of every
  //     `ExecuteQuery` reply for SELECT-shaped queries.
  //   * `cells` only — emitted once per result row.
  //   * `dml_stats` only — emitted as the final message of an
  //     INSERT / UPDATE / DELETE / MERGE reply, after any optional
  //     THEN-RETURN rows. Carries the per-statement modification
  //     counts the gateway folds into BigQuery's REST `dmlStats`
  //     and `numDmlAffectedRows` fields.
  //   * `statement_type` only — emitted as the trailing message of
  //     every successful reply (SELECT, DML, and DDL alike). The
  //     value is one of the canonical BigQuery REST statement-type
  //     strings (`SELECT`, `INSERT`, `CREATE_TABLE`, ...) the
  //     gateway folds into the
  //     `QueryResponse.statistics.query.statementType` envelope so
  //     callers can tell DDL / metadata / catalog operations apart
  //     from SELECTs and DML at the response layer. Routes that
  //     produce no recognizable BigQuery shape (today: nothing in
  //     the supported surface) leave the field empty so the gateway
  //     omits the envelope entirely.
  //   * `phase_timings` only — emitted after the last data row (or
  //     dml_stats) and before the `statement_type` trailer. Carries
  //     per-phase wall times in microseconds for emulator-internal
  //     performance debugging; the gateway surfaces this on loopback
  //     callers only as `Job.statistics.query.emulatorPhases`.
  //   * `emulator_route` only — emitted alongside `statement_type`
  //     as the trailing pair of every successful reply. The value
  //     is the canonical lowercase-snake spelling of the
  //     `Disposition` the coordinator's `RouteClassifier` chose
  //     (`duckdb_native`, `duckdb_rewrite`, `duckdb_udf`,
  //     `semantic_executor`, `control_op`, `local_stub`,
  //     `unsupported`; mirrors `backend/engine/disposition.cc`'s
  //     `DispositionToString`). The gateway surfaces this on the
  //     `Job.statistics.query.emulatorRoute` field only to
  //     loopback callers (see
  //     `gateway/middleware/emulator_route.go`) so it stays an
  //     emulator-internal debug signal the conformance harness
  //     reads back to assert per-query routing decisions, never a
  //     stable wire field for BigQuery client libraries.
  TableSchema schema = 1;
  repeated Cell cells = 2;
  DmlStats dml_stats = 3;
  string statement_type = 4;
  string emulator_route = 5;
  PhaseTimings phase_timings = 6;
}

message PhaseTiming {
  string name = 1;
  int64 duration_us = 2;
}

message PhaseTimings {
  repeated PhaseTiming phases = 1;
}

// DmlStats is the engine's report of how many rows a DML statement
// (INSERT / UPDATE / DELETE / MERGE) modified. Mirrors the BigQuery
// REST `Job.statistics.query.dmlStats` shape (see
// docs/bigquery/docs/reference/rest/v2/DmlStats.md): the counts are
// 64-bit because BigQuery exposes them as decimal strings on the
// wire and the gateway formats them with `strconv.FormatInt` from
// these int64 fields.
message DmlStats {
  // Number of rows added by INSERT / MERGE-INSERT branches.
  int64 inserted_row_count = 1;
  // Number of rows updated by UPDATE / MERGE-UPDATE branches.
  int64 updated_row_count = 2;
  // Number of rows removed by DELETE / MERGE-DELETE branches.
  int64 deleted_row_count = 3;
}

message Cell {
  // Wire shape: either `string_value`, `null_value`, `array`, or `struct`
  // is set. Mirrors googlesql::Value's flavor of variant.
  oneof value {
    string string_value = 1;
    bool null_value = 2;
    Array array = 3;
    Struct struct_value = 4;
  }
}

message Array {
  repeated Cell elements = 1;
}

message Struct {
  repeated Cell fields = 1;
}

// ---------------------------------------------------------------------------
// SqlTools service
//
// Parser, formatter, tokenizer, and catalog-aware completion for downstream
// UIs and linters. Not part of the public BigQuery REST surface; exposed
// via gateway `/api/emulator/sql/*` when enabled.
// ---------------------------------------------------------------------------

service SqlTools {
  rpc Format(FormatSqlRequest) returns (FormatSqlResponse);
  rpc Parse(ParseSqlRequest) returns (ParseSqlResponse);
  rpc Tokenize(TokenizeSqlRequest) returns (TokenizeSqlResponse);
  rpc Complete(CompleteSqlRequest) returns (CompleteSqlResponse);
  rpc Analyze(AnalyzeSqlRequest) returns (AnalyzeSqlResponse);
}

message SqlDiagnostic {
  int32 line = 1;
  int32 column = 2;
  string message = 3;
  string severity = 4;
  int32 end_line = 5;
  int32 end_column = 6;
  int32 start_byte = 7;
  int32 end_byte = 8;
}

message FormatSqlRequest {
  string sql = 1;
  // When true, use strict FormatSql (strips comments). Default is lenient.
  bool strict = 2;
  int32 line_length_limit = 3;
  int32 indentation_spaces = 4;
}

message FormatSqlResponse {
  string formatted_sql = 1;
  repeated SqlDiagnostic diagnostics = 2;
}

message ParseSqlRequest {
  string sql = 1;
}

message ParseSqlResponse {
  repeated SqlDiagnostic diagnostics = 1;
  repeated string statement_kinds = 2;
}

message TokenizeSqlRequest {
  string sql = 1;
  bool include_comments = 2;
}

message SqlToken {
  string kind = 1;
  string image = 2;
  int32 start_byte = 3;
  int32 end_byte = 4;
}

message TokenizeSqlResponse {
  repeated SqlToken tokens = 1;
  repeated SqlDiagnostic diagnostics = 2;
}

message CompleteSqlRequest {
  string project_id = 1;
  string default_dataset_id = 2;
  string sql = 3;
  int32 cursor_byte_offset = 4;
}

message SqlCompletionCandidate {
  string label = 1;
  string kind = 2;
  string insert_text = 3;
  string detail = 4;
  string fqn = 5;
}

message CompleteSqlResponse {
  repeated SqlCompletionCandidate candidates = 1;
  int32 replacement_start = 2;
  int32 replacement_end = 3;
}

message AnalyzeSqlRequest {
  string project_id = 1;
  string default_dataset_id = 2;
  string sql = 3;
}

message ReferencedTable {
  string project_id = 1;
  string dataset_id = 2;
  string table_id = 3;
  string alias = 4;
  string kind = 5;
}

message AnalyzeSqlResponse {
  repeated ReferencedTable referenced_tables = 1;
  repeated string statement_kinds = 2;
  repeated SqlDiagnostic diagnostics = 3;
}
